---
# =============================================================================
# STIG ID  : RHEL-10-000520
# Rule ID  : SV-280936r1184726_rule
# Severity : low
# CCI      : CCI-001849
# Title    : RHEL 10 must use a separate file system for the system audit data path.
#
# Description:
#   Placing "/var/log/audit" in its own partition enables better separation
#   between audit files and other system files and helps ensure that auditing
#   cannot be halted due to the partition running out of space.
#
# Check Text:
#   Verify RHEL 10 uses a separate file system/partition for the system audit
#   data path with the following command:
#
#   Note: /var/log/audit is used as the example as it is a common location.
#
#   $ mount | grep /var/log/audit
#   /dev/mapper/rootvg-varlogaudit on /var/log/audit type xfs
#   (rw,relatime,seclabel,attr2,inode64,logbufs=8,logbsize=32k,noquota)
#   Note: Options displayed for mount may differ.
#
#   If no line is returned, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to use a separate file system for the system audit data
#   path by migrating "/var/log/audit" onto a separate file system.
# =============================================================================

- name: "RHEL-10-000520 | RHEL 10 must use a separate file system for the system audit data path."
  when: rhel_10_000520 | bool
  tags:
    - RHEL-10-000520
    - low
    - CCI-001849
  block:
    - name: "RHEL-10-000520 | Check /var/log/audit is a distinct mountpoint"
      ansible.builtin.command: findmnt --noheadings --mountpoint /var/log/audit
      register: rhel_10_000520_findmnt
      changed_when: false
      failed_when: false

    - name: "RHEL-10-000520 | Assert /var/log/audit is on a separate filesystem"
      ansible.builtin.assert:
        that: rhel_10_000520_findmnt.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-000520 detail=/var/log/audit is not mounted on a separate filesystem. Remediation requires migrating /var/log/audit to a dedicated partition (typically requires offline partition work or a system reinstall)."
        success_msg: "result=PASS stig_id=RHEL-10-000520 detail=/var/log/audit is on a separate filesystem."

  rescue:
    - name: "RHEL-10-000520 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-000520 detail=Task failed unexpectedly — see prior error for details."
