---
# =============================================================================
# STIG ID  : RHEL-10-000530
# Rule ID  : SV-280937r1184727_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must use a separate file system for user home directories (such as "/home" or an equivalent).
#
# Description:
#   Ensuring that "/home" is mounted on its own partition enables the setting
#   of more restrictive mount options and helps ensure that users cannot
#   trivially fill partitions used for log or audit data storage.
#
# Check Text:
#   Verify RHEL 10 uses a separate file system/partition for "/home" with the
#   following command:
#
#   $ mount | grep /home
#   /dev/mapper/luks-ca2261ed-7b00-4b7b-84cd-8cd6d8fa4b28 on /home type xfs
#   (rw,nodev,nosuid,noexec,seclabel)
#   Note: Options displayed for mount may differ.
#
#   If a separate entry for "/home" is not in use, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to use a separate file system for user home directories
#   by migrating the "/home" directory onto a separate file system/partition.
# =============================================================================

- name: "RHEL-10-000530 | RHEL 10 must use a separate file system for user home directories (such as /home or an equivalent)."
  when: rhel_10_000530 | bool
  tags:
    - RHEL-10-000530
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-000530 | Check /home is a distinct mountpoint"
      ansible.builtin.command: findmnt --noheadings --mountpoint /home
      register: rhel_10_000530_findmnt
      changed_when: false
      failed_when: false

    - name: "RHEL-10-000530 | Assert /home is on a separate filesystem"
      ansible.builtin.assert:
        that: rhel_10_000530_findmnt.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-000530 detail=/home is not mounted on a separate filesystem. Remediation requires migrating /home to a dedicated partition (typically requires offline partition work or a system reinstall)."
        success_msg: "result=PASS stig_id=RHEL-10-000530 detail=/home is on a separate filesystem."

  rescue:
    - name: "RHEL-10-000530 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-000530 detail=Task failed unexpectedly — see prior error for details."
