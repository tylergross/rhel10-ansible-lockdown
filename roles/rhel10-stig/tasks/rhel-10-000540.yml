---
# =============================================================================
# STIG ID  : RHEL-10-000540
# Rule ID  : SV-280938r1184728_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must use a separate file system for "/tmp".
#
# Description:
#   The "/tmp" partition is used as temporary storage by many programs.
#   Placing "/tmp" in its own partition enables the setting of more
#   restrictive mount options, which can help protect programs that use it.
#
# Check Text:
#   Verify RHEL 10 uses a separate file system/partition for "/tmp" with the
#   following command:
#
#   $ mount | grep /tmp
#   /dev/mapper/luks-2d7e1b45-73c4-4282-8838-15a897e0d04e on /tmp type
#   xfs(rw,nodev,nosuid,noexec,seclabel)
#
#   Note: Options displayed for mount may differ.
#
#   If a separate entry for "/tmp" is not in use, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to use a separate file system for temporary storage
#   directories by migrating the "/tmp" path onto a separate file system.
# =============================================================================

- name: "RHEL-10-000540 | RHEL 10 must use a separate file system for /tmp."
  when: rhel_10_000540 | bool
  tags:
    - RHEL-10-000540
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-000540 | Check /tmp is a distinct mountpoint"
      ansible.builtin.command: findmnt --noheadings --mountpoint /tmp
      register: rhel_10_000540_findmnt
      changed_when: false
      failed_when: false

    - name: "RHEL-10-000540 | Assert /tmp is on a separate filesystem"
      ansible.builtin.assert:
        that: rhel_10_000540_findmnt.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-000540 detail=/tmp is not mounted on a separate filesystem. Remediation requires migrating /tmp to a dedicated partition or enabling the systemd tmp.mount unit (tmpfs)."
        success_msg: "result=PASS stig_id=RHEL-10-000540 detail=/tmp is on a separate filesystem."

  rescue:
    - name: "RHEL-10-000540 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-000540 detail=Task failed unexpectedly — see prior error for details."
