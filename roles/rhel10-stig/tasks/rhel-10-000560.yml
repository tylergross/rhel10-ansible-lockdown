---
# =============================================================================
# STIG ID  : RHEL-10-000560
# Rule ID  : SV-280940r1184730_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must use a separate file system for "/var/log".
#
# Description:
#   Placing "/var/log" in its own partition enables better separation between
#   log files and other files in "/var/".
#
# Check Text:
#   Verify RHEL 10 uses a separate file system/partition for "/var/log" with
#   the following command:
#
#   $ mount | grep /var/log
#   /dev/mapper/luks-c651f493-9fdc-4c6e-a711-0a4f03149661 on /var/log type
#   xfs (rw,nosuid,nodev,noexec,relatime,seclabel,attr2)
#   Note: Options displayed for mount may differ.
#
#   If a separate entry for "/var/log" is not in use, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to use a separate file system for log file directories
#   by migrating the "/var/log" path onto a separate file system.
# =============================================================================

- name: "RHEL-10-000560 | RHEL 10 must use a separate file system for /var/log."
  when: rhel_10_000560 | bool
  tags:
    - RHEL-10-000560
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-000560 | Check /var/log is a distinct mountpoint"
      ansible.builtin.command: findmnt --noheadings --mountpoint /var/log
      register: rhel_10_000560_findmnt
      changed_when: false
      failed_when: false

    - name: "RHEL-10-000560 | Assert /var/log is on a separate filesystem"
      ansible.builtin.assert:
        that: rhel_10_000560_findmnt.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-000560 detail=/var/log is not mounted on a separate filesystem. Remediation requires migrating /var/log to a dedicated partition (typically requires offline partition work or a system reinstall)."
        success_msg: "result=PASS stig_id=RHEL-10-000560 detail=/var/log is on a separate filesystem."

  rescue:
    - name: "RHEL-10-000560 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-000560 detail=Task failed unexpectedly — see prior error for details."
