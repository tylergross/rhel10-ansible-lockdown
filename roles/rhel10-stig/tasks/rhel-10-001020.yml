---
# =============================================================================
# STIG ID  : RHEL-10-001020
# Rule ID  : SV-280931r1197213_rule
# Severity : medium
# CCI      : CCI-003992
# Title    : RHEL 10 must ensure cryptographic verification of vendor software packages.
#
# Description:
#   Cryptographic verification of vendor software packages ensures that all
#   software packages are obtained from a valid source and protects against
#   spoofing that could lead to installation of malware on the system. Red
#   Hat cryptographically signs all software packages, including updates,
#   with a GNU Privacy Guard (GPG) key to verify that they are valid.
#
# Check Text:
#   Verify RHEL 10 ensures cryptographic verification of vendor software
#   packages.
#
#   Confirm Red Hat package-signing keys are installed on the system and
#   verify their fingerprints match vendor values.
#
#   Note: For RHEL 10 software packages, Red Hat uses GPG keys labeled
#   "release key 2", "auxiliary key 3", and "release key 4". The keys are
#   defined in key file "/etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release" by
#   default.
#
#   List Red Hat GPG keys installed on the system:
#
#   $ sudo rpm -q --queryformat "%{SUMMARY}\n" gpg-pubkey | grep -i "red hat"
#   Red Hat, Inc. (release key 2) <security@redhat.com> public key
#   Red Hat, Inc. (auxiliary key 3) <security@redhat.com> public key
#   Red Hat, Inc. (release key 4) <security@redhat.com> public key
#
#   If Red Hat GPG keys "release key 2", "auxiliary key 3", and "release key
#   4" are not installed, or if the key file
#   "/etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release" is missing, this is a
#   finding.
#
#   List key fingerprints of installed Red Hat GPG keys:
#
#   $ sq inspect /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
#   /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release: OpenPGP Certificate.
#
#   Fingerprint: 567E347AD0044ADE55BA8A5F199E2F91FD431D51
#   Public-key algo: RSA
#   Public-key size: 4096 bits
#   Creation time: 2009-10-22 11:59:55 UTC
#   Key flags: certification, signing
#
#   UserID: Red Hat, Inc. (release key 2) <security@redhat.com>
#
#   Note: There is another block of armored OpenPGP data.
#   Note: This is a non-standard extension to OpenPGP.
#
#   /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release: OpenPGP Certificate.
#
#   Fingerprint: 7E4624258C406535D56D6F135054E4A45A6340B3
#   Public-key algo: RSA
#   Public-key size: 4096 bits
#   Creation time: 2022-03-09 21:56:46 UTC
#   Key flags: certification, signing
#
#   UserID: Red Hat, Inc. (auxiliary key 3) <security@redhat.com>
#
#   Note: There is another block of armored OpenPGP data.
#   Note: This is a non-standard extension to OpenPGP.
#
#   /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release: OpenPGP Certificate.
#
#   Fingerprint:
#   FCD355B305707A62DA143AB6E422397E50FE8467A2A95343D246D6276AFEDF8F
#   Public-key algo: ML-DSA-87+Ed448
#   Creation time: 2025-10-08 17:40:03 UTC
#   Key flags: certification, signing
#
#   UserID: Red Hat, Inc. (release key 4) <security@redhat.com>
#
#   Compare key fingerprints of installed Red Hat GPG keys with fingerprints
#   listed for RHEL 10 on the Red Hat "Product Signing Keys" webpage at
#   https://access.redhat.com/security/team/key.
#
#   If key fingerprints do not match, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to ensure cryptographic verification of vendor software
#   packages.
#
#   Install Red Hat package-signing keys on the system and verify their
#   fingerprints match vendor values.
#
#   Insert the RHEL 10 installation disc or attach the RHEL 10 installation
#   image to the system. Mount the disc or image to make the contents
#   accessible inside the system.
#
#   Assuming the mounted location is "/media/cdrom", use the following
#   command to copy the Red Hat GPG key file onto the system:
#
#   $ sudo cp /media/cdrom/RPM-GPG-KEY-redhat-release /etc/pki/rpm-gpg/
#
#   Import Red Hat GPG keys from the key file into the system keyring:
#
#   $ sudo rpm --import /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
#
#   Using the steps listed in the Check Text, confirm the newly imported keys
#   show as installed on the system and verify their fingerprints match
#   vendor values.
# =============================================================================

- name: "RHEL-10-001020 | RHEL 10 must ensure cryptographic verification of vendor software packages."
  when: rhel_10_001020 | bool
  tags:
    - RHEL-10-001020
    - medium
    - CCI-003992
  block:
    - name: "RHEL-10-001020 | Check Red Hat GPG key file exists"
      ansible.builtin.stat:
        path: /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
      register: rhel_10_001020_keyfile

    - name: "RHEL-10-001020 | Assert Red Hat GPG key file is present"
      ansible.builtin.assert:
        that: rhel_10_001020_keyfile.stat.exists
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-001020
          detail=GPG key file /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release is missing.
          Remediation requires copying the key file from the RHEL 10 installation media
          and importing with: rpm --import /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
        success_msg: "result=PASS stig_id=RHEL-10-001020 detail=GPG key file /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release exists."

    - name: "RHEL-10-001020 | Query installed Red Hat GPG keys from rpm keyring"
      ansible.builtin.shell:
        cmd: >-
          "rpm -q --queryformat '%{SUMMARY}\n' gpg-pubkey | grep -i 'red hat'"
      register: rhel_10_001020_installed_keys
      changed_when: false
      failed_when: false

    - name: "RHEL-10-001020 | Assert release key 2 is installed"
      ansible.builtin.assert:
        that: rhel_10_001020_installed_keys.stdout is search('release key 2')
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-001020
          detail=Red Hat 'release key 2' is not installed in the rpm keyring.
          Import with: rpm --import /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
        success_msg: "result=PASS stig_id=RHEL-10-001020 detail=Red Hat 'release key 2' is installed in the rpm keyring."

    - name: "RHEL-10-001020 | Assert auxiliary key 3 is installed"
      ansible.builtin.assert:
        that: rhel_10_001020_installed_keys.stdout is search('auxiliary key 3')
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-001020
          detail=Red Hat 'auxiliary key 3' is not installed in the rpm keyring.
          Import with: rpm --import /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
        success_msg: "result=PASS stig_id=RHEL-10-001020 detail=Red Hat 'auxiliary key 3' is installed in the rpm keyring."

    - name: "RHEL-10-001020 | Assert release key 4 is installed"
      ansible.builtin.assert:
        that: rhel_10_001020_installed_keys.stdout is search('release key 4')
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-001020
          detail=Red Hat 'release key 4' is not installed in the rpm keyring.
          Import with: rpm --import /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
        success_msg: "result=PASS stig_id=RHEL-10-001020 detail=Red Hat 'release key 4' is installed in the rpm keyring."
