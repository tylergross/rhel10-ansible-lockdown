---
# =============================================================================
# STIG ID  : RHEL-10-001050
# Rule ID  : SV-280934r1165157_rule
# Severity : high
# CCI      : CCI-003992
# Title    : RHEL 10 must have GNU Privacy Guard (GPG) signature verification enabled for all software repositories.
#
# Description:
#   Changes to any software components can have significant effects on the
#   overall security of the operating system. This requirement ensures the
#   software has not been tampered with and has been provided by a trusted
#   vendor. All software packages must be signed with a cryptographic key
#   recognized and approved by the organization. Verifying the authenticity
#   of software prior to installation validates the integrity of the software
#   package received from a vendor.
#
# Check Text:
#   Verify RHEL 10 software repositories defined in "/etc/yum.repos.d/" have
#   been configured with "gpgcheck" enabled with the following command:
#
#   $ sudo grep -w gpgcheck /etc/yum.repos.d/*.repo | more
#   gpgcheck = 1
#
#   If "localpkg_gpgcheck" is not set to "1", or if the option is missing or
#   commented out, ask the system administrator how the GPG signatures of
#   local software packages are being verified.
#
#   If no process to verify GPG signatures has been approved by the
#   organization, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 software repositories defined in "/etc/yum.repos.d/" to
#   have "gpgcheck" enabled with the following command:
#
#   $ sudo sed -i 's/gpgcheck\s*=.*/gpgcheck=1/g' /etc/yum.repos.d/*
# =============================================================================

- name: "RHEL-10-001050 | RHEL 10 must have GNU Privacy Guard (GPG) signature verification enabled for all software repositories."
  when: rhel_10_001050 | bool
  tags:
    - RHEL-10-001050
    - high
    - CCI-003992
  block:
    - name: "RHEL-10-001050 | Find all .repo files"
      ansible.builtin.find:
        paths: /etc/yum.repos.d
        patterns: '*.repo'
      register: rhel_10_001050_repo_files

    - name: "RHEL-10-001050 | Check for repos with gpgcheck not set to 1"
      ansible.builtin.shell:
        cmd: >
          grep -Pl 'gpgcheck\s*=\s*(?!1\b)' {{ rhel_10_001050_repo_files.files | map(attribute='path') | join(' ') }}
          2>/dev/null || true
      register: rhel_10_001050_noncompliant
      changed_when: false
      failed_when: false
      when: rhel_10_001050_repo_files.matched > 0

    - name: "RHEL-10-001050 | Backup non-compliant .repo files before modification"
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ item }}.{{ ansible_date_time.epoch }}.bak"
        remote_src: true
        owner: root
        group: root
        mode: '0644'
      loop: "{{ rhel_10_001050_noncompliant.stdout_lines | default([]) }}"
      when:
        - rhel_10_001050_repo_files.matched > 0
        - rhel_10_001050_noncompliant.stdout | default('') | trim != ''

    - name: "RHEL-10-001050 | Ensure gpgcheck=1 in all non-compliant .repo files"
      ansible.builtin.replace:
        path: "{{ item }}"
        regexp: '(?m)^\s*gpgcheck\s*=\s*.*$'
        replace: 'gpgcheck=1'
      loop: "{{ rhel_10_001050_noncompliant.stdout_lines | default([]) }}"
      when:
        - rhel_10_001050_repo_files.matched > 0
        - rhel_10_001050_noncompliant.stdout | default('') | trim != ''

    - name: "RHEL-10-001050 | Re-check for repos with gpgcheck not set to 1"
      ansible.builtin.shell:
        cmd: >
          grep -Pl 'gpgcheck\s*=\s*(?!1\b)' {{ rhel_10_001050_repo_files.files | map(attribute='path') | join(' ') }}
          2>/dev/null || true
      register: rhel_10_001050_noncompliant_final
      changed_when: false
      failed_when: false
      when: rhel_10_001050_repo_files.matched > 0

    - name: "RHEL-10-001050 | Assert all .repo files have gpgcheck=1"
      ansible.builtin.assert:
        that: rhel_10_001050_noncompliant_final.stdout | default('') | trim == ''
        fail_msg: "result=FAIL stig_id=RHEL-10-001050 detail=One or more .repo files do not have gpgcheck=1 (files={{ rhel_10_001050_noncompliant_final.stdout | default('') | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-001050 detail=All .repo files in /etc/yum.repos.d have gpgcheck=1."
      when: rhel_10_001050_repo_files.matched > 0

    - name: "RHEL-10-001050 | Pass when no .repo files are present"
      ansible.builtin.assert:
        that: true
        success_msg: "result=PASS stig_id=RHEL-10-001050 detail=No .repo files found in /etc/yum.repos.d — nothing to check."
      when: rhel_10_001050_repo_files.matched == 0

  rescue:
    - name: "RHEL-10-001050 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-001050 detail=Task failed unexpectedly — see prior error for details."
