---
# =============================================================================
# STIG ID  : RHEL-10-200000
# Rule ID  : SV-280942r1165181_rule
# Severity : medium
# CCI      : CCI-002617
# Title    : RHEL 10 must remove all software components after updated versions have been installed.
#
# Description:
#   Previous versions of software components that are not removed from the
#   information system after updates have been installed may be exploited by
#   some adversaries.
#
# Check Text:
#   Verify RHEL 10 removes all software components after updated versions
#   have been installed with the following command:
#
#   $ sudo grep -i clean_requirements_on_remove /etc/dnf/dnf.conf
#   clean_requirements_on_remove=True
#
#   If "clean_requirements_on_remove" is not set to "True", this is a
#   finding.
#
# Fix Text:
#   Configure RHEL 10 to remove all software components after updated
#   versions have been installed.
#
#   Edit the file "/etc/dnf/dnf.conf" by adding or editing the following
#   line:
#
#   clean_requirements_on_remove=True
# =============================================================================

- name: "RHEL-10-200000 | RHEL 10 must remove all software components after updated versions have been installed."
  when: rhel_10_200000 | bool
  tags:
    - RHEL-10-200000
    - medium
    - CCI-002617
  block:
    - name: "RHEL-10-200000 | Check clean_requirements_on_remove in dnf.conf"
      ansible.builtin.command:
        cmd: grep -i clean_requirements_on_remove /etc/dnf/dnf.conf
      register: rhel_10_200000_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200000 | Backup /etc/dnf/dnf.conf before modification"
      ansible.builtin.copy:
        src: /etc/dnf/dnf.conf
        dest: "/etc/dnf/dnf.conf.{{ ansible_date_time.epoch }}.bak"
        remote_src: true
        owner: root
        group: root
        mode: '0644'
      when: rhel_10_200000_check.stdout is not search('(?i)clean_requirements_on_remove\s*=\s*True')

    - name: "RHEL-10-200000 | Ensure clean_requirements_on_remove=True in dnf.conf"
      ansible.builtin.lineinfile:
        path: /etc/dnf/dnf.conf
        regexp: '(?i)^\s*clean_requirements_on_remove\s*='
        line: 'clean_requirements_on_remove=True'
        insertafter: '^\[main\]'
        state: present
      when: rhel_10_200000_check.stdout is not search('(?i)clean_requirements_on_remove\s*=\s*True')

    - name: "RHEL-10-200000 | Re-check clean_requirements_on_remove after remediation"
      ansible.builtin.command:
        cmd: grep -i clean_requirements_on_remove /etc/dnf/dnf.conf
      register: rhel_10_200000_check_final
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200000 | Assert clean_requirements_on_remove=True"
      ansible.builtin.assert:
        that: rhel_10_200000_check_final.stdout is search('(?i)clean_requirements_on_remove\s*=\s*True')
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200000
          detail=clean_requirements_on_remove is not set to True in /etc/dnf/dnf.conf
          (found={{ rhel_10_200000_check_final.stdout | trim | default('missing') }}).
        success_msg: "result=PASS stig_id=RHEL-10-200000 detail=clean_requirements_on_remove=True is set in /etc/dnf/dnf.conf."
  rescue:
    - name: "RHEL-10-200000 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200000 detail=Task failed unexpectedly — see prior error for details."
