---
# =============================================================================
# STIG ID  : RHEL-10-200040
# Rule ID  : SV-280946r1184751_rule
# Severity : medium
# CCI      : CCI-000381
# Title    : RHEL 10 must not have the tuned package installed.
#
# Description:
#   It is detrimental for operating systems to provide, or install by
#   default, functionality exceeding requirements or mission objectives.
#   These unnecessary capabilities or services are often overlooked and
#   therefore, may remain unsecured. They increase the risk to the platform
#   by providing additional attack vectors. Operating systems are capable of
#   providing a wide variety of functions and services. Some of the functions
#   and services, provided by default, may not be necessary to support
#   essential organizational operations (e.g., key missions, functions). The
#   tuned package contains a daemon that tunes the system settings
#   dynamically. It does so by monitoring the usage of several system
#   components periodically. Based on that information, components will then
#   be put into lower or higher power savings modes to adapt to the current
#   usage. The tuned package is not needed for normal operating system
#   operations.
#
# Check Text:
#   Verify RHEL 10 does not have the tuned package installed with the
#   following command:
#
#   $ sudo dnf list --installed tuned
#   Error: No matching Packages to list
#
#   If the "tuned" package is installed and is not documented with the
#   information system security officer as an operational requirement, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to not have the tuned package installed with the
#   following command:
#
#   $ sudo dnf -y remove tuned
# =============================================================================

- name: "RHEL-10-200040 | RHEL 10 must not have the tuned package installed."
  when: rhel_10_200040 | bool
  tags:
    - RHEL-10-200040
    - medium
    - CCI-000381
  block:
    - name: "RHEL-10-200040 | Remove tuned if installed"
      ansible.builtin.package:
        name: tuned
        state: absent

    - name: "RHEL-10-200040 | Verify tuned is not installed"
      ansible.builtin.command: rpm -q tuned
      register: rhel_10_200040_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200040 | Assert tuned is not installed"
      ansible.builtin.assert:
        that: rhel_10_200040_check.rc != 0
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200040
          detail=Package tuned is still installed. Remove with: dnf -y remove tuned
        success_msg: "result=PASS stig_id=RHEL-10-200040 detail=Package tuned is not installed."
  rescue:
    - name: "RHEL-10-200040 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200040 detail=Task failed unexpectedly — see prior error for details."
