---
# =============================================================================
# STIG ID  : RHEL-10-200050
# Rule ID  : SV-280947r1165196_rule
# Severity : medium
# CCI      : CCI-000381
# Title    : RHEL 10 must not have a Trivial File Transfer Protocol (TFTP) server package installed unless it is required by the mission, and if required, the TFTP daemon must be configured to operate in secure mode.
#
# Description:
#   Removing the "tftp-server" package decreases the risk of the accidental
#   (or intentional) activation of TFTP services. If TFTP is required for
#   operational support (such as transmission of router configurations), its
#   use must be documented with the information systems security manager
#   (ISSM), restricted to only authorized personnel, and have access control
#   rules established. Restricting TFTP to a specific directory prevents
#   remote users from copying, transferring, or overwriting system files.
#
# Check Text:
#   Note: If TFTP is not required, it must not be installed. If TFTP is not
#   installed, this rule is not applicable.
#
#   Verify RHEL 10 is configured so that TFTP operates in secure mode if
#   installed.
#
#   Determine if TFTP server is installed with the following command:
#
#   $ sudo dnf list --installed | grep tftp-server
#   tftp-server.x86_64 5.2-48.el10 @rhel-10-for-x86_64-appstream-rpms
#
#   If the TFTP server package is installed and is not required, or if it is
#   not documented with the ISSM, this is a finding.
#
#   Verify the TFTP daemon, if tftp.server is installed, is configured to
#   operate in secure mode with the following command:
#
#   $ grep -i execstart /usr/lib/systemd/system/tftp.service
#   ExecStart=/usr/sbin/in.tftpd -s /var/lib/tftpboot
#
#   Note: The "-s" option ensures the TFTP server only serves files from the
#   specified directory, which is a security measure to prevent unauthorized
#   access to other parts of the file system.
#
#   If the "-s" option is not present in the "ExecStart" line, or if the line
#   is missing, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 so that TFTP operates in secure mode if installed.
#
#   If TFTP server is not required, remove it with the following command:
#
#   $ sudo dnf -y remove tftp-server
#
#   Configure the TFTP daemon to operate in secure mode with the following
#   command:
#
#   $ sudo systemctl edit tftp.service
#
#   In the editor, enter:
#
#   [Service]
#   ExecStart=/usr/sbin/in.tftpd -s /var/lib/tftpboot
#
#   After making changes, reload the systemd daemon and restart the TFTP
#   service as follows:
#
#   $ sudo systemctl daemon-reload
#   $ sudo systemctl restart tftp.service
# =============================================================================

- name: "RHEL-10-200050 | RHEL 10 must not have a Trivial File Transfer Protocol (TFTP) server package installed unless it is required by the mission, and if required, the TFTP daemon must be configured to operate in secure mode."
  when: rhel_10_200050 | bool
  tags:
    - RHEL-10-200050
    - medium
    - CCI-000381
  block:
    - name: "RHEL-10-200050 | Check if tftp-server is installed"
      ansible.builtin.command: rpm -q tftp-server
      register: rhel_10_200050_installed
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200050 | Check ExecStart line in tftp.service for -s flag"
      ansible.builtin.command: grep -i ExecStart /usr/lib/systemd/system/tftp.service
      register: rhel_10_200050_execstart
      changed_when: false
      failed_when: false
      when: rhel_10_200050_installed.rc == 0

    - name: "RHEL-10-200050 | Assert tftp-server is absent or running in secure mode"
      ansible.builtin.assert:
        that: >
          rhel_10_200050_installed.rc != 0 or
          (rhel_10_200050_execstart.stdout | default('') is search('-s\s'))
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200050
          detail=tftp-server is installed but ExecStart does not include the -s (secure mode) flag
          (ExecStart={{ rhel_10_200050_execstart.stdout | default('missing') | trim }}).
          Either remove the package (dnf -y remove tftp-server) or add '-s /var/lib/tftpboot'
          to ExecStart via a systemd override.
        success_msg: >-
          result=PASS stig_id=RHEL-10-200050
          detail={{ 'tftp-server is not installed.' if rhel_10_200050_installed.rc != 0
                    else 'tftp-server is installed and running in secure mode (-s flag present).' }}
  rescue:
    - name: "RHEL-10-200050 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200050 detail=Task failed unexpectedly — see prior error for details."
