---
# =============================================================================
# STIG ID  : RHEL-10-200090
# Rule ID  : SV-280951r1184744_rule
# Severity : high
# CCI      : CCI-000197
# Title    : RHEL 10 must not have a File Transfer Protocol (FTP) server package installed.
#
# Description:
#   The FTP service provides an unencrypted remote access that does not
#   provide for the confidentiality and integrity of user passwords or the
#   remote session. If a privileged user were to log in using this service,
#   the privileged user password could be compromised. Secure Shell (SSH) or
#   other encrypted file transfer methods must be used in place of this
#   service. Removing the "vsftpd" package decreases the risk of accidental
#   activation. Satisfies: SRG-OS-000074-GPOS-00042, SRG-OS-000095-GPOS-00049
#
# Check Text:
#   Verify RHEL 10 does not have an FTP server package installed with the
#   following command:
#
#   $ sudo dnf list --installed vsftp
#   Error: No matching Packages to list
#
#   If the "vsftp" package is installed, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to not have the FTP package installed with the
#   following command (using "vsftpd" as an example):
#
#   $ sudo dnf -y remove vsftpd
# =============================================================================

- name: "RHEL-10-200090 | RHEL 10 must not have a File Transfer Protocol (FTP) server package installed."
  when: rhel_10_200090 | bool
  tags:
    - RHEL-10-200090
    - high
    - CCI-000197
  block:
    - name: "RHEL-10-200090 | Remove vsftpd if installed"
      ansible.builtin.package:
        name: vsftpd
        state: absent

    - name: "RHEL-10-200090 | Verify vsftpd is not installed"
      ansible.builtin.command: rpm -q vsftpd
      register: rhel_10_200090_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200090 | Assert vsftpd is not installed"
      ansible.builtin.assert:
        that: rhel_10_200090_check.rc != 0
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200090
          detail=Package vsftpd is still installed. Remove with: dnf -y remove vsftpd
        success_msg: "result=PASS stig_id=RHEL-10-200090 detail=Package vsftpd is not installed."
  rescue:
    - name: "RHEL-10-200090 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200090 detail=Task failed unexpectedly — see prior error for details."
