---
# =============================================================================
# STIG ID  : RHEL-10-200510
# Rule ID  : SV-280953r1195342_rule
# Severity : medium
# CCI      : CCI-000381
# Title    : RHEL 10 must have the "nss-tools" package installed.
#
# Description:
#   Network Security Services (NSS) is a set of libraries designed to support
#   cross-platform development of security-enabled client and server
#   applications. Install the "nss-tools" package to install command-line
#   tools to manipulate the NSS certificate and key database.
#
# Check Text:
#   Verify RHEL 10 has the "nss-tools" package installed with the following
#   command:
#
#   $ sudo dnf list --installed nss-tools
#   Installed Packages
#   nss-tools.x86_64 3.112.0-4.el10_0 @rhel-10-for-x86_64-appstream-rpms
#
#   If the "nss-tools" package is not installed, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to have the "nss-tools" package installed with the
#   following command:
#
#   $ sudo dnf -y install nss-tools
# =============================================================================

- name: "RHEL-10-200510 | RHEL 10 must have the nss-tools package installed."
  when: rhel_10_200510 | bool
  tags:
    - RHEL-10-200510
    - medium
    - CCI-000381
  block:
    - name: "RHEL-10-200510 | Ensure nss-tools is installed"
      ansible.builtin.package:
        name: nss-tools
        state: present

    - name: "RHEL-10-200510 | Verify nss-tools is installed"
      ansible.builtin.command: rpm -q nss-tools
      register: rhel_10_200510_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200510 | Assert nss-tools is installed"
      ansible.builtin.assert:
        that: rhel_10_200510_check.rc == 0
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200510
          detail=Package nss-tools is not installed.
          Install with: dnf -y install nss-tools
        success_msg: "result=PASS stig_id=RHEL-10-200510 detail=Package nss-tools is installed."
  rescue:
    - name: "RHEL-10-200510 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200510 detail=Task failed unexpectedly — see prior error for details."
