---
# =============================================================================
# STIG ID  : RHEL-10-200530
# Rule ID  : SV-280955r1197220_rule
# Severity : medium
# CCI      : CCI-000382
# Title    : RHEL 10 must have the "firewalld" package installed.
#
# Description:
#   The "firewalld" package provides an easy and effective way to block/limit
#   remote access to the system via ports, services, and protocols. Remote
#   access services, such as those providing remote access to network devices
#   and information systems, that lack automated control capabilities
#   increase risk and make remote user access management difficult at best.
#   Remote access is access to DOD nonpublic information systems by an
#   authorized user (or an information system) communicating through an
#   external, nonorganizational-controlled network. Remote access methods
#   include, for example, dial-up, broadband, and wireless. RHEL 10
#   functionality (e.g., Secure Shell [SSH]) must be capable of taking
#   enforcement action if the audit reveals unauthorized activity. Automated
#   control of remote access sessions allows organizations to ensure ongoing
#   compliance with remote access policies by enforcing connection rules of
#   remote access applications on a variety of information system components
#   (e.g., servers, workstations, notebook computers, smartphones, and
#   tablets). Satisfies: SRG-OS-000096-GPOS-00050, SRG-OS-000297-GPOS-00115,
#   SRG-OS-000298-GPOS-00116, SRG-OS-000480-GPOS-00232
#
# Check Text:
#   Verify RHEL 10 has the "firewalld" package installed.
#
#   Run the following command to determine if the "firewalld" package is
#   installed:
#
#   Installed Packages
#   firewalld.noarch 2.3.1-1.el10_0 @rhel-10-for-x86_64-baseos-rpms
#
#   If the "firewall" package is not installed, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to have the "firewalld" package installed with the
#   following command:
#
#   $ sudo dnf -y install firewalld
# =============================================================================

- name: "RHEL-10-200530 | RHEL 10 must have the firewalld package installed."
  when: rhel_10_200530 | bool
  tags:
    - RHEL-10-200530
    - medium
    - CCI-000382
  block:
    - name: "RHEL-10-200530 | Ensure firewalld is installed"
      ansible.builtin.package:
        name: firewalld
        state: present

    - name: "RHEL-10-200530 | Verify firewalld is installed"
      ansible.builtin.command: rpm -q firewalld
      register: rhel_10_200530_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200530 | Assert firewalld is installed"
      ansible.builtin.assert:
        that: rhel_10_200530_check.rc == 0
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200530
          detail=Package firewalld is not installed.
          Install with: dnf -y install firewalld
        success_msg: "result=PASS stig_id=RHEL-10-200530 detail=Package firewalld is installed."
  rescue:
    - name: "RHEL-10-200530 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200530 detail=Task failed unexpectedly — see prior error for details."
