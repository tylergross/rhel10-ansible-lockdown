---
# =============================================================================
# STIG ID  : RHEL-10-200531
# Rule ID  : SV-280956r1165223_rule
# Severity : medium
# CCI      : CCI-000382
# Title    : RHEL 10 must have the "firewalld" service set to active.
#
# Description:
#   "Firewalld" provides an easy and effective way to block/limit remote
#   access to the system via ports, services, and protocols. Remote access
#   services, such as those providing remote access to network devices and
#   information systems, which lack automated control capabilities, increase
#   risk and make remote user access management difficult at best. Remote
#   access is access to DOD nonpublic information systems by an authorized
#   user (or an information system) communicating through an external,
#   nonorganization-controlled network. Remote access methods include, for
#   example, dial-up, broadband, and wireless. RHEL 10 functionality (e.g.,
#   Remote Desktop Protocol [RDP]) must be capable of taking enforcement
#   action if the audit reveals unauthorized activity. Automated control of
#   remote access sessions allows organizations to ensure ongoing compliance
#   with remote access policies by enforcing connection rules of remote
#   access applications on a variety of information system components (e.g.,
#   servers, workstations, notebook computers, smartphones, and tablets).
#   Satisfies: SRG-OS-000096-GPOS-00050, SRG-OS-000297-GPOS-00115,
#   SRG-OS-000480-GPOS-00232
#
# Check Text:
#   Verify RHEL 10 is configured so that "firewalld" is active with the
#   following command:
#
#   $ systemctl is-active firewalld
#   active
#
#   If the "firewalld" service is not active, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to have the "firewalld" service set to active.
#
#   To enable the "firewalld" service, run the following command:
#
#   $ sudo systemctl enable --now firewalld
# =============================================================================

- name: "RHEL-10-200531 | RHEL 10 must have the firewalld service set to active."
  when: rhel_10_200531 | bool
  tags:
    - RHEL-10-200531
    - medium
    - CCI-000382
  block:
    - name: "RHEL-10-200531 | Ensure firewalld is enabled and active"
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: "RHEL-10-200531 | Check firewalld is active"
      ansible.builtin.command: systemctl is-active firewalld
      register: rhel_10_200531_active
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200531 | Assert firewalld is active"
      ansible.builtin.assert:
        that: rhel_10_200531_active.stdout | trim == 'active'
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200531
          detail=firewalld service is not active (state={{ rhel_10_200531_active.stdout | trim }}).
          Enable with: systemctl enable --now firewalld
        success_msg: "result=PASS stig_id=RHEL-10-200531 detail=firewalld service is active and enabled."
  rescue:
    - name: "RHEL-10-200531 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200531 detail=Task failed unexpectedly — see prior error for details."
