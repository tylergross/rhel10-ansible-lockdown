---
# =============================================================================
# STIG ID  : RHEL-10-200532
# Rule ID  : SV-280957r1165226_rule
# Severity : medium
# CCI      : CCI-002314
# Title    : RHEL 10 must employ a deny-all, allow-by-exception policy for allowing connections to other systems.
#
# Description:
#   Failure to restrict network connectivity only to authorized systems
#   permits inbound connections from malicious systems. It also permits
#   outbound connections that may facilitate exfiltration of DOD data. RHEL
#   10 incorporates the "firewalld" daemon, which allows for many different
#   configurations. One of these configurations is zones. Zones can be used
#   in a deny-all, allow-by-exception approach. The default "drop" zone will
#   drop all incoming network packets unless it is explicitly allowed by the
#   configuration file or is related to an outgoing network connection.
#
# Check Text:
#   Verify RHEL 10 is configured so that "firewalld" employs a deny-all,
#   allow-by-exception policy for allowing connections to other systems with
#   the following commands (using ens133 as an example interface):
#
#   $ sudo firewall-cmd --state
#   running
#
#   $ sudo firewall-cmd --get-active-zones
#   drop (default)
#   interfaces: ens33
#
#   $ sudo firewall-cmd --info-zone=drop | grep target
#   target: DROP
#
#   $ sudo firewall-cmd --permanent --info-zone=drop | grep target
#   target: DROP
#
#   If no zones are active on the RHEL 10 interfaces or if runtime and
#   permanent targets are set to an option other than "DROP", this is a
#   finding.
#
#   Verify the permanent configuration is valid and there are no
#   misconfigured zones or rules with the following command:
#
#   $ sudo firewall-cmd --check-config
#   success
#
#   If this command does not return "success", this is a finding.
#
# Fix Text:
#   Configure RHEL 10 so that the "firewalld" daemon employs a deny-all,
#   allow-by-exception policy with the following commands (using ens133 as an
#   example interface):
#
#   Start by adding the exceptions that are required for mission
#   functionality to the "drop" zone. If SSH access on port 22 is needed, for
#   example, run the following:
#
#   $ sudo firewall-cmd --permanent --add-service=ssh --zone=drop
#
#   Reload the firewall rules to update the runtime configuration from the
#   "--permanent" changes made above:
#
#   $ sudo firewall-cmd --reload
#
#   Set the default zone to the drop zone:
#
#   $ sudo firewall-cmd --set-default-zone=drop
#   Note: This is a runtime and permanent change.
#
#   Add any interfaces to the newly modified "drop" zone:
#
#   $ sudo firewall-cmd --permanent --zone=drop --change-interface=ens33
#
#   Reload the firewall rules for changes to take effect:
#
#   $ sudo firewall-cmd --reload
# =============================================================================

- name: "RHEL-10-200532 | RHEL 10 must employ a deny-all, allow-by-exception policy for allowing connections to other systems."
  when: rhel_10_200532 | bool
  tags:
    - RHEL-10-200532
    - medium
    - CCI-002314
  block:
    - name: "RHEL-10-200532 | Check firewalld is running"
      ansible.builtin.command: firewall-cmd --state
      register: rhel_10_200532_state
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200532 | Check firewalld default zone"
      ansible.builtin.command: firewall-cmd --get-default-zone
      register: rhel_10_200532_zone
      changed_when: false
      failed_when: false
      when: rhel_10_200532_state.stdout | trim == 'running'

    - name: "RHEL-10-200532 | Set default zone to drop if not already set"
      ansible.builtin.command: firewall-cmd --set-default-zone=drop
      when:
        - rhel_10_200532_state.stdout | trim == 'running'
        - rhel_10_200532_zone.stdout | trim != 'drop'

    - name: "RHEL-10-200532 | Re-check default zone after remediation"
      ansible.builtin.command: firewall-cmd --get-default-zone
      register: rhel_10_200532_zone_final
      changed_when: false
      failed_when: false
      when: rhel_10_200532_state.stdout | trim == 'running'

    - name: "RHEL-10-200532 | Assert firewalld default zone is drop"
      ansible.builtin.assert:
        that:
          - rhel_10_200532_state.stdout | trim == 'running'
          - rhel_10_200532_zone_final.stdout | trim == 'drop'
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200532
          detail=firewalld default zone is not 'drop'
          (state={{ rhel_10_200532_state.stdout | trim }}
          zone={{ rhel_10_200532_zone_final.stdout | default('unknown') | trim }}).
          Set with: firewall-cmd --set-default-zone=drop
        success_msg: "result=PASS stig_id=RHEL-10-200532 detail=firewalld default zone is 'drop' (deny-all policy enforced)."
  rescue:
    - name: "RHEL-10-200532 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200532 detail=Task failed unexpectedly — see prior error for details."
