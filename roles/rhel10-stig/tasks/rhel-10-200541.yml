---
# =============================================================================
# STIG ID  : RHEL-10-200541
# Rule ID  : SV-280959r1165232_rule
# Severity : medium
# CCI      : CCI-004923
# Title    : RHEL 10 must enable the chronyd service.
#
# Description:
#   Inaccurate time stamps make it more difficult to correlate events and can
#   lead to an inaccurate analysis. Determining the correct time a particular
#   event occurred on a system is critical when conducting forensic analysis
#   and investigating system events. Sources outside the configured
#   acceptable allowance (drift) may be inaccurate. Synchronizing internal
#   information system clocks provides uniformity of time stamps for
#   information systems with multiple system clocks and systems connected
#   over a network.
#
# Check Text:
#   Verify RHEL 10 sets the chronyd service to active with the following
#   command:
#
#   $ systemctl is-active chronyd
#   active
#
#   If the chronyd service is not active, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to enable the chronyd service with the following
#   command:
#
#   $ sudo systemctl enable --now chronyd
# =============================================================================

- name: "RHEL-10-200541 | RHEL 10 must enable the chronyd service."
  when: rhel_10_200541 | bool
  tags:
    - RHEL-10-200541
    - medium
    - CCI-004923
  block:
    - name: "RHEL-10-200541 | Ensure chronyd is enabled and active"
      ansible.builtin.service:
        name: chronyd
        state: started
        enabled: true

    - name: "RHEL-10-200541 | Check chronyd is active"
      ansible.builtin.command: systemctl is-active chronyd
      register: rhel_10_200541_active
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200541 | Assert chronyd is active"
      ansible.builtin.assert:
        that: rhel_10_200541_active.stdout | trim == 'active'
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200541
          detail=chronyd service is not active (state={{ rhel_10_200541_active.stdout | trim }}).
          Enable with: systemctl enable --now chronyd
        success_msg: "result=PASS stig_id=RHEL-10-200541 detail=chronyd service is active and enabled."
  rescue:
    - name: "RHEL-10-200541 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200541 detail=Task failed unexpectedly — see prior error for details."
