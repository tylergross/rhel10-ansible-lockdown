---
# =============================================================================
# STIG ID  : RHEL-10-200560
# Rule ID  : SV-280962r1195350_rule
# Severity : medium
# CCI      : CCI-001958
# Title    : RHEL 10 must have the USBGuard package installed.
#
# Description:
#   The USBGuard-daemon is the main component of the USBGuard software
#   framework. It runs as a service in the background and enforces the USB
#   device authorization policy for all USB devices. The policy is defined by
#   a set of rules using a rule language described in the
#   "usbguard-rules.conf" file. The policy and the authorization state of USB
#   devices can be modified during runtime using the USBGuard tool. The
#   system administrator (SA) must work with the site information system
#   security officer (ISSO) to determine a list of authorized peripherals and
#   establish rules within the USBGuard software framework to allow only
#   authorized devices.
#
# Check Text:
#   Verify RHEL 10 has USBGuard installed on the operating system with the
#   following command:
#
#   $ sudo dnf list --installed usbguard
#   Installed Packages
#   usbguard.x86_64 1.1.3-6.el10 @rhel-10-for-x86_64-appstream-rpms
#
#   If the USBGuard package is not installed, ask the SA to indicate how
#   unauthorized peripherals are being blocked.
#
#   If there is no evidence that unauthorized peripherals are being blocked
#   before establishing a connection, this is a finding.
#
#   If the system is a virtual machine with no virtual or physical USB
#   peripherals attached, this is not a finding.
#
# Fix Text:
#   Configure RHEL 10 to have the USBGuard package installed with the
#   following command:
#
#   $ sudo dnf -y install usbguard
#
#   Enable the service to start on boot and then start it with the following
#   commands:
#
#   $ sudo systemctl enable usbguard
#   $ sudo systemctl start usbguard
#
#   Verify the status of the service with the following command:
#
#   $ sudo systemctl status usbguard
#
#   Note: USBGuard must be configured to allow authorized devices once it is
#   enabled on RHEL 10.
# =============================================================================

- name: "RHEL-10-200560 | RHEL 10 must have the USBGuard package installed."
  when: rhel_10_200560 | bool
  tags:
    - RHEL-10-200560
    - medium
    - CCI-001958
  block:
    - name: "RHEL-10-200560 | Ensure usbguard is installed"
      ansible.builtin.package:
        name: usbguard
        state: present

    - name: "RHEL-10-200560 | Verify usbguard is installed"
      ansible.builtin.command: rpm -q usbguard
      register: rhel_10_200560_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200560 | Assert usbguard is installed"
      ansible.builtin.assert:
        that: rhel_10_200560_check.rc == 0
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200560
          detail=Package usbguard is not installed.
          Install with: dnf -y install usbguard
        success_msg: "result=PASS stig_id=RHEL-10-200560 detail=Package usbguard is installed."
  rescue:
    - name: "RHEL-10-200560 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200560 detail=Task failed unexpectedly — see prior error for details."
