---
# =============================================================================
# STIG ID  : RHEL-10-200561
# Rule ID  : SV-280963r1165244_rule
# Severity : medium
# CCI      : CCI-001958
# Title    : RHEL 10 must have the USBGuard package enabled.
#
# Description:
#   The USBGuard-daemon is the main component of the USBGuard software
#   framework. It runs as a service in the background and enforces the USB
#   device authorization policy for all USB devices. The policy is defined by
#   a set of rules using a rule language described in the
#   "usbguard-rules.conf" file. The policy and the authorization state of USB
#   devices can be modified during runtime using the USBGuard tool. The
#   system administrator (SA) must work with the site information system
#   security officer (ISSO) to determine a list of authorized peripherals and
#   establish rules within the USBGuard software framework to allow only
#   authorized devices. Satisfies: SRG-OS-000378-GPOS-00163,
#   SRG-OS-000690-GPOS-00140
#
# Check Text:
#   Note: If the system is virtual machine with no virtual or physical USB
#   peripherals attached, this is not applicable.
#
#   Verify RHEL 10 has USBGuard enabled with the following command:
#
#   $ systemctl is-active usbguard
#   active
#
#   If USBGuard is not active, ask the SA to indicate how unauthorized
#   peripherals are being blocked.
#
#   If there is no evidence that unauthorized peripherals are being blocked
#   before establishing a connection, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to have the USBGuard service enabled by running the
#   following command:
#
#   $ sudo systemctl enable --now usbguard
# =============================================================================

- name: "RHEL-10-200561 | RHEL 10 must have the USBGuard package enabled."
  when: rhel_10_200561 | bool
  tags:
    - RHEL-10-200561
    - medium
    - CCI-001958
  block:
    - name: "RHEL-10-200561 | Ensure usbguard is enabled and active"
      ansible.builtin.service:
        name: usbguard
        state: started
        enabled: true

    - name: "RHEL-10-200561 | Check usbguard is active"
      ansible.builtin.command: systemctl is-active usbguard
      register: rhel_10_200561_active
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200561 | Assert usbguard is active"
      ansible.builtin.assert:
        that: rhel_10_200561_active.stdout | trim == 'active'
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200561
          detail=usbguard service is not active (state={{ rhel_10_200561_active.stdout | trim }}).
          Enable with: systemctl enable --now usbguard
        success_msg: "result=PASS stig_id=RHEL-10-200561 detail=usbguard service is active and enabled."
  rescue:
    - name: "RHEL-10-200561 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200561 detail=Task failed unexpectedly — see prior error for details."
