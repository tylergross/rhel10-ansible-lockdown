---
# =============================================================================
# STIG ID  : RHEL-10-200563
# Rule ID  : SV-280965r1165250_rule
# Severity : medium
# CCI      : CCI-000169
# Title    : RHEL 10 must enable audit logging for the USBGuard daemon.
#
# Description:
#   Without the capability to generate audit records, it would be difficult
#   to establish, correlate, and investigate the events relating to an
#   incident or identify those responsible for one. If auditing is enabled
#   late in the startup process, the actions of some startup processes may
#   not be audited. Some audit systems also maintain state information only
#   available if auditing is enabled before a given process is created. Audit
#   records can be generated from various components within the information
#   system (e.g., module or policy filter). The list of audited events is the
#   set of events for which audits are to be generated. This set of events is
#   typically a subset of the list of all events for which the system is
#   capable of generating audit records. DOD has defined the list of events
#   for which RHEL 10 will provide an audit record generation capability as
#   the following: 1) Successful and unsuccessful attempts to access, modify,
#   or delete privileges, security objects, security levels, or categories of
#   information (e.g., classification levels). 2) Access actions, such as
#   successful and unsuccessful login attempts, privileged activities or
#   other system-level access, starting and ending time for user access to
#   the system, concurrent logins from different workstations, successful and
#   unsuccessful accesses to objects, all program initiations, and all direct
#   access to the information system. 3) All account creations,
#   modifications, disabling, and terminations. 4) All kernel module load,
#   unload, and restart actions. Satisfies: SRG-OS-000062-GPOS-00031,
#   SRG-OS-000471-GPOS-00215
#
# Check Text:
#   Note: If the system is a virtual machine with no virtual or physical USB
#   peripherals attached, this is not applicable.
#
#   Verify RHEL 10 audit logging is enabled for the USBGuard daemon.
#
#   Confirm the setting with the following command:
#
#   $ sudo grep AuditBackend /etc/usbguard/usbguard-daemon.conf
#   AuditBackend=LinuxAudit
#
#   If "AuditBackend" is not set to "LinuxAudit", this is a finding.
#
# Fix Text:
#   Configure RHEL 10 USBGuard AuditBackend to use the audit system.
#
#   Add or edit the following line in "/etc/usbguard/usbguard-daemon.conf":
#
#   AuditBackend=LinuxAudit
# =============================================================================

- name: "RHEL-10-200563 | RHEL 10 must enable audit logging for the USBGuard daemon."
  when: rhel_10_200563 | bool
  tags:
    - RHEL-10-200563
    - medium
    - CCI-000169
  block:
    - name: "RHEL-10-200563 | Check AuditBackend in usbguard-daemon.conf"
      ansible.builtin.command: grep AuditBackend /etc/usbguard/usbguard-daemon.conf
      register: rhel_10_200563_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200563 | Backup /etc/usbguard/usbguard-daemon.conf before modification"
      ansible.builtin.copy:
        src: /etc/usbguard/usbguard-daemon.conf
        dest: "/etc/usbguard/usbguard-daemon.conf.{{ ansible_date_time.epoch }}.bak"
        remote_src: true
        owner: root
        group: root
        mode: '0600'
      when: rhel_10_200563_check.stdout is not search('AuditBackend\s*=\s*LinuxAudit')

    - name: "RHEL-10-200563 | Ensure AuditBackend=LinuxAudit in usbguard-daemon.conf"
      ansible.builtin.lineinfile:
        path: /etc/usbguard/usbguard-daemon.conf
        regexp: '^\s*AuditBackend\s*='
        line: 'AuditBackend=LinuxAudit'
        state: present
      register: rhel_10_200563_lineinfile
      when: rhel_10_200563_check.stdout is not search('AuditBackend\s*=\s*LinuxAudit')

    - name: "RHEL-10-200563 | Restart usbguard after config change"
      ansible.builtin.service:
        name: usbguard
        state: restarted
      when: rhel_10_200563_lineinfile is changed

    - name: "RHEL-10-200563 | Re-check AuditBackend after remediation"
      ansible.builtin.command: grep AuditBackend /etc/usbguard/usbguard-daemon.conf
      register: rhel_10_200563_check_final
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200563 | Assert AuditBackend=LinuxAudit"
      ansible.builtin.assert:
        that: rhel_10_200563_check_final.stdout is search('AuditBackend\s*=\s*LinuxAudit')
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200563
          detail=usbguard-daemon.conf AuditBackend is not set to LinuxAudit
          (found={{ rhel_10_200563_check_final.stdout | trim | default('missing') }}).
        success_msg: "result=PASS stig_id=RHEL-10-200563 detail=usbguard-daemon.conf has AuditBackend=LinuxAudit."
  rescue:
    - name: "RHEL-10-200563 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200563 detail=Task failed unexpectedly — see prior error for details."
