---
# =============================================================================
# STIG ID  : RHEL-10-200570
# Rule ID  : SV-280966r1195352_rule
# Severity : medium
# CCI      : CCI-001084
# Title    : RHEL 10 must have the "policycoreutils" package installed.
#
# Description:
#   Without verification of the security functions, security functions may
#   not operate correctly and the failure may go unnoticed. Security function
#   is defined as the hardware, software, and/or firmware of the information
#   system responsible for enforcing the system security policy and
#   supporting the isolation of code and data on which the protection is
#   based. Security functionality includes, but is not limited to,
#   establishing system accounts, configuring access authorizations (i.e.,
#   permissions, privileges), setting events to be audited, and setting
#   intrusion detection parameters. The "policycoreutils" package contains
#   the policy core utilities that are required for basic operation of an
#   SELinux-enabled system. These utilities include "load_policy" to load
#   SELinux policies, "setfile" to label filesystems, "newrole" to switch
#   roles, and "run_init" to run "/etc/init.d" scripts in the proper context.
#
# Check Text:
#   Verify RHEL 10 has the "policycoreutils" package installed with the
#   following command:
#
#   $ sudo dnf list --installed policycoreutils
#   Installed Packages
#   policycoreutils.x86_64 3.8-1.el10 @anaconda
#
#   If the "policycoreutils" package is not installed, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to have the "policycoreutils" package installed with
#   the following command:
#
#   $ sudo dnf -y install policycoreutils
# =============================================================================

- name: "RHEL-10-200570 | RHEL 10 must have the policycoreutils package installed."
  when: rhel_10_200570 | bool
  tags:
    - RHEL-10-200570
    - medium
    - CCI-001084
  block:
    - name: "RHEL-10-200570 | Ensure policycoreutils is installed"
      ansible.builtin.package:
        name: policycoreutils
        state: present

    - name: "RHEL-10-200570 | Verify policycoreutils is installed"
      ansible.builtin.command: rpm -q policycoreutils
      register: rhel_10_200570_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200570 | Assert policycoreutils is installed"
      ansible.builtin.assert:
        that: rhel_10_200570_check.rc == 0
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200570
          detail=Package policycoreutils is not installed.
          Install with: dnf -y install policycoreutils
        success_msg: "result=PASS stig_id=RHEL-10-200570 detail=Package policycoreutils is installed."
  rescue:
    - name: "RHEL-10-200570 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200570 detail=Task failed unexpectedly — see prior error for details."
