---
# =============================================================================
# STIG ID  : RHEL-10-200580
# Rule ID  : SV-280967r1195354_rule
# Severity : medium
# CCI      : CCI-000381
# Title    : RHEL 10 must have the "policycoreutils-python-utils" package installed.
#
# Description:
#   The "policycoreutils-python-utils" package is required to operate and
#   manage an SELinux environment and its policies. It provides utilities
#   such as "semanage", "audit2allow", "audit2why", "chcat", and "sandbox".
#
# Check Text:
#   Verify RHEL 10 has the "policycoreutils-python-utils" service package
#   installed with the following command:
#
#   $ sudo dnf list --installed policycoreutils-python-utils
#   Installed Packages
#   policycoreutils-python-utils.noarch 3.8-1.el10 @AppStream
#
#   If the "policycoreutils-python-utils" package is not installed, this is a
#   finding.
#
# Fix Text:
#   Configure RHEL 10 to have the "policycoreutils-python-utils" service
#   package installed with the following command:
#
#   $ sudo dnf -y install policycoreutils-python-utils
# =============================================================================

- name: "RHEL-10-200580 | RHEL 10 must have the policycoreutils-python-utils package installed."
  when: rhel_10_200580 | bool
  tags:
    - RHEL-10-200580
    - medium
    - CCI-000381
  block:
    - name: "RHEL-10-200580 | Ensure policycoreutils-python-utils is installed"
      ansible.builtin.package:
        name: policycoreutils-python-utils
        state: present

    - name: "RHEL-10-200580 | Verify policycoreutils-python-utils is installed"
      ansible.builtin.command: rpm -q policycoreutils-python-utils
      register: rhel_10_200580_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200580 | Assert policycoreutils-python-utils is installed"
      ansible.builtin.assert:
        that: rhel_10_200580_check.rc == 0
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200580
          detail=Package policycoreutils-python-utils is not installed.
          Install with: dnf -y install policycoreutils-python-utils
        success_msg: "result=PASS stig_id=RHEL-10-200580 detail=Package policycoreutils-python-utils is installed."
  rescue:
    - name: "RHEL-10-200580 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200580 detail=Task failed unexpectedly — see prior error for details."
