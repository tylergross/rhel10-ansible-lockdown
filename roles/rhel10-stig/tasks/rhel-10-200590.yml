---
# =============================================================================
# STIG ID  : RHEL-10-200590
# Rule ID  : SV-280968r1195356_rule
# Severity : medium
# CCI      : CCI-002235
# Title    : RHEL 10 must have the "sudo" package installed.
#
# Description:
#   The "sudo" package is a program designed to allow a system administrator
#   to give limited root privileges to users and log root activity. The basic
#   philosophy is to give as few privileges as possible but still allow
#   system users to complete their work.
#
# Check Text:
#   Verify RHEL 10 has the "sudo" package installed with the following
#   command:
#
#   $ sudo dnf list --installed sudo
#   Installed Packages
#   sudo.x86_64 1.9.15-8.p5.el10_0.2 @rhel-10-for-x86_64-baseos-rpms
#
#   If the "sudo" package is not installed, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to have the "sudo" package installed with the following
#   command:
#
#   $ sudo dnf -y install sudo
# =============================================================================

- name: "RHEL-10-200590 | RHEL 10 must have the sudo package installed."
  when: rhel_10_200590 | bool
  tags:
    - RHEL-10-200590
    - medium
    - CCI-002235
  block:
    - name: "RHEL-10-200590 | Ensure sudo is installed"
      ansible.builtin.package:
        name: sudo
        state: present

    - name: "RHEL-10-200590 | Verify sudo is installed"
      ansible.builtin.command: rpm -q sudo
      register: rhel_10_200590_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200590 | Assert sudo is installed"
      ansible.builtin.assert:
        that: rhel_10_200590_check.rc == 0
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200590
          detail=Package sudo is not installed.
          Install with: dnf -y install sudo
        success_msg: "result=PASS stig_id=RHEL-10-200590 detail=Package sudo is installed."
  rescue:
    - name: "RHEL-10-200590 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200590 detail=Task failed unexpectedly — see prior error for details."
