---
# =============================================================================
# STIG ID  : RHEL-10-200601
# Rule ID  : SV-280970r1165265_rule
# Severity : medium
# CCI      : CCI-001774
# Title    : RHEL 10 must enable the "fapolicy" module.
#
# Description:
#   The organization must identify authorized software programs and permit
#   execution of authorized software. The process used to identify software
#   programs that are authorized to execute on organizational information
#   systems is commonly referred to as allowlisting. Using an allowlist
#   provides a configuration management method for allowing the execution of
#   only authorized software. Using only authorized software decreases risk
#   by limiting the number of potential vulnerabilities. Verification of
#   allowlisted software occurs prior to execution or at system startup. User
#   home directories/folders may contain information of a sensitive nature.
#   Nonprivileged users should coordinate any sharing of information with a
#   system administrator through shared resources. RHEL 10 ships with many
#   optional packages. One such package is a file access policy daemon called
#   "fapolicyd". The "fapolicyd" is a userspace daemon that determines access
#   rights to files based on attributes of the process and file. It can be
#   used to either blocklist or allowlist processes or file access. Proceed
#   with caution with enforcing the use of this daemon. Improper
#   configuration may render the system nonfunctional. The "fapolicyd"
#   application programming interface (API) is not namespace aware and can
#   cause issues when launching or running containers. Satisfies:
#   SRG-OS-000370-GPOS-00155, SRG-OS-000368-GPOS-00154
#
# Check Text:
#   Verify RHEL 10 "fapolicyd" is active with the following command:
#
#   $ systemctl is-active fapolicyd
#   active
#
#   If the "fapolicyd" module is not active, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to enable "fapolicyd" with the following command:
#
#   $ systemctl enable --now fapolicyd
# =============================================================================

- name: "RHEL-10-200601 | RHEL 10 must enable the fapolicy module."
  when: rhel_10_200601 | bool
  tags:
    - RHEL-10-200601
    - medium
    - CCI-001774
  block:
    - name: "RHEL-10-200601 | Ensure fapolicyd service is started and enabled"
      ansible.builtin.service:
        name: fapolicyd
        state: started
        enabled: true

    - name: "RHEL-10-200601 | Check fapolicyd service is active"
      ansible.builtin.command: systemctl is-active fapolicyd
      register: rhel_10_200601_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200601 | Assert fapolicyd service is active"
      ansible.builtin.assert:
        that: rhel_10_200601_check.stdout == 'active'
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200601
          detail=Service fapolicyd is not active (got '{{ rhel_10_200601_check.stdout }}').
          Enable with: systemctl enable --now fapolicyd
        success_msg: "result=PASS stig_id=RHEL-10-200601 detail=Service fapolicyd is active and enabled."
  rescue:
    - name: "RHEL-10-200601 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200601 detail=Task failed unexpectedly — see prior error for details."
