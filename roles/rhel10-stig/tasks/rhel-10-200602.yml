---
# =============================================================================
# STIG ID  : RHEL-10-200602
# Rule ID  : SV-280971r1184780_rule
# Severity : medium
# CCI      : CCI-001764
# Title    : RHEL 10 must be configured to employ a deny-all, permit-by-exception policy to allow the execution of authorized software programs.
#
# Description:
#   The organization must identify authorized software programs and permit
#   execution of authorized software. The process used to identify software
#   programs that are authorized to execute on organizational information
#   systems is commonly referred to as allowlisting. Using an allowlist
#   provides a configuration management method for allowing the execution of
#   only authorized software. Using only authorized software decreases risk
#   by limiting the number of potential vulnerabilities. Verification of
#   allowlisted software occurs prior to execution or at system startup. User
#   home directories/folders may contain information of a sensitive nature.
#   Nonprivileged users should coordinate any sharing of information with a
#   system administrator through shared resources. RHEL 10 ships with many
#   optional packages. One such package is a file access policy daemon called
#   "fapolicyd". The "fapolicyd" is a userspace daemon that determines access
#   rights to files based on attributes of the process and file. It can be
#   used to either block list or allowlist processes or file access. Proceed
#   with caution with enforcing the use of this daemon. Improper
#   configuration may render the system nonfunctional. The "fapolicyd"
#   application programming interface (API) is not namespace aware and can
#   cause issues when launching or running containers. Satisfies:
#   SRG-OS-000368-GPOS-00154, SRG-OS-000370-GPOS-00155
#
# Check Text:
#   Verify the RHEL 10 "fapolicyd" employs a deny-all, permit-by-exception
#   policy.
#
#   Check that "fapolicyd" is in enforcement mode with the following command:
#
#   $ sudo grep permissive /etc/fapolicyd/fapolicyd.conf
#
#   permissive = 0
#
#   If "fapolicyd" is not running in enforcement mode, this is a finding.
#
#   Check that "fapolicyd" employs a deny-all policy on system mounts with
#   the following commands:
#
#   $ sudo tail /etc/fapolicyd/compiled.rules
#
#   allow exe=/usr/bin/python3.7 : ftype=text/x-python
#   deny_audit perm=any pattern=ld_so : all
#   deny perm=any all : all
#
#   If "fapolicyd" is not running with a deny-all, permit-by-exception
#   policy, this is a finding.
#
#   Note: "deny_log" or "deny_audit" options meet the security requirements.
#   These options will generate higher volumes of logs.
#
# Fix Text:
#   Configure RHEL 10 to employ a deny-all, permit-by-exception application
#   allow listing policy with "fapolicyd".
#
#   With the "fapolicyd" installed and enabled, configure the daemon to
#   function in permissive mode until the allow list is built correctly to
#   avoid system lockout. Do this by editing the
#   "/etc/fapolicyd/fapolicyd.conf" file with the following line:
#
#   permissive = 1
#
#   Build the allow list in a file within the "/etc/fapolicyd/rules.d"
#   directory, ensuring the last rule implements a deny-all policy, such as
#   "deny perm=any all : all".
#
#   Once it is determined the allow list is built correctly, set the
#   "fapolicyd" to enforcing mode by editing the "permissive" line in the
#   /etc/fapolicyd/fapolicyd.conf file.
#
#   permissive = 0
# =============================================================================

- name: "RHEL-10-200602 | RHEL 10 must be configured to employ a deny-all, permit-by-exception policy to allow the execution of authorized software programs."
  when: rhel_10_200602 | bool
  tags:
    - RHEL-10-200602
    - medium
    - CCI-001764
  block:
    - name: "RHEL-10-200602 | Check fapolicyd permissive setting"
      ansible.builtin.command: grep permissive /etc/fapolicyd/fapolicyd.conf
      register: rhel_10_200602_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200602 | Backup fapolicyd.conf before modification"
      ansible.builtin.copy:
        src: /etc/fapolicyd/fapolicyd.conf
        dest: "/etc/fapolicyd/fapolicyd.conf.{{ ansible_date_time.epoch }}.bak"
        remote_src: true
        mode: preserve
      when: rhel_10_200602_check.stdout is not search('permissive\s*=\s*0')

    - name: "RHEL-10-200602 | Ensure permissive = 0 in fapolicyd.conf"
      ansible.builtin.lineinfile:
        path: /etc/fapolicyd/fapolicyd.conf
        regexp: '^\s*permissive\s*='
        line: 'permissive = 0'
        state: present
      register: rhel_10_200602_lineinfile
      when: rhel_10_200602_check.stdout is not search('permissive\s*=\s*0')

    - name: "RHEL-10-200602 | Restart fapolicyd if config changed"
      ansible.builtin.service:
        name: fapolicyd
        state: restarted
      when: rhel_10_200602_lineinfile is changed

    - name: "RHEL-10-200602 | Re-check fapolicyd permissive setting"
      ansible.builtin.command: grep permissive /etc/fapolicyd/fapolicyd.conf
      register: rhel_10_200602_recheck
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200602 | Assert permissive = 0 is set"
      ansible.builtin.assert:
        that: rhel_10_200602_recheck.stdout is search('permissive\s*=\s*0')
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200602
          detail=fapolicyd is not in enforcement mode. Set permissive = 0 in /etc/fapolicyd/fapolicyd.conf
        success_msg: "result=PASS stig_id=RHEL-10-200602 detail=fapolicyd is configured with permissive = 0 (enforcement mode)."
  rescue:
    - name: "RHEL-10-200602 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200602 detail=Task failed unexpectedly — see prior error for details."
