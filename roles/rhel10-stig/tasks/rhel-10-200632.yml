---
# =============================================================================
# STIG ID  : RHEL-10-200632
# Rule ID  : SV-280979r1165292_rule
# Severity : medium
# CCI      : CCI-002475
# Title    : RHEL 10 must use a file integrity tool that is configured to use FIPS 140-3-approved cryptographic hashes for validating file contents and directories.
#
# Description:
#   RHEL 10 installation media ships with an optional file integrity tool
#   called Advanced Intrusion Detection Environment (AIDE). AIDE is highly
#   configurable at install time. This requirement assumes the "aide.conf"
#   file is under the "/etc" directory. File integrity tools use
#   cryptographic hashes for verifying that file contents and directories
#   have not been altered. These hashes must be FIPS 140-3-approved
#   cryptographic hashes.
#
# Check Text:
#   Verify RHEL 10 AIDE is configured to use FIPS 140-3 file hashing.
#
#   Verify global default hash settings with the following command:
#
#   $ sudo grep -iE 'sha|md5|rmd' /etc/aide.conf | grep -v ^#
#   FIPSR = p+i+n+u+g+s+m+ftype+growing+acl+selinux+xattrs+sha512
#   ALLXTRAHASHES = sha512
#   /usr/sbin/auditctl p+i+n+u+g+s+b+acl+xattrs+sha512
#   /usr/sbin/auditd p+i+n+u+g+s+b+acl+xattrs+sha512
#   /usr/sbin/ausearch p+i+n+u+g+s+b+acl+xattrs+sha512
#   /usr/sbin/aureport p+i+n+u+g+s+b+acl+xattrs+sha512
#   /usr/sbin/augenrules p+i+n+u+g+s+b+acl+xattrs+sha512
#   NORMAL = FIPSR+sha512
#   LSPP = FIPSR+sha512
#   DATAONLY = R+sha512
#   /etc/gshadow NORMAL
#   /etc/shadow NORMAL
#
#   If any hashes other than "sha512" are present, this is a finding.
#
#   Confirm no legacy hashes exist with the following command:
#
#   $ sudo grep -iE 'md5|sha1|whirlpool|tiger' /etc/aide.conf | grep -v ^#
#
#   If any uncommented lines are returned, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 so that the file integrity tool uses FIPS 140-3
#   cryptographic hashes for validating file and directory contents.
#
#   If AIDE is installed, ensure the "sha512" rule is present on all
#   uncommented file and directory selection lists, and that no legacy hashes
#   exist.
#
#   By default, AIDE excludes log files such as "/var/log" and other volatile
#   files to reduce unnecessary notifications.
# =============================================================================

- name: "RHEL-10-200632 | RHEL 10 must use a file integrity tool that is configured to use FIPS 140-3-approved cryptographic hashes for validating file contents and directories."
  when: rhel_10_200632 | bool
  tags:
    - RHEL-10-200632
    - medium
    - CCI-002475
  block:
    - name: "RHEL-10-200632 | Check for non-sha512 hash rules in aide.conf"
      ansible.builtin.shell: |
        grep -iE 'md5|rmd' /etc/aide.conf | grep -v '^#' | grep -v 'sha512' || true
      register: rhel_10_200632_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200632 | Assert no legacy-only hash rules present in aide.conf"
      ansible.builtin.assert:
        that: rhel_10_200632_check.stdout | trim == ''
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200632
          detail=Uncommented lines in /etc/aide.conf contain md5 or rmd160 without sha512.
          Remove or update legacy hash entries to use sha512 only.
        success_msg: "result=PASS stig_id=RHEL-10-200632 detail=No legacy-only hash rules found in /etc/aide.conf."
  rescue:
    - name: "RHEL-10-200632 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200632 detail=Task failed unexpectedly — see prior error for details."
