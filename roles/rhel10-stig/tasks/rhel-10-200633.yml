---
# =============================================================================
# STIG ID  : RHEL-10-200633
# Rule ID  : SV-280980r1165295_rule
# Severity : medium
# CCI      : CCI-001744
# Title    : RHEL 10 must routinely check the baseline configuration for unauthorized changes and notify the system administrator when anomalies in the operation of any security functions are discovered.
#
# Description:
#   Unauthorized changes to the baseline configuration could make the system
#   vulnerable to various attacks or allow unauthorized access to the
#   operating system. Changes to operating system configurations can have
#   unintended side effects, some of which may be relevant to security.
#   Detecting such changes and providing an automated response can help avoid
#   unintended, negative consequences that could ultimately affect the
#   security state of the operating system. The operating system's
#   information management officer (IMO)/information system security officer
#   (ISSO) and system administrators (SAs) must be notified via email and/or
#   monitoring system trap when there is an unauthorized modification of a
#   configuration item. Notifications provided by information systems include
#   messages to local computer consoles and/or hardware indications such as
#   lights. This capability must take into account operational requirements
#   for availability for selecting an appropriate response. The organization
#   may choose to shut down or restart the information system upon security
#   function anomaly detection. Satisfies: SRG-OS-000363-GPOS-00150,
#   SRG-OS-000446-GPOS-00200, SRG-OS-000447-GPOS-00201
#
# Check Text:
#   Verify RHEL 10 routinely executes a file integrity scan for changes to
#   the system baseline. The command used in the example will use a daily
#   occurrence.
#
#   Check the cron directories for scripts controlling the execution and
#   notification of results of the file integrity application. For example,
#   if AIDE is installed on the system, use the following commands:
#
#   $ sudo ls -al /etc/cron.* | grep aide
#   -rwxr-xr-x 1 root root 29 Nov 22 2015 aide
#
#   $ sudo grep aide /etc/crontab /var/spool/cron/root
#   /etc/crontab: 30 04 * * * root usr/sbin/aide
#   /var/spool/cron/root: 30 04 * * * root usr/sbin/aide
#
#   $ sudo more /etc/cron.daily/aide
#   #!/bin/bash
#   /usr/sbin/aide --check | /bin/mail -s "$HOSTNAME - Daily aide integrity
#   check run" root@sysname.mil
#
#   If the file integrity application does not exist, a script file
#   controlling the execution of the file integrity application does not
#   exist, or the file integrity application does not notify designated
#   personnel of changes, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to automatically run the file integrity tool on the
#   system at least weekly and notify designated personnel if baseline
#   configurations are changed in an unauthorized manner.
#
#   The AIDE tool can be configured to email designated personnel with the
#   use of the cron system.
#
#   The following example output is generic. It will set cron to run AIDE
#   daily and to send email at the completion of the analysis:
#
#   $ sudo more /etc/cron.daily/aide
#
#   #!/bin/bash
#   /usr/sbin/aide --check | /bin/mail -s "$HOSTNAME - Daily aide integrity
#   check run" root@sysname.mil
# =============================================================================

- name: "RHEL-10-200633 | RHEL 10 must routinely check the baseline configuration for unauthorized changes and notify the system administrator when anomalies in the operation of any security functions are discovered."
  when: rhel_10_200633 | bool
  tags:
    - RHEL-10-200633
    - medium
    - CCI-001744
  block:
    - name: "RHEL-10-200633 | Check if /etc/cron.daily/aide exists"
      ansible.builtin.stat:
        path: /etc/cron.daily/aide
      register: rhel_10_200633_check

    - name: "RHEL-10-200633 | Create /etc/cron.daily/aide if missing"
      ansible.builtin.copy:
        dest: /etc/cron.daily/aide
        content: |
          #!/bin/bash
          /usr/sbin/aide --check | /bin/mail -s "$HOSTNAME - Daily AIDE integrity check" root
        mode: '0755'
        owner: root
        group: root
      when: not rhel_10_200633_check.stat.exists

    - name: "RHEL-10-200633 | Re-check /etc/cron.daily/aide exists"
      ansible.builtin.stat:
        path: /etc/cron.daily/aide
      register: rhel_10_200633_recheck

    - name: "RHEL-10-200633 | Assert /etc/cron.daily/aide exists"
      ansible.builtin.assert:
        that: rhel_10_200633_recheck.stat.exists
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200633
          detail=Daily AIDE cron script /etc/cron.daily/aide does not exist.
          Create the script to schedule daily AIDE integrity checks.
        success_msg: "result=PASS stig_id=RHEL-10-200633 detail=Daily AIDE cron script /etc/cron.daily/aide exists."
  rescue:
    - name: "RHEL-10-200633 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200633 detail=Task failed unexpectedly — see prior error for details."
