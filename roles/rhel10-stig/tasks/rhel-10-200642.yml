---
# =============================================================================
# STIG ID  : RHEL-10-200642
# Rule ID  : SV-280985r1197221_rule
# Severity : medium
# CCI      : CCI-001851
# Title    : RHEL 10 must be configured to forward audit records via Transmission Control Protocol (TCP) to a different system or media from the system being audited via rsyslog.
#
# Description:
#   Information stored in one location is vulnerable to accidental or
#   incidental deletion or alteration. Off-loading is a common process in
#   information systems with limited audit storage capacity. RHEL 10
#   installation media provides "rsyslogd", a system utility providing
#   support for message logging. Support for both internet and Unix domain
#   sockets enables this utility to support both local and remote logging.
#   Coupling this utility with "gnutls" (a secure communications library
#   implementing the Secure Sockets Layer [SSL], Transport Layer Security
#   [TLS], and Datagram TLS [DTLS] protocols) creates a method to securely
#   encrypt and off-load auditing. The rsyslog provides three ways to forward
#   message: the traditional User Datagram Protocol (UDP) transport, which is
#   extremely lossy but standard; the plain TCP-based transport, which loses
#   messages only during certain situations but is widely available; and the
#   Reliable Event Logging Protocol (RELP) transport, which does not lose
#   messages but is currently available only as part of the rsyslogd 3.15.0
#   and above. Examples of each configuration: UDP *.* @remotesystemname TCP
#   *.* @@remotesystemname RELP *.* :omrelp:remotesystemname:2514 Note that a
#   port number was given as there is no standard port for RELP.
#
# Check Text:
#   Verify RHEL 10 audit system off-loads audit records onto a different
#   system or media from the system being audited via rsyslog using TCP with
#   the following commands:
#
#   To check for legacy configuration syntax, perform the following:
#
#   $ sudo grep -ir '@@' /etc/rsyslog.conf /etc/rsyslog.d/
#
#   To check for Rainer script syntax, perform the following:
#
#   $ sudo grep -rq 'type="omfwd"' /etc/rsyslog.conf /etc/rsyslog.d/
#
#   If a remote server is not configured, or the line is commented out, ask
#   the system administrator to indicate how the audit logs are off-loaded to
#   a different system or media.
#
#   If there is no evidence that the audit logs are being off-loaded to
#   another system or media, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to off-load audit records onto a different system or
#   media from the system being audited via TCP using rsyslog by specifying
#   the remote logging server in "/etc/rsyslog.conf" or
#   "/etc/rsyslog.d/[customfile].conf" with the name or IP address of the log
#   aggregation server.
#
#   Using legacy "@host:port" syntax example:
#   *.* @@[remoteloggingserver]:[port]
#
#   Using Rainer script example:
#   action(
#   type="omfwd"
#   target="logserver.example.com"
#   port="514"
#   protocol="tcp"
#   action.resumeRetryCount="-1"
#   queue.type="linkedList"
#   que.size="10000"
#   )
#
#   Note: The Rainer script above does not contain the required encryption
#   settings.
# =============================================================================

- name: "RHEL-10-200642 | RHEL 10 must be configured to forward audit records via Transmission Control Protocol (TCP) to a different system or media from the system being audited via rsyslog."
  when: rhel_10_200642 | bool
  tags:
    - RHEL-10-200642
    - medium
    - CCI-001851
  block:
    - name: "RHEL-10-200642 | Check rsyslog TCP forwarding configuration (legacy syntax)"
      ansible.builtin.shell: grep -ir '@@' /etc/rsyslog.conf /etc/rsyslog.d/ 2>/dev/null || true
      register: rhel_10_200642_legacy
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200642 | Check rsyslog TCP forwarding configuration (RainerScript syntax)"
      ansible.builtin.shell: grep -rq 'type="omfwd"' /etc/rsyslog.conf /etc/rsyslog.d/ 2>/dev/null; echo $?
      register: rhel_10_200642_rainer
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200642 | Assert TCP forwarding is configured in rsyslog"
      ansible.builtin.assert:
        that: >-
          (rhel_10_200642_legacy.stdout | trim != '') or
          (rhel_10_200642_rainer.stdout | trim == '0')
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200642
          detail=No TCP forwarding rule found. Configure rsyslog to forward to {{ rhel_10_rsyslog_remote_server }}
        success_msg: "result=PASS stig_id=RHEL-10-200642 detail=rsyslog TCP forwarding is configured."
  rescue:
    - name: "RHEL-10-200642 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200642 detail=Task failed unexpectedly — see prior error for details."
