---
# =============================================================================
# STIG ID  : RHEL-10-200661
# Rule ID  : SV-280994r1165337_rule
# Severity : medium
# CCI      : CCI-000169
# Title    : RHEL 10 must enable the audit service.
#
# Description:
#   Without establishing what type of events occurred, it would be difficult
#   to establish, correlate, and investigate the events leading up to an
#   outage or attack. Ensuring the auditd service is active ensures audit
#   records generated by the kernel are appropriately recorded. Additionally,
#   a properly configured audit subsystem ensures that actions of individual
#   system users can be uniquely traced to those users so they can be held
#   accountable for their actions. Satisfies: SRG-OS-000062-GPOS-00031,
#   SRG-OS-000037-GPOS-00015, SRG-OS-000038-GPOS-00016,
#   SRG-OS-000039-GPOS-00017, SRG-OS-000040-GPOS-00018,
#   SRG-OS-000041-GPOS-00019, SRG-OS-000042-GPOS-00021,
#   SRG-OS-000051-GPOS-00024, SRG-OS-000054-GPOS-00025,
#   SRG-OS-000122-GPOS-00063, SRG-OS-000254-GPOS-00095,
#   SRG-OS-000255-GPOS-00096, SRG-OS-000337-GPOS-00129,
#   SRG-OS-000348-GPOS-00136, SRG-OS-000349-GPOS-00137,
#   SRG-OS-000350-GPOS-00138, SRG-OS-000351-GPOS-00139,
#   SRG-OS-000352-GPOS-00140, SRG-OS-000353-GPOS-00141,
#   SRG-OS-000354-GPOS-00142, SRG-OS-000358-GPOS-00145,
#   SRG-OS-000365-GPOS-00152, SRG-OS-000392-GPOS-00172,
#   SRG-OS-000475-GPOS-00220
#
# Check Text:
#   Verify RHEL 10 enables the audit service to produce audit records with
#   the following command:
#
#   $ systemctl status auditd.service
#   o auditd.service - Security Audit Logging Service
#   Loaded: loaded (/usr/lib/systemd/system/auditd.service; enabled; preset:
#   enabled)
#   Active: active (running) since Wed 2025-10-01 14:00:21 EDT; 1 week 6 days
#   ago
#
#   If the audit service is not "active" and "running", this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to enable the auditd service with the following
#   command:
#
#   $ sudo systemctl enable --now auditd
# =============================================================================

- name: "RHEL-10-200661 | RHEL 10 must enable the audit service."
  when: rhel_10_200661 | bool
  tags:
    - RHEL-10-200661
    - medium
    - CCI-000169
  block:
    - name: "RHEL-10-200661 | Ensure auditd service is started and enabled"
      ansible.builtin.service:
        name: auditd
        state: started
        enabled: true

    - name: "RHEL-10-200661 | Check auditd service is active"
      ansible.builtin.command: systemctl is-active auditd
      register: rhel_10_200661_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200661 | Assert auditd service is active"
      ansible.builtin.assert:
        that: rhel_10_200661_check.stdout == 'active'
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200661
          detail=Service auditd is not active (got '{{ rhel_10_200661_check.stdout }}').
          Enable with: systemctl enable --now auditd
        success_msg: "result=PASS stig_id=RHEL-10-200661 detail=Service auditd is active and enabled."
  rescue:
    - name: "RHEL-10-200661 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200661 detail=Task failed unexpectedly — see prior error for details."
