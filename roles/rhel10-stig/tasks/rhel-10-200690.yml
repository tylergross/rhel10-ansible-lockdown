---
# =============================================================================
# STIG ID  : RHEL-10-200690
# Rule ID  : SV-280997r1195387_rule
# Severity : medium
# CCI      : CCI-000139
# Title    : RHEL 10 must notify designated personnel if baseline configurations are changed in an unauthorized manner.
#
# Description:
#   The "postfix" package provides the mail command required to allow sending
#   email notifications of unauthorized configuration changes to designated
#   personnel.
#
# Check Text:
#   Verify RHEL 10 is configured to allow sending email notifications.
#
#   Note: The "postfix" package provides the "mail" command that is used to
#   send email messages.
#
#   Verify that the "postfix" package is installed on the system:
#
#   $ sudo dnf list --installed postfix
#   Installed Packages
#   postfix.x86_64 2:3.8.5-8.el10 @AppStream
#
#   If the "postfix" package is not installed, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to notify designated personnel if baseline
#   configurations are changed in an unauthorized manner.
#
#   Install the postfix package with the following command:
#
#   $ sudo dnf -y install postfix
# =============================================================================

- name: "RHEL-10-200690 | RHEL 10 must notify designated personnel if baseline configurations are changed in an unauthorized manner."
  when: rhel_10_200690 | bool
  tags:
    - RHEL-10-200690
    - medium
    - CCI-000139
  block:
    - name: "RHEL-10-200690 | Ensure postfix is installed"
      ansible.builtin.package:
        name: postfix
        state: present

    - name: "RHEL-10-200690 | Verify postfix is installed"
      ansible.builtin.command: rpm -q postfix
      register: rhel_10_200690_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200690 | Assert postfix is installed"
      ansible.builtin.assert:
        that: rhel_10_200690_check.rc == 0
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200690
          detail=Package postfix is not installed.
          Install with: dnf -y install postfix
        success_msg: "result=PASS stig_id=RHEL-10-200690 detail=Package postfix is installed."
  rescue:
    - name: "RHEL-10-200690 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200690 detail=Task failed unexpectedly — see prior error for details."
