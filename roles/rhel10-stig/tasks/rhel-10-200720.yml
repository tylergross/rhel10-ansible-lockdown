---
# =============================================================================
# STIG ID  : RHEL-10-200720
# Rule ID  : SV-281001r1195391_rule
# Severity : medium
# CCI      : CCI-002418
# Title    : RHEL 10 must have a Secure Shell (SSH) server installed for all networked systems.
#
# Description:
#   Without protection of the transmitted information, confidentiality and
#   integrity may be compromised because unprotected communications can be
#   intercepted and read or altered. This requirement applies to internal and
#   external networks and all types of information system components from
#   which information can be transmitted (e.g., servers, mobile devices,
#   notebook computers, printers, copiers, scanners, and facsimile machines).
#   Communication paths outside the physical protection of a controlled
#   boundary are exposed to the possibility of interception and modification.
#   Protecting the confidentiality and integrity of organizational
#   information can be accomplished by physical means (e.g., employing
#   physical distribution systems) or by logical means (e.g., employing
#   cryptographic techniques). If physical means of protection are employed,
#   logical means (cryptography) do not have to be employed, and vice versa.
#   Satisfies: SRG-OS-000423-GPOS-00187, SRG-OS-000424-GPOS-00188,
#   SRG-OS-000425-GPOS-00189, SRG-OS-000426-GPOS-00190
#
# Check Text:
#   Verify RHEL 10 has the "openssh-server" package installed with the
#   following command:
#
#   $ sudo dnf list --installed openssh-server
#   Installed Packages
#   openssh-server.x86_64 9.9p1-7.el10_0 @anaconda
#
#   If the "openssh-server" package is not installed, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to have the "openssh-server" package installed with the
#   following command:
#
#   $ sudo dnf -y install openssh-server
# =============================================================================

- name: "RHEL-10-200720 | RHEL 10 must have a Secure Shell (SSH) server installed for all networked systems."
  when: rhel_10_200720 | bool
  tags:
    - RHEL-10-200720
    - medium
    - CCI-002418
  block:
    - name: "RHEL-10-200720 | Ensure openssh-server is installed"
      ansible.builtin.package:
        name: openssh-server
        state: present

    - name: "RHEL-10-200720 | Verify openssh-server is installed"
      ansible.builtin.command: rpm -q openssh-server
      register: rhel_10_200720_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200720 | Assert openssh-server is installed"
      ansible.builtin.assert:
        that: rhel_10_200720_check.rc == 0
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200720
          detail=Package openssh-server is not installed.
          Install with: dnf -y install openssh-server
        success_msg: "result=PASS stig_id=RHEL-10-200720 detail=Package openssh-server is installed."
  rescue:
    - name: "RHEL-10-200720 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200720 detail=Task failed unexpectedly — see prior error for details."
