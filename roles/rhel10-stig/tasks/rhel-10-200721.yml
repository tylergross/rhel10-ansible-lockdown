---
# =============================================================================
# STIG ID  : RHEL-10-200721
# Rule ID  : SV-281002r1184641_rule
# Severity : medium
# CCI      : CCI-002418
# Title    : RHEL 10 must, for all networked systems, have and implement Secure Shell (SSH) to protect the confidentiality and integrity of transmitted and received information.
#
# Description:
#   Without protection of the transmitted information, confidentiality and
#   integrity may be compromised because unprotected communications can be
#   intercepted and either read or altered. This requirement applies to both
#   internal and external networks and all types of information system
#   components from which information can be transmitted (e.g., servers,
#   mobile devices, notebook computers, printers, copiers, scanners, and
#   facsimile machines). Communication paths outside the physical protection
#   of a controlled boundary are exposed to the possibility of interception
#   and modification. Protecting the confidentiality and integrity of
#   organizational information can be accomplished by physical means (e.g.,
#   employing physical distribution systems) or logical means (e.g.,
#   employing cryptographic techniques). If physical means of protection are
#   employed, then logical means (cryptography) do not have to be employed,
#   and vice versa. Satisfies: SRG-OS-000423-GPOS-00187,
#   SRG-OS-000424-GPOS-00188, SRG-OS-000425-GPOS-00189,
#   SRG-OS-000426-GPOS-00190
#
# Check Text:
#   Verify RHEL 10 "sshd" is active with the following command:
#
#   $ systemctl is-active sshd
#   active
#
#   If the "sshd" service is not active, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to enable the sshd service by running the following
#   command:
#
#   $ systemctl enable --now sshd
# =============================================================================

- name: "RHEL-10-200721 | RHEL 10 must, for all networked systems, have and implement Secure Shell (SSH) to protect the confidentiality and integrity of transmitted and received information."
  when: rhel_10_200721 | bool
  tags:
    - RHEL-10-200721
    - medium
    - CCI-002418
  block:
    - name: "RHEL-10-200721 | Ensure sshd is enabled and active"
      ansible.builtin.service:
        name: sshd
        state: started
        enabled: true

    - name: "RHEL-10-200721 | Check sshd is active"
      ansible.builtin.command: systemctl is-active sshd
      register: rhel_10_200721_active
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200721 | Assert sshd is active"
      ansible.builtin.assert:
        that: rhel_10_200721_active.stdout | trim == 'active'
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200721
          detail=sshd service is not active (state={{ rhel_10_200721_active.stdout | trim }}).
          Enable with: systemctl enable --now sshd
        success_msg: "result=PASS stig_id=RHEL-10-200721 detail=sshd service is active and enabled."
  rescue:
    - name: "RHEL-10-200721 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200721 detail=Task failed unexpectedly — see prior error for details."
