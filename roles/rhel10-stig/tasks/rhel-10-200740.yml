---
# =============================================================================
# STIG ID  : RHEL-10-200740
# Rule ID  : SV-281006r1195397_rule
# Severity : medium
# CCI      : CCI-000381
# Title    : RHEL 10 must have the "gnutls-utils" package installed.
#
# Description:
#   "GnuTLS" is a secure communications library implementing the Secure
#   Sockets Layer (SSL), Transport Layer Security (TLS), and Datagram TLS
#   (DTLS) protocols and technologies around them. It provides a simple C
#   language application programming interface (API) to access the secure
#   communications protocols as well as APIs to parse and write X.509, PKCS
#   #12, OpenPGP, and other required structures. This package contains
#   command line TLS client and server and certificate manipulation tools.
#
# Check Text:
#   Verify RHEL 10 has the "gnutls-utils" package installed with the
#   following command:
#
#   $ sudo dnf list --installed gnutls-utils
#   Installed Packages
#   gnutls-utils.x86_64 3.8.9-9.el10_0.14 @rhel-10-for-x86_64-appstream-rpms
#
#   If the "gnutls-utils" package is not installed, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to have the "gnutls-utils" package installed with the
#   following command:
#
#   $ sudo dnf -y install gnutls-utils
# =============================================================================

- name: "RHEL-10-200740 | RHEL 10 must have the gnutls-utils package installed."
  when: rhel_10_200740 | bool
  tags:
    - RHEL-10-200740
    - medium
    - CCI-000381
  block:
    - name: "RHEL-10-200740 | Ensure gnutls-utils is installed"
      ansible.builtin.package:
        name: gnutls-utils
        state: present

    - name: "RHEL-10-200740 | Verify gnutls-utils is installed"
      ansible.builtin.command: rpm -q gnutls-utils
      register: rhel_10_200740_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-200740 | Assert gnutls-utils is installed"
      ansible.builtin.assert:
        that: rhel_10_200740_check.rc == 0
        fail_msg: >-
          result=FAIL stig_id=RHEL-10-200740
          detail=Package gnutls-utils is not installed.
          Install with: dnf -y install gnutls-utils
        success_msg: "result=PASS stig_id=RHEL-10-200740 detail=Package gnutls-utils is installed."
  rescue:
    - name: "RHEL-10-200740 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-200740 detail=Task failed unexpectedly — see prior error for details."
