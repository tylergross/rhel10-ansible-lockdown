---
# =============================================================================
# STIG ID  : RHEL-10-300010
# Rule ID  : SV-281008r1195401_rule
# Severity : high
# CCI      : CCI-000068
# Title    : RHEL 10 must implement a FIPS 140-3-compliant systemwide cryptographic policy.
#
# Description:
#   Centralized cryptographic policies simplify applying secure ciphers
#   across an operating system and the applications that run on that
#   operating system. Use of weak or untested encryption algorithms
#   undermines the purposes of using encryption to protect data. Satisfies:
#   SRG-OS-000033-GPOS-00014, SRG-OS-000396-GPOS-00176,
#   SRG-OS-000393-GPOS-00173, SRG-OS-000394-GPOS-00174
#
# Check Text:
#   Verify RHEL 10 is set to use a FIPS 140-3-compliant systemwide
#   cryptographic policy.
#
#   Verify the current systemwide crypto-policy with the following command:
#
#   $ update-crypto-policies --show
#   FIPS
#
#   If the systemwide crypto-policy is not set to "FIPS", this is a finding.
#
#   Verify the current minimum crypto-policy configuration with the following
#   commands:
#
#   $ sudo grep -E 'rsa_size|hash' /etc/crypto-policies/state/CURRENT.pol
#   hash = SHA2-256 SHA2-384 SHA2-512 SHA2-224 SHA3-256 SHA3-384 SHA3-512
#   SHAKE-256
#   min_rsa_size = 2048
#
#   If the "hash" values do not include at least the following FIPS
#   140-3-compliant algorithms, this is a finding:
#
#   "SHA2-256 SHA2-384 SHA2-512 SHA2-224 SHA3-256 SHA3-384 SHA3-512
#   SHAKE-256"
#
#   If any algorithms include "SHA1" or a hash value less than "224", this is
#   a finding.
#
#   If the "min_rsa_size" is not set to a value of at least "2048", this is a
#   finding.
#
#   If these commands do not return any output, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to use a FIPS 140-3-compliant systemwide cryptographic
#   policy.
#
#   Set the systemwide crypto-policy to FIPS with the following command:
#
#   $ sudo update-crypto-policies --set FIPS
#   Setting system policy to FIPS
#
#   Note: Systemwide crypto-policies are applied on application startup. It
#   is recommended to restart the system for the change of policies to fully
#   take place.
# =============================================================================

- name: "RHEL-10-300010 | RHEL 10 must implement a FIPS 140-3-compliant systemwide cryptographic policy."
  when: rhel_10_300010 | bool
  tags:
    - RHEL-10-300010
    - high
    - CCI-000068
  block:
    - name: "RHEL-10-300010 | Check current systemwide crypto policy"
      ansible.builtin.command:
        cmd: update-crypto-policies --show
      register: rhel_10_300010_policy
      changed_when: false
      failed_when: false

    - name: "RHEL-10-300010 | Set crypto policy to FIPS if not already set"
      ansible.builtin.command:
        cmd: update-crypto-policies --set FIPS
      when: rhel_10_300010_policy.stdout | trim != 'FIPS'
      register: rhel_10_300010_set

    - name: "RHEL-10-300010 | Re-check crypto policy after remediation"
      ansible.builtin.command:
        cmd: update-crypto-policies --show
      register: rhel_10_300010_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-300010 | Assert FIPS crypto policy is active"
      ansible.builtin.assert:
        that: rhel_10_300010_verify.stdout | trim == 'FIPS'
        fail_msg: "result=FAIL stig_id=RHEL-10-300010 detail=Systemwide crypto policy is not FIPS (current={{ rhel_10_300010_verify.stdout | trim }}). A system reboot may be required."
        success_msg: "result=PASS stig_id=RHEL-10-300010 detail=Systemwide crypto policy is set to FIPS."

  rescue:
    - name: "RHEL-10-300010 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-300010 detail=Task failed unexpectedly — see prior error for details."
