---
# =============================================================================
# STIG ID  : RHEL-10-300030
# Rule ID  : SV-281010r1184643_rule
# Severity : high
# CCI      : CCI-000068
# Title    : RHEL 10 must be configured so that Secure Shell (SSH) clients use only DOD-approved encryption ciphers employing FIPS 140-3-validated cryptographic hash algorithms to protect the confidentiality of SSH client connections.
#
# Description:
#   Without cryptographic integrity protections, information can be altered
#   by unauthorized users without detection. Remote access (e.g., Remote
#   Desktop Protocol [RDP]) is access to DOD nonpublic information systems by
#   an authorized user (or an information system) communicating through an
#   external, nonorganizational-controlled network. Remote access methods
#   include, for example, dial-up, broadband, and wireless. Cryptographic
#   mechanisms used for protecting the integrity of information include, for
#   example, signed hash functions that use asymmetric cryptography. This
#   enables distribution of the public key to verify the hash information
#   while maintaining the confidentiality of the secret key used to generate
#   the hash. RHEL 10 incorporates systemwide crypto policies by default. The
#   SSH configuration file has no effect on the ciphers, MACs, or algorithms
#   unless specifically defined in the "/etc/sysconfig/sshd" file. The
#   employed algorithms can be viewed in the
#   "/etc/crypto-policies/back-ends/openssh.config" file. Satisfies:
#   SRG-OS-000033-GPOS-00014, SRG-OS-000125-GPOS-00065,
#   SRG-OS-000250-GPOS-00093, SRG-OS-000393-GPOS-00173,
#   SRG-OS-000394-GPOS-00174, SRG-OS-000423-GPOS-00187
#
# Check Text:
#   Verify RHEL 10 SSH clients are configured to use only ciphers employing
#   FIPS 140-3-approved algorithms.
#
#   To verify the ciphers in the systemwide SSH configuration file, use the
#   following command:
#
#   $ sudo grep -i Ciphers /etc/crypto-policies/back-ends/openssh.config
#   Ciphers
#   aes256-gcm@openssh.com,aes256-ctr,aes128-gcm@openssh.com,aes128-ctr
#
#   If the cipher entries in the "openssh.config" file have any ciphers other
#   than
#   "aes256-gcm@openssh.com,aes256-ctr,aes128-gcm@openssh.com,aes128-ctr", or
#   they are missing or commented out, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 SSH clients to use only ciphers employing FIPS
#   140-3-approved algorithms.
#
#   Reinstall crypto-policies with the following command:
#
#   $ sudo dnf -y reinstall crypto-policies
#
#   Set the crypto-policy to FIPS with the following command:
#
#   $ sudo update-crypto-policies --set FIPS
#   Setting system policy to FIPS
#
#   Note: Systemwide crypto policies are applied on application startup. It
#   is recommended to restart the system for the change of policies to fully
#   take place.
# =============================================================================

- name: "RHEL-10-300030 | RHEL 10 must be configured so that Secure Shell (SSH) clients use only DOD-approved encryption ciphers employing FIPS 140-3-validated cryptographic hash algorithms to protect the confidentiality of SSH client connections."
  when: rhel_10_300030 | bool
  tags:
    - RHEL-10-300030
    - high
    - CCI-000068
  block:
    - name: "RHEL-10-300030 | Check SSH client ciphers in openssh.config"
      ansible.builtin.command:
        cmd: grep -i Ciphers /etc/crypto-policies/back-ends/openssh.config
      register: rhel_10_300030_ciphers
      changed_when: false
      failed_when: false

    - name: "RHEL-10-300030 | Assert SSH client ciphers are FIPS-compliant"
      ansible.builtin.assert:
        that:
          - rhel_10_300030_ciphers.rc == 0
          - "'aes256-gcm@openssh.com,aes256-ctr,aes128-gcm@openssh.com,aes128-ctr' in rhel_10_300030_ciphers.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-300030 detail=SSH client ciphers in openssh.config are not FIPS-compliant or missing (output={{ rhel_10_300030_ciphers.stdout | trim }}). Fix: dnf reinstall crypto-policies && update-crypto-policies --set FIPS."
        success_msg: "result=PASS stig_id=RHEL-10-300030 detail=SSH client ciphers in openssh.config are FIPS-compliant."

  rescue:
    - name: "RHEL-10-300030 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-300030 detail=Task failed unexpectedly — see prior error for details."
