---
# =============================================================================
# STIG ID  : RHEL-10-300070
# Rule ID  : SV-281014r1165397_rule
# Severity : high
# CCI      : CCI-000068
# Title    : RHEL 10 must use FIPS 140-3-approved cryptographic algorithms for IP tunnels.
#
# Description:
#   Overriding the systemwide cryptographic policy makes the behavior of the
#   Libreswan service violate expectations and makes system configuration
#   more fragmented.
#
# Check Text:
#   Note: If the IPsec service is not installed, this requirement is not
#   applicable.
#
#   Verify RHEL 10 sets the IPsec service to use the systemwide cryptographic
#   policy with the following command:
#
#   $ sudo grep include /etc/ipsec.conf /etc/ipsec.d/*.conf
#   /etc/ipsec.conf:include /etc/crypto-policies/back-ends/libreswan.config
#
#   If the ipsec configuration file does not contain "include
#   /etc/crypto-policies/back-ends/libreswan.config", this is a finding.
#
# Fix Text:
#   Configure RHEL 10 so that Libreswan uses the systemwide cryptographic
#   policy.
#
#   Add the following line to "/etc/ipsec.conf":
#
#   include /etc/crypto-policies/back-ends/libreswan.config
# =============================================================================

- name: "RHEL-10-300070 | RHEL 10 must use FIPS 140-3-approved cryptographic algorithms for IP tunnels."
  when: rhel_10_300070 | bool
  tags:
    - RHEL-10-300070
    - high
    - CCI-000068
  block:
    - name: "RHEL-10-300070 | Check if libreswan (ipsec) is installed"
      ansible.builtin.command:
        cmd: rpm -q libreswan
      register: rhel_10_300070_libreswan
      changed_when: false
      failed_when: false

    - name: "RHEL-10-300070 | Check /etc/ipsec.conf for crypto-policies include"
      ansible.builtin.command:
        cmd: grep -F "include /etc/crypto-policies/back-ends/libreswan.config" /etc/ipsec.conf
      register: rhel_10_300070_check
      changed_when: false
      failed_when: false
      when: rhel_10_300070_libreswan.rc == 0

    - name: "RHEL-10-300070 | Backup /etc/ipsec.conf before modification"
      ansible.builtin.copy:
        src: /etc/ipsec.conf
        dest: "/etc/ipsec.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when:
        - rhel_10_300070_libreswan.rc == 0
        - rhel_10_300070_check.rc != 0

    - name: "RHEL-10-300070 | Add crypto-policies include to /etc/ipsec.conf"
      ansible.builtin.lineinfile:
        path: /etc/ipsec.conf
        line: "include /etc/crypto-policies/back-ends/libreswan.config"
        state: present
      when:
        - rhel_10_300070_libreswan.rc == 0
        - rhel_10_300070_check.rc != 0

    - name: "RHEL-10-300070 | Re-check /etc/ipsec.conf after remediation"
      ansible.builtin.command:
        cmd: grep -F "include /etc/crypto-policies/back-ends/libreswan.config" /etc/ipsec.conf
      register: rhel_10_300070_verify
      changed_when: false
      failed_when: false
      when: rhel_10_300070_libreswan.rc == 0

    - name: "RHEL-10-300070 | Assert ipsec crypto-policies include is present (libreswan installed)"
      ansible.builtin.assert:
        that: rhel_10_300070_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-300070 detail=libreswan is installed but /etc/ipsec.conf does not include /etc/crypto-policies/back-ends/libreswan.config."
        success_msg: "result=PASS stig_id=RHEL-10-300070 detail=libreswan crypto-policies include is present in /etc/ipsec.conf."
      when: rhel_10_300070_libreswan.rc == 0

    - name: "RHEL-10-300070 | Assert not applicable (libreswan not installed)"
      ansible.builtin.assert:
        that: true
        success_msg: "result=PASS stig_id=RHEL-10-300070 detail=libreswan is not installed — control not applicable."
      when: rhel_10_300070_libreswan.rc != 0

  rescue:
    - name: "RHEL-10-300070 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-300070 detail=Task failed unexpectedly — see prior error for details."
