---
# =============================================================================
# STIG ID  : RHEL-10-300090
# Rule ID  : SV-281016r1165403_rule
# Severity : high
# CCI      : CCI-002450
# Title    : RHEL 10 cryptographic policy must not be overridden.
#
# Description:
#   Centralized cryptographic policies simplify applying secure ciphers
#   across an operating system and the applications that run on that
#   operating system. Use of weak or untested encryption algorithms
#   undermines the purposes of using encryption to protect data. Satisfies:
#   SRG-OS-000396-GPOS-00176, SRG-OS-000393-GPOS-00173,
#   SRG-OS-000394-GPOS-00174
#
# Check Text:
#   Verify RHEL 10 cryptographic policies are not overridden.
#
#   Verify the configured policy matches the generated policy with the
#   following command:
#
#   $ sudo update-crypto-policies --check
#   The configured policy matches the generated policy
#
#   If the returned message does not match the above, but instead matches the
#   following, this is a finding:
#
#   The configured policy does NOT match the generated policy
#
#   List all of the crypto backends configured on the system with the
#   following command:
#
#   $ ls -l /etc/crypto-policies/back-ends/
#   lrwxrwxrwx. 1 root root 40 Nov 13 16:29 bind.config ->
#   /usr/share/crypto-policies/FIPS/bind.txt
#   lrwxrwxrwx. 1 root root 42 Nov 13 16:29 gnutls.config ->
#   /usr/share/crypto-policies/FIPS/gnutls.txt
#   lrwxrwxrwx. 1 root root 40 Nov 13 16:29 java.config ->
#   /usr/share/crypto-policies/FIPS/java.txt
#   lrwxrwxrwx. 1 root root 46 Nov 13 16:29 javasystem.config ->
#   /usr/share/crypto-policies/FIPS/javasystem.txt
#   lrwxrwxrwx. 1 root root 40 Nov 13 16:29 krb5.config ->
#   /usr/share/crypto-policies/FIPS/krb5.txt
#   lrwxrwxrwx. 1 root root 45 Nov 13 16:29 libreswan.config ->
#   /usr/share/crypto-policies/FIPS/libreswan.txt
#   lrwxrwxrwx. 1 root root 42 Nov 13 16:29 libssh.config ->
#   /usr/share/crypto-policies/FIPS/libssh.txt
#   -rw-r--r--. 1 root root 398 Nov 13 16:29 nss.config
#   lrwxrwxrwx. 1 root root 43 Nov 13 16:29 openssh.config ->
#   /usr/share/crypto-policies/FIPS/openssh.txt
#   lrwxrwxrwx. 1 root root 49 Nov 13 16:29 opensshserver.config ->
#   /usr/share/crypto-policies/FIPS/opensshserver.txt
#   lrwxrwxrwx. 1 root root 46 Nov 13 16:29 opensslcnf.config ->
#   /usr/share/crypto-policies/FIPS/opensslcnf.txt
#   lrwxrwxrwx. 1 root root 43 Nov 13 16:29 openssl.config ->
#   /usr/share/crypto-policies/FIPS/openssl.txt
#   lrwxrwxrwx. 1 root root 48 Nov 13 16:29 openssl_fips.config ->
#   /usr/share/crypto-policies/FIPS/openssl_fips.txt
#
#   If the paths do not point to the respective files under
#   "/usr/share/crypto-policies/FIPS" path, this is a finding.
#
#   Note: nss.config should not be symlinked.
#
#   Note: If there is an operational need to use a subpolicy that causes the
#   links to the crypto backends to break, this is a finding, and exceptions
#   must be made by the authorizing official and documented with the
#   information system security officer.
#
# Fix Text:
#   Configure RHEL 10 to correctly implement the systemwide cryptographic
#   policies by reinstalling the crypto-policies package contents.
#
#   Reinstall crypto-policies with the following command:
#
#   $ sudo dnf -y reinstall crypto-policies
#
#   Set the crypto-policy to FIPS with the following command:
#
#   $ sudo update-crypto-policies --set FIPS
#   Setting system policy to FIPS
#
#   Note: Systemwide crypto policies are applied on application startup. It
#   is recommended to restart the system for the change of policies to fully
#   take place.
# =============================================================================

- name: "RHEL-10-300090 | RHEL 10 cryptographic policy must not be overridden."
  when: rhel_10_300090 | bool
  tags:
    - RHEL-10-300090
    - high
    - CCI-002450
  block:
    - name: "RHEL-10-300090 | Check if crypto policy matches generated policy"
      ansible.builtin.command:
        cmd: update-crypto-policies --check
      register: rhel_10_300090_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-300090 | Reinstall crypto-policies to restore overridden backends"
      ansible.builtin.package:
        name: crypto-policies
        state: latest
      when: "'does NOT match' in rhel_10_300090_check.stdout"

    - name: "RHEL-10-300090 | Re-apply FIPS policy after reinstall"
      ansible.builtin.command:
        cmd: update-crypto-policies --set FIPS
      when: "'does NOT match' in rhel_10_300090_check.stdout"

    - name: "RHEL-10-300090 | Re-check crypto policy integrity after remediation"
      ansible.builtin.command:
        cmd: update-crypto-policies --check
      register: rhel_10_300090_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-300090 | Assert crypto policy has not been overridden"
      ansible.builtin.assert:
        that: "'The configured policy matches the generated policy' in rhel_10_300090_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-300090 detail=Cryptographic policy has been overridden ({{ rhel_10_300090_verify.stdout | trim }}). Fix: dnf reinstall crypto-policies && update-crypto-policies --set FIPS."
        success_msg: "result=PASS stig_id=RHEL-10-300090 detail=Configured crypto policy matches the generated policy."

  rescue:
    - name: "RHEL-10-300090 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-300090 detail=Task failed unexpectedly — see prior error for details."
