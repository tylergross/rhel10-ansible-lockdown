---
# =============================================================================
# STIG ID  : RHEL-10-400025
# Rule ID  : SV-281022r1165421_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must be configured so that the "/etc/gshadow" file is group-owned by "root".
#
# Description:
#   The "/etc/gshadow" file contains group password hashes. Protection of
#   this file is critical for system security.
#
# Check Text:
#   Verify RHEL 10 is configured so that the "/etc/gshadow" file is
#   group-owned by "root" with the following command:
#
#   $ sudo stat -c "%G %n" /etc/gshadow
#   root /etc/gshadow
#
#   If the "/etc/gshadow" file does not have a group owner of "root", this is
#   a finding.
#
# Fix Text:
#   Configure RHEL 10 so that the group of the "/etc/gshadow" file is set to
#   "root" by running the following command:
#
#   $ sudo chgrp root /etc/gshadow
# =============================================================================

- name: "RHEL-10-400025 | RHEL 10 must be configured so that the /etc/gshadow file is group-owned by root."
  when: rhel_10_400025 | bool
  tags:
    - RHEL-10-400025
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-400025 | Check group owner of /etc/gshadow"
      ansible.builtin.stat:
        path: /etc/gshadow
      register: rhel_10_400025_stat

    - name: "RHEL-10-400025 | Set correct group owner on /etc/gshadow"
      ansible.builtin.file:
        path: /etc/gshadow
        group: root
      when: rhel_10_400025_stat.stat.gr_name != 'root'

    - name: "RHEL-10-400025 | Re-check group owner of /etc/gshadow"
      ansible.builtin.stat:
        path: /etc/gshadow
      register: rhel_10_400025_verify

    - name: "RHEL-10-400025 | Assert correct group owner on /etc/gshadow"
      ansible.builtin.assert:
        that:
          - rhel_10_400025_verify.stat.gr_name == 'root'
        fail_msg: "result=FAIL stig_id=RHEL-10-400025 detail=/etc/gshadow is not group-owned by root (group={{ rhel_10_400025_verify.stat.gr_name }})."
        success_msg: "result=PASS stig_id=RHEL-10-400025 detail=/etc/gshadow is group-owned by root."

  rescue:
    - name: "RHEL-10-400025 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400025 detail=Task failed unexpectedly — see prior error for details."
