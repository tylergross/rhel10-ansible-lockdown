---
# =============================================================================
# STIG ID  : RHEL-10-400040
# Rule ID  : SV-281025r1165430_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must be configured so that the "/etc/passwd" file is owned by "root".
#
# Description:
#   The "/etc/passwd" file contains information about the users that are
#   configured on the system. Protection of this file is critical for system
#   security.
#
# Check Text:
#   Verify RHEL 10 is configured so that the "/etc/passwd" file is owned by
#   "root" with the following command:
#
#   $ sudo stat -c "%U %n" /etc/passwd
#   root /etc/passwd
#
#   If the "/etc/passwd" file does not have an owner of "root", this is a
#   finding.
#
# Fix Text:
#   Configure RHEL 10 so that the owner of the "/etc/passwd" file is set to
#   "root" by running the following command:
#
#   $ sudo chown root /etc/passwd
# =============================================================================

- name: "RHEL-10-400040 | RHEL 10 must be configured so that the /etc/passwd file is owned by root."
  when: rhel_10_400040 | bool
  tags:
    - RHEL-10-400040
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-400040 | Check owner of /etc/passwd"
      ansible.builtin.stat:
        path: /etc/passwd
      register: rhel_10_400040_stat

    - name: "RHEL-10-400040 | Set correct owner on /etc/passwd"
      ansible.builtin.file:
        path: /etc/passwd
        owner: root
      when: rhel_10_400040_stat.stat.pw_name != 'root'

    - name: "RHEL-10-400040 | Re-check owner of /etc/passwd"
      ansible.builtin.stat:
        path: /etc/passwd
      register: rhel_10_400040_verify

    - name: "RHEL-10-400040 | Assert correct owner on /etc/passwd"
      ansible.builtin.assert:
        that:
          - rhel_10_400040_verify.stat.pw_name == 'root'
        fail_msg: "result=FAIL stig_id=RHEL-10-400040 detail=/etc/passwd is not owned by root (owner={{ rhel_10_400040_verify.stat.pw_name }})."
        success_msg: "result=PASS stig_id=RHEL-10-400040 detail=/etc/passwd is owned by root."

  rescue:
    - name: "RHEL-10-400040 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400040 detail=Task failed unexpectedly — see prior error for details."
