---
# =============================================================================
# STIG ID  : RHEL-10-400070
# Rule ID  : SV-281031r1165448_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must be configured so that the "/etc/shadow-" file is owned by "root".
#
# Description:
#   The "/etc/shadow-" file is a backup file of "/etc/shadow", and as such
#   contains the list of local system accounts and password hashes.
#   Protection of this file is critical for system security.
#
# Check Text:
#   Verify RHEL 10 is configured so that the "/etc/shadow-" file is owned by
#   "root" with the following command:
#
#   $ sudo stat -c "%U %n" /etc/shadow-
#   root /etc/shadow-
#
#   If the "/etc/shadow-" file does not have an owner of "root", this is a
#   finding.
#
# Fix Text:
#   Configure RHEL 10 so that the owner of the "/etc/shadow-" file is set to
#   "root" by running the following command:
#
#   $ sudo chown root /etc/shadow-
# =============================================================================

- name: "RHEL-10-400070 | RHEL 10 must be configured so that the /etc/shadow- file is owned by root."
  when: rhel_10_400070 | bool
  tags:
    - RHEL-10-400070
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-400070 | Check owner of /etc/shadow-"
      ansible.builtin.stat:
        path: /etc/shadow-
      register: rhel_10_400070_stat

    - name: "RHEL-10-400070 | Set correct owner on /etc/shadow-"
      ansible.builtin.file:
        path: /etc/shadow-
        owner: root
      when: rhel_10_400070_stat.stat.exists and rhel_10_400070_stat.stat.pw_name != 'root'

    - name: "RHEL-10-400070 | Re-check owner of /etc/shadow-"
      ansible.builtin.stat:
        path: /etc/shadow-
      register: rhel_10_400070_verify

    - name: "RHEL-10-400070 | Assert correct owner on /etc/shadow-"
      ansible.builtin.assert:
        that:
          - rhel_10_400070_verify.stat.exists
          - rhel_10_400070_verify.stat.pw_name == 'root'
        fail_msg: "result=FAIL stig_id=RHEL-10-400070 detail=/etc/shadow- is not owned by root (owner={{ rhel_10_400070_verify.stat.pw_name | default('file missing') }})."
        success_msg: "result=PASS stig_id=RHEL-10-400070 detail=/etc/shadow- is owned by root."

  rescue:
    - name: "RHEL-10-400070 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400070 detail=Task failed unexpectedly — see prior error for details."
