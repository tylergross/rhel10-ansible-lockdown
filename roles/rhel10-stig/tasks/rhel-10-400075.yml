---
# =============================================================================
# STIG ID  : RHEL-10-400075
# Rule ID  : SV-281032r1165451_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must be configured so that the "/etc/shadow-" file is group-owned by "root".
#
# Description:
#   The "/etc/shadow-" file is a backup file of "/etc/shadow", and as such
#   contains the list of local system accounts and password hashes.
#   Protection of this file is critical for system security.
#
# Check Text:
#   Verify RHEL 10 is configured so that the "/etc/shadow-" file is
#   group-owned by "root" with the following command:
#
#   $ sudo stat -c "%G %n" /etc/shadow-
#   root /etc/shadow-
#
#   If the "/etc/shadow-" file does not have a group owner of "root", this is
#   a finding.
#
# Fix Text:
#   Configure RHEL 10 so that the group of the "/etc/shadow-" file is set to
#   "root" by running the following command:
#
#   $ sudo chgrp root /etc/shadow-
# =============================================================================

- name: "RHEL-10-400075 | RHEL 10 must be configured so that the /etc/shadow- file is group-owned by root."
  when: rhel_10_400075 | bool
  tags:
    - RHEL-10-400075
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-400075 | Check group owner of /etc/shadow-"
      ansible.builtin.stat:
        path: /etc/shadow-
      register: rhel_10_400075_stat

    - name: "RHEL-10-400075 | Set correct group owner on /etc/shadow-"
      ansible.builtin.file:
        path: /etc/shadow-
        group: root
      when: rhel_10_400075_stat.stat.exists and rhel_10_400075_stat.stat.gr_name != 'root'

    - name: "RHEL-10-400075 | Re-check group owner of /etc/shadow-"
      ansible.builtin.stat:
        path: /etc/shadow-
      register: rhel_10_400075_verify

    - name: "RHEL-10-400075 | Assert correct group owner on /etc/shadow-"
      ansible.builtin.assert:
        that:
          - rhel_10_400075_verify.stat.exists
          - rhel_10_400075_verify.stat.gr_name == 'root'
        fail_msg: "result=FAIL stig_id=RHEL-10-400075 detail=/etc/shadow- is not group-owned by root (group={{ rhel_10_400075_verify.stat.gr_name | default('file missing') }})."
        success_msg: "result=PASS stig_id=RHEL-10-400075 detail=/etc/shadow- is group-owned by root."

  rescue:
    - name: "RHEL-10-400075 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400075 detail=Task failed unexpectedly — see prior error for details."
