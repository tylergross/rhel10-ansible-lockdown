---
# =============================================================================
# STIG ID  : RHEL-10-400100
# Rule ID  : SV-281037r1165466_rule
# Severity : medium
# CCI      : CCI-001499
# Title    : RHEL 10 must be configured so that system commands are owned by "root".
#
# Description:
#   If RHEL 10 allowed any user to make changes to software libraries, those
#   changes might be implemented without undergoing the appropriate testing
#   and approvals that are part of a robust change management process. This
#   requirement applies to RHEL 10 with software libraries that are
#   accessible and configurable, as in the case of interpreted languages.
#   Software libraries also include privileged programs that execute with
#   escalated privileges.
#
# Check Text:
#   Verify RHEL 10 is configured so that the system commands contained in the
#   following directories are owned by "root" with the following command:
#
#   $ sudo find -L /bin /sbin /usr/bin /usr/sbin /usr/libexec /usr/local/bin
#   /usr/local/sbin ! -user root -exec stat -L -c "%U %n" {} \;
#
#   If any system commands are found to not be owned by root, this is a
#   finding.
#
# Fix Text:
#   Configure RHEL 10 so that the system commands are protected from
#   unauthorized access.
#
#   Run the following command, replacing "[FILE]" with any system command
#   file not owned by "root".
#
#   $ sudo chown root [FILE]
# =============================================================================

- name: "RHEL-10-400100 | RHEL 10 must be configured so that system commands are owned by root."
  when: rhel_10_400100 | bool
  tags:
    - RHEL-10-400100
    - medium
    - CCI-001499
  block:
    - name: "RHEL-10-400100 | Find system commands not owned by root"
      ansible.builtin.command:
        cmd: find -L /bin /sbin /usr/bin /usr/sbin /usr/libexec /usr/local/bin /usr/local/sbin ! -user root -type f -print
      register: rhel_10_400100_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-400100 | Set root ownership on system commands not owned by root"
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
      loop: "{{ rhel_10_400100_check.stdout_lines }}"
      when: rhel_10_400100_check.stdout_lines | length > 0

    - name: "RHEL-10-400100 | Re-check system commands not owned by root"
      ansible.builtin.command:
        cmd: find -L /bin /sbin /usr/bin /usr/sbin /usr/libexec /usr/local/bin /usr/local/sbin ! -user root -type f -print
      register: rhel_10_400100_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-400100 | Assert all system commands are owned by root"
      ansible.builtin.assert:
        that:
          - rhel_10_400100_verify.stdout_lines | length == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-400100 detail=System commands not owned by root: {{ rhel_10_400100_verify.stdout_lines | join(', ') }}."
        success_msg: "result=PASS stig_id=RHEL-10-400100 detail=All system commands in standard directories are owned by root."

  rescue:
    - name: "RHEL-10-400100 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400100 detail=Task failed unexpectedly — see prior error for details."
