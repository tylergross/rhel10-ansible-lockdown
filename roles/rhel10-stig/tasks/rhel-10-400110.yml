---
# =============================================================================
# STIG ID  : RHEL-10-400110
# Rule ID  : SV-281039r1165472_rule
# Severity : medium
# CCI      : CCI-001499
# Title    : RHEL 10 must be configured so that library files are owned by "root".
#
# Description:
#   If RHEL 10 allowed any user to make changes to software libraries, those
#   changes might be implemented without undergoing the appropriate testing
#   and approvals that are part of a robust change management process. This
#   requirement applies to RHEL 10 with software libraries that are
#   accessible and configurable, as in the case of interpreted languages.
#   Software libraries also include privileged programs that execute with
#   escalated privileges.
#
# Check Text:
#   Verify RHEL 10 is configured so that the systemwide shared library files
#   are owned by "root" with the following command:
#
#   $ sudo find -L /lib /lib64 /usr/lib /usr/lib64 ! -user root ! -type d
#   -exec stat -L -c "%U %n" {} \;
#
#   If any systemwide shared library file is not owned by root, this is a
#   finding.
#
# Fix Text:
#   Configure RHEL 10 so that the systemwide shared library files (/lib,
#   /lib64, /usr/lib, and /usr/lib64) are protected from unauthorized access.
#
#   Run the following command, replacing "[FILE]" with any library file not
#   owned by "root".
#
#   $ sudo chown root [FILE]
# =============================================================================

- name: "RHEL-10-400110 | RHEL 10 must be configured so that library files are owned by root."
  when: rhel_10_400110 | bool
  tags:
    - RHEL-10-400110
    - medium
    - CCI-001499
  block:
    - name: "RHEL-10-400110 | Find library files not owned by root"
      ansible.builtin.command:
        cmd: find -L /lib /lib64 /usr/lib /usr/lib64 ! -user root ! -type d -print
      register: rhel_10_400110_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-400110 | Set root ownership on library files not owned by root"
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
      loop: "{{ rhel_10_400110_check.stdout_lines }}"
      when: rhel_10_400110_check.stdout_lines | length > 0

    - name: "RHEL-10-400110 | Re-check library files not owned by root"
      ansible.builtin.command:
        cmd: find -L /lib /lib64 /usr/lib /usr/lib64 ! -user root ! -type d -print
      register: rhel_10_400110_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-400110 | Assert all library files are owned by root"
      ansible.builtin.assert:
        that:
          - rhel_10_400110_verify.stdout_lines | length == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-400110 detail=Library files not owned by root: {{ rhel_10_400110_verify.stdout_lines | join(', ') }}."
        success_msg: "result=PASS stig_id=RHEL-10-400110 detail=All library files in standard directories are owned by root."

  rescue:
    - name: "RHEL-10-400110 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400110 detail=Task failed unexpectedly — see prior error for details."
