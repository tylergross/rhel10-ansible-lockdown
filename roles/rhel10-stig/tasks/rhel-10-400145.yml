---
# =============================================================================
# STIG ID  : RHEL-10-400145
# Rule ID  : SV-281046r1165493_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must be configured so that all system device files are correctly labeled to prevent unauthorized modification.
#
# Description:
#   If an unauthorized or modified device is allowed to exist on the system,
#   the system may perform unintended or unauthorized operations.
#
# Check Text:
#   Verify RHEL 10 is configured so that all system device files are
#   correctly labeled to prevent unauthorized modification.
#
#   List all device files on the system that are incorrectly labeled with the
#   following commands:
#
#   Note: Device files are normally found under "/dev", but applications may
#   place device files in other directories and may necessitate a search of
#   the entire system.
#
#   $ sudo find /dev -context *:device_t:* \( -type c -o -type b \) -printf
#   "%p %Z\n"
#
#   $ sudo find /dev -context *:unlabeled_t:* \( -type c -o -type b \)
#   -printf "%p %Z\n"
#
#   Note: There are device files, such as "/dev/vmci", that are used when the
#   operating system is a host virtual machine. They will not be owned by a
#   user on the system and require the "device_t" label to operate. These
#   device files are not a finding.
#
#   If there is output from either of these commands, other than already
#   noted, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 so that all system device files are correctly labeled
#   to prevent unauthorized modification.
#
#   Restore the SELinux policy for the affected device file from the system
#   policy database using the following command:
#
#   $ sudo restorecon -v <device_path>
#
#   Substitute "<device_path>" with the path to the affected device file
#   (from the output of the previous commands). An example device file path
#   would be "/dev/ttyUSB0".
#
#   If the output of the above command does not indicate that the device was
#   relabeled to a more specific SELinux type label, the SELinux policy of
#   the system must be updated with more specific policy for the device class
#   specified.
#
#   If a package was used to install support for a device class, that package
#   could be reinstalled using the following command:
#
#   $ sudo dnf reinstall <package_name>
#
#   If a package was not used to install the SELinux policy for a given
#   device class, it must be generated manually and provide specific type
#   labels.
# =============================================================================

- name: "RHEL-10-400145 | RHEL 10 must be configured so that all system device files are correctly labeled to prevent unauthorized modification."
  when: rhel_10_400145 | bool
  tags:
    - RHEL-10-400145
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-400145 | Find device files with incorrect device_t or unlabeled_t SELinux labels"
      ansible.builtin.command:
        cmd: find /dev \( -context "*:device_t:*" -o -context "*:unlabeled_t:*" \) \( -type c -o -type b \) -printf "%p %Z\n"
      register: rhel_10_400145_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-400145 | Restore SELinux context on incorrectly labeled device files"
      ansible.builtin.command:
        cmd: >-
          restorecon -v "{{ item.split(' ')[0] }}"
      loop: "{{ rhel_10_400145_check.stdout_lines }}"
      when: rhel_10_400145_check.stdout_lines | length > 0
      changed_when: true

    - name: "RHEL-10-400145 | Re-check device files with incorrect SELinux labels"
      ansible.builtin.command:
        cmd: find /dev \( -context "*:device_t:*" -o -context "*:unlabeled_t:*" \) \( -type c -o -type b \) -printf "%p %Z\n"
      register: rhel_10_400145_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-400145 | Assert all system device files are correctly labeled"
      ansible.builtin.assert:
        that:
          - rhel_10_400145_verify.stdout_lines | length == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-400145 detail=Device files with incorrect SELinux labels: {{ rhel_10_400145_verify.stdout_lines | join('; ') }}."
        success_msg: "result=PASS stig_id=RHEL-10-400145 detail=All system device files are correctly labeled."

  rescue:
    - name: "RHEL-10-400145 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400145 detail=Task failed unexpectedly — see prior error for details."
