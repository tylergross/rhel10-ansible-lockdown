---
# =============================================================================
# STIG ID  : RHEL-10-400205
# Rule ID  : SV-281058r1165529_rule
# Severity : medium
# CCI      : CCI-001499
# Title    : RHEL 10 must enforce mode "755" or less permissive for system commands.
#
# Description:
#   If RHEL 10 allowed any user to make changes to software libraries, those
#   changes might be implemented without undergoing the appropriate testing
#   and approvals that are part of a robust change management process. This
#   requirement applies to RHEL 10 with software libraries that are
#   accessible and configurable, as in the case of interpreted languages.
#   Software libraries also include privileged programs that execute with
#   escalated privileges.
#
# Check Text:
#   Verify RHEL 10 is configured so that the system commands contained in the
#   following directories have mode "755" or less permissive with the
#   following command:
#
#   $ sudo find -L /bin /sbin /usr/bin /usr/sbin /usr/libexec /usr/local/bin
#   /usr/local/sbin -perm /022 -exec ls -l {} \;
#
#   If any system commands are found to be group-writable or world-writable,
#   this is a finding.
#
# Fix Text:
#   Configure RHEL 10 so that the system commands to be protected from
#   unauthorized access.
#
#   Run the following command, replacing "[FILE]" with any system command
#   with a mode more permissive than "755".
#
#   $ sudo chmod 755 [FILE]
# =============================================================================

- name: "RHEL-10-400205 | RHEL 10 must enforce mode 755 or less permissive for system commands."
  when: rhel_10_400205 | bool
  tags:
    - RHEL-10-400205
    - medium
    - CCI-001499
  block:
    - name: "RHEL-10-400205 | Find system commands more permissive than 755"
      ansible.builtin.command:
        cmd: find -L /bin /sbin /usr/bin /usr/sbin /usr/libexec /usr/local/bin /usr/local/sbin -perm /022 -type f
      register: rhel_10_400205_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-400205 | Remediate system commands more permissive than 755"
      ansible.builtin.file:
        path: "{{ item }}"
        mode: "u-s,g-ws,o-wt"
      loop: "{{ rhel_10_400205_check.stdout_lines }}"
      when: rhel_10_400205_check.stdout_lines | length > 0

    - name: "RHEL-10-400205 | Re-check system commands more permissive than 755"
      ansible.builtin.command:
        cmd: find -L /bin /sbin /usr/bin /usr/sbin /usr/libexec /usr/local/bin /usr/local/sbin -perm /022 -type f
      register: rhel_10_400205_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-400205 | Assert no system commands are group- or world-writable"
      ansible.builtin.assert:
        that:
          - rhel_10_400205_verify.stdout_lines | length == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-400205 detail=System commands with mode more permissive than 755 found: {{ rhel_10_400205_verify.stdout_lines | join(', ') }}."
        success_msg: "result=PASS stig_id=RHEL-10-400205 detail=All system commands have mode 755 or less permissive."

  rescue:
    - name: "RHEL-10-400205 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400205 detail=Task failed unexpectedly — see prior error for details."
