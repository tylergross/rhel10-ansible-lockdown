---
# =============================================================================
# STIG ID  : RHEL-10-400220
# Rule ID  : SV-281061r1165538_rule
# Severity : medium
# CCI      : CCI-001314
# Title    : RHEL 10 must enforce mode "0755" or less permissive for the "/var/log" directory.
#
# Description:
#   Only authorized personnel should be aware of errors and the details of
#   the errors. Error messages are an indicator of an organization's
#   operational state or can identify the RHEL 10 system or platform.
#   Additionally, personally identifiable information (PII) and operational
#   information must not be revealed through error messages to unauthorized
#   personnel or their designated representatives. The structure and content
#   of error messages must be carefully considered by the organization and
#   development team. The extent to which the information system is able to
#   identify and handle error conditions is guided by organizational policy
#   and operational requirements.
#
# Check Text:
#   Verify RHEL 10 is configured so that the "/var/log" directory has a mode
#   of "0755" or less permissive with the following command:
#
#   $ stat -c '%a %n' /var/log
#   755 /var/log
#
#   If "/var/log" does not have a mode of "0755" or less permissive, this is
#   a finding.
#
# Fix Text:
#   Configure RHEL 10 so that the "/var/log" directory has a mode of "0755"
#   by running the following command:
#
#   $ sudo chmod 0755 /var/log
# =============================================================================

- name: "RHEL-10-400220 | RHEL 10 must enforce mode 0755 or less permissive for the /var/log directory."
  when: rhel_10_400220 | bool
  tags:
    - RHEL-10-400220
    - medium
    - CCI-001314
  block:
    - name: "RHEL-10-400220 | Check mode of /var/log directory"
      ansible.builtin.stat:
        path: /var/log
      register: rhel_10_400220_stat
      changed_when: false

    - name: "RHEL-10-400220 | Set mode of /var/log to 0755"
      ansible.builtin.file:
        path: /var/log
        mode: '0755'
      when: >
        not rhel_10_400220_stat.stat.exists or
        (rhel_10_400220_stat.stat.mode | int(base=8)) > (0o755)

    - name: "RHEL-10-400220 | Re-check mode of /var/log directory"
      ansible.builtin.stat:
        path: /var/log
      register: rhel_10_400220_verify
      changed_when: false

    - name: "RHEL-10-400220 | Assert /var/log has mode 0755 or less permissive"
      ansible.builtin.assert:
        that:
          - rhel_10_400220_verify.stat.exists
          - (rhel_10_400220_verify.stat.mode | int(base=8)) <= (0o755)
        fail_msg: "result=FAIL stig_id=RHEL-10-400220 detail=/var/log mode is {{ rhel_10_400220_verify.stat.mode }} which is more permissive than 0755."
        success_msg: "result=PASS stig_id=RHEL-10-400220 detail=/var/log has mode 0755 or less permissive ({{ rhel_10_400220_verify.stat.mode }})."

  rescue:
    - name: "RHEL-10-400220 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400220 detail=Task failed unexpectedly — see prior error for details."
