---
# =============================================================================
# STIG ID  : RHEL-10-400265
# Rule ID  : SV-281070r1165565_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must enforce mode "0644" or less permissive for the "/etc/passwd" file to prevent unauthorized access.
#
# Description:
#   If the "/etc/passwd" file is writable by a group-owner or the world, the
#   risk of its compromise is increased. The file contains the list of
#   accounts on the system and associated information, and protection of this
#   file is critical for system security.
#
# Check Text:
#   Verify RHEL 10 is configured so that the "/etc/passwd" file has mode
#   "0644" or less permissive with the following command:
#
#   $ sudo stat -c "%a %n" /etc/passwd
#   644 /etc/passwd
#
#   If a value of "0644" or less permissive is not returned, this is a
#   finding.
#
# Fix Text:
#   Configure RHEL 10 so that the mode of the file "/etc/passwd" is set to
#   "0644" by running the following command:
#
#   $ sudo chmod 0644 /etc/passwd
# =============================================================================

- name: "RHEL-10-400265 | RHEL 10 must enforce mode 0644 or less permissive for the /etc/passwd file to prevent unauthorized access."
  when: rhel_10_400265 | bool
  tags:
    - RHEL-10-400265
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-400265 | Check mode of /etc/passwd"
      ansible.builtin.stat:
        path: /etc/passwd
      register: rhel_10_400265_stat
      changed_when: false

    - name: "RHEL-10-400265 | Set mode of /etc/passwd to 0644"
      ansible.builtin.file:
        path: /etc/passwd
        mode: '0644'
      when: >
        not rhel_10_400265_stat.stat.exists or
        (rhel_10_400265_stat.stat.mode | int(base=8)) > (0o644)

    - name: "RHEL-10-400265 | Re-check mode of /etc/passwd"
      ansible.builtin.stat:
        path: /etc/passwd
      register: rhel_10_400265_verify
      changed_when: false

    - name: "RHEL-10-400265 | Assert /etc/passwd has mode 0644 or less permissive"
      ansible.builtin.assert:
        that:
          - rhel_10_400265_verify.stat.exists
          - (rhel_10_400265_verify.stat.mode | int(base=8)) <= (0o644)
        fail_msg: "result=FAIL stig_id=RHEL-10-400265 detail=/etc/passwd mode is {{ rhel_10_400265_verify.stat.mode }} which is more permissive than 0644."
        success_msg: "result=PASS stig_id=RHEL-10-400265 detail=/etc/passwd has mode 0644 or less permissive ({{ rhel_10_400265_verify.stat.mode }})."

  rescue:
    - name: "RHEL-10-400265 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400265 detail=Task failed unexpectedly — see prior error for details."
