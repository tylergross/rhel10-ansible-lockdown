---
# =============================================================================
# STIG ID  : RHEL-10-400280
# Rule ID  : SV-281073r1165574_rule
# Severity : medium
# CCI      : CCI-001090
# Title    : RHEL 10 must be configured so that a sticky bit is set on all public directories.
#
# Description:
#   Preventing unauthorized information transfers mitigates the risk of
#   information, including encrypted representations of information, produced
#   by the actions of prior users/roles (or the actions of processes acting
#   on behalf of prior users/roles) from being available to any current
#   users/roles (or current processes) that obtain access to shared system
#   resources (e.g., registers, main memory, hard disks) after those
#   resources have been released back to information systems. The control of
#   information in shared resources is also commonly referred to as object
#   reuse and residual information protection. This requirement generally
#   applies to the design of an information technology product, but it can
#   also apply to the configuration of information system components that
#   are, or use, such products. This can be verified by acceptance/validation
#   processes in DOD or other government agencies.
#
# Check Text:
#   Verify RHEL 10 is configured so that all world-writable directories have
#   the sticky bit set with the following command:
#
#   $ sudo find / -type d \( -perm -0002 -a ! -perm -1000 \) -print
#   2>/dev/null
#   drwxrwxrwt 7 root root 4096 Jul 26 11:19 /tmp
#
#   If any of the returned directories are world-writable and do not have the
#   sticky bit set, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 so that all world-writable directories have the sticky
#   bit set to prevent unauthorized and unintended information transferred
#   via shared system resources.
#
#   Set the sticky bit on all world-writable directories using the following
#   command (replace "[World-Writable Directory]" with any directory path
#   missing the sticky bit):
#
#   $ chmod a+t [World-Writable Directory]
# =============================================================================

- name: "RHEL-10-400280 | RHEL 10 must be configured so that a sticky bit is set on all public directories."
  when: rhel_10_400280 | bool
  tags:
    - RHEL-10-400280
    - medium
    - CCI-001090
  block:
    - name: "RHEL-10-400280 | Find world-writable directories without sticky bit"
      ansible.builtin.command:
        cmd: find / -xdev -type d \( -perm -0002 -a ! -perm -1000 \) -print
      register: rhel_10_400280_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-400280 | Set sticky bit on world-writable directories"
      ansible.builtin.file:
        path: "{{ item }}"
        mode: 'a+t'
      loop: "{{ rhel_10_400280_check.stdout_lines }}"
      when: rhel_10_400280_check.stdout_lines | length > 0

    - name: "RHEL-10-400280 | Re-check world-writable directories without sticky bit"
      ansible.builtin.command:
        cmd: find / -xdev -type d \( -perm -0002 -a ! -perm -1000 \) -print
      register: rhel_10_400280_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-400280 | Assert all world-writable directories have sticky bit set"
      ansible.builtin.assert:
        that:
          - rhel_10_400280_verify.stdout_lines | length == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-400280 detail=World-writable directories without sticky bit found: {{ rhel_10_400280_verify.stdout_lines | join(', ') }}."
        success_msg: "result=PASS stig_id=RHEL-10-400280 detail=All world-writable directories have the sticky bit set."

  rescue:
    - name: "RHEL-10-400280 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400280 detail=Task failed unexpectedly — see prior error for details."
