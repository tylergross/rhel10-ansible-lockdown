---
# =============================================================================
# STIG ID  : RHEL-10-400295
# Rule ID  : SV-281076r1165583_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must enforce mode "0000" for "/etc/shadow" to prevent unauthorized access.
#
# Description:
#   The "/etc/shadow" file contains the list of local system accounts and
#   stores password hashes. Protection of this file is critical for system
#   security. Failure to give ownership of this file to "root" provides the
#   designated owner with access to sensitive information, which could weaken
#   the system security posture.
#
# Check Text:
#   Verify RHEL 10 is configured so that the "/etc/shadow" file has mode
#   "0000" with the following command:
#
#   $ sudo stat -c "%a %n" /etc/shadow
#   0 /etc/shadow
#
#   If a value of "0" is not returned, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to enforce mode "0000" for "/etc/shadow" to prevent
#   unauthorized access.
#
#   Change the mode of the file "/etc/shadow" to "0000" by running the
#   following command:
#
#   $ sudo chmod 0000 /etc/shadow
# =============================================================================

- name: "RHEL-10-400295 | RHEL 10 must enforce mode 0000 for /etc/shadow to prevent unauthorized access."
  when: rhel_10_400295 | bool
  tags:
    - RHEL-10-400295
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-400295 | Check mode of /etc/shadow"
      ansible.builtin.stat:
        path: /etc/shadow
      register: rhel_10_400295_stat
      changed_when: false

    - name: "RHEL-10-400295 | Set mode of /etc/shadow to 0000"
      ansible.builtin.file:
        path: /etc/shadow
        mode: '0000'
      when: >
        not rhel_10_400295_stat.stat.exists or
        rhel_10_400295_stat.stat.mode != '0000'

    - name: "RHEL-10-400295 | Re-check mode of /etc/shadow"
      ansible.builtin.stat:
        path: /etc/shadow
      register: rhel_10_400295_verify
      changed_when: false

    - name: "RHEL-10-400295 | Assert /etc/shadow has mode 0000"
      ansible.builtin.assert:
        that:
          - rhel_10_400295_verify.stat.exists
          - rhel_10_400295_verify.stat.mode == '0000'
        fail_msg: "result=FAIL stig_id=RHEL-10-400295 detail=/etc/shadow mode is {{ rhel_10_400295_verify.stat.mode }} — expected 0000."
        success_msg: "result=PASS stig_id=RHEL-10-400295 detail=/etc/shadow has mode 0000."

  rescue:
    - name: "RHEL-10-400295 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400295 detail=Task failed unexpectedly — see prior error for details."
