---
# =============================================================================
# STIG ID  : RHEL-10-400305
# Rule ID  : SV-281078r1165589_rule
# Severity : medium
# CCI      : CCI-001493
# Title    : RHEL 10 must be configured so that audit tools are group-owned by "root".
#
# Description:
#   Protecting audit information also includes identifying and protecting the
#   tools used to view and manipulate log data; therefore, protecting audit
#   tools is necessary to prevent unauthorized operation on audit
#   information. RHEL 10 systems providing tools to interface with audit
#   information will leverage user permissions and roles identifying the user
#   accessing the tools, and the corresponding rights the user enjoys, to
#   make access decisions regarding the access to audit tools. Audit tools
#   include, but are not limited to, vendor-provided and open source audit
#   tools needed to successfully view and manipulate audit information system
#   activity and records. Audit tools include custom queries and report
#   generators. Satisfies: SRG-OS-000256-GPOS-00097,
#   SRG-OS-000257-GPOS-00098, SRG-OS-000258-GPOS-00099
#
# Check Text:
#   Verify RHEL 10 audit tools are group-owned by "root" with the following
#   command:
#
#   $ sudo stat -c "%G %n" /sbin/auditctl /sbin/aureport /sbin/ausearch
#   /sbin/auditd /sbin/rsyslogd /sbin/augenrules
#   root /sbin/auditctl
#   root /sbin/aureport
#   root /sbin/ausearch
#   root /sbin/auditd
#   root /sbin/rsyslogd
#   root /sbin/augenrules
#
#   If any audit tools do not have a group owner of "root", this is a
#   finding.
#
# Fix Text:
#   Configure RHEL 10 so that the audit tools are group-owned by "root" by
#   running the following command:
#
#   $ sudo chgrp root [audit_tool]
#
#   Replace "[audit_tool]" with each audit tool not group-owned by "root".
# =============================================================================

- name: "RHEL-10-400305 | RHEL 10 must be configured so that audit tools are group-owned by root."
  when: rhel_10_400305 | bool
  tags:
    - RHEL-10-400305
    - medium
    - CCI-001493
  block:
    - name: "RHEL-10-400305 | Set group owner of audit tools to root"
      ansible.builtin.file:
        path: "{{ item }}"
        group: root
      loop:
        - /sbin/auditctl
        - /sbin/aureport
        - /sbin/ausearch
        - /sbin/auditd
        - /sbin/rsyslogd
        - /sbin/augenrules
      register: rhel_10_400305_fix
      failed_when: false

    - name: "RHEL-10-400305 | Verify group owner of audit tools is root"
      ansible.builtin.stat:
        path: "{{ item }}"
      register: rhel_10_400305_verify
      loop:
        - /sbin/auditctl
        - /sbin/aureport
        - /sbin/ausearch
        - /sbin/auditd
        - /sbin/rsyslogd
        - /sbin/augenrules
      changed_when: false

    - name: "RHEL-10-400305 | Assert all audit tools are group-owned by root"
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.gr_name == 'root'
        fail_msg: "result=FAIL stig_id=RHEL-10-400305 detail=Audit tool {{ item.item }} is not group-owned by root (gr_name={{ item.stat.gr_name | default('unknown') }})."
        success_msg: "result=PASS stig_id=RHEL-10-400305 detail=Audit tool {{ item.item }} is group-owned by root."
      loop: "{{ rhel_10_400305_verify.results }}"
      loop_control:
        label: "{{ item.item }}"

  rescue:
    - name: "RHEL-10-400305 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400305 detail=Task failed unexpectedly — see prior error for details."
