---
# =============================================================================
# STIG ID  : RHEL-10-400320
# Rule ID  : SV-281081r1184682_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must define default permissions for the c shell.
#
# Description:
#   The "umask" controls the default access mode assigned to newly created
#   files. A "umask" of "077" limits new files to mode "600" or less
#   permissive. Although "umask" can be represented as a four-digit number,
#   the first digit representing special access modes is typically ignored or
#   required to be "0". This requirement applies to the globally configured
#   system defaults and the local interactive user defaults for each account
#   on the system.
#
# Check Text:
#   Verify the RHEL 10 "umask" setting is configured correctly in the
#   "/etc/csh.cshrc" file with the following command:
#
#   Note: If the value of the "umask" parameter is set to "000" in the
#   "/etc/csh.cshrc" file, the Severity is raised to a CAT I.
#
#   $ sudo grep umask /etc/csh.cshrc
#   umask 077
#
#   If the value for the "umask" parameter is not "077", or the "umask"
#   parameter is missing or is commented out, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to define default permissions for all authenticated
#   users using the c shell.
#
#   Add or edit the lines for the "umask" parameter in the "/etc/csh.cshrc"
#   file to "077":
#
#   umask 077
# =============================================================================

- name: "RHEL-10-400320 | RHEL 10 must define default permissions for the c shell."
  when: rhel_10_400320 | bool
  tags:
    - RHEL-10-400320
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-400320 | Check umask setting in /etc/csh.cshrc"
      ansible.builtin.command:
        cmd: grep -E '^\s*umask\s+077\b' /etc/csh.cshrc
      register: rhel_10_400320_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-400320 | Backup /etc/csh.cshrc"
      ansible.builtin.copy:
        src: /etc/csh.cshrc
        dest: "/etc/csh.cshrc.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: rhel_10_400320_check.rc != 0

    - name: "RHEL-10-400320 | Set umask 077 in /etc/csh.cshrc"
      ansible.builtin.lineinfile:
        path: /etc/csh.cshrc
        regexp: '^\s*umask\s+'
        line: 'umask 077'
        state: present
      when: rhel_10_400320_check.rc != 0

    - name: "RHEL-10-400320 | Re-check umask setting in /etc/csh.cshrc"
      ansible.builtin.command:
        cmd: grep -E '^\s*umask\s+077\b' /etc/csh.cshrc
      register: rhel_10_400320_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-400320 | Assert umask 077 is set in /etc/csh.cshrc"
      ansible.builtin.assert:
        that: rhel_10_400320_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-400320 detail=umask 077 is not set in /etc/csh.cshrc."
        success_msg: "result=PASS stig_id=RHEL-10-400320 detail=umask 077 is correctly set in /etc/csh.cshrc."

  rescue:
    - name: "RHEL-10-400320 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400320 detail=Task failed unexpectedly — see prior error for details."
