---
# =============================================================================
# STIG ID  : RHEL-10-400330
# Rule ID  : SV-281083r1184689_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must define default permissions for the system default profile.
#
# Description:
#   The "umask" controls the default access mode assigned to newly created
#   files. A "umask" of "077" limits new files to mode "600" or less
#   permissive. "Although umask" can be represented as a four-digit number,
#   the first digit representing special access modes is typically ignored or
#   required to be "0". This requirement applies to the globally configured
#   system defaults and the local interactive user defaults for each account
#   on the system.
#
# Check Text:
#   Verify the RHEL 10 "umask" setting is configured correctly in the
#   "/etc/profile" file with the following command:
#
#   Note: If the value of the "umask" parameter is set to "000" in the
#   "/etc/profile" file, the Severity is raised to a CAT I.
#
#   $ sudo grep umask /etc/profile
#   umask 077
#
#   If the value for the "umask" parameter is not "077", or the "umask"
#   parameter is missing or is commented out, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to define default permissions for all authenticated
#   users in such a way that the user can read and modify only their own
#   files.
#
#   Add or edit the lines for the "umask" parameter in the "/etc/profile"
#   file to "077":
#
#   umask 077
# =============================================================================

- name: "RHEL-10-400330 | RHEL 10 must define default permissions for the system default profile."
  when: rhel_10_400330 | bool
  tags:
    - RHEL-10-400330
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-400330 | Check umask setting in /etc/profile"
      ansible.builtin.command:
        cmd: grep -E '^\s*umask\s+077\b' /etc/profile
      register: rhel_10_400330_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-400330 | Backup /etc/profile"
      ansible.builtin.copy:
        src: /etc/profile
        dest: "/etc/profile.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: rhel_10_400330_check.rc != 0

    - name: "RHEL-10-400330 | Set umask 077 in /etc/profile"
      ansible.builtin.lineinfile:
        path: /etc/profile
        regexp: '^\s*umask\s+'
        line: 'umask 077'
        state: present
      when: rhel_10_400330_check.rc != 0

    - name: "RHEL-10-400330 | Re-check umask setting in /etc/profile"
      ansible.builtin.command:
        cmd: grep -E '^\s*umask\s+077\b' /etc/profile
      register: rhel_10_400330_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-400330 | Assert umask 077 is set in /etc/profile"
      ansible.builtin.assert:
        that: rhel_10_400330_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-400330 detail=umask 077 is not set in /etc/profile."
        success_msg: "result=PASS stig_id=RHEL-10-400330 detail=umask 077 is correctly set in /etc/profile."

  rescue:
    - name: "RHEL-10-400330 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400330 detail=Task failed unexpectedly — see prior error for details."
