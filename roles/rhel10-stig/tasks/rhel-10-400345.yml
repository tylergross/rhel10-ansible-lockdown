---
# =============================================================================
# STIG ID  : RHEL-10-400345
# Rule ID  : SV-281086r1165613_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must enforce "root" group ownership of the "/boot/grub2/grub.cfg" file.
#
# Description:
#   The "root" group is a highly privileged group. Furthermore, the group
#   owner of this file should not have any access privileges anyway.
#
# Check Text:
#   Verify RHEL 10 enforces group ownership of the "/boot/grub2/grub.cfg"
#   file with the following command:
#
#   $ sudo stat -c "%G %n" /boot/grub2/grub.cfg
#   root /boot/grub2/grub.cfg
#
#   If the "/boot/grub2/grub.cfg" file does not have a group owner of "root",
#   this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to enforce group ownership of the
#   "/boot/grub2/grub.cfg" file.
#
#   Change the group owner of the file "/boot/grub2/grub.cfg" to "root" by
#   running the following command:
#
#   $ sudo chgrp root /boot/grub2/grub.cfg
# =============================================================================

- name: "RHEL-10-400345 | RHEL 10 must enforce root group ownership of the /boot/grub2/grub.cfg file."
  when: rhel_10_400345 | bool
  tags:
    - RHEL-10-400345
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-400345 | Check group ownership of /boot/grub2/grub.cfg"
      ansible.builtin.stat:
        path: /boot/grub2/grub.cfg
      register: rhel_10_400345_stat
      changed_when: false

    - name: "RHEL-10-400345 | Set group ownership of /boot/grub2/grub.cfg to root"
      ansible.builtin.file:
        path: /boot/grub2/grub.cfg
        group: root
      when: >
        not rhel_10_400345_stat.stat.exists or
        rhel_10_400345_stat.stat.gr_name != 'root'

    - name: "RHEL-10-400345 | Re-check group ownership of /boot/grub2/grub.cfg"
      ansible.builtin.stat:
        path: /boot/grub2/grub.cfg
      register: rhel_10_400345_verify
      changed_when: false

    - name: "RHEL-10-400345 | Assert /boot/grub2/grub.cfg is group-owned by root"
      ansible.builtin.assert:
        that:
          - rhel_10_400345_verify.stat.exists
          - rhel_10_400345_verify.stat.gr_name == 'root'
        fail_msg: "result=FAIL stig_id=RHEL-10-400345 detail=/boot/grub2/grub.cfg is not group-owned by root (gr_name={{ rhel_10_400345_verify.stat.gr_name | default('unknown') }})."
        success_msg: "result=PASS stig_id=RHEL-10-400345 detail=/boot/grub2/grub.cfg is correctly group-owned by root."

  rescue:
    - name: "RHEL-10-400345 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400345 detail=Task failed unexpectedly — see prior error for details."
