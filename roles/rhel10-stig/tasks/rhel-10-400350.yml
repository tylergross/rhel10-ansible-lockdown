---
# =============================================================================
# STIG ID  : RHEL-10-400350
# Rule ID  : SV-281087r1165616_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must enforce "root" ownership of the "/boot/grub2/grub.cfg" file.
#
# Description:
#   The " /boot/grub2/grub.cfg" file stores sensitive system configuration.
#   Protection of this file is critical for system security.
#
# Check Text:
#   Verify RHEL 10 enforces ownership of the "/boot/grub2/grub.cfg" file with
#   the following command:
#
#   $ sudo stat -c "%U %n" /boot/grub2/grub.cfg
#   root /boot/grub2/grub.cfg
#
#   If the "/boot/grub2/grub.cfg" file does not have an owner of "root", this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to enforce ownership of the "/boot/grub2/grub.cfg"
#   file.
#
#   Change the owner of the "/boot/grub2/grub.cfg" file to "root" by running
#   the following command:
#
#   $ sudo chown root /boot/grub2/grub.cfg
# =============================================================================

- name: "RHEL-10-400350 | RHEL 10 must enforce root ownership of the /boot/grub2/grub.cfg file."
  when: rhel_10_400350 | bool
  tags:
    - RHEL-10-400350
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-400350 | Check ownership of /boot/grub2/grub.cfg"
      ansible.builtin.stat:
        path: /boot/grub2/grub.cfg
      register: rhel_10_400350_stat
      changed_when: false

    - name: "RHEL-10-400350 | Set ownership of /boot/grub2/grub.cfg to root"
      ansible.builtin.file:
        path: /boot/grub2/grub.cfg
        owner: root
      when: >
        not rhel_10_400350_stat.stat.exists or
        rhel_10_400350_stat.stat.pw_name != 'root'

    - name: "RHEL-10-400350 | Re-check ownership of /boot/grub2/grub.cfg"
      ansible.builtin.stat:
        path: /boot/grub2/grub.cfg
      register: rhel_10_400350_verify
      changed_when: false

    - name: "RHEL-10-400350 | Assert /boot/grub2/grub.cfg is owned by root"
      ansible.builtin.assert:
        that:
          - rhel_10_400350_verify.stat.exists
          - rhel_10_400350_verify.stat.pw_name == 'root'
        fail_msg: "result=FAIL stig_id=RHEL-10-400350 detail=/boot/grub2/grub.cfg is not owned by root (owner={{ rhel_10_400350_verify.stat.pw_name | default('unknown') }})."
        success_msg: "result=PASS stig_id=RHEL-10-400350 detail=/boot/grub2/grub.cfg is correctly owned by root."

  rescue:
    - name: "RHEL-10-400350 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400350 detail=Task failed unexpectedly — see prior error for details."
