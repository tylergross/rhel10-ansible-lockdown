---
# =============================================================================
# STIG ID  : RHEL-10-400400
# Rule ID  : SV-281091r1165628_rule
# Severity : medium
# CCI      : CCI-001764
# Title    : RHEL 10 must mount "/var/log/audit" with the "nodev" option.
#
# Description:
#   The "nodev" mount option causes the system to not interpret character or
#   block special devices. Executing character or block special devices from
#   untrusted file systems increases the opportunity for nonprivileged users
#   to attain unauthorized administrative access. The only legitimate
#   location for device files is the "/dev" directory located on the root
#   partition, with the exception of chroot jails if implemented.
#
# Check Text:
#   Verify RHEL 10 is configured so that "/var/log/audit" is mounted with the
#   "nodev" option:
#
#   $ mount | grep /var/log/audit
#   /dev/mapper/luks-4e45e1ad-5337-42c4-a19f-ee12ccc1d502 on /var/log/audit
#   type xfs (rw,nodev,nosuid,noexec,seclabel)
#
#   If the "/var/log/audit" file system is mounted without the "nodev"
#   option, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to mount "/var/log/audit" with the "nodev" option.
#
#   Modify "/etc/fstab" to use the "nodev" option on the "/var/log/audit"
#   directory.
# =============================================================================

- name: "RHEL-10-400400 | RHEL 10 must mount /var/log/audit with the nodev option."
  when: rhel_10_400400 | bool
  tags:
    - RHEL-10-400400
    - medium
    - CCI-001764
  block:
    - name: "RHEL-10-400400 | Check mount options for /var/log/audit"
      ansible.builtin.command:
        cmd: findmnt --noheadings --mountpoint /var/log/audit --output OPTIONS
      register: rhel_10_400400_mount
      changed_when: false
      failed_when: false

    - name: "RHEL-10-400400 | Assert nodev is set on /var/log/audit"
      ansible.builtin.assert:
        that:
          - rhel_10_400400_mount.rc == 0
          - "'nodev' in rhel_10_400400_mount.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-400400 detail=/var/log/audit is not mounted with nodev (options={{ rhel_10_400400_mount.stdout | trim }}). Fix: add nodev to /etc/fstab and remount."
        success_msg: "result=PASS stig_id=RHEL-10-400400 detail=/var/log/audit is mounted with nodev."

  rescue:
    - name: "RHEL-10-400400 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400400 detail=Task failed unexpectedly — see prior error for details."
