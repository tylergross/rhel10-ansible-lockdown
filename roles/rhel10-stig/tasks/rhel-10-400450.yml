---
# =============================================================================
# STIG ID  : RHEL-10-400450
# Rule ID  : SV-281094r1165637_rule
# Severity : medium
# CCI      : CCI-001493
# Title    : RHEL 10 must enforce a mode of "0755" or less permissive for audit tools.
#
# Description:
#   Protecting audit information also includes identifying and protecting the
#   tools used to view and manipulate log data. Therefore, protecting audit
#   tools is necessary to prevent unauthorized operation on audit
#   information. RHEL 10 systems providing tools to interface with audit
#   information will leverage user permissions and roles identifying the user
#   accessing the tools, and the corresponding rights the user enjoys, to
#   make access decisions regarding the access to audit tools. Audit tools
#   include, but are not limited to, vendor-provided and open source audit
#   tools needed to successfully view and manipulate audit information system
#   activity and records. Audit tools include custom queries and report
#   generators. Satisfies: SRG-OS-000256-GPOS-00097,
#   SRG-OS-000257-GPOS-00098, SRG-OS-000258-GPOS-00099
#
# Check Text:
#   Verify RHEL 10 is configured so that the audit tools have a mode of
#   "0755" or less with the following command:
#
#   $ stat -c "%a %n" /sbin/auditctl /sbin/aureport /sbin/ausearch
#   /sbin/auditd /sbin/rsyslogd /sbin/augenrules
#   755 /sbin/auditctl
#   755 /sbin/aureport
#   755 /sbin/ausearch
#   755 /sbin/auditd
#   755 /sbin/rsyslogd
#   755 /sbin/augenrules
#
#   If any of the audit tool files have a mode more permissive than "0755",
#   this is a finding.
#
# Fix Text:
#   Configure RHEL 10 so that the audit tools to have a mode of "0755" by
#   running the following command:
#
#   $ sudo chmod 0755 [audit_tool]
#
#   Replace "[audit_tool]" with each audit tool that has a mode more
#   permissive than "0755".
# =============================================================================

- name: "RHEL-10-400450 | RHEL 10 must enforce a mode of 0755 or less permissive for audit tools."
  when: rhel_10_400450 | bool
  tags:
    - RHEL-10-400450
    - medium
    - CCI-001493
  block:
    - name: "RHEL-10-400450 | Check mode of audit tools"
      ansible.builtin.stat:
        path: "{{ item }}"
      register: rhel_10_400450_stat
      loop:
        - /sbin/auditctl
        - /sbin/aureport
        - /sbin/ausearch
        - /sbin/auditd
        - /sbin/rsyslogd
        - /sbin/augenrules
      changed_when: false

    - name: "RHEL-10-400450 | Set mode 0755 on audit tools more permissive than 0755"
      ansible.builtin.file:
        path: "{{ item.item }}"
        mode: '0755'
      loop: "{{ rhel_10_400450_stat.results }}"
      loop_control:
        label: "{{ item.item }}"
      when:
        - item.stat.exists
        - (item.stat.mode | int(base=8)) > (0o755)

    - name: "RHEL-10-400450 | Re-check mode of audit tools"
      ansible.builtin.stat:
        path: "{{ item }}"
      register: rhel_10_400450_verify
      loop:
        - /sbin/auditctl
        - /sbin/aureport
        - /sbin/ausearch
        - /sbin/auditd
        - /sbin/rsyslogd
        - /sbin/augenrules
      changed_when: false

    - name: "RHEL-10-400450 | Assert all audit tools have mode 0755 or less permissive"
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - (item.stat.mode | int(base=8)) <= (0o755)
        fail_msg: "result=FAIL stig_id=RHEL-10-400450 detail=Audit tool {{ item.item }} has mode {{ item.stat.mode }} which is more permissive than 0755."
        success_msg: "result=PASS stig_id=RHEL-10-400450 detail=Audit tool {{ item.item }} has mode {{ item.stat.mode }} (0755 or less permissive)."
      loop: "{{ rhel_10_400450_verify.results }}"
      loop_control:
        label: "{{ item.item }}"

  rescue:
    - name: "RHEL-10-400450 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-400450 detail=Task failed unexpectedly — see prior error for details."
