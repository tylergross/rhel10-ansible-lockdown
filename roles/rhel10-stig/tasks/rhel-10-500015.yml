---
# =============================================================================
# STIG ID  : RHEL-10-500015
# Rule ID  : SV-281099r1165652_rule
# Severity : medium
# CCI      : CCI-000163
# Title    : RHEL 10 must write audit records to disk.
#
# Description:
#   Audit data must be synchronously written to disk to ensure log integrity.
#   This setting ensures that all audit event data is written to disk.
#
# Check Text:
#   Verify the RHEL 10 audit system is configured to write logs to the disk
#   with the following command:
#
#   $ sudo grep write_logs /etc/audit/auditd.conf
#   write_logs = yes
#
#   If "write_logs" does not have a value of "yes", the line is commented
#   out, or the line is missing, this is a finding.
#
# Fix Text:
#   Configure the RHEL 10 audit system to write log files to the disk.
#
#   Edit the "/etc/audit/auditd.conf" file and add or update the "write_logs"
#   option to "yes":
#
#   write_logs = yes
#
#   Restart the audit daemon with the following command for changes to take
#   effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500015 | RHEL 10 must write audit records to disk."
  when: rhel_10_500015 | bool
  tags:
    - RHEL-10-500015
    - medium
    - CCI-000163
  block:
    - name: "RHEL-10-500015 | Check write_logs in /etc/audit/auditd.conf"
      ansible.builtin.command:
        cmd: grep -E '^\s*write_logs\s*=\s*yes' /etc/audit/auditd.conf
      register: rhel_10_500015_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500015 | Backup /etc/audit/auditd.conf before modification"
      ansible.builtin.copy:
        src: /etc/audit/auditd.conf
        dest: "/etc/audit/auditd.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: rhel_10_500015_check.rc != 0

    - name: "RHEL-10-500015 | Set write_logs = yes in /etc/audit/auditd.conf"
      ansible.builtin.lineinfile:
        path: /etc/audit/auditd.conf
        regexp: '^\s*write_logs\s*='
        line: 'write_logs = yes'
        state: present
      when: rhel_10_500015_check.rc != 0
      notify: restart auditd

    - name: "RHEL-10-500015 | Re-check write_logs in /etc/audit/auditd.conf"
      ansible.builtin.command:
        cmd: grep -E '^\s*write_logs\s*=\s*yes' /etc/audit/auditd.conf
      register: rhel_10_500015_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500015 | Assert write_logs = yes is configured"
      ansible.builtin.assert:
        that: rhel_10_500015_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-500015 detail=write_logs is not set to yes in /etc/audit/auditd.conf."
        success_msg: "result=PASS stig_id=RHEL-10-500015 detail=write_logs = yes is configured in /etc/audit/auditd.conf."

  rescue:
    - name: "RHEL-10-500015 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500015 detail=Task failed unexpectedly — see prior error for details."
