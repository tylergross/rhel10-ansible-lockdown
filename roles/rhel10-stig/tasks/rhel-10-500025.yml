---
# =============================================================================
# STIG ID  : RHEL-10-500025
# Rule ID  : SV-281101r1195411_rule
# Severity : medium
# CCI      : CCI-000171
# Title    : RHEL 10 must allow only the information system security manager (ISSM) (or individuals or roles appointed by the ISSM) to select which auditable events are to be audited.
#
# Description:
#   Without the capability to restrict the roles and individuals that can
#   select which events are audited, unauthorized personnel may be able to
#   prevent the auditing of critical events. Misconfigured audits may degrade
#   the system's performance by overwhelming the audit log. Misconfigured
#   audits may also make it more difficult to establish, correlate, and
#   investigate the events relating to an incident or identify those
#   responsible for one.
#
# Check Text:
#   Verify RHEL 10 sets the files in directory "/etc/audit/rules.d/" and
#   "/etc/audit/auditd.conf" file to have a mode of "0640" or less permissive
#   with the following command:
#
#   $ sudo find /etc/audit/rules.d/ /etc/audit/audit.rules
#   /etc/audit/auditd.conf -type f -exec stat -c "%a %n" {} \;
#   600 /etc/audit/rules.d/audit.rules
#   640 /etc/audit/audit.rules
#   640 /etc/audit/auditd.conf
#
#   If the audit configuration files have a mode more permissive than those
#   shown, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 so that the files in directory "/etc/audit/rules.d/"
#   and the "/etc/audit/auditd.conf" file have a mode of "0640" with the
#   following commands:
#
#   $ sudo chmod 0600 /etc/audit/rules.d/audit.rules
#   $ sudo chmod 0640 /etc/audit/rules.d/[customrulesfile].rules
#   $ sudo chmod 0640 /etc/audit/auditd.conf
# =============================================================================

- name: "RHEL-10-500025 | RHEL 10 must allow only the information system security manager (ISSM) (or individuals or roles appointed by the ISSM) to select which auditable events are to be audited."
  when: rhel_10_500025 | bool
  tags:
    - RHEL-10-500025
    - medium
    - CCI-000171
  block:
    - name: "RHEL-10-500025 | Set mode 0640 on /etc/audit/auditd.conf"
      ansible.builtin.file:
        path: /etc/audit/auditd.conf
        mode: '0640'
        owner: root
        group: root

    - name: "RHEL-10-500025 | Set mode 0640 on /etc/audit/audit.rules if present"
      ansible.builtin.file:
        path: /etc/audit/audit.rules
        mode: '0640'
        owner: root
        group: root
      failed_when: false

    - name: "RHEL-10-500025 | Find all files in /etc/audit/rules.d/"
      ansible.builtin.find:
        paths: /etc/audit/rules.d/
        file_type: file
      register: rhel_10_500025_rules_files

    - name: "RHEL-10-500025 | Set mode 0640 on each file in /etc/audit/rules.d/"
      ansible.builtin.file:
        path: "{{ item.path }}"
        mode: '0640'
        owner: root
        group: root
      loop: "{{ rhel_10_500025_rules_files.files }}"

    - name: "RHEL-10-500025 | Verify /etc/audit/auditd.conf mode"
      ansible.builtin.command:
        cmd: stat -c "%a" /etc/audit/auditd.conf
      register: rhel_10_500025_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500025 | Assert /etc/audit/auditd.conf mode is 640 or less permissive"
      ansible.builtin.assert:
        that: rhel_10_500025_verify.stdout | trim | int <= 640
        fail_msg: "result=FAIL stig_id=RHEL-10-500025 detail=auditd.conf mode is {{ rhel_10_500025_verify.stdout | trim }}, more permissive than 0640."
        success_msg: "result=PASS stig_id=RHEL-10-500025 detail=/etc/audit/auditd.conf mode is {{ rhel_10_500025_verify.stdout | trim }}."

  rescue:
    - name: "RHEL-10-500025 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500025 detail=Task failed unexpectedly — see prior error for details."
