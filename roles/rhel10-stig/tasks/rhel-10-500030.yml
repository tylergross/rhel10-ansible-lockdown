---
# =============================================================================
# STIG ID  : RHEL-10-500030
# Rule ID  : SV-281102r1195414_rule
# Severity : medium
# CCI      : CCI-000130
# Title    : RHEL 10 must allocate an "audit_backlog_limit" of sufficient size to capture processes that start prior to the audit daemon.
#
# Description:
#   Without the capability to generate audit records, it would be difficult
#   to establish, correlate, and investigate the events relating to an
#   incident or identify those responsible for one. If auditing is enabled
#   late in the startup process, the actions of some startup processes may
#   not be audited. Some audit systems also maintain state information only
#   available if auditing is enabled before a given process is created. Audit
#   records can be generated from various components within the information
#   system (e.g., module or policy filter). Allocating an
#   "audit_backlog_limit" of sufficient size is critical in maintaining a
#   stable boot process. With an insufficient limit allocated, the system is
#   susceptible to boot failures and crashes. Satisfies:
#   SRG-OS-000037-GPOS-00015, SRG-OS-000042-GPOS-00020,
#   SRG-OS-000062-GPOS-00031, SRG-OS-000254-GPOS-00095,
#   SRG-OS-000341-GPOS-00132, SRG-OS-000392-GPOS-00172,
#   SRG-OS-000462-GPOS-00206, SRG-OS-000471-GPOS-00215
#
# Check Text:
#   Verify RHEL 10 allocates a sufficient "audit_backlog_limit" to capture
#   processes that start prior to the audit daemon with the following
#   command:
#
#   $ grep -oP 'audit_backlog_limit=\K[0-9]+' /proc/cmdline
#   8192
#
#   If the command returns any outputs, and "audit_backlog_limit" is less
#   than "8192", this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to allocate sufficient "audit_backlog_limit" to capture
#   processes that start prior to the audit daemon with the following
#   command:
#
#   $ sudo grubby --update-kernel=ALL --args=audit_backlog_limit=8192
#
#   The setting will be applied on reboot.
# =============================================================================

- name: "RHEL-10-500030 | RHEL 10 must allocate an audit_backlog_limit of sufficient size to capture processes that start prior to the audit daemon."
  when: rhel_10_500030 | bool
  tags:
    - RHEL-10-500030
    - medium
    - CCI-000130
  block:
    - name: "RHEL-10-500030 | Check current audit_backlog_limit in /proc/cmdline"
      ansible.builtin.command:
        cmd: grep -oP 'audit_backlog_limit=\K[0-9]+' /proc/cmdline
      register: rhel_10_500030_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500030 | Set audit_backlog_limit=8192 via grubby"
      ansible.builtin.command:
        cmd: grubby --update-kernel=ALL --args="audit_backlog_limit=8192"
      when: >
        rhel_10_500030_check.stdout | trim == '' or
        rhel_10_500030_check.stdout | trim | int < 8192

    - name: "RHEL-10-500030 | Re-check audit_backlog_limit in GRUB config"
      ansible.builtin.command:
        cmd: grubby --info=ALL
      register: rhel_10_500030_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500030 | Assert audit_backlog_limit=8192 is configured"
      ansible.builtin.assert:
        that: rhel_10_500030_verify.stdout is search('audit_backlog_limit=8192')
        fail_msg: "result=FAIL stig_id=RHEL-10-500030 detail=audit_backlog_limit=8192 is not configured in GRUB kernel args."
        success_msg: "result=PASS stig_id=RHEL-10-500030 detail=audit_backlog_limit=8192 is configured in GRUB kernel args."

  rescue:
    - name: "RHEL-10-500030 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500030 detail=Task failed unexpectedly — see prior error for details."
