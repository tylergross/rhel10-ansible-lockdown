---
# =============================================================================
# STIG ID  : RHEL-10-500045
# Rule ID  : SV-281105r1166267_rule
# Severity : medium
# CCI      : CCI-000132
# Title    : RHEL 10 must label all off-loaded audit logs before sending them to the central log server.
#
# Description:
#   Enriched logging is needed to determine who, what, and when events occur
#   on a system. Without this, determining root cause of an event will be
#   much more difficult. When audit logs are not labeled before they are sent
#   to a central log server, the audit data will not be able to be analyzed
#   and tied back to the correct system. Satisfies: SRG-OS-000039-GPOS-00017,
#   SRG-OS-000342-GPOS-00133, SRG-OS-000479-GPOS-00224
#
# Check Text:
#   Verify the RHEL 10 audit daemon is configured to label all off-loaded
#   audit logs with the following command:
#
#   $ sudo grep name_format /etc/audit/auditd.conf
#   name_format = hostname
#
#   If the "name_format" option is not "hostname", "fqd", or "numeric", or
#   the line is commented out, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 so that all off-loaded audit logs are labeled before
#   sending them to the central log server.
#
#   Edit the "/etc/audit/auditd.conf" file and add or update the
#   "name_format" option:
#
#   name_format = hostname
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500045 | RHEL 10 must label all off-loaded audit logs before sending them to the central log server."
  when: rhel_10_500045 | bool
  tags:
    - RHEL-10-500045
    - medium
    - CCI-000132
  block:
    - name: "RHEL-10-500045 | Check name_format in /etc/audit/auditd.conf"
      ansible.builtin.command:
        cmd: grep -E '^\s*name_format\s*=\s*(hostname|fqd|numeric)' /etc/audit/auditd.conf
      register: rhel_10_500045_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500045 | Backup /etc/audit/auditd.conf before modification"
      ansible.builtin.copy:
        src: /etc/audit/auditd.conf
        dest: "/etc/audit/auditd.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: rhel_10_500045_check.rc != 0

    - name: "RHEL-10-500045 | Set name_format = hostname in /etc/audit/auditd.conf"
      ansible.builtin.lineinfile:
        path: /etc/audit/auditd.conf
        regexp: '^\s*name_format\s*='
        line: 'name_format = hostname'
        state: present
      when: rhel_10_500045_check.rc != 0
      notify: restart auditd

    - name: "RHEL-10-500045 | Re-check name_format in /etc/audit/auditd.conf"
      ansible.builtin.command:
        cmd: grep -E '^\s*name_format\s*=\s*(hostname|fqd|numeric)' /etc/audit/auditd.conf
      register: rhel_10_500045_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500045 | Assert name_format is configured"
      ansible.builtin.assert:
        that: rhel_10_500045_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-500045 detail=name_format is not set to hostname/fqd/numeric in /etc/audit/auditd.conf."
        success_msg: "result=PASS stig_id=RHEL-10-500045 detail=name_format is configured correctly in /etc/audit/auditd.conf."

  rescue:
    - name: "RHEL-10-500045 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500045 detail=Task failed unexpectedly — see prior error for details."
