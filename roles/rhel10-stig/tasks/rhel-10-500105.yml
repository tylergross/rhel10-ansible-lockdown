---
# =============================================================================
# STIG ID  : RHEL-10-500105
# Rule ID  : SV-281107r1166273_rule
# Severity : medium
# CCI      : CCI-001855
# Title    : RHEL 10 must take action when allocated audit record storage volume reaches 95 percent of the audit record storage capacity.
#
# Description:
#   If action is not taken when storage volume reaches 95 percent
#   utilization, the auditing system may fail when the storage volume reaches
#   capacity.
#
# Check Text:
#   Verify RHEL 10 takes action when allocated audit record storage volume
#   reaches 95 percent of the repository maximum audit record storage
#   capacity with the following command:
#
#   $ sudo grep -w admin_space_left /etc/audit/auditd.conf
#   admin_space_left = 5%
#
#   If the value of the "admin_space_left" keyword is not set to 5 percent of
#   the storage volume allocated to audit logs, or if the line is commented
#   out, ask the system administrator to indicate how the system is taking
#   action if the allocated storage is about to reach capacity.
#
#   If the "space_left" value is not configured to the correct value, this is
#   a finding.
#
# Fix Text:
#   Configure RHEL 10 to initiate an action when allocated audit record
#   storage volume reaches 95 percent of the repository maximum audit record
#   storage capacity by adding/modifying the following line in the
#   /etc/audit/auditd.conf file:
#
#   admin_space_left = 5%
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500105 | RHEL 10 must take action when allocated audit record storage volume reaches 95 percent of the audit record storage capacity."
  when: rhel_10_500105 | bool
  tags:
    - RHEL-10-500105
    - medium
    - CCI-001855
  block:
    - name: "RHEL-10-500105 | Check admin_space_left in /etc/audit/auditd.conf"
      ansible.builtin.command:
        cmd: >-
          grep -E '^\s*admin_space_left\s*=\s*5%' /etc/audit/auditd.conf
      register: rhel_10_500105_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500105 | Backup /etc/audit/auditd.conf before modification"
      ansible.builtin.copy:
        src: /etc/audit/auditd.conf
        dest: "/etc/audit/auditd.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: rhel_10_500105_check.rc != 0

    - name: "RHEL-10-500105 | Set admin_space_left = 5% in /etc/audit/auditd.conf"
      ansible.builtin.lineinfile:
        path: /etc/audit/auditd.conf
        regexp: '^\s*admin_space_left\s*='
        line: 'admin_space_left = 5%'
        state: present
      when: rhel_10_500105_check.rc != 0
      notify: restart auditd

    - name: "RHEL-10-500105 | Re-check admin_space_left in /etc/audit/auditd.conf"
      ansible.builtin.command:
        cmd: >-
          grep -E '^\s*admin_space_left\s*=\s*5%' /etc/audit/auditd.conf
      register: rhel_10_500105_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500105 | Assert admin_space_left = 5% is configured"
      ansible.builtin.assert:
        that: rhel_10_500105_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-500105 detail=admin_space_left is not set to 5% in /etc/audit/auditd.conf."
        success_msg: "result=PASS stig_id=RHEL-10-500105 detail=admin_space_left = 5% is configured in /etc/audit/auditd.conf."

  rescue:
    - name: "RHEL-10-500105 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500105 detail=Task failed unexpectedly — see prior error for details."
