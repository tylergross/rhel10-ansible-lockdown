---
# =============================================================================
# STIG ID  : RHEL-10-500120
# Rule ID  : SV-281110r1166282_rule
# Severity : medium
# CCI      : CCI-001487
# Title    : RHEL 10 must produce audit records containing information to establish the identity of any individual or process associated with the event.
#
# Description:
#   Without establishing what type of events occurred, along with the source,
#   location, and outcome, it would be difficult to establish, correlate, and
#   investigate the events leading up to an outage or attack. Audit record
#   content that may be necessary to satisfy this requirement includes, for
#   example, time stamps, source and destination addresses, user/process
#   identifiers, event descriptions, success/fail indications, filenames
#   involved, and access control or flow control rules invoked. Enriched
#   logging aids in making sense of who, what, and when events occur on a
#   system. Without this, determining root cause of an event will be much
#   more difficult.
#
# Check Text:
#   Verify the RHEL 10 audit system is configured to resolve audit
#   information before writing to disk with the following command:
#
#   $ sudo grep log_format /etc/audit/auditd.conf
#   log_format = ENRICHED
#
#   If the "log_format" option is not "ENRICHED", or the line is commented
#   out, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 audit system to resolve audit information before
#   writing to disk.
#
#   Edit the "/etc/audit/auditd.conf" file and add or update the "log_format"
#   option:
#
#   log_format = ENRICHED
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500120 | RHEL 10 must produce audit records containing information to establish the identity of any individual or process associated with the event."
  when: rhel_10_500120 | bool
  tags:
    - RHEL-10-500120
    - medium
    - CCI-001487
  block:
    - name: "RHEL-10-500120 | Check log_format in /etc/audit/auditd.conf"
      ansible.builtin.command:
        cmd: >-
          grep -E '^\s*log_format\s*=\s*ENRICHED' /etc/audit/auditd.conf
      register: rhel_10_500120_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500120 | Backup /etc/audit/auditd.conf before modification"
      ansible.builtin.copy:
        src: /etc/audit/auditd.conf
        dest: "/etc/audit/auditd.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: rhel_10_500120_check.rc != 0

    - name: "RHEL-10-500120 | Set log_format = ENRICHED in /etc/audit/auditd.conf"
      ansible.builtin.lineinfile:
        path: /etc/audit/auditd.conf
        regexp: '^\s*log_format\s*='
        line: 'log_format = ENRICHED'
        state: present
      when: rhel_10_500120_check.rc != 0
      notify: restart auditd

    - name: "RHEL-10-500120 | Re-check log_format in /etc/audit/auditd.conf"
      ansible.builtin.command:
        cmd: >-
          grep -E '^\s*log_format\s*=\s*ENRICHED' /etc/audit/auditd.conf
      register: rhel_10_500120_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500120 | Assert log_format = ENRICHED is configured"
      ansible.builtin.assert:
        that: rhel_10_500120_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-500120 detail=log_format is not set to ENRICHED in /etc/audit/auditd.conf."
        success_msg: "result=PASS stig_id=RHEL-10-500120 detail=log_format = ENRICHED is configured in /etc/audit/auditd.conf."

  rescue:
    - name: "RHEL-10-500120 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500120 detail=Task failed unexpectedly — see prior error for details."
