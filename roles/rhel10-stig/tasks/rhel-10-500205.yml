---
# =============================================================================
# STIG ID  : RHEL-10-500205
# Rule ID  : SV-281113r1184746_rule
# Severity : medium
# CCI      : CCI-001855
# Title    : RHEL 10 must notify the system administrator (SA) and information system security officer (ISSO) (at a minimum) when allocated audit record storage volume 75 percent utilization.
#
# Description:
#   If security personnel are not notified immediately when storage volume
#   reaches 75 percent utilization, they are unable to plan for audit record
#   storage capacity expansion.
#
# Check Text:
#   Verify RHEL 10 notifies the SA and ISSO (at a minimum) when allocated
#   audit record storage volume reaches 75 percent of the repository maximum
#   audit record storage capacity with the following command:
#
#   $ sudo grep -w space_left_action /etc/audit/auditd.conf
#   space_left_action = email
#
#   If the value of the "space_left_action" is not set to "email", or if the
#   line is commented out, ask the SA to indicate how the system is providing
#   real-time alerts to the SA and ISSO.
#
#   If there is no evidence that real-time alerts are configured on the
#   system, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to initiate an action to notify the SA and ISSO (at a
#   minimum) when allocated audit record storage volume reaches 75 percent of
#   the repository maximum audit record storage capacity by adding/modifying
#   the following line in the "/etc/audit/auditd.conf" file.
#
#   space_left_action = email
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500205 | RHEL 10 must notify the system administrator (SA) and information system security officer (ISSO) (at a minimum) when allocated audit record storage volume 75 percent utilization."
  when: rhel_10_500205 | bool
  tags:
    - RHEL-10-500205
    - medium
    - CCI-001855
  block:
    - name: "RHEL-10-500205 | Check space_left_action in /etc/audit/auditd.conf"
      ansible.builtin.command:
        cmd: grep -E '^\s*space_left_action\s*=\s*email' /etc/audit/auditd.conf
      register: rhel_10_500205_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500205 | Backup /etc/audit/auditd.conf before modification"
      ansible.builtin.copy:
        src: /etc/audit/auditd.conf
        dest: "/etc/audit/auditd.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: rhel_10_500205_check.rc != 0

    - name: "RHEL-10-500205 | Set space_left_action = email in /etc/audit/auditd.conf"
      ansible.builtin.lineinfile:
        path: /etc/audit/auditd.conf
        regexp: '^\s*space_left_action\s*='
        line: 'space_left_action = email'
        state: present
      when: rhel_10_500205_check.rc != 0
      notify: restart auditd

    - name: "RHEL-10-500205 | Re-check space_left_action in /etc/audit/auditd.conf"
      ansible.builtin.command:
        cmd: grep -E '^\s*space_left_action\s*=\s*email' /etc/audit/auditd.conf
      register: rhel_10_500205_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500205 | Assert space_left_action = email is configured"
      ansible.builtin.assert:
        that: rhel_10_500205_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-500205 detail=space_left_action is not set to email in /etc/audit/auditd.conf."
        success_msg: "result=PASS stig_id=RHEL-10-500205 detail=space_left_action = email is configured in /etc/audit/auditd.conf."

  rescue:
    - name: "RHEL-10-500205 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500205 detail=Task failed unexpectedly — see prior error for details."
