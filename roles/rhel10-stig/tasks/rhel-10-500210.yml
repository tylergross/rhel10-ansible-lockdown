---
# =============================================================================
# STIG ID  : RHEL-10-500210
# Rule ID  : SV-281114r1166294_rule
# Severity : medium
# CCI      : CCI-000139
# Title    : RHEL 10 must notify the system administrator (SA) and/or information system security officer (ISSO) (at a minimum) of an audit processing failure.
#
# Description:
#   It is critical for the appropriate personnel to be aware if a system is
#   at risk of failing to process audit logs as required. Without this
#   notification, the security personnel may be unaware of an impending
#   failure of the audit capability, and system operation may be adversely
#   affected. Audit processing failures include software/hardware errors,
#   failures in the audit capturing mechanisms, and audit storage capacity
#   being reached or exceeded. This requirement applies to each audit data
#   storage repository (i.e., distinct information system component where
#   audit records are stored), the centralized audit storage capacity of
#   organizations (i.e., all audit data storage repositories combined), or
#   both. Satisfies: SRG-OS-000046-GPOS-00022, SRG-OS-000343-GPOS-00134
#
# Check Text:
#   Verify RHEL 10 is configured to notify the SA and/or ISSO (at a minimum)
#   of an audit processing failure with the following command:
#
#   $ sudo grep action_mail_acct /etc/audit/auditd.conf
#   action_mail_acct = root
#
#   If the value of the "action_mail_acct" keyword is not set to "root"
#   and/or other accounts for security personnel, the "action_mail_acct"
#   keyword is missing, or the retuned line is commented out, ask the SA to
#   indicate how they and the ISSO are notified of an audit process failure.
#
#   If there is no evidence of the proper personnel being notified of an
#   audit processing failure, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to notify the SA and/or ISSO (at a minimum) of an audit
#   processing failure.
#
#   Edit the following line in "/etc/audit/auditd.conf" to ensure
#   administrators are notified via email for those situations:
#
#   action_mail_acct = root
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500210 | RHEL 10 must notify the system administrator (SA) and/or information system security officer (ISSO) (at a minimum) of an audit processing failure."
  when: rhel_10_500210 | bool
  tags:
    - RHEL-10-500210
    - medium
    - CCI-000139
  block:
    - name: "RHEL-10-500210 | Check action_mail_acct in /etc/audit/auditd.conf"
      ansible.builtin.command:
        cmd: grep -E '^\s*action_mail_acct\s*=\s*root' /etc/audit/auditd.conf
      register: rhel_10_500210_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500210 | Backup /etc/audit/auditd.conf before modification"
      ansible.builtin.copy:
        src: /etc/audit/auditd.conf
        dest: "/etc/audit/auditd.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: rhel_10_500210_check.rc != 0

    - name: "RHEL-10-500210 | Set action_mail_acct = root in /etc/audit/auditd.conf"
      ansible.builtin.lineinfile:
        path: /etc/audit/auditd.conf
        regexp: '^\s*action_mail_acct\s*='
        line: 'action_mail_acct = root'
        state: present
      when: rhel_10_500210_check.rc != 0
      notify: restart auditd

    - name: "RHEL-10-500210 | Re-check action_mail_acct in /etc/audit/auditd.conf"
      ansible.builtin.command:
        cmd: grep -E '^\s*action_mail_acct\s*=\s*root' /etc/audit/auditd.conf
      register: rhel_10_500210_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500210 | Assert action_mail_acct = root is configured"
      ansible.builtin.assert:
        that: rhel_10_500210_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-500210 detail=action_mail_acct is not set to root in /etc/audit/auditd.conf."
        success_msg: "result=PASS stig_id=RHEL-10-500210 detail=action_mail_acct = root is configured in /etc/audit/auditd.conf."

  rescue:
    - name: "RHEL-10-500210 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500210 detail=Task failed unexpectedly — see prior error for details."
