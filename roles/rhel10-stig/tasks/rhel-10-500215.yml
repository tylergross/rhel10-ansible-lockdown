---
# =============================================================================
# STIG ID  : RHEL-10-500215
# Rule ID  : SV-281115r1184650_rule
# Severity : medium
# CCI      : CCI-000067
# Title    : RHEL 10 must log Secure Shell (SSH) connection attempts and failures to the server.
#
# Description:
#   SSH provides several logging levels with varying amounts of verbosity.
#   "DEBUG" is specifically not recommended other than strictly for debugging
#   SSH communications because it provides so much data that it is difficult
#   to identify important security information. "INFO" or "VERBOSE" level is
#   the basic level that only records login activity of SSH users. In many
#   situations, such as incident response, it is important to determine when
#   a particular user was active on a system. The logout record can eliminate
#   users who disconnected, which helps narrow the field.
#
# Check Text:
#   Verify RHEL 10 logs SSH connection attempts and failures to the server
#   with the following command:
#
#   $ sudo /usr/sbin/sshd -dd 2>&1 | awk '/filename/ {print $4}' | tr -d '\r'
#   | tr '\n' ' ' | xargs sudo grep -iH '^\s*loglevel'
#   /etc/ssh/sshd_config.d/90-sshd.conf:LogLevel VERBOSE
#
#   If a value of "VERBOSE" is not returned, or the line is commented out or
#   missing, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to log connection attempts by adding or modifying the
#   following line in "/etc/ssh/sshd_config" or in a file in
#   "/etc/ssh/sshd_config.d":
#
#   LogLevel VERBOSE
#
#   Restart the SSH daemon with the following command for the settings to
#   take effect:
#
#   $ sudo systemctl restart sshd.service
# =============================================================================

- name: "RHEL-10-500215 | RHEL 10 must log Secure Shell (SSH) connection attempts and failures to the server."
  when: rhel_10_500215 | bool
  tags:
    - RHEL-10-500215
    - medium
    - CCI-000067
  block:
    - name: "RHEL-10-500215 | Check LogLevel VERBOSE in sshd config"
      ansible.builtin.command:
        cmd: grep -iE '^\s*LogLevel\s+VERBOSE' /etc/ssh/sshd_config /etc/ssh/sshd_config.d/
      register: rhel_10_500215_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500215 | Backup /etc/ssh/sshd_config.d/90-sshd.conf before modification"
      ansible.builtin.copy:
        src: /etc/ssh/sshd_config.d/90-sshd.conf
        dest: "/etc/ssh/sshd_config.d/90-sshd.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: rhel_10_500215_check.rc != 0
      failed_when: false

    - name: "RHEL-10-500215 | Set LogLevel VERBOSE in /etc/ssh/sshd_config.d/90-sshd.conf"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config.d/90-sshd.conf
        regexp: '^\s*#?\s*LogLevel'
        line: 'LogLevel VERBOSE'
        state: present
        create: true
        mode: '0600'
        owner: root
        group: root
      when: rhel_10_500215_check.rc != 0
      notify: restart sshd

    - name: "RHEL-10-500215 | Re-check LogLevel VERBOSE in sshd config"
      ansible.builtin.shell:
        cmd: grep -iE '^\s*LogLevel\s+VERBOSE' /etc/ssh/sshd_config /etc/ssh/sshd_config.d/* 2>/dev/null
      register: rhel_10_500215_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500215 | Assert LogLevel VERBOSE is configured"
      ansible.builtin.assert:
        that: rhel_10_500215_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-500215 detail=LogLevel VERBOSE is not configured in sshd configuration."
        success_msg: "result=PASS stig_id=RHEL-10-500215 detail=LogLevel VERBOSE is configured in sshd configuration."

  rescue:
    - name: "RHEL-10-500215 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500215 detail=Task failed unexpectedly — see prior error for details."
