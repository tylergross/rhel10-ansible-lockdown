---
# =============================================================================
# STIG ID  : RHEL-10-500380
# Rule ID  : SV-281124r1166324_rule
# Severity : medium
# CCI      : CCI-000130
# Title    : RHEL 10 must generate audit records for successful and unsuccessful uses of the "setsebool" command.
#
# Description:
#   Without generating audit records specific to the security and mission
#   needs of the organization, it would be difficult to establish, correlate,
#   and investigate the events relating to an incident or identify those
#   responsible for one. Audit records can be generated from various
#   components within the information system (e.g., module or policy filter).
#   When a user logs on, the auid is set to the uid of the account being
#   authenticated. Daemons are not user sessions and have the loginuid set to
#   -1. The auid representation is an unsigned 32-bit integer, which equals
#   4294967295. The audit system interprets -1, 4294967295, and "unset" in
#   the same way. The system call rules are loaded into a matching engine
#   that intercepts each system call made by all programs on the system.
#   Therefore, it is very important to use system call rules only when
#   absolutely necessary because these affect performance. More rules lead to
#   poorer performance. The performance can be helped, however, by combining
#   system calls into one rule whenever possible. Satisfies:
#   SRG-OS-000037-GPOS-00015, SRG-OS-000042-GPOS-00020,
#   SRG-OS-000062-GPOS-00031, SRG-OS-000392-GPOS-00172,
#   SRG-OS-000462-GPOS-00206, SRG-OS-000471-GPOS-00215,
#   SRG-OS-000463-GPOS-00207, SRG-OS-000465-GPOS-00209
#
# Check Text:
#   Verify RHEL 10 is configured to audit the execution of the "setsebool"
#   command with the following command:
#
#   $ sudo auditctl -l | grep setsebool
#   -a always,exit -S all -F path=/usr/sbin/setsebool -F perm=x -F auid>=1000
#   -F auid!=-1 -F key=privileged
#
#   If the command does not return a line, or the line is commented out, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to generate audit records upon successful and
#   unsuccessful use of the "setsebool " command by adding or updating the
#   following rules in the "/etc/audit/rules.d/audit.rules" file:
#
#   -a always,exit -F path=/usr/sbin/setsebool -F perm=x -F auid>=1000 -F
#   auid!=unset -F key=privileged
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500380 | RHEL 10 must generate audit records for successful and unsuccessful uses of the setsebool command."
  when: rhel_10_500380 | bool
  tags:
    - RHEL-10-500380
    - medium
    - CCI-000130
  block:
    - name: "RHEL-10-500380 | Check audit rules for setsebool command"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500380_rules
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500380 | Add audit rule for /usr/sbin/setsebool"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: '-a always,exit -F path=/usr/sbin/setsebool -F perm=x -F auid>=1000 -F auid!=unset -F key=privileged'
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'/usr/sbin/setsebool' not in rhel_10_500380_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500380 | Re-check audit rules for setsebool"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500380_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500380 | Assert setsebool audit rule is configured"
      ansible.builtin.assert:
        that: "'/usr/sbin/setsebool' in rhel_10_500380_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-500380 detail=Audit rule for /usr/sbin/setsebool is not configured."
        success_msg: "result=PASS stig_id=RHEL-10-500380 detail=Audit rule for /usr/sbin/setsebool is configured."

  rescue:
    - name: "RHEL-10-500380 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500380 detail=Task failed unexpectedly — see prior error for details."
