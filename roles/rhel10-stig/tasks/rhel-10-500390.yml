---
# =============================================================================
# STIG ID  : RHEL-10-500390
# Rule ID  : SV-281125r1197225_rule
# Severity : medium
# CCI      : CCI-000130
# Title    : RHEL 10 must generate audit records for successful and unsuccessful uses of the "truncate", "ftruncate", "creat", "open", "openat", and "open_by_handle_at" system calls.
#
# Description:
#   Without generating audit records that are specific to the security and
#   mission needs of the organization, it would be difficult to establish,
#   correlate, and investigate the events relating to an incident or identify
#   those responsible for one. Audit records can be generated from various
#   components within the information system (e.g., module or policy filter).
#   When a user logs on, the auid is set to the uid of the account that is
#   being authenticated. Daemons are not user sessions and have the loginuid
#   set to -1. The auid representation is an unsigned 32-bit integer, which
#   equals 4294967295. The audit system interprets -1, 4294967295, and
#   "unset" in the same way. The system call rules are loaded into a matching
#   engine that intercepts each syscall made by all programs on the system.
#   Therefore, it is very important to use syscall rules only when absolutely
#   necessary because these affect performance. More rules lead to poorer
#   performance. The performance can be helped, however, by combining
#   syscalls into one rule whenever possible. Satisfies:
#   SRG-OS-000037-GPOS-00015, SRG-OS-000042-GPOS-00020,
#   SRG-OS-000062-GPOS-00031, SRG-OS-000392-GPOS-00172,
#   SRG-OS-000462-GPOS-00206, SRG-OS-000471-GPOS-00215,
#   SRG-OS-000064-GPOS-00033, SRG-OS-000458-GPOS-00203,
#   SRG-OS-000461-GPOS-00205
#
# Check Text:
#   Verify RHEL 10 is configured to audit successful/unsuccessful attempts to
#   use the "truncate", "ftruncate", "creat", "open", "openat", and
#   "open_by_handle_at" system calls with the following command:
#
#   $ sudo auditctl -l | grep 'open\|truncate\|creat'
#   -a always,exit -F arch=b32 -S
#   truncate,ftruncate,creat,open,openat,open_by_handle_at -F exit=-EPERM -F
#   auid>=1000 -F auid!=unset -k perm_access
#   -a always,exit -F arch=b64 -S
#   truncate,ftruncate,creat,open,openat,open_by_handle_at -F exit=-EPERM -F
#   auid>=1000 -F auid!=unset -k perm_access
#
#   -a always,exit -F arch=b32 -S
#   truncate,ftruncate,creat,open,openat,open_by_handle_at -F exit=-EACCES -F
#   auid>=1000 -F auid!=unset -k perm_access
#   -a always,exit -F arch=b64 -S
#   truncate,ftruncate,creat,open,openat,open_by_handle_at -F exit=-EACCES -F
#   auid>=1000 -F auid!=unset -k perm_access
#
#   If the output does not produce rules containing "-F exit=-EPERM", this is
#   a finding.
#
#   If the output does not produce rules containing "-F exit=-EACCES", this
#   is a finding.
#
#   If the command does not return an audit rule for "truncate", "ftruncate",
#   "creat", "open", "openat", and "open_by_handle_at", or any of the lines
#   returned are commented out, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to generate audit records upon successful and
#   unsuccessful use of the "truncate", "ftruncate", "creat", "open",
#   "openat", and "open_by_handle_at" system calls by adding or updating the
#   following rules in the "/etc/audit/rules.d/audit.rules" file:
#
#   -a always,exit -F arch=b32 -S
#   truncate,ftruncate,creat,open,openat,open_by_handle_at -F exit=-EPERM -F
#   auid>=1000 -F auid!=unset -k perm_access
#   -a always,exit -F arch=b64 -S
#   truncate,ftruncate,creat,open,openat,open_by_handle_at -F exit=-EPERM -F
#   auid>=1000 -F auid!=unset -k perm_access
#
#   -a always,exit -F arch=b32 -S
#   truncate,ftruncate,creat,open,openat,open_by_handle_at -F exit=-EACCES -F
#   auid>=1000 -F auid!=unset -k perm_access
#   -a always,exit -F arch=b64 -S
#   truncate,ftruncate,creat,open,openat,open_by_handle_at -F exit=-EACCES -F
#   auid>=1000 -F auid!=unset -k perm_access
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500390 | RHEL 10 must generate audit records for successful and unsuccessful uses of the truncate, ftruncate, creat, open, openat, and open_by_handle_at system calls."
  when: rhel_10_500390 | bool
  tags:
    - RHEL-10-500390
    - medium
    - CCI-000130
  block:
    - name: "RHEL-10-500390 | Check audit rules for open/truncate/creat syscalls"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500390_rules
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500390 | Add open/truncate/creat audit rule b32 EPERM"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: '-a always,exit -F arch=b32 -S truncate,ftruncate,creat,open,openat,open_by_handle_at -F exit=-EPERM -F auid>=1000 -F auid!=unset -k perm_access'
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'perm_access' not in rhel_10_500390_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500390 | Add open/truncate/creat audit rule b64 EPERM"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: '-a always,exit -F arch=b64 -S truncate,ftruncate,creat,open,openat,open_by_handle_at -F exit=-EPERM -F auid>=1000 -F auid!=unset -k perm_access'
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'perm_access' not in rhel_10_500390_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500390 | Add open/truncate/creat audit rule b32 EACCES"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: '-a always,exit -F arch=b32 -S truncate,ftruncate,creat,open,openat,open_by_handle_at -F exit=-EACCES -F auid>=1000 -F auid!=unset -k perm_access'
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'perm_access' not in rhel_10_500390_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500390 | Add open/truncate/creat audit rule b64 EACCES"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: '-a always,exit -F arch=b64 -S truncate,ftruncate,creat,open,openat,open_by_handle_at -F exit=-EACCES -F auid>=1000 -F auid!=unset -k perm_access'
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'perm_access' not in rhel_10_500390_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500390 | Re-check audit rules for open/truncate/creat"
      ansible.builtin.command:
        cmd: cat /etc/audit/rules.d/rhel10-stig.rules
      register: rhel_10_500390_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500390 | Assert open/truncate/creat audit rules are configured"
      ansible.builtin.assert:
        that: "'perm_access' in rhel_10_500390_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-500390 detail=Audit rules for open/truncate/creat syscalls with perm_access key are not configured."
        success_msg: "result=PASS stig_id=RHEL-10-500390 detail=Audit rules for open/truncate/creat syscalls are configured."

  rescue:
    - name: "RHEL-10-500390 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500390 detail=Task failed unexpectedly — see prior error for details."
