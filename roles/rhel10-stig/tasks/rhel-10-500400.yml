---
# =============================================================================
# STIG ID  : RHEL-10-500400
# Rule ID  : SV-281126r1166330_rule
# Severity : medium
# CCI      : CCI-000130
# Title    : RHEL 10 must generate audit records for successful and unsuccessful uses of the "delete_module" system call.
#
# Description:
#   Without generating audit records specific to the security and mission
#   needs of the organization, it would be difficult to establish, correlate,
#   and investigate the events relating to an incident or identify those
#   responsible for one. Audit records can be generated from various
#   components within the information system (e.g., module or policy filter).
#   When a user logs on, the auid is set to the uid of the account being
#   authenticated. Daemons are not user sessions and have the loginuid set to
#   -1. The auid representation is an unsigned 32-bit integer, which equals
#   4294967295. The audit system interprets -1, 4294967295, and "unset" in
#   the same way. The system call rules are loaded into a matching engine
#   that intercepts each system call made by all programs on the system.
#   Therefore, it is very important to use system call rules only when
#   absolutely necessary because these affect performance. More rules lead to
#   poorer performance. The performance can be helped, however, by combining
#   system calls into one rule whenever possible. Satisfies:
#   SRG-OS-000037-GPOS-00015, SRG-OS-000042-GPOS-00020,
#   SRG-OS-000062-GPOS-00031, SRG-OS-000392-GPOS-00172,
#   SRG-OS-000462-GPOS-00206, SRG-OS-000471-GPOS-00215,
#   SRG-OS-000471-GPOS-00216, SRG-OS-000477-GPOS-00222
#
# Check Text:
#   Verify RHEL 10 is configured to audit the execution of the
#   "delete_module" system call with the following command:
#
#   $ sudo auditctl -l | grep delete_module
#   -a always,exit -F arch=b32 -S delete_module -F auid>=1000 -F auid!=-1 -F
#   key=module_chng
#   -a always,exit -F arch=b64 -S delete_module -F auid>=1000 -F auid!=-1 -F
#   key=module_chng
#
#   If both the "b32" and "b64" audit rules are not defined for the
#   "delete_module" system call, or any of the lines returned are commented
#   out, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to generate audit records upon successful and
#   unsuccessful use of the "delete_module" system call by adding or updating
#   the following rules in the "/etc/audit/rules.d/audit.rules" file:
#
#   -a always,exit -F arch=b32 -S delete_module -F auid>=1000 -F auid!=unset
#   -k module_chng
#   -a always,exit -F arch=b64 -S delete_module -F auid>=1000 -F auid!=unset
#   -k module_chng
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500400 | RHEL 10 must generate audit records for successful and unsuccessful uses of the delete_module system call."
  when: rhel_10_500400 | bool
  tags:
    - RHEL-10-500400
    - medium
    - CCI-000130
  block:
    - name: "RHEL-10-500400 | Check audit rules for delete_module syscall"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500400_rules
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500400 | Add delete_module audit rule b32"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: '-a always,exit -F arch=b32 -S delete_module -F auid>=1000 -F auid!=unset -k module_chng'
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'delete_module' not in rhel_10_500400_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500400 | Add delete_module audit rule b64"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: '-a always,exit -F arch=b64 -S delete_module -F auid>=1000 -F auid!=unset -k module_chng'
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'delete_module' not in rhel_10_500400_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500400 | Re-check audit rules for delete_module"
      ansible.builtin.command:
        cmd: cat /etc/audit/rules.d/rhel10-stig.rules
      register: rhel_10_500400_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500400 | Assert delete_module audit rules are configured"
      ansible.builtin.assert:
        that: "'delete_module' in rhel_10_500400_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-500400 detail=Audit rules for delete_module syscall are not configured."
        success_msg: "result=PASS stig_id=RHEL-10-500400 detail=Audit rules for delete_module syscall are configured."

  rescue:
    - name: "RHEL-10-500400 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500400 detail=Task failed unexpectedly — see prior error for details."
