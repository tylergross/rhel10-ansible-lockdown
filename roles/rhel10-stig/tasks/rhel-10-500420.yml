---
# =============================================================================
# STIG ID  : RHEL-10-500420
# Rule ID  : SV-281128r1166336_rule
# Severity : medium
# CCI      : CCI-000130
# Title    : RHEL 10 must generate audit records for successful and unsuccessful uses of the "chage" command.
#
# Description:
#   Without generating audit records specific to the security and mission
#   needs of the organization, it would be difficult to establish, correlate,
#   and investigate the events relating to an incident or identify those
#   responsible for one. Audit records can be generated from various
#   components within the information system (e.g., module or policy filter).
#   When a user logs on, the auid is set to the uid of the account being
#   authenticated. Daemons are not user sessions and have the loginuid set to
#   -1. The auid representation is an unsigned 32-bit integer, which equals
#   4294967295. The audit system interprets -1, 4294967295, and "unset" in
#   the same way. The system call rules are loaded into a matching engine
#   that intercepts each system call made by all programs on the system.
#   Therefore, it is very important to use system call rules only when
#   absolutely necessary because these affect performance. More rules lead to
#   poorer performance. The performance can be helped, however, by combining
#   system calls into one rule whenever possible. Satisfies:
#   SRG-OS-000037-GPOS-00015, SRG-OS-000042-GPOS-00020,
#   SRG-OS-000062-GPOS-00031, SRG-OS-000392-GPOS-00172,
#   SRG-OS-000462-GPOS-00206, SRG-OS-000468-GPOS-00212,
#   SRG-OS-000471-GPOS-00215
#
# Check Text:
#   Verify RHEL 10 is configured to audit the execution of the "chage"
#   command with the following command:
#
#   $ sudo auditctl -l | grep chage
#   -a always,exit -S all -F path=/usr/bin/chage -F perm=x -F auid>=1000 -F
#   auid!=-1 -F key=privileged-chage
#
#   If the command does not return a line, or the line is commented out, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to generate audit records upon successful and
#   unsuccessful attempts to use the "chage" command by adding or updating
#   the following rule in "/etc/audit/rules.d/audit.rules":
#
#   -a always,exit -F path=/usr/bin/chage -F perm=x -F auid>=1000 -F
#   auid!=unset -k privileged-chage
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500420 | RHEL 10 must generate audit records for successful and unsuccessful uses of the chage command."
  when: rhel_10_500420 | bool
  tags:
    - RHEL-10-500420
    - medium
    - CCI-000130
  block:
    - name: "RHEL-10-500420 | Check audit rules for chage command"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500420_rules
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500420 | Add audit rule for /usr/bin/chage"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: '-a always,exit -F path=/usr/bin/chage -F perm=x -F auid>=1000 -F auid!=unset -k privileged-chage'
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'/usr/bin/chage' not in rhel_10_500420_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500420 | Re-check audit rules for chage"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500420_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500420 | Assert chage audit rule is configured"
      ansible.builtin.assert:
        that: "'/usr/bin/chage' in rhel_10_500420_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-500420 detail=Audit rule for /usr/bin/chage is not configured."
        success_msg: "result=PASS stig_id=RHEL-10-500420 detail=Audit rule for /usr/bin/chage is configured."

  rescue:
    - name: "RHEL-10-500420 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500420 detail=Task failed unexpectedly — see prior error for details."
