---
# =============================================================================
# STIG ID  : RHEL-10-500460
# Rule ID  : SV-281132r1166348_rule
# Severity : medium
# CCI      : CCI-000130
# Title    : RHEL 10 must generate audit records for successful and unsuccessful uses of the "kmod" command.
#
# Description:
#   Without generating audit records that are specific to the security and
#   mission needs of the organization, it would be difficult to establish,
#   correlate, and investigate the events relating to an incident or identify
#   those responsible for one. Audit records can be generated from various
#   components within the information system (e.g., module or policy filter).
#   When a user logs on, the auid is set to the uid of the account being
#   authenticated. Daemons are not user sessions and have the loginuid set to
#   -1. The auid representation is an unsigned 32-bit integer, which equals
#   4294967295. The audit system interprets -1, 4294967295, and "unset" in
#   the same way. The system call rules are loaded into a matching engine
#   that intercepts each system call made by all programs on the system.
#   Therefore, it is very important to use system call rules only when
#   absolutely necessary because these affect performance. More rules lead to
#   poorer performance. The performance can be helped, however, by combining
#   system calls into one rule whenever possible. Satisfies:
#   SRG-OS-000037-GPOS-00015, SRG-OS-000042-GPOS-00020,
#   SRG-OS-000062-GPOS-00031, SRG-OS-000392-GPOS-00172,
#   SRG-OS-000462-GPOS-00206, SRG-OS-000471-GPOS-00215,
#   SRG-OS-000471-GPOS-00216, SRG-OS-000477-GPOS-00222
#
# Check Text:
#   Verify RHEL 10 is configured to audit the execution of the "kmod" command
#   with the following command:
#
#   $ sudo auditctl -l | grep kmod
#   -a always,exit -S all -F path=/usr/bin/kmod -F perm=x -F auid>=1000 -F
#   auid!=-1 -F key=modules
#
#   If the command does not return a line, or the line is commented out, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to generate audit records upon successful and
#   unsuccessful attempts to use the "kmod" command by adding or updating the
#   following rule in "/etc/audit/rules.d/audit.rules":
#
#   -a always,exit -F path=/usr/bin/kmod -F perm=x -F auid>=1000 -F
#   auid!=unset -k modules
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500460 | RHEL 10 must generate audit records for successful and unsuccessful uses of the kmod command."
  when: rhel_10_500460 | bool
  tags:
    - RHEL-10-500460
    - medium
    - CCI-000130
  block:
    - name: "RHEL-10-500460 | Check audit rule for kmod"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500460_rules
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500460 | Add audit rule for kmod"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: "-a always,exit -F path=/usr/bin/kmod -F perm=x -F auid>=1000 -F auid!=unset -k modules"
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'modules' not in rhel_10_500460_rules.stdout or '/usr/bin/kmod' not in rhel_10_500460_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500460 | Re-check audit rule for kmod"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500460_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500460 | Assert audit rule for kmod is present"
      ansible.builtin.assert:
        that: "'/usr/bin/kmod' in rhel_10_500460_verify.stdout and 'modules' in rhel_10_500460_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-500460 detail=Audit rule for /usr/bin/kmod with key=modules is missing."
        success_msg: "result=PASS stig_id=RHEL-10-500460 detail=Audit rule for /usr/bin/kmod with key=modules is present."

  rescue:
    - name: "RHEL-10-500460 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500460 detail=Task failed unexpectedly — see prior error for details."
