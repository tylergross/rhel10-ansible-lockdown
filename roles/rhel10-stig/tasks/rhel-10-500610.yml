---
# =============================================================================
# STIG ID  : RHEL-10-500610
# Rule ID  : SV-281147r1166393_rule
# Severity : medium
# CCI      : CCI-000130
# Title    : RHEL 10 must generate audit records for successful and unsuccessful uses of the "mount" command.
#
# Description:
#   Without generating audit records that are specific to the security and
#   mission needs of the organization, it would be difficult to establish,
#   correlate, and investigate the events relating to an incident or identify
#   those responsible for one. Audit records can be generated from various
#   components within the information system (e.g., module or policy filter).
#   When a user logs on, the auid is set to the uid of the account that is
#   being authenticated. Daemons are not user sessions and have the loginuid
#   set to -1. The auid representation is an unsigned 32-bit integer, which
#   equals 4294967295. The audit system interprets -1, 4294967295, and
#   "unset" in the same way. The system call rules are loaded into a matching
#   engine that intercepts each syscall made by all programs on the system.
#   Therefore, it is very important to use syscall rules only when absolutely
#   necessary because these affect performance. More rules lead to poorer
#   performance. The performance can be helped, however, by combining
#   syscalls into one rule whenever possible. Satisfies:
#   SRG-OS-000037-GPOS-00015, SRG-OS-000042-GPOS-00020,
#   SRG-OS-000062-GPOS-00031, SRG-OS-000392-GPOS-00172,
#   SRG-OS-000462-GPOS-00206, SRG-OS-000471-GPOS-00215
#
# Check Text:
#   Verify RHEL 10 is configured to audit the execution of the "mount"
#   command with the following command:
#
#   $ sudo auditctl -l | grep mount
#   -a always,exit -F arch=b32 -S mount -F auid>=1000 -F auid!=unset -k
#   export
#   -a always,exit -F arch=b64 -S mount -F auid>=1000 -F auid!=unset -k
#   export
#
#   If the command does not return a line, or the line is commented out, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to generate audit records upon successful and
#   unsuccessful attempts to use the "mount" command by adding or updating
#   the following rule in "/etc/audit/rules.d/audit.rules":
#
#   -a always,exit -F arch=b32 -S mount -F auid>=1000 -F auid!=unset -k
#   export
#   -a always,exit -F arch=b64 -S mount -F auid>=1000 -F auid!=unset -k
#   export
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500610 | RHEL 10 must generate audit records for successful and unsuccessful uses of the mount command."
  when: rhel_10_500610 | bool
  tags:
    - RHEL-10-500610
    - medium
    - CCI-000130
  block:
    - name: "RHEL-10-500610 | Check audit rule for mount syscall"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500610_rules
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500610 | Add audit rule for mount syscall (b32)"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: "-a always,exit -F arch=b32 -S mount -F auid>=1000 -F auid!=unset -k export"
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'arch=b32' not in rhel_10_500610_rules.stdout or 'mount' not in rhel_10_500610_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500610 | Add audit rule for mount syscall (b64)"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: "-a always,exit -F arch=b64 -S mount -F auid>=1000 -F auid!=unset -k export"
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'arch=b64' not in rhel_10_500610_rules.stdout or 'mount' not in rhel_10_500610_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500610 | Re-check audit rule for mount syscall"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500610_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500610 | Assert audit rules for mount syscall are present"
      ansible.builtin.assert:
        that:
          - "'export' in rhel_10_500610_verify.stdout"
          - "'mount' in rhel_10_500610_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-500610 detail=Audit rule for mount syscall (key=export) is missing."
        success_msg: "result=PASS stig_id=RHEL-10-500610 detail=Audit rule for mount syscall (key=export) is present."

  rescue:
    - name: "RHEL-10-500610 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500610 detail=Task failed unexpectedly — see prior error for details."
