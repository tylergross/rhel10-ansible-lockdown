---
# =============================================================================
# STIG ID  : RHEL-10-500630
# Rule ID  : SV-281149r1166399_rule
# Severity : medium
# CCI      : CCI-000172
# Title    : RHEL 10 must generate audit records for successful and unsuccessful uses of the "poweroff" command.
#
# Description:
#   Misuse of the "poweroff" command may cause availability issues for the
#   system.
#
# Check Text:
#   Verify RHEL 10 is configured to audit the execution of the "poweroff"
#   command with the following command:
#
#   $ sudo auditctl -l | grep poweroff
#   -a always,exit -S all -F path=/usr/sbin/poweroff -F perm=x -F auid>=1000
#   -F auid!=-1 -F key=privileged-poweroff
#
#   If the command does not return a line, or the line is commented out, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to generate audit records upon successful and
#   unsuccessful uses of the "poweroff" command by adding or updating the
#   following rule in the "/etc/audit/rules.d/audit.rules" file:
#
#   -a always,exit -F path=/usr/sbin/poweroff -F perm=x -F auid>=1000 -F
#   auid!=unset -k privileged-poweroff
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500630 | RHEL 10 must generate audit records for successful and unsuccessful uses of the poweroff command."
  when: rhel_10_500630 | bool
  tags:
    - RHEL-10-500630
    - medium
    - CCI-000172
  block:
    - name: "RHEL-10-500630 | Check audit rule for poweroff command"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500630_rules
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500630 | Add audit rule for poweroff command"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: "-a always,exit -F path=/usr/sbin/poweroff -F perm=x -F auid>=1000 -F auid!=unset -k privileged-poweroff"
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'privileged-poweroff' not in rhel_10_500630_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500630 | Re-check audit rule for poweroff command"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500630_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500630 | Assert audit rule for poweroff command is present"
      ansible.builtin.assert:
        that: "'privileged-poweroff' in rhel_10_500630_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-500630 detail=Audit rule for /usr/sbin/poweroff (key=privileged-poweroff) is missing."
        success_msg: "result=PASS stig_id=RHEL-10-500630 detail=Audit rule for /usr/sbin/poweroff (key=privileged-poweroff) is present."

  rescue:
    - name: "RHEL-10-500630 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500630 detail=Task failed unexpectedly — see prior error for details."
