---
# =============================================================================
# STIG ID  : RHEL-10-500640
# Rule ID  : SV-281150r1166402_rule
# Severity : medium
# CCI      : CCI-000172
# Title    : RHEL 10 must generate audit records for successful and unsuccessful uses of the "reboot" command.
#
# Description:
#   Misuse of the "reboot" command may cause system availability issues.
#
# Check Text:
#   Verify RHEL 10 is configured to audit the execution of the "reboot"
#   command with the following command:
#
#   $ sudo auditctl -l | grep reboot
#   -a always,exit -S all -F path=/usr/sbin/reboot -F perm=x -F auid>=1000 -F
#   auid!=-1 -F key=privileged-reboot
#
#   If the command does not return a line, or the line is commented out, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to generate audit records upon successful and
#   unsuccessful uses of the "reboot" command by adding or updating the
#   following rule in the "/etc/audit/rules.d/audit.rules" file:
#
#   -a always,exit -F path=/usr/sbin/reboot -F perm=x -F auid>=1000 -F
#   auid!=unset -k privileged-reboot
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500640 | RHEL 10 must generate audit records for successful and unsuccessful uses of the reboot command."
  when: rhel_10_500640 | bool
  tags:
    - RHEL-10-500640
    - medium
    - CCI-000172
  block:
    - name: "RHEL-10-500640 | Check audit rule for reboot command"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500640_rules
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500640 | Add audit rule for reboot command"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: "-a always,exit -F path=/usr/sbin/reboot -F perm=x -F auid>=1000 -F auid!=unset -k privileged-reboot"
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'privileged-reboot' not in rhel_10_500640_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500640 | Re-check audit rule for reboot command"
      ansible.builtin.command:
        cmd: cat /etc/audit/rules.d/rhel10-stig.rules
      register: rhel_10_500640_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500640 | Assert audit rule for reboot command is present"
      ansible.builtin.assert:
        that: "'privileged-reboot' in rhel_10_500640_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-500640 detail=Audit rule for /usr/sbin/reboot (key=privileged-reboot) is missing."
        success_msg: "result=PASS stig_id=RHEL-10-500640 detail=Audit rule for /usr/sbin/reboot (key=privileged-reboot) is present."

  rescue:
    - name: "RHEL-10-500640 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500640 detail=Task failed unexpectedly — see prior error for details."
