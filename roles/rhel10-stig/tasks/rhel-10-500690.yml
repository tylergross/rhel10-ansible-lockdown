---
# =============================================================================
# STIG ID  : RHEL-10-500690
# Rule ID  : SV-281155r1197236_rule
# Severity : medium
# CCI      : CCI-000018
# Title    : RHEL 10 must generate audit records for all account creations, modifications, disabling, and termination events that affect the "/etc/sudoers.d/" directory.
#
# Description:
#   The actions taken by system administrators must be audited to keep a
#   record of what was executed on the system, as well as for accountability
#   purposes. Editing the "sudoers" file may be a sign of an attacker trying
#   to establish persistent methods to a system. Auditing the editing of the
#   "sudoers" files mitigates this risk. Satisfies: SRG-OS-000004-GPOS-00004,
#   SRG-OS-000037-GPOS-00015, SRG-OS-000042-GPOS-00020,
#   SRG-OS-000062-GPOS-00031, SRG-OS-000304-GPOS-00121,
#   SRG-OS-000392-GPOS-00172, SRG-OS-000462-GPOS-00206,
#   SRG-OS-000470-GPOS-00214, SRG-OS-000471-GPOS-00215,
#   SRG-OS-000239-GPOS-00089, SRG-OS-000240-GPOS-00090,
#   SRG-OS-000241-GPOS-00091, SRG-OS-000303-GPOS-00120,
#   SRG-OS-000466-GPOS-00210, SRG-OS-000476-GPOS-00221
#
# Check Text:
#   Verify RHEL 10 generates audit records for all account creations,
#   modifications, disabling, and termination events that affect
#   "/etc/sudoers.d/" with the following command:
#
#   $ sudo auditctl -l | grep /etc/sudoers.d
#   -a always,exit -F arch=b32 -F path=/etc/sudoers.d/ -F perm=wa -F
#   key=identity
#   -a always,exit -F arch=b64 -F path=/etc/sudoers.d/ -F perm=wa -F
#   key=identity
#
#   If the command does not return a line, or the line is commented out, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to generate audit records for all account creations,
#   modifications, disabling, and termination events that affect
#   "/etc/sudoers.d/".
#
#   Add or update the following file system rule to
#   "/etc/audit/rules.d/audit.rules":
#
#   -a always,exit -F arch=b32 -F path=/etc/sudoers.d/ -F perm=wa -F
#   key=identity
#   -a always,exit -F arch=b64 -F path=/etc/sudoers.d/ -F perm=wa -F
#   key=identity
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500690 | RHEL 10 must generate audit records for all account creations, modifications, disabling, and termination events that affect the /etc/sudoers.d/ directory."
  when: rhel_10_500690 | bool
  tags:
    - RHEL-10-500690
    - medium
    - CCI-000018
  block:
    - name: "RHEL-10-500690 | Check audit rule for /etc/sudoers.d/"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500690_rules
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500690 | Add audit rule for /etc/sudoers.d/ (b32)"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: "-a always,exit -F arch=b32 -F path=/etc/sudoers.d/ -F perm=wa -F key=identity"
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'/etc/sudoers.d' not in rhel_10_500690_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500690 | Add audit rule for /etc/sudoers.d/ (b64)"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: "-a always,exit -F arch=b64 -F path=/etc/sudoers.d/ -F perm=wa -F key=identity"
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'/etc/sudoers.d' not in rhel_10_500690_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500690 | Re-check audit rule for /etc/sudoers.d/"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500690_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500690 | Assert audit rule for /etc/sudoers.d/ is present"
      ansible.builtin.assert:
        that: "'/etc/sudoers.d' in rhel_10_500690_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-500690 detail=Audit rule for /etc/sudoers.d/ (key=identity) is missing."
        success_msg: "result=PASS stig_id=RHEL-10-500690 detail=Audit rule for /etc/sudoers.d/ (key=identity) is present."

  rescue:
    - name: "RHEL-10-500690 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500690 detail=Task failed unexpectedly — see prior error for details."
