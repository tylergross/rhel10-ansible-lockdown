---
# =============================================================================
# STIG ID  : RHEL-10-500710
# Rule ID  : SV-281157r1166423_rule
# Severity : medium
# CCI      : CCI-000018
# Title    : RHEL 10 must generate audit records for all account creations, modifications, disabling, and termination events that affect "/etc/gshadow".
#
# Description:
#   In addition to auditing new user and group accounts, these watches will
#   alert the system administrator(s) to any modifications. Any unexpected
#   users, groups, or modifications should be investigated for legitimacy.
#   Satisfies: SRG-OS-000004-GPOS-00004, SRG-OS-000037-GPOS-00015,
#   SRG-OS-000042-GPOS-00020, SRG-OS-000062-GPOS-00031,
#   SRG-OS-000304-GPOS-00121, SRG-OS-000392-GPOS-00172,
#   SRG-OS-000462-GPOS-00206, SRG-OS-000470-GPOS-00214,
#   SRG-OS-000471-GPOS-00215, SRG-OS-000239-GPOS-00089,
#   SRG-OS-000240-GPOS-00090, SRG-OS-000241-GPOS-00091,
#   SRG-OS-000303-GPOS-00120, SRG-OS-000466-GPOS-00210,
#   SRG-OS-000476-GPOS-00221
#
# Check Text:
#   Verify RHEL 10 generates audit records for all account creations,
#   modifications, disabling, and termination events that affect
#   "/etc/gshadow" with the following command:
#
#   $ sudo auditctl -l | egrep '(/etc/gshadow)'
#   -a always,exit -F arch=b32 -F path=/etc/gshadow -F perm=wa -F
#   key=identity
#   -a always,exit -F arch=b64 -F path=/etc/gshadow -F perm=wa -F
#   key=identity
#
#   If the command does not return a line, or the line is commented out, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to generate audit records for all account creations,
#   modifications, disabling, and termination events that affect
#   "/etc/gshadow".
#
#   Add or update the following file system rule to
#   "/etc/audit/rules.d/audit.rules":
#
#   -a always,exit -F arch=b32 -F path=/etc/gshadow -F perm=wa -F
#   key=identity
#   -a always,exit -F arch=b64 -F path=/etc/gshadow -F perm=wa -F
#   key=identity
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500710 | RHEL 10 must generate audit records for all account creations, modifications, disabling, and termination events that affect /etc/gshadow."
  when: rhel_10_500710 | bool
  tags:
    - RHEL-10-500710
    - medium
    - CCI-000018
  block:
    - name: "RHEL-10-500710 | Check audit rule for /etc/gshadow"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500710_rules
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500710 | Add audit rule for /etc/gshadow (b32)"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: "-a always,exit -F arch=b32 -F path=/etc/gshadow -F perm=wa -F key=identity"
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'/etc/gshadow' not in rhel_10_500710_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500710 | Add audit rule for /etc/gshadow (b64)"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: "-a always,exit -F arch=b64 -F path=/etc/gshadow -F perm=wa -F key=identity"
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'/etc/gshadow' not in rhel_10_500710_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500710 | Re-check audit rule for /etc/gshadow"
      ansible.builtin.command:
        cmd: cat /etc/audit/rules.d/rhel10-stig.rules
      register: rhel_10_500710_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500710 | Assert audit rule for /etc/gshadow is present"
      ansible.builtin.assert:
        that: "'/etc/gshadow' in rhel_10_500710_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-500710 detail=Audit rule for /etc/gshadow (key=identity) is missing."
        success_msg: "result=PASS stig_id=RHEL-10-500710 detail=Audit rule for /etc/gshadow (key=identity) is present."

  rescue:
    - name: "RHEL-10-500710 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500710 detail=Task failed unexpectedly — see prior error for details."
