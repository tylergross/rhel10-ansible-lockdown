---
# =============================================================================
# STIG ID  : RHEL-10-500760
# Rule ID  : SV-281162r1166438_rule
# Severity : medium
# CCI      : CCI-000130
# Title    : RHEL 10 must generate audit records for all account creations, modifications, disabling, and termination events that affect "/var/log/lastlog".
#
# Description:
#   Without generating audit records specific to the security and mission
#   needs of the organization, it would be difficult to establish, correlate,
#   and investigate the events relating to an incident or identify those
#   responsible for one. Satisfies: SRG-OS-000037-GPOS-00015,
#   SRG-OS-000042-GPOS-00020, SRG-OS-000062-GPOS-00031,
#   SRG-OS-000392-GPOS-00172, SRG-OS-000462-GPOS-00206,
#   SRG-OS-000471-GPOS-00215, SRG-OS-000473-GPOS-00218,
#   SRG-OS-000470-GPOS-00214
#
# Check Text:
#   Verify RHEL 10 generates audit records for all account creations,
#   modifications, disabling, and termination events that affect
#   "/var/log/lastlog" with the following command:
#
#   $ sudo auditctl -l | grep /var/log/lastlog
#   -a always,exit -F arch=b32 -F path=/var/log/lastlog -F perm=wa -F
#   key=logins
#   -a always,exit -F arch=b64 -F path=/var/log/lastlog -F perm=wa -F
#   key=logins
#
#   If the command does not return a line, or the line is commented out, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to generate audit records for all account creations,
#   modifications, disabling, and termination events that affect
#   "/var/log/lastlog".
#
#   Add or update the following file system rule to
#   "/etc/audit/rules.d/audit.rules":
#
#   -a always,exit -F arch=b32 -F path=/var/log/lastlog -F perm=wa -F
#   key=logins
#   -a always,exit -F arch=b64 -F path=/var/log/lastlog -F perm=wa -F
#   key=logins
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500760 | RHEL 10 must generate audit records for all account creations, modifications, disabling, and termination events that affect /var/log/lastlog."
  when: rhel_10_500760 | bool
  tags:
    - RHEL-10-500760
    - medium
    - CCI-000130
  block:
    - name: "RHEL-10-500760 | Check audit rule for /var/log/lastlog"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500760_rules
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500760 | Add audit rule for /var/log/lastlog (b32)"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: "-a always,exit -F arch=b32 -F path=/var/log/lastlog -F perm=wa -F key=logins"
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'/var/log/lastlog' not in rhel_10_500760_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500760 | Add audit rule for /var/log/lastlog (b64)"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: "-a always,exit -F arch=b64 -F path=/var/log/lastlog -F perm=wa -F key=logins"
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'/var/log/lastlog' not in rhel_10_500760_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500760 | Re-check audit rule for /var/log/lastlog"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500760_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500760 | Assert audit rule for /var/log/lastlog is present"
      ansible.builtin.assert:
        that: "'/var/log/lastlog' in rhel_10_500760_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-500760 detail=Audit rule for /var/log/lastlog (key=logins) is missing."
        success_msg: "result=PASS stig_id=RHEL-10-500760 detail=Audit rule for /var/log/lastlog (key=logins) is present."

  rescue:
    - name: "RHEL-10-500760 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500760 detail=Task failed unexpectedly — see prior error for details."
