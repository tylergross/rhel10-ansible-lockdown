---
# =============================================================================
# STIG ID  : RHEL-10-500780
# Rule ID  : SV-281163r1166441_rule
# Severity : medium
# CCI      : CCI-000130
# Title    : RHEL 10 must generate audit records for all uses of the "chmod", "fchmod", "fchmodat", and "fchmodat2" syscalls.
#
# Description:
#   Without generating audit records that are specific to the security and
#   mission needs of the organization, it would be difficult to establish,
#   correlate, and investigate the events relating to an incident or identify
#   those responsible for one. Audit records can be generated from various
#   components within the information system (e.g., module or policy filter).
#   When a user logs on, the auid is set to the uid of the account that is
#   being authenticated. Daemons are not user sessions and have the loginuid
#   set to -1. The auid representation is an unsigned 32-bit integer, which
#   equals 4294967295. The audit system interprets -1, 4294967295, and
#   "unset" in the same way. The system call rules are loaded into a matching
#   engine that intercepts each syscall made by all programs on the system.
#   Therefore, it is very important to use syscall rules only when absolutely
#   necessary because these affect performance. More rules lead to poorer
#   performance. The performance can be helped, however, by combining
#   syscalls into one rule whenever possible. Satisfies:
#   SRG-OS-000037-GPOS-00015, SRG-OS-000042-GPOS-00020,
#   SRG-OS-000062-GPOS-00031, SRG-OS-000392-GPOS-00172,
#   SRG-OS-000462-GPOS-00206, SRG-OS-000471-GPOS-00215,
#   SRG-OS-000064-GPOS-00033, SRG-OS-000466-GPOS-00210,
#   SRG-OS-000458-GPOS-00203
#
# Check Text:
#   Verify RHEL 10 is configured to audit the execution of the "chmod",
#   "fchmod", "fchmodat", and "fchmodat2" syscalls with the following
#   command:
#
#   $ sudo auditctl -l | grep chmod
#   -a always,exit -F arch=b32 -S chmod,fchmod,fchmodat,fchmodat2 -F
#   auid>=1000 -F auid!=unset -k perm_mod
#   -a always,exit -F arch=b64 -S chmod,fchmod,fchmodat,fchmodat2 -F
#   auid>=1000 -F auid!=unset -k perm_mod
#
#   If both the "b32" and "b64" audit rules are not defined for the "chmod",
#   "fchmod", "fchmodat", and "fchmodat2" syscalls, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to generate audit records upon successful and
#   unsuccessful attempts to use the "chmod", "fchmod", "fchmodat", and
#   "fchmodat2" syscalls.
#
#   Add or update the following rules in "/etc/audit/rules.d/audit.rules":
#
#   -a always,exit -F arch=b32 -S chmod,fchmod,fchmodat,fchmodat2 -F
#   auid>=1000 -F auid!=unset -k perm_mod
#
#   -a always,exit -F arch=b64 -S chmod,fchmod,fchmodat,fchmodat2 -F
#   auid>=1000 -F auid!=unset -k perm_mod
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500780 | RHEL 10 must generate audit records for all uses of the chmod, fchmod, fchmodat, and fchmodat2 syscalls."
  when: rhel_10_500780 | bool
  tags:
    - RHEL-10-500780
    - medium
    - CCI-000130
  block:
    - name: "RHEL-10-500780 | Check audit rules for chmod/fchmod/fchmodat/fchmodat2 syscalls"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500780_rules
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500780 | Add audit rule for chmod syscalls (b32)"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: "-a always,exit -F arch=b32 -S chmod,fchmod,fchmodat,fchmodat2 -F auid>=1000 -F auid!=unset -k perm_mod"
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'perm_mod' not in rhel_10_500780_rules.stdout or 'chmod' not in rhel_10_500780_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500780 | Add audit rule for chmod syscalls (b64)"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: "-a always,exit -F arch=b64 -S chmod,fchmod,fchmodat,fchmodat2 -F auid>=1000 -F auid!=unset -k perm_mod"
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'perm_mod' not in rhel_10_500780_rules.stdout or 'chmod' not in rhel_10_500780_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500780 | Re-check audit rules for chmod syscalls"
      ansible.builtin.command:
        cmd: cat /etc/audit/rules.d/rhel10-stig.rules
      register: rhel_10_500780_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500780 | Assert audit rules for chmod syscalls are present"
      ansible.builtin.assert:
        that:
          - "'perm_mod' in rhel_10_500780_verify.stdout"
          - "'chmod' in rhel_10_500780_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-500780 detail=Audit rules for chmod/fchmod/fchmodat/fchmodat2 syscalls (key=perm_mod) are missing."
        success_msg: "result=PASS stig_id=RHEL-10-500780 detail=Audit rules for chmod/fchmod/fchmodat/fchmodat2 syscalls (key=perm_mod) are present."

  rescue:
    - name: "RHEL-10-500780 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500780 detail=Task failed unexpectedly — see prior error for details."
