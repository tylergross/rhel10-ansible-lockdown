---
# =============================================================================
# STIG ID  : RHEL-10-500810
# Rule ID  : SV-281165r1166447_rule
# Severity : medium
# CCI      : CCI-000130
# Title    : RHEL 10 must generate audit records for all uses of the "rename", "unlink", "rmdir", "renameat", "renameat2", and "unlinkat" system calls.
#
# Description:
#   Without generating audit records that are specific to the security and
#   mission needs of the organization, it would be difficult to establish,
#   correlate, and investigate the events relating to an incident or identify
#   those responsible for one. Audit records can be generated from various
#   components within the information system (e.g., module or policy filter).
#   When a user logs on, the auid is set to the uid of the account that is
#   being authenticated. Daemons are not user sessions and have the loginuid
#   set to -1. The auid representation is an unsigned 32-bit integer, which
#   equals 4294967295. The audit system interprets -1, 4294967295, and
#   "unset" in the same way. The system call rules are loaded into a matching
#   engine that intercepts each syscall made by all programs on the system.
#   Therefore, it is very important to use syscall rules only when absolutely
#   necessary because these affect performance. More rules lead to poorer
#   performance. The performance can be helped, however, by combining
#   syscalls into one rule whenever possible. Satisfies:
#   SRG-OS-000037-GPOS-00015, SRG-OS-000042-GPOS-00020,
#   SRG-OS-000062-GPOS-00031, SRG-OS-000392-GPOS-00172,
#   SRG-OS-000462-GPOS-00206, SRG-OS-000471-GPOS-00215,
#   SRG-OS-000466-GPOS-00210, SRG-OS-000467-GPOS-00211,
#   SRG-OS-000468-GPOS-00212
#
# Check Text:
#   Verify RHEL 10 is configured to audit successful/unsuccessful attempts to
#   use the "rename", "unlink", "rmdir", "renameat", "renameat2", and
#   "unlinkat" system calls with the following command:
#
#   $ sudo auditctl -l | grep 'rename\|unlink\|rmdir'
#   -a always,exit -F arch=b32 -S
#   rename,unlink,rmdir,renameat,renameat2,unlinkat -F auid>=1000 -F
#   auid!=unset -k delete
#   -a always,exit -F arch=b64 -S
#   rename,unlink,rmdir,renameat,renameat2,unlinkat -F auid>=1000 -F
#   auid!=unset -k delete
#
#   If the command does not return an audit rule for "rename", "unlink",
#   "rmdir", "renameat", and "unlinkat", or any of the lines returned are
#   commented out, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to generate an audit event for any
#   successful/unsuccessful use of the "rename", "unlink", "rmdir",
#   "renameat", "renameat2", and "unlinkat" system calls by adding or
#   updating the following rules in the "/etc/audit/rules.d/audit.rules"
#   file:
#
#   -a always,exit -F arch=b32 -S
#   rename,unlink,rmdir,renameat,renameat2,unlinkat -F auid>=1000 -F
#   auid!=unset -k delete
#   -a always,exit -F arch=b64 -S
#   rename,unlink,rmdir,renameat,renameat2,unlinkat -F auid>=1000 -F
#   auid!=unset -k delete
#
#   Restart the audit daemon with the following command for the changes to
#   take effect:
#
#   $ sudo service auditd restart
# =============================================================================

- name: "RHEL-10-500810 | RHEL 10 must generate audit records for all uses of the rename, unlink, rmdir, renameat, renameat2, and unlinkat system calls."
  when: rhel_10_500810 | bool
  tags:
    - RHEL-10-500810
    - medium
    - CCI-000130
  block:
    - name: "RHEL-10-500810 | Check audit rules for rename/unlink/rmdir/renameat/renameat2/unlinkat syscalls"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500810_rules
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500810 | Add audit rule for delete syscalls (b32)"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: "-a always,exit -F arch=b32 -S rename,unlink,rmdir,renameat,renameat2,unlinkat -F auid>=1000 -F auid!=unset -k delete"
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'delete' not in rhel_10_500810_rules.stdout or 'rename' not in rhel_10_500810_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500810 | Add audit rule for delete syscalls (b64)"
      ansible.builtin.lineinfile:
        path: /etc/audit/rules.d/rhel10-stig.rules
        line: "-a always,exit -F arch=b64 -S rename,unlink,rmdir,renameat,renameat2,unlinkat -F auid>=1000 -F auid!=unset -k delete"
        create: true
        mode: '0640'
        owner: root
        group: root
      when: "'delete' not in rhel_10_500810_rules.stdout or 'rename' not in rhel_10_500810_rules.stdout"
      notify: restart auditd

    - name: "RHEL-10-500810 | Re-check audit rules for delete syscalls"
      ansible.builtin.command:
        cmd: auditctl -l
      register: rhel_10_500810_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-500810 | Assert audit rules for delete syscalls are present"
      ansible.builtin.assert:
        that:
          - "'delete' in rhel_10_500810_verify.stdout"
          - "'rename' in rhel_10_500810_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-500810 detail=Audit rules for rename/unlink/rmdir/renameat/renameat2/unlinkat syscalls (key=delete) are missing."
        success_msg: "result=PASS stig_id=RHEL-10-500810 detail=Audit rules for rename/unlink/rmdir/renameat/renameat2/unlinkat syscalls (key=delete) are present."

  rescue:
    - name: "RHEL-10-500810 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-500810 detail=Task failed unexpectedly — see prior error for details."
