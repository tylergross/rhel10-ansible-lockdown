---
# =============================================================================
# STIG ID  : RHEL-10-600130
# Rule ID  : SV-281172r1166468_rule
# Severity : medium
# CCI      : CCI-000764
# Title    : RHEL 10 must not allow duplicate user IDs (UIDs) to exist for interactive users.
#
# Description:
#   To ensure accountability and prevent unauthenticated access, interactive
#   users must be identified and authenticated to prevent potential misuse
#   and compromise of the system. Satisfies: SRG-OS-000104-GPOS-00051,
#   SRG-OS-000121-GPOS-00062
#
# Check Text:
#   Verify RHEL 10 contains no duplicate UIDs for interactive users with the
#   following command:
#
#   $ sudo awk -F ":" 'list[$3]++{print $1, $3}' /etc/passwd
#
#   If output is produced and the accounts listed are interactive user
#   accounts, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to not allow duplicate UIDs to exist for interactive
#   users.
#
#   Edit the file "/etc/passwd", and provide each interactive user account
#   that has a duplicate UID with a unique UID.
# =============================================================================

- name: "RHEL-10-600130 | RHEL 10 must not allow duplicate user IDs (UIDs) to exist for interactive users."
  when: rhel_10_600130 | bool
  tags:
    - RHEL-10-600130
    - medium
    - CCI-000764
  block:
    - name: "RHEL-10-600130 | Check for duplicate UIDs for interactive users"
      ansible.builtin.shell:
        cmd: >-
          awk -F':' 'list[$3]++{print $1, $3}' /etc/passwd | awk '$2 >= 1000'
      register: rhel_10_600130_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600130 | Assert no duplicate UIDs exist for interactive users"
      ansible.builtin.assert:
        that:
          - rhel_10_600130_check.stdout_lines | length == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-600130 detail=Duplicate UIDs found for interactive users ({{ rhel_10_600130_check.stdout | trim }}). Edit /etc/passwd to assign unique UIDs."
        success_msg: "result=PASS stig_id=RHEL-10-600130 detail=No duplicate UIDs exist for interactive users."
  rescue:
    - name: "RHEL-10-600130 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-600130 detail=Task failed unexpectedly — see prior error for details."
