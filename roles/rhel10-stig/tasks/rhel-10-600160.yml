---
# =============================================================================
# STIG ID  : RHEL-10-600160
# Rule ID  : SV-281175r1197238_rule
# Severity : medium
# CCI      : CCI-003627
# Title    : RHEL 10 must disable account identifiers (individuals, groups, roles, and devices) after 35 days of inactivity.
#
# Description:
#   Inactive identifiers pose a risk to systems and applications because
#   attackers may exploit an inactive identifier and potentially obtain
#   undetected access to the system. Disabling inactive accounts ensures
#   accounts that may not have been responsibly removed are not available to
#   attackers who may have compromised their credentials. Owners of inactive
#   accounts will not notice if unauthorized access to their user account has
#   been obtained. Satisfies: SRG-OS-000118-GPOS-00060,
#   SRG-OS-000590-GPOS-00110
#
# Check Text:
#   Verify RHEL 10 account identifiers (individuals, groups, roles, and
#   devices) are disabled after 35 days of inactivity.
#
#   Check the account inactivity value by performing the following command:
#
#   $ sudo grep -i inactive /etc/default/useradd
#   INACTIVE=35
#
#   If "INACTIVE" is set to "-1", a value greater than "35", or is commented
#   out, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to disable account identifiers after 35 days of
#   inactivity after the password expiration.
#
#   Run the following command to change the configuration for "useradd":
#
#   $ sudo useradd -D -f 35
#
#   A recommendation is 35 days, but a lower value is acceptable.
# =============================================================================

- name: "RHEL-10-600160 | RHEL 10 must disable account identifiers (individuals, groups, roles, and devices) after 35 days of inactivity."
  when: rhel_10_600160 | bool
  tags:
    - RHEL-10-600160
    - medium
    - CCI-003627
  block:
    - name: "RHEL-10-600160 | Check INACTIVE setting in /etc/default/useradd"
      ansible.builtin.command:
        cmd: grep -i "^INACTIVE" /etc/default/useradd
      register: rhel_10_600160_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600160 | Backup /etc/default/useradd before modification"
      ansible.builtin.copy:
        src: /etc/default/useradd
        dest: "/etc/default/useradd.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: >
        rhel_10_600160_check.rc != 0 or
        rhel_10_600160_check.stdout | regex_search('INACTIVE=(-1|[3-9][6-9]|[4-9][0-9]|[1-9][0-9]{2,})')

    - name: "RHEL-10-600160 | Set INACTIVE in /etc/default/useradd"
      ansible.builtin.lineinfile:
        path: /etc/default/useradd
        regexp: '^#?INACTIVE='
        line: "INACTIVE={{ rhel_10_600160_inactive_days }}"
        state: present
      when: >
        rhel_10_600160_check.rc != 0 or
        rhel_10_600160_check.stdout | regex_search('INACTIVE=(-1|[3-9][6-9]|[4-9][0-9]|[1-9][0-9]{2,})')

    - name: "RHEL-10-600160 | Re-check INACTIVE setting"
      ansible.builtin.command:
        cmd: grep -i "^INACTIVE" /etc/default/useradd
      register: rhel_10_600160_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600160 | Assert INACTIVE is set within acceptable range"
      ansible.builtin.assert:
        that:
          - rhel_10_600160_verify.rc == 0
          - rhel_10_600160_verify.stdout | regex_search('INACTIVE=[1-9][0-9]*') is not none
        fail_msg: "result=FAIL stig_id=RHEL-10-600160 detail=INACTIVE is not properly set in /etc/default/useradd (current={{ rhel_10_600160_verify.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-600160 detail=INACTIVE is set to {{ rhel_10_600160_inactive_days }} days in /etc/default/useradd."
  rescue:
    - name: "RHEL-10-600160 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-600160 detail=Task failed unexpectedly — see prior error for details."
