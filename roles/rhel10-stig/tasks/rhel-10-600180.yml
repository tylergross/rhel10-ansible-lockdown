---
# =============================================================================
# STIG ID  : RHEL-10-600180
# Rule ID  : SV-281177r1184748_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must assign a home directory to all local interactive users in the "/etc/passwd" file.
#
# Description:
#   If local interactive users are not assigned a valid home directory, there
#   is no place for the storage and control of files they should own.
#
# Check Text:
#   Verify RHEL 10 interactive users have a home directory assigned with the
#   following command:
#
#   $ sudo awk -F: '($3>=1000)&&($7 !~ /nologin/){print $1, $3, $6}'
#   /etc/passwd
#   nsauser:x:1000:1000:nsauser:/home/nsauser:/bin/bash
#   disauser:x:1001:1001:disauser:/home/disauser:/bin/bash
#   doduser:x:1002:1002:doduser:/home/doduser:/bin/bash
#
#   Inspect the output and verify that all interactive users (normally users
#   with a user identifier [UID] greater than 1000) have a home directory
#   defined.
#
#   If a user's home directory is not defined, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 interactive users to have a home directory assigned in
#   the "/etc/passwd" file.
#
#   Create and assign home directories to all local interactive users on RHEL
#   10 that do not have a home directory assigned.
# =============================================================================

- name: "RHEL-10-600180 | RHEL 10 must assign a home directory to all local interactive users in the /etc/passwd file."
  when: rhel_10_600180 | bool
  tags:
    - RHEL-10-600180
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-600180 | Find interactive users without a home directory defined"
      ansible.builtin.shell:
        cmd: >
          awk -F: '($3 >= 1000 && $3 != 65534 && $7 !~ /nologin/ && $6 == "") {print $1}' /etc/passwd
      register: rhel_10_600180_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600180 | Assert all interactive users have a home directory defined"
      ansible.builtin.assert:
        that:
          - rhel_10_600180_check.stdout_lines | length == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-600180 detail=Interactive user(s) have no home directory defined in /etc/passwd ({{ rhel_10_600180_check.stdout | trim }}). Assign home directories to these users."
        success_msg: "result=PASS stig_id=RHEL-10-600180 detail=All interactive users have a home directory assigned in /etc/passwd."
  rescue:
    - name: "RHEL-10-600180 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-600180 detail=Task failed unexpectedly — see prior error for details."
