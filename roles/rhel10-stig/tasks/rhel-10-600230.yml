---
# =============================================================================
# STIG ID  : RHEL-10-600230
# Rule ID  : SV-281182r1195424_rule
# Severity : medium
# CCI      : CCI-004066
# Title    : RHEL 10 must enforce password complexity by requiring at least one special character to be used.
#
# Description:
#   Use of a complex password helps to increase the time and resources
#   required to compromise the password. Password complexity, or strength, is
#   a measure of the effectiveness of a password in resisting attempts at
#   guessing and brute-force attacks. Password complexity is one factor of
#   several that determines how long it takes to crack a password. The more
#   complex the password, the greater the number of possible combinations
#   that must be tested before the password is compromised. RHEL 10 uses
#   "pwquality" as a mechanism to enforce password complexity. Note that to
#   require special characters without degrading the "minlen" value, the
#   credit value must be expressed as a negative number in
#   "/etc/security/pwquality.conf".
#
# Check Text:
#   Verify RHEL 10 enforces password complexity by requiring that at least
#   one special character be used with the following command:
#
#   $ sudo grep -s ocredit /etc/security/pwquality.conf
#   /etc/security/pwquality.conf.d/*.conf
#   /etc/security/pwquality.conf:# ocredit = 0
#
#   If the value of "ocredit" is a positive number or is commented out, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to enforce password complexity by requiring that at
#   least one special character be used by setting the "ocredit" option.
#
#   Add or update the following line in the "/etc/security/pwquality.conf"
#   file or a configuration file in the "/etc/security/pwquality.conf.d/"
#   directory to contain the "ocredit" parameter:
#
#   ocredit = -1
# =============================================================================

- name: "RHEL-10-600230 | RHEL 10 must enforce password complexity by requiring at least one special character to be used."
  when: rhel_10_600230 | bool
  tags:
    - RHEL-10-600230
    - medium
    - CCI-004066
  block:
    - name: "RHEL-10-600230 | Check ocredit in /etc/security/pwquality.conf"
      ansible.builtin.command:
        cmd: grep -s "^ocredit" /etc/security/pwquality.conf
      register: rhel_10_600230_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600230 | Backup /etc/security/pwquality.conf before modification"
      ansible.builtin.copy:
        src: /etc/security/pwquality.conf
        dest: "/etc/security/pwquality.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: >
        rhel_10_600230_check.rc != 0 or
        (rhel_10_600230_check.stdout | regex_search('ocredit\s*=\s*(-?\d+)', '\1') | first | int) >= 0

    - name: "RHEL-10-600230 | Set ocredit = -1 in /etc/security/pwquality.conf"
      ansible.builtin.lineinfile:
        path: /etc/security/pwquality.conf
        regexp: '^#?\s*ocredit\s*='
        line: 'ocredit = -1'
        state: present
      when: >
        rhel_10_600230_check.rc != 0 or
        (rhel_10_600230_check.stdout | regex_search('ocredit\s*=\s*(-?\d+)', '\1') | first | int) >= 0

    - name: "RHEL-10-600230 | Re-check ocredit"
      ansible.builtin.command:
        cmd: grep -s "^ocredit" /etc/security/pwquality.conf
      register: rhel_10_600230_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600230 | Assert ocredit is a negative number"
      ansible.builtin.assert:
        that:
          - rhel_10_600230_verify.rc == 0
          - (rhel_10_600230_verify.stdout | regex_search('ocredit\s*=\s*(-?\d+)', '\1') | first | int) < 0
        fail_msg: "result=FAIL stig_id=RHEL-10-600230 detail=ocredit is not set to a negative value in /etc/security/pwquality.conf (current={{ rhel_10_600230_verify.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-600230 detail=ocredit is set to a negative value in /etc/security/pwquality.conf ({{ rhel_10_600230_verify.stdout | trim }})."
  rescue:
    - name: "RHEL-10-600230 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-600230 detail=Task failed unexpectedly — see prior error for details."
