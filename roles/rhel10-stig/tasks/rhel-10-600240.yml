---
# =============================================================================
# STIG ID  : RHEL-10-600240
# Rule ID  : SV-281183r1195427_rule
# Severity : medium
# CCI      : CCI-004066
# Title    : RHEL 10 must enforce password complexity by requiring that at least one lowercase character be used.
#
# Description:
#   Use of a complex password helps to increase the time and resources
#   required to compromise the password. Password complexity, or strength, is
#   a measure of the effectiveness of a password in resisting attempts at
#   guessing and brute-force attacks. Password complexity is one factor of
#   several that determines how long it takes to crack a password. The more
#   complex the password, the greater the number of possible combinations
#   that must be tested before the password is compromised. Requiring a
#   minimum number of lowercase characters makes password guessing attacks
#   more difficult by ensuring a larger search space.
#
# Check Text:
#   Verify RHEL 10 enforces password complexity by requiring that at least
#   one lowercase character be used with the following command:
#
#   $ sudo grep -s lcredit /etc/security/pwquality.conf
#   /etc/security/pwquality.conf/*.conf
#   /etc/security/pwquality.conf:lcredit = -1
#
#   If the value of "lcredit" is a positive number or is commented out, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to enforce password complexity by requiring that at
#   least one lowercase character be used by setting the "lcredit" option.
#
#   Add or update the following line in the "/etc/security/pwquality.conf"
#   file or a configuration file in the "/etc/security/pwquality.conf.d/"
#   directory to contain the "lcredit" parameter:
#
#   lcredit = -1
# =============================================================================

- name: "RHEL-10-600240 | RHEL 10 must enforce password complexity by requiring that at least one lowercase character be used."
  when: rhel_10_600240 | bool
  tags:
    - RHEL-10-600240
    - medium
    - CCI-004066
  block:
    - name: "RHEL-10-600240 | Check lcredit in /etc/security/pwquality.conf"
      ansible.builtin.shell:
        cmd: >-
          awk -F= '/^lcredit/{gsub(/ /,\"\",$2); exit ($2+0<0 ? 0 : 1)} END{exit 1}' /etc/security/pwquality.conf
      register: rhel_10_600240_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600240 | Backup /etc/security/pwquality.conf before modification"
      ansible.builtin.copy:
        src: /etc/security/pwquality.conf
        dest: "/etc/security/pwquality.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: rhel_10_600240_check.rc != 0

    - name: "RHEL-10-600240 | Set lcredit = -1 in /etc/security/pwquality.conf"
      ansible.builtin.lineinfile:
        path: /etc/security/pwquality.conf
        regexp: '^#?\s*lcredit\s*='
        line: 'lcredit = -1'
        state: present
      when: rhel_10_600240_check.rc != 0

    - name: "RHEL-10-600240 | Re-check lcredit"
      ansible.builtin.shell:
        cmd: >-
          awk -F= '/^lcredit/{gsub(/ /,\"\",$2); exit ($2+0<0 ? 0 : 1)} END{exit 1}' /etc/security/pwquality.conf
      register: rhel_10_600240_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600240 | Assert lcredit is a negative number"
      ansible.builtin.assert:
        that: rhel_10_600240_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-600240 detail=lcredit is not set to a negative value in /etc/security/pwquality.conf (current={{ rhel_10_600240_verify.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-600240 detail=lcredit is set to a negative value in /etc/security/pwquality.conf ({{ rhel_10_600240_verify.stdout | trim }})."
  rescue:
    - name: "RHEL-10-600240 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-600240 detail=Task failed unexpectedly — see prior error for details."
