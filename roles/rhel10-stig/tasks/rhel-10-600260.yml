---
# =============================================================================
# STIG ID  : RHEL-10-600260
# Rule ID  : SV-281185r1195433_rule
# Severity : medium
# CCI      : CCI-004066
# Title    : RHEL 10 must require the change of at least eight characters when passwords are changed.
#
# Description:
#   Use of a complex password helps to increase the time and resources
#   required to compromise the password. Password complexity, or strength, is
#   a measure of the effectiveness of a password in resisting attempts at
#   guessing and brute–force attacks. Password complexity is one factor of
#   several that determines how long it takes to crack a password. The more
#   complex the password, the greater the number of possible combinations
#   that must be tested before the password is compromised. Requiring a
#   minimum number of different characters during password changes ensures
#   that newly changed passwords should not resemble previously compromised
#   ones. Note that passwords that are changed on compromised systems will
#   still be compromised.
#
# Check Text:
#   Verify RHEL 10 requires the change of at least eight characters when
#   passwords are changed by checking the value of the "difok" option in
#   "/etc/security/pwquality.conf" with the following command:
#
#   $ sudo grep difok -s /etc/security/pwquality.conf
#   /etc/security/pwquality.conf.d/*.conf
#   /etc/security/pwquality.conf:difok = 8
#
#   If the value of "difok" is set to less than "8" or is commented out, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to require the change of at least eight of the total
#   number of characters when passwords are changed by setting the "difok"
#   option.
#
#   Add or update the following line in the "/etc/security/pwquality.conf"
#   file or a configuration file in the "/etc/security/pwquality.conf.d/"
#   directory to contain the "difok" parameter:
#
#   difok = 8
# =============================================================================

- name: "RHEL-10-600260 | RHEL 10 must require the change of at least eight characters when passwords are changed."
  when: rhel_10_600260 | bool
  tags:
    - RHEL-10-600260
    - medium
    - CCI-004066
  block:
    - name: "RHEL-10-600260 | Check difok in /etc/security/pwquality.conf"
      ansible.builtin.command:
        cmd: grep -s "^difok" /etc/security/pwquality.conf
      register: rhel_10_600260_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600260 | Backup /etc/security/pwquality.conf before modification"
      ansible.builtin.copy:
        src: /etc/security/pwquality.conf
        dest: "/etc/security/pwquality.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: >
        rhel_10_600260_check.rc != 0 or
        (rhel_10_600260_check.stdout | regex_search('difok\s*=\s*(\d+)', '\1') | first | int) < 8

    - name: "RHEL-10-600260 | Set difok = 8 in /etc/security/pwquality.conf"
      ansible.builtin.lineinfile:
        path: /etc/security/pwquality.conf
        regexp: '^#?\s*difok\s*='
        line: 'difok = 8'
        state: present
      when: >
        rhel_10_600260_check.rc != 0 or
        (rhel_10_600260_check.stdout | regex_search('difok\s*=\s*(\d+)', '\1') | first | int) < 8

    - name: "RHEL-10-600260 | Re-check difok"
      ansible.builtin.command:
        cmd: grep -s "^difok" /etc/security/pwquality.conf
      register: rhel_10_600260_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600260 | Assert difok is 8 or greater"
      ansible.builtin.assert:
        that:
          - rhel_10_600260_verify.rc == 0
          - (rhel_10_600260_verify.stdout | regex_search('difok\s*=\s*(\d+)', '\1') | first | int) >= 8
        fail_msg: "result=FAIL stig_id=RHEL-10-600260 detail=difok is not set to 8 or greater in /etc/security/pwquality.conf (current={{ rhel_10_600260_verify.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-600260 detail=difok is set to 8 or greater in /etc/security/pwquality.conf ({{ rhel_10_600260_verify.stdout | trim }})."
  rescue:
    - name: "RHEL-10-600260 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-600260 detail=Task failed unexpectedly — see prior error for details."
