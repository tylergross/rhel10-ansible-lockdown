---
# =============================================================================
# STIG ID  : RHEL-10-600300
# Rule ID  : SV-281189r1195442_rule
# Severity : medium
# CCI      : CCI-004066
# Title    : RHEL 10 must require the change of at least four character classes when passwords are changed.
#
# Description:
#   Use of a complex password helps to increase the time and resources
#   required to compromise the password. Password complexity, or strength, is
#   a measure of the effectiveness of a password in resisting attempts at
#   guessing and brute-force attacks. Password complexity is one factor of
#   several that determines how long it takes to crack a password. The more
#   complex a password is, the greater the number of possible combinations
#   that must be tested before the password is compromised.
#
# Check Text:
#   Verify RHEL 10 sets the value of the "minclass" option in
#   "/etc/security/pwquality.conf" with the following command:
#
#   $ sudo grep -s minclass /etc/security/pwquality.conf
#   /etc/security/pwquality.conf.d/*.conf
#   /etc/security/pwquality.conf:minclass = 4
#
#   If the value of "minclass" is set to less than "4" or is commented out,
#   this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to require the change of at least four character
#   classes when passwords are changed by setting the "minclass" option.
#
#   Add or update the following line in the "/etc/security/pwquality.conf"
#   file or a configuration file in the "/etc/security/pwquality.conf.d/"
#   directory to contain the "minclass" parameter:
#
#   minclass = 4
# =============================================================================

- name: "RHEL-10-600300 | RHEL 10 must require the change of at least four character classes when passwords are changed."
  when: rhel_10_600300 | bool
  tags:
    - RHEL-10-600300
    - medium
    - CCI-004066
  block:
    - name: "RHEL-10-600300 | Check minclass in /etc/security/pwquality.conf"
      ansible.builtin.command:
        cmd: grep -s "^minclass" /etc/security/pwquality.conf
      register: rhel_10_600300_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600300 | Backup /etc/security/pwquality.conf before modification"
      ansible.builtin.copy:
        src: /etc/security/pwquality.conf
        dest: "/etc/security/pwquality.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: >
        rhel_10_600300_check.rc != 0 or
        (rhel_10_600300_check.stdout | regex_search('minclass\s*=\s*(\d+)', '\1') | first | int) < 4

    - name: "RHEL-10-600300 | Set minclass = 4 in /etc/security/pwquality.conf"
      ansible.builtin.lineinfile:
        path: /etc/security/pwquality.conf
        regexp: '^#?\s*minclass\s*='
        line: 'minclass = 4'
        state: present
      when: >
        rhel_10_600300_check.rc != 0 or
        (rhel_10_600300_check.stdout | regex_search('minclass\s*=\s*(\d+)', '\1') | first | int) < 4

    - name: "RHEL-10-600300 | Re-check minclass"
      ansible.builtin.command:
        cmd: grep -s "^minclass" /etc/security/pwquality.conf
      register: rhel_10_600300_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600300 | Assert minclass is 4 or greater"
      ansible.builtin.assert:
        that:
          - rhel_10_600300_verify.rc == 0
          - (rhel_10_600300_verify.stdout | regex_search('minclass\s*=\s*(\d+)', '\1') | first | int) >= 4
        fail_msg: "result=FAIL stig_id=RHEL-10-600300 detail=minclass is not set to 4 or greater in /etc/security/pwquality.conf (current={{ rhel_10_600300_verify.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-600300 detail=minclass is set to 4 or greater in /etc/security/pwquality.conf ({{ rhel_10_600300_verify.stdout | trim }})."
  rescue:
    - name: "RHEL-10-600300 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-600300 detail=Task failed unexpectedly — see prior error for details."
