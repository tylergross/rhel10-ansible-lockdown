---
# =============================================================================
# STIG ID  : RHEL-10-600320
# Rule ID  : SV-281191r1195448_rule
# Severity : medium
# CCI      : CCI-004066
# Title    : RHEL 10 must prevent the use of dictionary words for passwords.
#
# Description:
#   Use of a complex password helps to increase the time and resources
#   required to compromise the password. Password complexity, or strength, is
#   a measure of the effectiveness of a password in resisting attempts at
#   guessing and brute-force attacks. If RHEL 10 allows the user to select
#   passwords based on dictionary words, this increases the chances of
#   password compromise by increasing the opportunity for successful guesses
#   and brute-force attacks. Satisfies: SRG-OS-000480-GPOS-00225,
#   SRG-OS-000072-GPOS-00040
#
# Check Text:
#   Verify RHEL 10 prevents the use of dictionary words for passwords with
#   the following command:
#
#   $ sudo grep -s dictcheck /etc/security/pwquality.conf
#   /etc/pwquality.conf.d/*.conf
#   /etc/security/pwquality.conf:dictcheck=1
#
#   If "dictcheck" does not have a value other than "0" or is commented out,
#   this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to prevent the use of dictionary words for passwords.
#
#   Add or update the following line in the "/etc/security/pwquality.conf"
#   file or a configuration file in the "/etc/security/pwquality.conf.d/"
#   directory to contain the "dictcheck" parameter:
#
#   dictcheck=1
# =============================================================================

- name: "RHEL-10-600320 | RHEL 10 must prevent the use of dictionary words for passwords."
  when: rhel_10_600320 | bool
  tags:
    - RHEL-10-600320
    - medium
    - CCI-004066
  block:
    - name: "RHEL-10-600320 | Check dictcheck in /etc/security/pwquality.conf"
      ansible.builtin.command:
        cmd: grep -s "^dictcheck" /etc/security/pwquality.conf
      register: rhel_10_600320_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600320 | Backup /etc/security/pwquality.conf before modification"
      ansible.builtin.copy:
        src: /etc/security/pwquality.conf
        dest: "/etc/security/pwquality.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: >
        rhel_10_600320_check.rc != 0 or
        rhel_10_600320_check.stdout | regex_search('dictcheck\s*=\s*0')

    - name: "RHEL-10-600320 | Set dictcheck = 1 in /etc/security/pwquality.conf"
      ansible.builtin.lineinfile:
        path: /etc/security/pwquality.conf
        regexp: '^#?\s*dictcheck\s*='
        line: 'dictcheck = 1'
        state: present
      when: >
        rhel_10_600320_check.rc != 0 or
        rhel_10_600320_check.stdout | regex_search('dictcheck\s*=\s*0')

    - name: "RHEL-10-600320 | Re-check dictcheck"
      ansible.builtin.command:
        cmd: grep -s "^dictcheck" /etc/security/pwquality.conf
      register: rhel_10_600320_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600320 | Assert dictcheck is set to a non-zero value"
      ansible.builtin.assert:
        that:
          - rhel_10_600320_verify.rc == 0
          - rhel_10_600320_verify.stdout | regex_search('dictcheck\s*=\s*[^0]') is not none
        fail_msg: "result=FAIL stig_id=RHEL-10-600320 detail=dictcheck is not set or is set to 0 in /etc/security/pwquality.conf (current={{ rhel_10_600320_verify.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-600320 detail=dictcheck is enabled in /etc/security/pwquality.conf ({{ rhel_10_600320_verify.stdout | trim }})."
  rescue:
    - name: "RHEL-10-600320 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-600320 detail=Task failed unexpectedly — see prior error for details."
