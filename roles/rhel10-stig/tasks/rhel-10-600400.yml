---
# =============================================================================
# STIG ID  : RHEL-10-600400
# Rule ID  : SV-281192r1166528_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must allow only the root account to have unrestricted access to the system.
#
# Description:
#   An account has root authority if it has a user identifier (UID) of "0".
#   Multiple accounts with a UID of "0" afford more opportunity for potential
#   intruders to guess a password for a privileged account. Proper
#   configuration of sudo is recommended to afford multiple system
#   administrators access to root privileges in an accountable manner.
#
# Check Text:
#   Verify RHEL 10 is configured so that only the "root" account has a UID
#   "0" assignment with the following command:
#
#   $ awk -F: '$3 == 0 {print $1}' /etc/passwd
#   root
#
#   If any accounts other than "root" have a UID of "0", this is a finding.
#
# Fix Text:
#   Configure RHEL 10 so that only the "root" account has a UID assignment of
#   "0".
#
#   Change the UID of any account on the system, other than "root", that has
#   a UID of "0".
#
#   If the account is associated with system commands or applications, the
#   UID should be changed to one greater than "0" but less than "1000".
#   Otherwise, assign a UID of greater than "1000" that has not already been
#   assigned.
# =============================================================================

- name: "RHEL-10-600400 | RHEL 10 must allow only the root account to have unrestricted access to the system."
  when: rhel_10_600400 | bool
  tags:
    - RHEL-10-600400
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-600400 | Check for accounts with UID 0 other than root"
      ansible.builtin.command:
        cmd: awk -F':' '$3 == 0 && $1 != "root" {print $1}' /etc/passwd
      register: rhel_10_600400_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600400 | Assert only root has UID 0"
      ansible.builtin.assert:
        that:
          - rhel_10_600400_check.stdout_lines | length == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-600400 detail=Account(s) other than root have UID 0 ({{ rhel_10_600400_check.stdout | trim }}). Change the UID of these accounts."
        success_msg: "result=PASS stig_id=RHEL-10-600400 detail=Only the root account has UID 0."
  rescue:
    - name: "RHEL-10-600400 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-600400 detail=Task failed unexpectedly — see prior error for details."
