---
# =============================================================================
# STIG ID  : RHEL-10-600420
# Rule ID  : SV-281196r1166540_rule
# Severity : medium
# CCI      : CCI-002238
# Title    : RHEL 10 must automatically lock an account when three unsuccessful login attempts occur during a 15-minute time period.
#
# Description:
#   By limiting the number of failed login attempts, the risk of unauthorized
#   system access via user password guessing, otherwise known as
#   brute-forcing, is reduced. Limits are imposed by locking the account.
#   Satisfies: SRG-OS-000329-GPOS-00128, SRG-OS-000021-GPOS-00005
#
# Check Text:
#   Verify RHEL 10 locks an account after three unsuccessful login attempts
#   within a period of 15 minutes with the following command:
#
#   $ sudo grep fail_interval /etc/security/faillock.conf
#   fail_interval = 900
#
#   If the "fail_interval" option is not set to "900" or less (but not "0"),
#   the line is commented out, or the line is missing, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to lock out the "root" account after a number of
#   incorrect login attempts within 15 minutes using "pam_faillock.so".
#
#   Enable the feature using the following command:
#
#   $ authselect enable-feature with-faillock
#
#   Edit the "/etc/security/faillock.conf" file as follows:
#
#   fail_interval = 900
# =============================================================================

- name: "RHEL-10-600420 | RHEL 10 must automatically lock an account when three unsuccessful login attempts occur during a 15-minute time period."
  when: rhel_10_600420 | bool
  tags:
    - RHEL-10-600420
    - medium
    - CCI-002238
  block:
    - name: "RHEL-10-600420 | Check fail_interval in /etc/security/faillock.conf"
      ansible.builtin.command:
        cmd: grep "fail_interval" /etc/security/faillock.conf
      register: rhel_10_600420_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600420 | Backup /etc/security/faillock.conf before modification"
      ansible.builtin.copy:
        src: /etc/security/faillock.conf
        dest: "/etc/security/faillock.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: >
        rhel_10_600420_check.rc != 0 or
        (rhel_10_600420_check.stdout | regex_search('fail_interval\s*=\s*(\d+)', '\1') | first | int) == 0 or
        (rhel_10_600420_check.stdout | regex_search('fail_interval\s*=\s*(\d+)', '\1') | first | int) > 900

    - name: "RHEL-10-600420 | Set fail_interval = 900 in /etc/security/faillock.conf"
      ansible.builtin.lineinfile:
        path: /etc/security/faillock.conf
        regexp: '^#?\s*fail_interval\s*='
        line: 'fail_interval = 900'
        state: present
      when: >
        rhel_10_600420_check.rc != 0 or
        (rhel_10_600420_check.stdout | regex_search('fail_interval\s*=\s*(\d+)', '\1') | first | int) == 0 or
        (rhel_10_600420_check.stdout | regex_search('fail_interval\s*=\s*(\d+)', '\1') | first | int) > 900

    - name: "RHEL-10-600420 | Re-check fail_interval"
      ansible.builtin.command:
        cmd: grep "fail_interval" /etc/security/faillock.conf
      register: rhel_10_600420_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600420 | Assert fail_interval is 900 or less (but not 0)"
      ansible.builtin.assert:
        that:
          - rhel_10_600420_verify.rc == 0
          - (rhel_10_600420_verify.stdout | regex_search('fail_interval\s*=\s*(\d+)', '\1') | first | int) > 0
          - (rhel_10_600420_verify.stdout | regex_search('fail_interval\s*=\s*(\d+)', '\1') | first | int) <= 900
        fail_msg: "result=FAIL stig_id=RHEL-10-600420 detail=fail_interval is not set to 900 or less in /etc/security/faillock.conf (current={{ rhel_10_600420_verify.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-600420 detail=fail_interval is set to 900 or less in /etc/security/faillock.conf ({{ rhel_10_600420_verify.stdout | trim }})."
  rescue:
    - name: "RHEL-10-600420 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-600420 detail=Task failed unexpectedly — see prior error for details."
