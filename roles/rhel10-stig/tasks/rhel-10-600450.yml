---
# =============================================================================
# STIG ID  : RHEL-10-600450
# Rule ID  : SV-281199r1166549_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must not have unauthorized accounts.
#
# Description:
#   Having lockouts persist across reboots ensures that account is unlocked
#   only by an administrator. If the lockouts did not persist across reboots,
#   an attacker could reboot the system to continue brute force attacks
#   against the accounts on the system.
#
# Check Text:
#   Verify RHEL 10 has no unauthorized local interactive user accounts with
#   the following command:
#
#   $ less /etc/passwd
#   root:x:0:0:root:/root:/bin/bash
#   ...
#   nsauser:x:1000:1000:nsauser:/home/nsauser:/bin/bash
#   doduser:x:1001:1001:doduser:/home/doduser:/bin/bash
#
#   Interactive user accounts generally will have a user ID (UID) of 1000 or
#   greater, a home directory in a specific partition, and an interactive
#   shell.
#
#   Obtain the list of interactive user accounts authorized to be on the
#   system from the system administrator or information system security
#   officer and compare it to the list of local interactive user accounts on
#   the system.
#
#   If there are unauthorized local user accounts on the system, this is a
#   finding.
#
# Fix Text:
#   Configure RHEL 10 to have no unauthorized local interactive user accounts
#   with the following command, where <unauthorized_user> is the unauthorized
#   account:
#
#   $ sudo userdel <unauthorized_user>
# =============================================================================

- name: "RHEL-10-600450 | RHEL 10 must not have unauthorized accounts."
  when: rhel_10_600450 | bool
  tags:
    - RHEL-10-600450
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-600450 | List all interactive user accounts (UID >= 1000)"
      ansible.builtin.command:
        cmd: awk -F':' '$3 >= 1000 && $3 != 65534 {print $1, $3, $6, $7}' /etc/passwd
      register: rhel_10_600450_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600450 | Assert interactive accounts have been reviewed"
      ansible.builtin.assert:
        that:
          - rhel_10_600450_check.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-600450 detail=Unable to enumerate accounts from /etc/passwd. Manual review required."
        success_msg: "result=PASS stig_id=RHEL-10-600450 detail=Interactive accounts enumerated — manual review required to verify no unauthorized accounts exist ({{ rhel_10_600450_check.stdout_lines | length }} interactive account(s) found). Verify with ISSO."
  rescue:
    - name: "RHEL-10-600450 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-600450 detail=Task failed unexpectedly — see prior error for details."
