---
# =============================================================================
# STIG ID  : RHEL-10-600530
# Rule ID  : SV-281208r1166576_rule
# Severity : medium
# CCI      : CCI-002038
# Title    : RHEL 10 must require users to reauthenticate for privilege escalation.
#
# Description:
#   Without reauthentication, users may access resources or perform tasks for
#   which they do not have authorization. When operating systems provide the
#   capability to escalate a functional capability, it is critical that the
#   user reauthenticate. Satisfies: SRG-OS-000373-GPOS-00156,
#   SRG-OS-000373-GPOS-00157, SRG-OS-000373-GPOS-00158
#
# Check Text:
#   Verify RHEL 10 "/etc/sudoers" has no occurrences of "!authenticate" with
#   the following command:
#
#   $ sudo grep -ir '!authenticate' /etc/sudoers /etc/sudoers.d/
#
#   If any occurrences of "!authenticate" are returned, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to not allow users to execute privileged actions
#   without authenticating.
#
#   Remove any occurrence of "!authenticate" found in the "/etc/sudoers" file
#   or files in the "/etc/sudoers.d" directory:
#
#   $ sudo sed -i '/\!authenticate/ s/^/# /g' /etc/sudoers /etc/sudoers.d/*
# =============================================================================

- name: "RHEL-10-600530 | RHEL 10 must require users to reauthenticate for privilege escalation."
  when: rhel_10_600530 | bool
  tags:
    - RHEL-10-600530
    - medium
    - CCI-002038
  block:
    - name: "RHEL-10-600530 | Check for !authenticate in sudoers files"
      ansible.builtin.command:
        cmd: grep -ir '!authenticate' /etc/sudoers /etc/sudoers.d/
      register: rhel_10_600530_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600530 | Assert !authenticate is not present in sudoers"
      ansible.builtin.assert:
        that: rhel_10_600530_check.rc != 0
        fail_msg: "result=FAIL stig_id=RHEL-10-600530 detail=One or more !authenticate entries were found in sudoers — reauthentication is being bypassed. Remove all !authenticate occurrences."
        success_msg: "result=PASS stig_id=RHEL-10-600530 detail=No !authenticate entries found in sudoers — reauthentication is required."

  rescue:
    - name: "RHEL-10-600530 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-600530 detail=Task failed unexpectedly — see prior error for details."
