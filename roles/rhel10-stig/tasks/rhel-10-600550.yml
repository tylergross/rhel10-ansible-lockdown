---
# =============================================================================
# STIG ID  : RHEL-10-600550
# Rule ID  : SV-281210r1166582_rule
# Severity : medium
# CCI      : CCI-002038
# Title    : RHEL 10 must use the invoking user's password for privilege escalation when using "sudo".
#
# Description:
#   If the "rootpw", "targetpw", or "runaspw" flags are defined and not
#   disabled, by default the operating system will prompt the invoking user
#   for the "root" user password.
#
# Check Text:
#   Verify RHEL 10 sudoers security policy is configured to use the invoking
#   user's password for privilege escalation with the following command:
#
#   $ sudo grep -irE '(!rootpw|!targetpw|!runaspw)' /etc/sudoers
#   /etc/sudoers.d/ | grep -v '#'
#   /etc/sudoers:Defaults !targetpw
#   /etc/sudoers:Defaults !rootpw
#   /etc/sudoers:Defaults !runaspw
#
#   If no results are returned, this is a finding.
#
#   If results are returned from more than one file location, this is a
#   finding.
#
#   If "Defaults !targetpw" is not defined, this is a finding.
#
#   If "Defaults !rootpw" is not defined, this is a finding.
#
#   If "Defaults !runaspw" is not defined, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to use the invoking user's password for privilege
#   escalation when using "sudo".
#
#   Define the following in the Defaults section of the /etc/sudoers file or
#   a single configuration file in the /etc/sudoers.d/ directory:
#
#   Defaults !targetpw
#   Defaults !rootpw
#   Defaults !runaspw
# =============================================================================

- name: "RHEL-10-600550 | RHEL 10 must use the invoking user's password for privilege escalation when using sudo."
  when: rhel_10_600550 | bool
  tags:
    - RHEL-10-600550
    - medium
    - CCI-002038
  block:
    - name: "RHEL-10-600550 | Check for !targetpw !rootpw !runaspw in /etc/sudoers"
      ansible.builtin.command:
        cmd: >-
          grep -irE '(!rootpw|!targetpw|!runaspw)' /etc/sudoers /etc/sudoers.d/
      register: rhel_10_600550_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600550 | Check that all three defaults are in /etc/sudoers only"
      ansible.builtin.command:
        cmd: >-
          grep -iE '(!rootpw|!targetpw|!runaspw)' /etc/sudoers
      register: rhel_10_600550_main
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600550 | Backup /etc/sudoers"
      ansible.builtin.copy:
        src: /etc/sudoers
        dest: "/etc/sudoers.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: '0440'
      when: >
        not (rhel_10_600550_main.stdout is search('!targetpw')) or
        not (rhel_10_600550_main.stdout is search('!rootpw')) or
        not (rhel_10_600550_main.stdout is search('!runaspw'))

    - name: "RHEL-10-600550 | Ensure Defaults !targetpw in /etc/sudoers"
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        regexp: '^Defaults\s+!targetpw'
        line: 'Defaults !targetpw'
        state: present
        validate: '/usr/sbin/visudo -cf %s'
      when: rhel_10_600550_main.stdout is not search('!targetpw')

    - name: "RHEL-10-600550 | Ensure Defaults !rootpw in /etc/sudoers"
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        regexp: '^Defaults\s+!rootpw'
        line: 'Defaults !rootpw'
        state: present
        validate: '/usr/sbin/visudo -cf %s'
      when: rhel_10_600550_main.stdout is not search('!rootpw')

    - name: "RHEL-10-600550 | Ensure Defaults !runaspw in /etc/sudoers"
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        regexp: '^Defaults\s+!runaspw'
        line: 'Defaults !runaspw'
        state: present
        validate: '/usr/sbin/visudo -cf %s'
      when: rhel_10_600550_main.stdout is not search('!runaspw')

    - name: "RHEL-10-600550 | Re-check for !targetpw !rootpw !runaspw in /etc/sudoers"
      ansible.builtin.command:
        cmd: >-
          grep -iE '(!rootpw|!targetpw|!runaspw)' /etc/sudoers
      register: rhel_10_600550_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600550 | Assert invoking-user password defaults are set"
      ansible.builtin.assert:
        that:
          - rhel_10_600550_verify.stdout is search('!targetpw')
          - rhel_10_600550_verify.stdout is search('!rootpw')
          - rhel_10_600550_verify.stdout is search('!runaspw')
        fail_msg: "result=FAIL stig_id=RHEL-10-600550 detail=One or more of Defaults !targetpw/!rootpw/!runaspw are missing from /etc/sudoers."
        success_msg: "result=PASS stig_id=RHEL-10-600550 detail=Defaults !targetpw, !rootpw, and !runaspw are all configured in /etc/sudoers."

  rescue:
    - name: "RHEL-10-600550 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-600550 detail=Task failed unexpectedly — see prior error for details."
