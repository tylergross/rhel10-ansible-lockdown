---
# =============================================================================
# STIG ID  : RHEL-10-600620
# Rule ID  : SV-281214r1166594_rule
# Severity : medium
# CCI      : CCI-004066
# Title    : RHEL 10 must ensure the password complexity module is enabled in the "password-auth" file.
#
# Description:
#   Enabling Pluggable Authentication Module (PAM) password complexity
#   permits enforcement of strong passwords and consequently makes the system
#   less prone to dictionary attacks. Satisfies: SRG-OS-000069-GPOS-00037,
#   SRG-OS-000070-GPOS-00038
#
# Check Text:
#   Verify RHEL 10 uses "pwquality" to enforce the password complexity rules
#   in the "password-auth" file with the following command:
#
#   $ sudo grep pam_pwquality /etc/pam.d/password-auth
#   password required pam_pwquality.so
#
#   If the command does not return a line containing the value
#   "pam_pwquality.so", or the line is commented out, this is a finding.
#
#   If the system administrator can demonstrate that the required
#   configuration is contained in a PAM configuration file included or
#   substacked from the "system-auth" file, this is not a finding.
#
# Fix Text:
#   Configure RHEL 10 to use "pwquality" to enforce password complexity
#   rules.
#
#   Add the following line to the "/etc/pam.d/password-auth" file (or modify
#   the line to have the required value):
#
#   password required pam_pwquality.so
# =============================================================================

- name: "RHEL-10-600620 | RHEL 10 must ensure the password complexity module is enabled in the password-auth file."
  when: rhel_10_600620 | bool
  tags:
    - RHEL-10-600620
    - medium
    - CCI-004066
  block:
    - name: "RHEL-10-600620 | Check pam_pwquality.so in /etc/pam.d/password-auth"
      ansible.builtin.command:
        cmd: grep pam_pwquality /etc/pam.d/password-auth
      register: rhel_10_600620_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600620 | Backup /etc/pam.d/password-auth"
      ansible.builtin.copy:
        src: /etc/pam.d/password-auth
        dest: "/etc/pam.d/password-auth.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: rhel_10_600620_check.rc != 0

    - name: "RHEL-10-600620 | Ensure pam_pwquality.so is present in /etc/pam.d/password-auth"
      ansible.builtin.lineinfile:
        path: /etc/pam.d/password-auth
        regexp: '^#?\s*password\s+required\s+pam_pwquality\.so'
        line: 'password required pam_pwquality.so'
        state: present
        insertbefore: '^password'
      when: rhel_10_600620_check.rc != 0

    - name: "RHEL-10-600620 | Re-check pam_pwquality.so in /etc/pam.d/password-auth"
      ansible.builtin.command:
        cmd: grep pam_pwquality /etc/pam.d/password-auth
      register: rhel_10_600620_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-600620 | Assert pam_pwquality.so is present in password-auth"
      ansible.builtin.assert:
        that: rhel_10_600620_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-600620 detail=pam_pwquality.so is not present in /etc/pam.d/password-auth."
        success_msg: "result=PASS stig_id=RHEL-10-600620 detail=pam_pwquality.so is configured in /etc/pam.d/password-auth."

  rescue:
    - name: "RHEL-10-600620 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-600620 detail=Task failed unexpectedly — see prior error for details."
