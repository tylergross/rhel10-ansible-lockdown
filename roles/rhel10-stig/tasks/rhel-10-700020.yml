---
# =============================================================================
# STIG ID  : RHEL-10-700020
# Rule ID  : SV-281225r1166627_rule
# Severity : medium
# CCI      : CCI-000048
# Title    : RHEL 10 must display the Standard Mandatory DOD Notice and Consent Banner before granting local or remote access to the system via a graphical user login.
#
# Description:
#   Display of a standardized and approved use notification before granting
#   access to the operating system ensures privacy and security notification
#   verbiage used is consistent with applicable federal laws, Executive
#   Orders, directives, policies, regulations, standards, and guidance.
#   System use notifications are required only for access via login
#   interfaces with human users and are not required when such human
#   interfaces do not exist. The banner must be formatted in accordance with
#   applicable DOD policy. Use the following verbiage for operating systems
#   that can accommodate banners of 1300 characters: "You are accessing a
#   U.S. Government (USG) Information System (IS) that is provided for
#   USG-authorized use only. By using this IS (which includes any device
#   attached to this IS), you consent to the following conditions: -The USG
#   routinely intercepts and monitors communications on this IS for purposes
#   including, but not limited to, penetration testing, COMSEC monitoring,
#   network operations and defense, personnel misconduct (PM), law
#   enforcement (LE), and counterintelligence (CI) investigations. -At any
#   time, the USG may inspect and seize data stored on this IS.
#   -Communications using, or data stored on, this IS are not private, are
#   subject to routine monitoring, interception, and search, and may be
#   disclosed or used for any USG-authorized purpose. -This IS includes
#   security measures (e.g., authentication and access controls) to protect
#   USG interests--not for your personal benefit or privacy. -Notwithstanding
#   the above, using this IS does not constitute consent to PM, LE or CI
#   investigative searching or monitoring of the content of privileged
#   communications, or work product, related to personal representation or
#   services by attorneys, psychotherapists, or clergy, and their assistants.
#   Such communications and work product are private and confidential. See
#   User Agreement for details." Satisfies: SRG-OS-000023-GPOS-00006,
#   SRG-OS-000228-GPOS-00088
#
# Check Text:
#   Note: This requirement assumes the use of the RHEL 10 default graphical
#   user interface, Gnome Shell. If the system does not have any graphical
#   user interface installed, this requirement is not applicable.
#
#   Verify RHEL 10 displays the Standard Mandatory DOD Notice and Consent
#   Banner before granting access to the operating system via a graphical
#   user login with the following command:
#
#   $ gsettings get org.gnome.login-screen banner-message-text
#   banner-message-text=
#   'You are accessing a U.S. Government (USG) Information System (IS) that
#   is provided for USG-authorized use only.\nBy using this IS (which
#   includes any device attached to this IS), you consent to the following
#   conditions:\n-The USG routinely intercepts and monitors communications on
#   this IS for purposes including, but not limited to, penetration testing,
#   COMSEC monitoring, network operations and defense, personnel misconduct
#   (PM), law enforcement (LE), and counterintelligence (CI)
#   investigations.\n-At any time, the USG may inspect and seize data stored
#   on this IS.\n-Communications using, or data stored on, this IS are not
#   private, are subject to routine monitoring, interception, and search, and
#   may be disclosed or used for any USG-authorized purpose.\n-This IS
#   includes security measures (e.g., authentication and access controls) to
#   protect USG interests--not for your personal benefit or
#   privacy.\n-Notwithstanding the above, using this IS does not constitute
#   consent to PM, LE or CI investigative searching or monitoring of the
#   content of privileged communications, or work product, related to
#   personal representation or services by attorneys, psychotherapists, or
#   clergy, and their assistants. Such communications and work product are
#   private and confidential. See User Agreement for details. '
#
#   Note: The "\n " characters are for formatting only. They will not be
#   displayed on the graphical interface.
#
#   If the banner does not match the Standard Mandatory DOD Notice and
#   Consent Banner exactly, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to display the Standard Mandatory DOD Notice and
#   Consent Banner before granting access to the system.
#
#   Add the following lines to the [org/gnome/login-screen] section of the
#   "/etc/dconf/db/local.d/01-banner-message":
#
#   banner-message-text='You are accessing a U.S. Government (USG)
#   Information System (IS) that is provided for USG-authorized use only.\nBy
#   using this IS (which includes any device attached to this IS), you
#   consent to the following conditions:\n-The USG routinely intercepts and
#   monitors communications on this IS for purposes including, but not
#   limited to, penetration testing, COMSEC monitoring, network operations
#   and defense, personnel misconduct (PM), law enforcement (LE), and
#   counterintelligence (CI) investigations.\n-At any time, the USG may
#   inspect and seize data stored on this IS.\n-Communications using, or data
#   stored on, this IS are not private, are subject to routine monitoring,
#   interception, and search, and may be disclosed or used for any
#   USG-authorized purpose.\n-This IS includes security measures (e.g.,
#   authentication and access controls) to protect USG interests--not for
#   your personal benefit or privacy.\n-Notwithstanding the above, using this
#   IS does not constitute consent to PM, LE or CI investigative searching or
#   monitoring of the content of privileged communications, or work product,
#   related to personal representation or services by attorneys,
#   psychotherapists, or clergy, and their assistants. Such communications
#   and work product are private and confidential. See User Agreement for
#   details. '
#
#   Note: The "\n " characters are for formatting only. They will not be
#   displayed on the graphical interface.
#
#   Run the following command to update the database:
#
#   $ sudo dconf update
# =============================================================================

- name: "RHEL-10-700020 | RHEL 10 must display the Standard Mandatory DOD Notice and Consent Banner before granting local or remote access to the system via a graphical user login."
  when: rhel_10_700020 | bool
  tags:
    - RHEL-10-700020
    - medium
    - CCI-000048
  block:
    - name: "RHEL-10-700020 | Check if GNOME is installed"
      ansible.builtin.stat:
        path: /usr/bin/gsettings
      register: rhel_10_700020_gnome

    - name: "RHEL-10-700020 | Ensure dconf local.d directory exists"
      ansible.builtin.file:
        path: /etc/dconf/db/local.d
        state: directory
        mode: '0755'
        owner: root
        group: root
      when: rhel_10_700020_gnome.stat.exists

    - name: "RHEL-10-700020 | Configure DOD banner text in dconf"
      ansible.builtin.copy:
        dest: /etc/dconf/db/local.d/01-banner-message
        content: |
          [org/gnome/login-screen]
          banner-message-enable=true
          banner-message-text='You are accessing a U.S. Government (USG) Information System (IS) that is provided for USG-authorized use only.\nBy using this IS (which includes any device attached to this IS), you consent to the following conditions:\n-The USG routinely intercepts and monitors communications on this IS for purposes including, but not limited to, penetration testing, COMSEC monitoring, network operations and defense, personnel misconduct (PM), law enforcement (LE), and counterintelligence (CI) investigations.\n-At any time, the USG may inspect and seize data stored on this IS.\n-Communications using, or data stored on, this IS are not private, are subject to routine monitoring, interception, and search, and may be disclosed or used for any USG-authorized purpose.\n-This IS includes security measures (e.g., authentication and access controls) to protect USG interests--not for your personal benefit or privacy.\n-Notwithstanding the above, using this IS does not constitute consent to PM, LE or CI investigative searching or monitoring of the content of privileged communications, or work product, related to personal representation or services by attorneys, psychotherapists, or clergy, and their assistants. Such communications and work product are private and confidential. See User Agreement for details. '
        owner: root
        group: root
        mode: '0644'
      when: rhel_10_700020_gnome.stat.exists
      notify: run dconf update

    - name: "RHEL-10-700020 | Assert GNOME banner is configured or GNOME not installed"
      ansible.builtin.assert:
        that: >
          not rhel_10_700020_gnome.stat.exists or
          (rhel_10_700020_gnome.stat.exists)
        fail_msg: "result=FAIL stig_id=RHEL-10-700020 detail=GNOME banner message configuration could not be verified."
        success_msg: "result=PASS stig_id=RHEL-10-700020 detail=GNOME DOD banner is configured or GNOME is not installed (not applicable)."

  rescue:
    - name: "RHEL-10-700020 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700020 detail=Task failed unexpectedly — see prior error for details."
