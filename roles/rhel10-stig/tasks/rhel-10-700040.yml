---
# =============================================================================
# STIG ID  : RHEL-10-700040
# Rule ID  : SV-281227r1184627_rule
# Severity : medium
# CCI      : CCI-000048
# Title    : RHEL 10 must display the Standard Mandatory DOD Notice and Consent Banner before granting local or remote access to the system via a command line user login.
#
# Description:
#   Display of a standardized and approved use notification before granting
#   access to the operating system ensures privacy and security notification
#   verbiage used is consistent with applicable federal laws, Executive
#   Orders, directives, policies, regulations, standards, and guidance.
#   System use notifications are required only for access via login
#   interfaces with human users and are not required when such human
#   interfaces do not exist. Satisfies: SRG-OS-000023-GPOS-00006,
#   SRG-OS-000228-GPOS-00088
#
# Check Text:
#   Verify RHEL 10 displays the Standard Mandatory DOD Notice and Consent
#   Banner before granting access to the operating system via a command line
#   login screen with the following command:
#
#   $ cat /etc/issue
#
#   If the banner is set correctly, it will return the following text:
#
#   "You are accessing a U.S. Government (USG) Information System (IS) that
#   is provided for USG-authorized use only.
#
#   By using this IS (which includes any device attached to this IS), you
#   consent to the following conditions:
#
#   -The USG routinely intercepts and monitors communications on this IS for
#   purposes including, but not limited to, penetration testing, COMSEC
#   monitoring, network operations and defense, personnel misconduct (PM),
#   law enforcement (LE), and counterintelligence (CI) investigations.
#
#   -At any time, the USG may inspect and seize data stored on this IS.
#
#   -Communications using, or data stored on, this IS are not private, are
#   subject to routine monitoring, interception, and search, and may be
#   disclosed or used for any USG-authorized purpose.
#
#   -This IS includes security measures (e.g., authentication and access
#   controls) to protect USG interests--not for your personal benefit or
#   privacy.
#
#   -Notwithstanding the above, using this IS does not constitute consent to
#   PM, LE or CI investigative searching or monitoring of the content of
#   privileged communications, or work product, related to personal
#   representation or services by attorneys, psychotherapists, or clergy, and
#   their assistants. Such communications and work product are private and
#   confidential. See User Agreement for details."
#
#   If the banner text does not match the Standard Mandatory DOD Notice and
#   Consent Banner exactly, or the line is commented out, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to display the Standard Mandatory DOD Notice and
#   Consent Banner before granting access to the system via command line
#   login.
#
#   Edit the "/etc/issue" file to replace the default text with the Standard
#   Mandatory DOD Notice and Consent Banner. The DOD-required text is:
#
#   "You are accessing a U.S. Government (USG) Information System (IS) that
#   is provided for USG-authorized use only.
#
#   By using this IS (which includes any device attached to this IS), you
#   consent to the following conditions:
#
#   -The USG routinely intercepts and monitors communications on this IS for
#   purposes including, but not limited to, penetration testing, COMSEC
#   monitoring, network operations and defense, personnel misconduct (PM),
#   law enforcement (LE), and counterintelligence (CI) investigations.
#
#   -At any time, the USG may inspect and seize data stored on this IS.
#
#   -Communications using, or data stored on, this IS are not private, are
#   subject to routine monitoring, interception, and search, and may be
#   disclosed or used for any USG-authorized purpose.
#
#   -This IS includes security measures (e.g., authentication and access
#   controls) to protect USG interests -- not for your personal benefit or
#   privacy.
#
#   -Notwithstanding the above, using this IS does not constitute consent to
#   PM, LE or CI investigative searching or monitoring of the content of
#   privileged communications, or work product, related to personal
#   representation or services by attorneys, psychotherapists, or clergy, and
#   their assistants. Such communications and work product are private and
#   confidential. See User Agreement for details."
# =============================================================================

- name: "RHEL-10-700040 | RHEL 10 must display the Standard Mandatory DOD Notice and Consent Banner before granting local or remote access to the system via a command line user login."
  when: rhel_10_700040 | bool
  tags:
    - RHEL-10-700040
    - medium
    - CCI-000048
  block:
    - name: "RHEL-10-700040 | Check current /etc/issue content"
      ansible.builtin.command:
        cmd: grep -c "U.S. Government" /etc/issue
      register: rhel_10_700040_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700040 | Backup /etc/issue before modification"
      ansible.builtin.copy:
        src: /etc/issue
        dest: "/etc/issue.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: rhel_10_700040_check.rc != 0

    - name: "RHEL-10-700040 | Write DOD banner to /etc/issue"
      ansible.builtin.copy:
        dest: /etc/issue
        content: |
          You are accessing a U.S. Government (USG) Information System (IS) that is provided for USG-authorized use only.

          By using this IS (which includes any device attached to this IS), you consent to the following conditions:

          -The USG routinely intercepts and monitors communications on this IS for purposes including, but not limited to, penetration testing, COMSEC monitoring, network operations and defense, personnel misconduct (PM), law enforcement (LE), and counterintelligence (CI) investigations.

          -At any time, the USG may inspect and seize data stored on this IS.

          -Communications using, or data stored on, this IS are not private, are subject to routine monitoring, interception, and search, and may be disclosed or used for any USG-authorized purpose.

          -This IS includes security measures (e.g., authentication and access controls) to protect USG interests -- not for your personal benefit or privacy.

          -Notwithstanding the above, using this IS does not constitute consent to PM, LE or CI investigative searching or monitoring of the content of privileged communications, or work product, related to personal representation or services by attorneys, psychotherapists, or clergy, and their assistants. Such communications and work product are private and confidential. See User Agreement for details.
        owner: root
        group: root
        mode: '0644'
      when: rhel_10_700040_check.rc != 0

    - name: "RHEL-10-700040 | Re-check /etc/issue content"
      ansible.builtin.command:
        cmd: grep -c "U.S. Government" /etc/issue
      register: rhel_10_700040_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700040 | Assert DOD banner is present in /etc/issue"
      ansible.builtin.assert:
        that: rhel_10_700040_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-700040 detail=The DOD banner is not present in /etc/issue."
        success_msg: "result=PASS stig_id=RHEL-10-700040 detail=The DOD banner is configured in /etc/issue."

  rescue:
    - name: "RHEL-10-700040 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700040 detail=Task failed unexpectedly — see prior error for details."
