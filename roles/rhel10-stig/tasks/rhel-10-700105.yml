---
# =============================================================================
# STIG ID  : RHEL-10-700105
# Rule ID  : SV-281229r1166639_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must prevent code from being executed on file systems that are imported via Network File System (NFS).
#
# Description:
#   The "noexec" mount option causes the system not to execute binary files.
#   This option must be used for mounting any file system not containing
#   approved binary as they may be incompatible. Executing files from
#   untrusted file systems increases the opportunity for nonprivileged users
#   to attain unauthorized administrative access.
#
# Check Text:
#   Note: If no NFS mounts are configured, this requirement is not
#   applicable.
#
#   Verify RHEL 10 has the "noexec" option configured for all NFS mounts with
#   the following command:
#
#   $ sudo grep nfs /etc/fstab
#   192.168.22.2:/mnt/export /data nfs4
#   rw,nosuid,nodev,noexec,sync,soft,sec=krb5:krb5i:krb5p
#
#   If the system is mounting file systems via NFS and the "noexec" option is
#   missing, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to prevent code from being executed on file systems
#   that are imported via NFS.
#
#   Update each NFS mounted file system to use the "noexec" option on file
#   systems that are being imported via NFS.
# =============================================================================

- name: "RHEL-10-700105 | RHEL 10 must prevent code from being executed on file systems that are imported via Network File System (NFS)."
  when: rhel_10_700105 | bool
  tags:
    - RHEL-10-700105
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-700105 | Check for NFS mounts in /etc/fstab"
      ansible.builtin.command:
        cmd: grep -i nfs /etc/fstab
      register: rhel_10_700105_nfs
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700105 | Check for NFS mounts missing noexec"
      ansible.builtin.command:
        cmd: >-
          grep -iP '\snfs\S*\s+\S+\s+(?!.*\bnoexec\b)' /etc/fstab
      register: rhel_10_700105_missing
      changed_when: false
      failed_when: false
      when: rhel_10_700105_nfs.rc == 0

    - name: "RHEL-10-700105 | Assert NFS mounts have noexec or no NFS mounts exist"
      ansible.builtin.assert:
        that: rhel_10_700105_nfs.rc != 0 or rhel_10_700105_missing.rc != 0
        fail_msg: "result=FAIL stig_id=RHEL-10-700105 detail=NFS mount(s) found in /etc/fstab without noexec option. Update /etc/fstab manually."
        success_msg: "result=PASS stig_id=RHEL-10-700105 detail=No NFS mounts found or all NFS mounts have noexec option."

  rescue:
    - name: "RHEL-10-700105 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700105 detail=Task failed unexpectedly — see prior error for details."
