---
# =============================================================================
# STIG ID  : RHEL-10-700125
# Rule ID  : SV-281233r1166651_rule
# Severity : medium
# CCI      : CCI-001764
# Title    : RHEL 10 must prevent files with the "setuid" and "setgid" bit set from being executed on the "/boot" directory.
#
# Description:
#   The "nosuid" mount option causes the system not to execute "setuid" and
#   "setgid" files with owner privileges. This option must be used for
#   mounting any file system not containing approved "setuid" and "setguid"
#   files. Executing files from untrusted file systems increases the
#   opportunity for nonprivileged users to attain unauthorized administrative
#   access.
#
# Check Text:
#   Verify RHEL 10 is configured so that the "/boot" directory is mounted
#   with the "nosuid" option with the following command:
#
#   $ mount | grep '\s/boot\s'
#   /dev/sda1 on /boot type xfs (rw,nodev,nosuid,relatime,seclabel,attr2)
#
#   If the "/boot" file system does not have the "nosuid" option set, this is
#   a finding.
#
# Fix Text:
#   Configure RHEL 10 to prevent files with the "setuid" and "setgid" bit set
#   from being executed on the "/boot" directory.
#
#   Modify "/etc/fstab" to use the "nosuid" option on the "/boot" directory.
#
#   To reload all implicit mount units and update the dependency graph so
#   that new options will apply correctly at next remount, run the following
#   command:
#
#   $ sudo systemctl daemon-reload
#
#   Use the following command to apply the changes immediately without a
#   reboot:
#
#   $ sudo mount -o remount /boot
# =============================================================================

- name: "RHEL-10-700125 | RHEL 10 must prevent files with the setuid and setgid bit set from being executed on the /boot directory."
  when: rhel_10_700125 | bool
  tags:
    - RHEL-10-700125
    - medium
    - CCI-001764
  block:
    - name: "RHEL-10-700125 | Check /boot is mounted with nosuid"
      ansible.builtin.command:
        cmd: findmnt -kn -o OPTIONS /boot
      register: rhel_10_700125_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700125 | Backup /etc/fstab before modification"
      ansible.builtin.copy:
        src: /etc/fstab
        dest: "/etc/fstab.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: "'nosuid' not in (rhel_10_700125_check.stdout | default(''))"

    - name: "RHEL-10-700125 | Add nosuid to /boot mount options in /etc/fstab"
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(\S+\s+/boot\s+\S+\s+)(\S+)(\s+.*)$'
        replace: '\1\2,nosuid\3'
      when: >
        rhel_10_700125_check.rc == 0 and
        'nosuid' not in (rhel_10_700125_check.stdout | default(''))

    - name: "RHEL-10-700125 | Remount /boot to apply nosuid"
      ansible.builtin.command:
        cmd: mount -o remount /boot
      when: >
        rhel_10_700125_check.rc == 0 and
        'nosuid' not in (rhel_10_700125_check.stdout | default(''))
      changed_when: true

    - name: "RHEL-10-700125 | Re-check /boot is mounted with nosuid"
      ansible.builtin.command:
        cmd: findmnt -kn -o OPTIONS /boot
      register: rhel_10_700125_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700125 | Assert /boot is mounted with nosuid"
      ansible.builtin.assert:
        that: >
          rhel_10_700125_verify.rc != 0 or
          'nosuid' in (rhel_10_700125_verify.stdout | default(''))
        fail_msg: "result=FAIL stig_id=RHEL-10-700125 detail=/boot is mounted without the nosuid option."
        success_msg: "result=PASS stig_id=RHEL-10-700125 detail=/boot is mounted with the nosuid option."

  rescue:
    - name: "RHEL-10-700125 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700125 detail=Task failed unexpectedly — see prior error for details."
