---
# =============================================================================
# STIG ID  : RHEL-10-700140
# Rule ID  : SV-281236r1166660_rule
# Severity : medium
# CCI      : CCI-001764
# Title    : RHEL 10 must mount "/dev/shm" with the "noexec" option.
#
# Description:
#   The "noexec" mount option causes the system to not execute binary files.
#   This option must be used for mounting any file system not containing
#   approved binary files, as they may be incompatible. Executing files from
#   untrusted file systems increases the opportunity for nonprivileged users
#   to attain unauthorized administrative access.
#
# Check Text:
#   Verify RHEL 10 is configured so that "/dev/shm" is mounted with the
#   "noexec" option with the following command:
#
#   $ mount | grep /dev/shm
#   tmpfs on /dev/shm type tmpfs (rw,nodev,nosuid,noexec,seclabel)
#
#   If the "/dev/shm" file system is mounted without the "noexec" option,
#   this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to mount "/dev/shm" with the "noexec" option.
#
#   Modify "/etc/fstab" to use the "noexec" option on the "/dev/shm" file
#   system.
#
#   To reload all implicit mount units and update the dependency graph so
#   that new options will apply correctly at next remount, run the following
#   command:
#
#   $ sudo systemctl daemon-reload
#
#   Use the following command to apply the changes immediately without a
#   reboot:
#
#   $ sudo mount -o remount /dev/shm
# =============================================================================

- name: "RHEL-10-700140 | RHEL 10 must mount /dev/shm with the noexec option."
  when: rhel_10_700140 | bool
  tags:
    - RHEL-10-700140
    - medium
    - CCI-001764
  block:
    - name: "RHEL-10-700140 | Check /dev/shm is mounted with noexec"
      ansible.builtin.command:
        cmd: findmnt -kn -o OPTIONS /dev/shm
      register: rhel_10_700140_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700140 | Backup /etc/fstab before modification"
      ansible.builtin.copy:
        src: /etc/fstab
        dest: "/etc/fstab.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: "'noexec' not in (rhel_10_700140_check.stdout | default(''))"

    - name: "RHEL-10-700140 | Ensure /dev/shm entry with noexec exists in /etc/fstab"
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^tmpfs\s+/dev/shm\s+'
        line: 'tmpfs /dev/shm tmpfs defaults,nodev,nosuid,noexec 0 0'
        state: present
        create: false
      when: "'noexec' not in (rhel_10_700140_check.stdout | default(''))"

    - name: "RHEL-10-700140 | Remount /dev/shm to apply noexec"
      ansible.builtin.command:
        cmd: mount -o remount /dev/shm
      when: "'noexec' not in (rhel_10_700140_check.stdout | default(''))"
      changed_when: true

    - name: "RHEL-10-700140 | Re-check /dev/shm is mounted with noexec"
      ansible.builtin.command:
        cmd: findmnt -kn -o OPTIONS /dev/shm
      register: rhel_10_700140_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700140 | Assert /dev/shm is mounted with noexec"
      ansible.builtin.assert:
        that: "'noexec' in (rhel_10_700140_verify.stdout | default(''))"
        fail_msg: "result=FAIL stig_id=RHEL-10-700140 detail=/dev/shm is mounted without the noexec option."
        success_msg: "result=PASS stig_id=RHEL-10-700140 detail=/dev/shm is mounted with the noexec option."

  rescue:
    - name: "RHEL-10-700140 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700140 detail=Task failed unexpectedly — see prior error for details."
