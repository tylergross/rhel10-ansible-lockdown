---
# =============================================================================
# STIG ID  : RHEL-10-700155
# Rule ID  : SV-281239r1166669_rule
# Severity : medium
# CCI      : CCI-001764
# Title    : RHEL 10 must mount "/tmp" with the "noexec" option.
#
# Description:
#   The "noexec" mount option causes the system to not execute binary files.
#   This option must be used for mounting any file system not containing
#   approved binary files, as they may be incompatible. Executing files from
#   untrusted file systems increases the opportunity for nonprivileged users
#   to attain unauthorized administrative access.
#
# Check Text:
#   Verify RHEL 10 is configured so that "/tmp" is mounted with the "noexec"
#   option:
#
#   $ mount | grep /tmp
#   /dev/mapper/luks-c98555c8-0462-4b97-9afa-6db8c4bfee3b on /var/tmp type
#   xfs (rw,nosuid,nodev,noexec,relatime,seclabel,attr2)
#
#   If the "/tmp" file system is mounted without the "noexec" option, this is
#   a finding.
#
# Fix Text:
#   Configure RHEL 10 to mount "/tmp" with the "noexec" option.
#
#   Modify "/etc/fstab" to use the "noexec" option on the "/tmp" directory.
#
#   To reload all implicit mount units and update the dependency graph so
#   that new options will apply correctly at next remount, run the following
#   command:
#
#   $ sudo systemctl daemon-reload
#
#   Use the following command to apply the changes immediately without a
#   reboot:
#
#   $ sudo mount -o remount /tmp
# =============================================================================

- name: "RHEL-10-700155 | RHEL 10 must mount /tmp with the noexec option."
  when: rhel_10_700155 | bool
  tags:
    - RHEL-10-700155
    - medium
    - CCI-001764
  block:
    - name: "RHEL-10-700155 | Check /tmp is mounted with noexec"
      ansible.builtin.command:
        cmd: findmnt -kn -o OPTIONS /tmp
      register: rhel_10_700155_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700155 | Backup /etc/fstab before modification"
      ansible.builtin.copy:
        src: /etc/fstab
        dest: "/etc/fstab.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: "'noexec' not in (rhel_10_700155_check.stdout | default(''))"

    - name: "RHEL-10-700155 | Add noexec to /tmp mount options in /etc/fstab"
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(\S+\s+/tmp\s+\S+\s+)(\S+)(\s+.*)$'
        replace: '\1\2,noexec\3'
      when: >
        rhel_10_700155_check.rc == 0 and
        'noexec' not in (rhel_10_700155_check.stdout | default(''))

    - name: "RHEL-10-700155 | Remount /tmp to apply noexec"
      ansible.builtin.command:
        cmd: mount -o remount /tmp
      when: >
        rhel_10_700155_check.rc == 0 and
        'noexec' not in (rhel_10_700155_check.stdout | default(''))
      changed_when: true

    - name: "RHEL-10-700155 | Re-check /tmp is mounted with noexec"
      ansible.builtin.command:
        cmd: findmnt -kn -o OPTIONS /tmp
      register: rhel_10_700155_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700155 | Assert /tmp is mounted with noexec"
      ansible.builtin.assert:
        that: "'noexec' in (rhel_10_700155_verify.stdout | default(''))"
        fail_msg: "result=FAIL stig_id=RHEL-10-700155 detail=/tmp is mounted without the noexec option."
        success_msg: "result=PASS stig_id=RHEL-10-700155 detail=/tmp is mounted with the noexec option."

  rescue:
    - name: "RHEL-10-700155 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700155 detail=Task failed unexpectedly — see prior error for details."
