---
# =============================================================================
# STIG ID  : RHEL-10-700160
# Rule ID  : SV-281240r1166672_rule
# Severity : medium
# CCI      : CCI-001764
# Title    : RHEL 10 must mount "/tmp" with the "nosuid" option.
#
# Description:
#   The "nosuid" mount option causes the system to not execute "setuid" and
#   "setgid" files with owner privileges. This option must be used for
#   mounting any file system not containing approved "setuid" and "setguid"
#   files. Executing files from untrusted file systems increases the
#   opportunity for nonprivileged users to attain unauthorized administrative
#   access.
#
# Check Text:
#   Verify RHEL 10 is configured so that "/tmp" is mounted with the "nosuid"
#   option:
#
#   $ mount | grep /tmp
#   /dev/mapper/luks-c98555c8-0462-4b97-9afa-6db8c4bfee3b on /var/tmp type
#   xfs (rw,nosuid,nodev,noexec,relatime,seclabel,attr2)
#
#   If the "/tmp" file system is mounted without the "nosuid" option, this is
#   a finding.
#
# Fix Text:
#   Configure RHEL 10 to mount "/tmp" with the "nosuid" option.
#
#   Modify "/etc/fstab" to use the "nosuid" option on the "/tmp" directory.
#
#   To reload all implicit mount units and update the dependency graph so
#   that new options will apply correctly at next remount, run the following
#   command:
#
#   $ sudo systemctl daemon-reload
#
#   Use the following command to apply the changes immediately without a
#   reboot:
#
#   $ sudo mount -o remount /tmp
# =============================================================================

- name: "RHEL-10-700160 | RHEL 10 must mount /tmp with the nosuid option."
  when: rhel_10_700160 | bool
  tags:
    - RHEL-10-700160
    - medium
    - CCI-001764
  block:
    - name: "RHEL-10-700160 | Check /tmp is mounted with nosuid"
      ansible.builtin.command:
        cmd: findmnt -kn -o OPTIONS /tmp
      register: rhel_10_700160_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700160 | Backup /etc/fstab before modification"
      ansible.builtin.copy:
        src: /etc/fstab
        dest: "/etc/fstab.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: "'nosuid' not in (rhel_10_700160_check.stdout | default(''))"

    - name: "RHEL-10-700160 | Add nosuid to /tmp mount options in /etc/fstab"
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(\S+\s+/tmp\s+\S+\s+)(\S+)(\s+.*)$'
        replace: '\1\2,nosuid\3'
      when: >
        rhel_10_700160_check.rc == 0 and
        'nosuid' not in (rhel_10_700160_check.stdout | default(''))

    - name: "RHEL-10-700160 | Remount /tmp to apply nosuid"
      ansible.builtin.command:
        cmd: mount -o remount /tmp
      when: >
        rhel_10_700160_check.rc == 0 and
        'nosuid' not in (rhel_10_700160_check.stdout | default(''))
      changed_when: true

    - name: "RHEL-10-700160 | Re-check /tmp is mounted with nosuid"
      ansible.builtin.command:
        cmd: findmnt -kn -o OPTIONS /tmp
      register: rhel_10_700160_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700160 | Assert /tmp is mounted with nosuid"
      ansible.builtin.assert:
        that: "'nosuid' in (rhel_10_700160_verify.stdout | default(''))"
        fail_msg: "result=FAIL stig_id=RHEL-10-700160 detail=/tmp is mounted without the nosuid option."
        success_msg: "result=PASS stig_id=RHEL-10-700160 detail=/tmp is mounted with the nosuid option."

  rescue:
    - name: "RHEL-10-700160 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700160 detail=Task failed unexpectedly — see prior error for details."
