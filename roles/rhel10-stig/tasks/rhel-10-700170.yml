---
# =============================================================================
# STIG ID  : RHEL-10-700170
# Rule ID  : SV-281242r1166678_rule
# Severity : medium
# CCI      : CCI-001764
# Title    : RHEL 10 must mount "/var/log" with the "nodev" option.
#
# Description:
#   The "nodev" mount option causes the system to not interpret character or
#   block special devices. Executing character or block special devices from
#   untrusted file systems increases the opportunity for nonprivileged users
#   to attain unauthorized administrative access. The only legitimate
#   location for device files is the "/dev" directory located on the root
#   partition, with the exception of chroot jails if implemented.
#
# Check Text:
#   Verify RHEL 10 is configured so that "/var/log" is mounted with the
#   "nodev" option:
#
#   $ mount | grep /var/log
#   /dev/mapper/luks-c651f493-9fdc-4c6e-a711-0a4f03149661 on /var/log type
#   xfs (rw,nosuid,nodev,noexec,relatime,seclabel,attr2)
#
#   If the "/var/log" file system is mounted without the "nodev" option, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to mount "/var/log" with the "nodev" option.
#
#   Modify "/etc/fstab" to use the "nodev" option on the "/var/log"
#   directory.
#
#   To reload all implicit mount units and update the dependency graph so
#   that new options will apply correctly at next remount, run the following
#   command:
#
#   $ sudo systemctl daemon-reload
#
#   Use the following command to apply the changes immediately without a
#   reboot:
#
#   $ sudo mount -o remount /var/log
# =============================================================================

- name: "RHEL-10-700170 | RHEL 10 must mount /var/log with the nodev option."
  when: rhel_10_700170 | bool
  tags:
    - RHEL-10-700170
    - medium
    - CCI-001764
  block:
    - name: "RHEL-10-700170 | Check /var/log is mounted with nodev"
      ansible.builtin.command:
        cmd: findmnt -kn -o OPTIONS /var/log
      register: rhel_10_700170_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700170 | Backup /etc/fstab before modification"
      ansible.builtin.copy:
        src: /etc/fstab
        dest: "/etc/fstab.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: >
        rhel_10_700170_check.rc == 0 and
        'nodev' not in (rhel_10_700170_check.stdout | default(''))

    - name: "RHEL-10-700170 | Add nodev to /var/log mount options in /etc/fstab"
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(\S+\s+/var/log\s+\S+\s+)(\S+)(\s+.*)$'
        replace: '\1\2,nodev\3'
      when: >
        rhel_10_700170_check.rc == 0 and
        'nodev' not in (rhel_10_700170_check.stdout | default(''))

    - name: "RHEL-10-700170 | Remount /var/log to apply nodev"
      ansible.builtin.command:
        cmd: mount -o remount /var/log
      when: >
        rhel_10_700170_check.rc == 0 and
        'nodev' not in (rhel_10_700170_check.stdout | default(''))
      changed_when: true

    - name: "RHEL-10-700170 | Re-check /var/log is mounted with nodev"
      ansible.builtin.command:
        cmd: findmnt -kn -o OPTIONS /var/log
      register: rhel_10_700170_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700170 | Assert /var/log is mounted with nodev"
      ansible.builtin.assert:
        that: >
          rhel_10_700170_verify.rc != 0 or
          'nodev' in (rhel_10_700170_verify.stdout | default(''))
        fail_msg: "result=FAIL stig_id=RHEL-10-700170 detail=/var/log is mounted without the nodev option."
        success_msg: "result=PASS stig_id=RHEL-10-700170 detail=/var/log is mounted with the nodev option."

  rescue:
    - name: "RHEL-10-700170 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700170 detail=Task failed unexpectedly — see prior error for details."
