---
# =============================================================================
# STIG ID  : RHEL-10-700175
# Rule ID  : SV-281243r1166681_rule
# Severity : medium
# CCI      : CCI-001764
# Title    : RHEL 10 must mount "/var/log" with the "noexec" option.
#
# Description:
#   The "noexec" mount option causes the system to not execute binary files.
#   This option must be used for mounting any file system not containing
#   approved binary files, as they may be incompatible. Executing files from
#   untrusted file systems increases the opportunity for nonprivileged users
#   to attain unauthorized administrative access.
#
# Check Text:
#   Verify RHEL 10 is configured so that "/var/log" is mounted with the
#   "noexec" option:
#
#   $ mount | grep /var/log
#   /dev/mapper/luks-c651f493-9fdc-4c6e-a711-0a4f03149661 on /var/log type
#   xfs (rw,nosuid,nodev,noexec,relatime,seclabel,attr2)
#
#   If the "/var/log" file system is mounted without the "noexec" option,
#   this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to mount "/var/log" with the "noexec" option.
#
#   Modify "/etc/fstab" to use the "noexec" option on the "/var/log"
#   directory.
#
#   To reload all implicit mount units and update the dependency graph so
#   that new options will apply correctly at next remount, run the following
#   command:
#
#   $ sudo systemctl daemon-reload
#
#   Use the following command to apply the changes immediately without a
#   reboot:
#
#   $ sudo mount -o remount /var/log
# =============================================================================

- name: "RHEL-10-700175 | RHEL 10 must mount /var/log with the noexec option."
  when: rhel_10_700175 | bool
  tags:
    - RHEL-10-700175
    - medium
    - CCI-001764
  block:
    - name: "RHEL-10-700175 | Check /var/log is mounted with noexec"
      ansible.builtin.command:
        cmd: findmnt -kn -o OPTIONS /var/log
      register: rhel_10_700175_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700175 | Backup /etc/fstab before modification"
      ansible.builtin.copy:
        src: /etc/fstab
        dest: "/etc/fstab.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: >
        rhel_10_700175_check.rc == 0 and
        'noexec' not in (rhel_10_700175_check.stdout | default(''))

    - name: "RHEL-10-700175 | Add noexec to /var/log mount options in /etc/fstab"
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(\S+\s+/var/log\s+\S+\s+)(\S+)(\s+.*)$'
        replace: '\1\2,noexec\3'
      when: >
        rhel_10_700175_check.rc == 0 and
        'noexec' not in (rhel_10_700175_check.stdout | default(''))

    - name: "RHEL-10-700175 | Remount /var/log to apply noexec"
      ansible.builtin.command:
        cmd: mount -o remount /var/log
      when: >
        rhel_10_700175_check.rc == 0 and
        'noexec' not in (rhel_10_700175_check.stdout | default(''))
      changed_when: true

    - name: "RHEL-10-700175 | Re-check /var/log is mounted with noexec"
      ansible.builtin.command:
        cmd: findmnt -kn -o OPTIONS /var/log
      register: rhel_10_700175_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700175 | Assert /var/log is mounted with noexec"
      ansible.builtin.assert:
        that: >
          rhel_10_700175_verify.rc != 0 or
          'noexec' in (rhel_10_700175_verify.stdout | default(''))
        fail_msg: "result=FAIL stig_id=RHEL-10-700175 detail=/var/log is mounted without the noexec option."
        success_msg: "result=PASS stig_id=RHEL-10-700175 detail=/var/log is mounted with the noexec option."

  rescue:
    - name: "RHEL-10-700175 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700175 detail=Task failed unexpectedly — see prior error for details."
