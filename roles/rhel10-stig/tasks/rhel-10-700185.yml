---
# =============================================================================
# STIG ID  : RHEL-10-700185
# Rule ID  : SV-281245r1166687_rule
# Severity : medium
# CCI      : CCI-001764
# Title    : RHEL 10 must mount "/var/tmp" with the "nodev" option.
#
# Description:
#   The "nodev" mount option causes the system to not interpret character or
#   block special devices. Executing character or block special devices from
#   untrusted file systems increases the opportunity for nonprivileged users
#   to attain unauthorized administrative access. The only legitimate
#   location for device files is the "/dev" directory located on the root
#   partition, with the exception of chroot jails if implemented.
#
# Check Text:
#   Verify RHEL 10 is configured so that "/var/tmp" is mounted with the
#   "nodev" option:
#
#   $ mount | grep /var/tmp
#   /dev/mapper/luks-c98555c8-0462-4b97-9afa-6db8c4bfee3b on /var/tmp type
#   xfs (rw,nosuid,nodev,noexec,relatime,seclabel,attr2)
#
#   If the "/var/tmp" file system is mounted without the "nodev" option, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to mount "/var/tmp" with the "nodev" option.
#
#   Modify "/etc/fstab" to use the "nodev" option on the "/var/tmp"
#   directory.
#
#   To reload all implicit mount units and update the dependency graph so
#   that new options will apply correctly at next remount, run the following
#   command:
#
#   $ sudo systemctl daemon-reload
#
#   Use the following command to apply the changes immediately without a
#   reboot:
#
#   $ sudo mount -o remount /var/tmp
# =============================================================================

- name: "RHEL-10-700185 | RHEL 10 must mount /var/tmp with the nodev option."
  when: rhel_10_700185 | bool
  tags:
    - RHEL-10-700185
    - medium
    - CCI-001764
  block:
    - name: "RHEL-10-700185 | Check /var/tmp is mounted with nodev"
      ansible.builtin.command:
        cmd: findmnt -kn -o OPTIONS /var/tmp
      register: rhel_10_700185_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700185 | Backup /etc/fstab before modification"
      ansible.builtin.copy:
        src: /etc/fstab
        dest: "/etc/fstab.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: >
        rhel_10_700185_check.rc == 0 and
        'nodev' not in (rhel_10_700185_check.stdout | default(''))

    - name: "RHEL-10-700185 | Add nodev to /var/tmp mount options in /etc/fstab"
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(\S+\s+/var/tmp\s+\S+\s+)(\S+)(\s+.*)$'
        replace: '\1\2,nodev\3'
      when: >
        rhel_10_700185_check.rc == 0 and
        'nodev' not in (rhel_10_700185_check.stdout | default(''))

    - name: "RHEL-10-700185 | Remount /var/tmp to apply nodev"
      ansible.builtin.command:
        cmd: mount -o remount /var/tmp
      when: >
        rhel_10_700185_check.rc == 0 and
        'nodev' not in (rhel_10_700185_check.stdout | default(''))
      changed_when: true

    - name: "RHEL-10-700185 | Re-check /var/tmp is mounted with nodev"
      ansible.builtin.command:
        cmd: findmnt -kn -o OPTIONS /var/tmp
      register: rhel_10_700185_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700185 | Assert /var/tmp is mounted with nodev"
      ansible.builtin.assert:
        that: >
          rhel_10_700185_verify.rc != 0 or
          'nodev' in (rhel_10_700185_verify.stdout | default(''))
        fail_msg: "result=FAIL stig_id=RHEL-10-700185 detail=/var/tmp is mounted without the nodev option."
        success_msg: "result=PASS stig_id=RHEL-10-700185 detail=/var/tmp is mounted with the nodev option."

  rescue:
    - name: "RHEL-10-700185 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700185 detail=Task failed unexpectedly — see prior error for details."
