---
# =============================================================================
# STIG ID  : RHEL-10-700400
# Rule ID  : SV-281249r1197242_rule
# Severity : medium
# CCI      : CCI-002696
# Title    : RHEL 10 must enable the SELinux targeted policy.
#
# Description:
#   Setting the SELinux policy to "targeted" or a more specialized policy
#   ensures the system will confine processes that are likely to be targeted
#   for exploitation, such as network or system services. Note: During the
#   development or debugging of SELinux modules, it is common to temporarily
#   place nonproduction systems in "permissive" mode. In such temporary
#   cases, SELinux policies should be developed, and once work is completed,
#   the system should be reconfigured to "targeted".
#
# Check Text:
#   Verify RHEL 10 SELINUX is using the targeted policy with the following
#   command:
#
#   $ sestatus | grep policy
#   Loaded policy name: targeted
#
#   If the loaded policy name is not "targeted", this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to use the targeted SELINUX policy.
#
#   Edit the file "/etc/selinux/config" and add or modify the following line:
#
#   SELINUXTYPE=targeted
#
#   A reboot is required for the changes to take effect.
# =============================================================================

- name: "RHEL-10-700400 | RHEL 10 must enable the SELinux targeted policy."
  when: rhel_10_700400 | bool
  tags:
    - RHEL-10-700400
    - medium
    - CCI-002696
  block:
    - name: "RHEL-10-700400 | Check current SELinux policy type"
      ansible.builtin.command:
        cmd: sestatus
      register: rhel_10_700400_sestatus
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700400 | Backup /etc/selinux/config before modification"
      ansible.builtin.copy:
        src: /etc/selinux/config
        dest: "/etc/selinux/config.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: "'targeted' not in (rhel_10_700400_sestatus.stdout | lower)"

    - name: "RHEL-10-700400 | Set SELINUXTYPE=targeted in /etc/selinux/config"
      ansible.builtin.lineinfile:
        path: /etc/selinux/config
        regexp: '^#?SELINUXTYPE='
        line: 'SELINUXTYPE=targeted'
        state: present
      when: "'targeted' not in (rhel_10_700400_sestatus.stdout | lower)"

    - name: "RHEL-10-700400 | Re-check SELinux policy type"
      ansible.builtin.command:
        cmd: sestatus
      register: rhel_10_700400_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700400 | Assert SELinux targeted policy is loaded"
      ansible.builtin.assert:
        that: "'targeted' in rhel_10_700400_verify.stdout | lower"
        fail_msg: "result=FAIL stig_id=RHEL-10-700400 detail=SELinux targeted policy is not loaded (a reboot may be required)."
        success_msg: "result=PASS stig_id=RHEL-10-700400 detail=SELinux targeted policy is enabled."

  rescue:
    - name: "RHEL-10-700400 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700400 detail=Task failed unexpectedly — see prior error for details."
