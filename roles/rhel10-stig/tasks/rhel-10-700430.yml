---
# =============================================================================
# STIG ID  : RHEL-10-700430
# Rule ID  : SV-281252r1166708_rule
# Severity : medium
# CCI      : CCI-000044
# Title    : RHEL 10 must configure SELinux context type to allow the use of a nondefault faillock tally directory.
#
# Description:
#   Not having the correct SELinux context on the faillock directory may lead
#   to unauthorized access to the directory.
#
# Check Text:
#   Note: If the system does not have SELinux enabled and enforcing a
#   targeted policy, or if the pam_faillock module is not configured for use,
#   this requirement is not applicable.
#
#   Verify RHEL 10 SELinux context type allows the use of a nondefault
#   faillock tally directory.
#
#   Verify the location of the nondefault tally directory for the
#   pam_faillock module with the following command:
#
#   $ sudo grep -w dir /etc/security/faillock.conf
#   dir = /var/log/faillock
#
#   Check the security context type of the nondefault tally directory with
#   the following command:
#
#   $ ls -Zd /var/log/faillock
#   unconfined_u:object_r:faillog_t:s0 /var/log/faillock
#
#   If the security context type of the nondefault tally directory is not
#   "faillog_t", this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to allow the use of a nondefault faillock tally
#   directory while SELinux enforces a targeted policy.
#
#   Enable the feature using the following command:
#
#   $ sudo authselect enable-feature with-faillock
#
#   Create a nondefault faillock tally directory (if it does not already
#   exist) with the following example:
#
#   $ sudo mkdir /var/log/faillock
#
#   Add/modify the "/etc/security/faillock.conf" file to match the following
#   line:
#
#   dir = /var/log/faillock
#
#   Update "/etc/selinux/targeted/contexts/files/file_contexts.local" with
#   "faillog_t" context type for the nondefault faillock tally directory with
#   the following command:
#
#   $ sudo semanage fcontext -a -t faillog_t "/var/log/faillock(/.*)?"
#
#   Update the context type of the nondefault faillock
#   directory/subdirectories and files with the following command:
#
#   $ sudo restorecon -R -v /var/log/faillock
# =============================================================================

- name: "RHEL-10-700430 | RHEL 10 must configure SELinux context type to allow the use of a nondefault faillock tally directory."
  when: rhel_10_700430 | bool
  tags:
    - RHEL-10-700430
    - medium
    - CCI-000044
  block:
    - name: "RHEL-10-700430 | Check if faillock nondefault dir is configured"
      ansible.builtin.command:
        cmd: grep -w dir /etc/security/faillock.conf
      register: rhel_10_700430_dir
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700430 | Check SELinux context of faillock tally directory"
      ansible.builtin.command:
        cmd: ls -Zd /var/log/faillock
      register: rhel_10_700430_context
      changed_when: false
      failed_when: false
      when: rhel_10_700430_dir.rc == 0

    - name: "RHEL-10-700430 | Create faillock tally directory if missing"
      ansible.builtin.file:
        path: /var/log/faillock
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: >
        rhel_10_700430_dir.rc == 0 and
        rhel_10_700430_context.rc != 0

    - name: "RHEL-10-700430 | Set faillog_t SELinux context on faillock directory"
      ansible.builtin.command:
        cmd: semanage fcontext -a -t faillog_t "/var/log/faillock(/.*)?"
      register: rhel_10_700430_semanage
      changed_when: rhel_10_700430_semanage.rc == 0
      failed_when: false
      when: >
        rhel_10_700430_dir.rc == 0 and
        'faillog_t' not in (rhel_10_700430_context.stdout | default(''))

    - name: "RHEL-10-700430 | Apply SELinux context with restorecon"
      ansible.builtin.command:
        cmd: restorecon -R -v /var/log/faillock
      changed_when: true
      failed_when: false
      when: >
        rhel_10_700430_dir.rc == 0 and
        'faillog_t' not in (rhel_10_700430_context.stdout | default(''))

    - name: "RHEL-10-700430 | Re-check SELinux context of faillock directory"
      ansible.builtin.command:
        cmd: ls -Zd /var/log/faillock
      register: rhel_10_700430_verify
      changed_when: false
      failed_when: false
      when: rhel_10_700430_dir.rc == 0

    - name: "RHEL-10-700430 | Assert faillock directory has faillog_t context or no nondefault dir"
      ansible.builtin.assert:
        that: >
          rhel_10_700430_dir.rc != 0 or
          'faillog_t' in (rhel_10_700430_verify.stdout | default(''))
        fail_msg: "result=FAIL stig_id=RHEL-10-700430 detail=The faillock tally directory does not have the faillog_t SELinux context type."
        success_msg: "result=PASS stig_id=RHEL-10-700430 detail=The faillock tally directory has the faillog_t SELinux context or no nondefault dir is configured."

  rescue:
    - name: "RHEL-10-700430 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700430 detail=Task failed unexpectedly — see prior error for details."
