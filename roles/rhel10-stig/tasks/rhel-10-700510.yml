---
# =============================================================================
# STIG ID  : RHEL-10-700510
# Rule ID  : SV-281254r1184754_rule
# Severity : medium
# CCI      : CCI-001813
# Title    : RHEL 10 must be configured so that the Secure Shell (SSH) daemon does not allow Generic Security Service Application Program Interface (GSSAPI) authentication.
#
# Description:
#   GSSAPI authentication is used to provide additional authentication
#   mechanisms to applications. Allowing GSSAPI authentication through SSH
#   exposes the system's GSSAPI to remote hosts, increasing the attack
#   surface of the system. OpenSSH uses the first occurrence of a keyword it
#   sees, and drop-in files are read in lexicographical order at the start of
#   the configuration. Red Hat recommends using drop-in files rather than
#   changing base configuration files.
#
# Check Text:
#   Verify RHEL 10 SSH daemons do not allow GSSAPI authentication with the
#   following command:
#
#   $ sudo /usr/sbin/sshd -dd 2>&1 | awk '/filename/ {print $4}' | tr -d '\r'
#   | tr '\n' ' ' | xargs sudo grep -iH '^\s*gssapiauthentication'
#   /etc/ssh/sshd_config.d/10-stig.conf:GSSAPIAuthentication no
#   /etc/ssh/sshd_config.d/50-redhat.conf:GSSAPIAuthentication yes
#
#   Verify the runtime setting with the following command:
#
#   $ sudo sshd -T | grep -i gssapiauthentication
#   gssapiauthentication no
#
#   If the "GSSAPIAuthentication" keyword is not set to "no" in a drop-in
#   that lexicographically precedes 50-redhat.conf, no output is returned,
#   and the use of GSSAPI authentication has not been documented with the
#   information system security officer, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 SSH daemons to not allow GSSAPI authentication.
#
#   In "/etc/ssh/sshd_config.d", create a drop file that will
#   lexicographically precede 50-redhat.conf and add the following line:
#
#   GSSAPIAuthentication no
#
#   Restart the SSH service with the following command for the changes to
#   take effect:
#
#   $ sudo systemctl restart sshd.service
# =============================================================================

- name: "RHEL-10-700510 | RHEL 10 must be configured so that the Secure Shell (SSH) daemon does not allow Generic Security Service Application Program Interface (GSSAPI) authentication."
  when: rhel_10_700510 | bool
  tags:
    - RHEL-10-700510
    - medium
    - CCI-001813
  block:
    - name: "RHEL-10-700510 | Check GSSAPIAuthentication in sshd runtime config"
      ansible.builtin.command:
        cmd: sshd -T
      register: rhel_10_700510_runtime
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700510 | Set GSSAPIAuthentication no in /etc/ssh/sshd_config.d/10-stig.conf"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config.d/10-stig.conf
        regexp: '^#?GSSAPIAuthentication'
        line: 'GSSAPIAuthentication no'
        state: present
        create: true
        mode: '0600'
        owner: root
        group: root
      when: "'gssapiauthentication no' not in rhel_10_700510_runtime.stdout | lower"
      notify: restart sshd

    - name: "RHEL-10-700510 | Re-check GSSAPIAuthentication in sshd runtime config"
      ansible.builtin.command:
        cmd: sshd -T
      register: rhel_10_700510_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700510 | Assert GSSAPIAuthentication is set to no"
      ansible.builtin.assert:
        that: "'gssapiauthentication no' in rhel_10_700510_verify.stdout | lower"
        fail_msg: "result=FAIL stig_id=RHEL-10-700510 detail=sshd runtime config does not have GSSAPIAuthentication no."
        success_msg: "result=PASS stig_id=RHEL-10-700510 detail=sshd GSSAPIAuthentication is set to no."

  rescue:
    - name: "RHEL-10-700510 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700510 detail=Task failed unexpectedly — see prior error for details."
