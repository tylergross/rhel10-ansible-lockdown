---
# =============================================================================
# STIG ID  : RHEL-10-700520
# Rule ID  : SV-281255r1184755_rule
# Severity : medium
# CCI      : CCI-001813
# Title    : RHEL 10 must be configured so that the Secure Shell (SSH) daemon does not allow Kerberos authentication.
#
# Description:
#   Kerberos authentication for SSH is often implemented using Generic
#   Security Service Application Program Interface (GSSAPI). If Kerberos is
#   enabled through SSH, the SSH daemon provides a means of access to the
#   system's Kerberos implementation. Vulnerabilities in the system's
#   Kerberos implementations may be subject to exploitation. OpenSSH uses the
#   first occurrence of a keyword it sees, and drop-in files are read in
#   lexicographical order at the start of the configuration. Red Hat
#   recommends using drop-in files rather than changing base configuration
#   files.
#
# Check Text:
#   Verify RHEL 10 SSH daemons do not allow Kerberos authentication with the
#   following command:
#
#   $ sudo /usr/sbin/sshd -dd 2>&1 | awk '/filename/ {print $4}' | tr -d '\r'
#   | tr '\n' ' ' | xargs sudo grep -iH '^\s*kerberosauthentication'
#   /etc/ssh/sshd_config.d/10-stig.conf:KerberosAuthentication no
#
#   Verify the runtime setting with the following command:
#
#   $ sudo sshd -T | grep -i kerberosauthentication
#   kerberosauthentication no
#
#   If the "KerberosAuthentication" keyword is not set to "no" in a drop-in
#   that lexicographically precedes 50-redhat.conf, no output is returned,
#   and the use of Kerberos authentication has not been documented with the
#   information system security officer, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 SSH daemons to not allow Kerberos authentication.
#
#   In "/etc/ssh/sshd_config.d", create a drop file that will
#   lexicographically precede 50-redhat.conf and add the following line:
#
#   KerberosAuthentication no
#
#   Restart the SSH service with the following command for the changes to
#   take effect:
#
#   $ sudo systemctl restart sshd.service
# =============================================================================

- name: "RHEL-10-700520 | RHEL 10 must be configured so that the Secure Shell (SSH) daemon does not allow Kerberos authentication."
  when: rhel_10_700520 | bool
  tags:
    - RHEL-10-700520
    - medium
    - CCI-001813
  block:
    - name: "RHEL-10-700520 | Check KerberosAuthentication in sshd runtime config"
      ansible.builtin.command:
        cmd: sshd -T
      register: rhel_10_700520_runtime
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700520 | Set KerberosAuthentication no in /etc/ssh/sshd_config.d/10-stig.conf"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config.d/10-stig.conf
        regexp: '^#?KerberosAuthentication'
        line: 'KerberosAuthentication no'
        state: present
        create: true
        mode: '0600'
        owner: root
        group: root
      when: "'kerberosauthentication no' not in rhel_10_700520_runtime.stdout | lower"
      notify: restart sshd

    - name: "RHEL-10-700520 | Re-check KerberosAuthentication in sshd runtime config"
      ansible.builtin.command:
        cmd: sshd -T
      register: rhel_10_700520_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700520 | Assert KerberosAuthentication is set to no"
      ansible.builtin.assert:
        that: "'kerberosauthentication no' in rhel_10_700520_verify.stdout | lower"
        fail_msg: "result=FAIL stig_id=RHEL-10-700520 detail=sshd runtime config does not have KerberosAuthentication no."
        success_msg: "result=PASS stig_id=RHEL-10-700520 detail=sshd KerberosAuthentication is set to no."

  rescue:
    - name: "RHEL-10-700520 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700520 detail=Task failed unexpectedly — see prior error for details."
