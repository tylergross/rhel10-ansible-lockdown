---
# =============================================================================
# STIG ID  : RHEL-10-700540
# Rule ID  : SV-281257r1184757_rule
# Severity : medium
# CCI      : CCI-002696
# Title    : RHEL 10 must be configured so that the Secure Shell (SSH) daemon does not allow known hosts authentication.
#
# Description:
#   Configuring the "IgnoreUserKnownHosts" setting for the SSH daemon
#   provides additional assurance that remote login via SSH will require a
#   password, even in the event of misconfiguration elsewhere. OpenSSH uses
#   the first occurrence of a keyword it sees, and drop-in files are read in
#   lexicographical order at the start of the configuration. Red Hat
#   recommends using drop-in files rather than changing base configuration
#   files.
#
# Check Text:
#   Verify RHEL 10 SSH daemons do not allow known hosts authentication with
#   the following command:
#
#   $ sudo /usr/sbin/sshd -dd 2>&1 | awk '/filename/ {print $4}' | tr -d '\r'
#   | tr '\n' ' ' | xargs sudo grep -iH '^\s*ignoreuserknownhosts'
#   /etc/ssh/sshd_config.d/10-stig.conf:IgnoreUserKnownHosts yes
#
#   Verify the runtime setting with the following command:
#
#   $ sudo sshd -T | grep -i ignoreuserknownhosts
#   ignoreuserknownhosts yes
#
#   If the "IgnoreUserKnownHosts" keyword is not set to "yes" in a drop-in
#   that lexicographically precedes 50-redhat.conf, or if no output is
#   returned, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 SSH daemons to not allow known hosts authentication.
#
#   In "/etc/ssh/sshd_config.d", create a drop file that will
#   lexicographically precede 50-redhat.conf and add the following line:
#
#   IgnoreUserKnownHosts yes
#
#   Restart the SSH service with the following command for the changes to
#   take effect:
#
#   $ sudo systemctl restart sshd.service
# =============================================================================

- name: "RHEL-10-700540 | RHEL 10 must be configured so that the Secure Shell (SSH) daemon does not allow known hosts authentication."
  when: rhel_10_700540 | bool
  tags:
    - RHEL-10-700540
    - medium
    - CCI-002696
  block:
    - name: "RHEL-10-700540 | Check IgnoreUserKnownHosts in sshd runtime config"
      ansible.builtin.command:
        cmd: sshd -T
      register: rhel_10_700540_runtime
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700540 | Set IgnoreUserKnownHosts yes in /etc/ssh/sshd_config.d/10-stig.conf"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config.d/10-stig.conf
        regexp: '^#?IgnoreUserKnownHosts'
        line: 'IgnoreUserKnownHosts yes'
        state: present
        create: true
        mode: '0600'
        owner: root
        group: root
      when: "'ignoreuserknownhosts yes' not in rhel_10_700540_runtime.stdout | lower"
      notify: restart sshd

    - name: "RHEL-10-700540 | Re-check IgnoreUserKnownHosts in sshd runtime config"
      ansible.builtin.command:
        cmd: sshd -T
      register: rhel_10_700540_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700540 | Assert IgnoreUserKnownHosts is set to yes"
      ansible.builtin.assert:
        that: "'ignoreuserknownhosts yes' in rhel_10_700540_verify.stdout | lower"
        fail_msg: "result=FAIL stig_id=RHEL-10-700540 detail=sshd runtime config does not have IgnoreUserKnownHosts yes."
        success_msg: "result=PASS stig_id=RHEL-10-700540 detail=sshd IgnoreUserKnownHosts is set to yes."

  rescue:
    - name: "RHEL-10-700540 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700540 detail=Task failed unexpectedly — see prior error for details."
