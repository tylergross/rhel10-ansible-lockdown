---
# =============================================================================
# STIG ID  : RHEL-10-700580
# Rule ID  : SV-281261r1184761_rule
# Severity : medium
# CCI      : CCI-002696
# Title    : RHEL 10 must be configured so that the Secure Shell (SSH) daemon prevents remote hosts from connecting to the proxy display.
#
# Description:
#   When X11 forwarding is enabled, there may be additional exposure to the
#   server and client displays if the sshd proxy display is configured to
#   listen on the wildcard address. By default, sshd binds the forwarding
#   server to the loopback address and sets the hostname part of the
#   "DISPLAY" environment variable to localhost. This prevents remote hosts
#   from connecting to the proxy display. OpenSSH uses the first occurrence
#   of a keyword it sees, and drop-in files are read in lexicographical order
#   at the start of the configuration. Red Hat recommends using drop-in files
#   rather than changing base configuration files.
#
# Check Text:
#   Verify RHEL 10 SSH daemons prevent remote hosts from connecting to the
#   proxy display with the following command:
#
#   $ sudo /usr/sbin/sshd -dd 2>&1 | awk '/filename/ {print $4}' | tr -d '\r'
#   | tr '\n' ' ' | xargs sudo grep -iH '^\s*x11uselocalhost'
#   /etc/ssh/sshd_config.d/10-stig.conf:X11UseLocalhost yes
#
#   Verify the runtime setting with the following command:
#
#   $ sudo sshd -T | grep -i x11uselocalhost
#   x11uselocalhost yes
#
#   If the "X11UseLocalhost" keyword is not set to "yes" in a drop-in that
#   lexicographically precedes 50-redhat.conf, or if no output is returned,
#   this is a finding.
#
# Fix Text:
#   Configure RHEL 10 SSH daemons to prevent remote hosts from connecting to
#   the proxy display.
#
#   In "/etc/ssh/sshd_config.d", create a drop file that will
#   lexicographically precede 50-redhat.conf and add the following line:
#
#   X11UseLocalhost yes
#
#   Restart the SSH service with the following command for the changes to
#   take effect:
#
#   $ sudo systemctl restart sshd.service
# =============================================================================

- name: "RHEL-10-700580 | RHEL 10 must be configured so that the Secure Shell (SSH) daemon prevents remote hosts from connecting to the proxy display."
  when: rhel_10_700580 | bool
  tags:
    - RHEL-10-700580
    - medium
    - CCI-002696
  block:
    - name: "RHEL-10-700580 | Check X11UseLocalhost in sshd runtime config"
      ansible.builtin.command:
        cmd: sshd -T
      register: rhel_10_700580_runtime
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700580 | Set X11Forwarding in /etc/ssh/sshd_config.d/10-stig.conf"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config.d/10-stig.conf
        regexp: '^#?X11Forwarding'
        line: "X11Forwarding {{ 'yes' if rhel_10_700580_x11_forwarding | bool else 'no' }}"
        state: present
        create: true
        mode: '0600'
        owner: root
        group: root
      notify: restart sshd

    - name: "RHEL-10-700580 | Set X11UseLocalhost yes when X11 forwarding is enabled"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config.d/10-stig.conf
        regexp: '^#?X11UseLocalhost'
        line: 'X11UseLocalhost yes'
        state: present
      when: rhel_10_700580_x11_forwarding | bool
      notify: restart sshd

    - name: "RHEL-10-700580 | Re-check X11 settings in sshd runtime config"
      ansible.builtin.command:
        cmd: sshd -T
      register: rhel_10_700580_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700580 | Assert X11UseLocalhost is yes when forwarding enabled"
      ansible.builtin.assert:
        that: >
          (not rhel_10_700580_x11_forwarding | bool) or
          ('x11uselocalhost yes' in rhel_10_700580_verify.stdout | lower)
        fail_msg: "result=FAIL stig_id=RHEL-10-700580 detail=X11 forwarding is enabled but X11UseLocalhost is not set to yes in sshd runtime config."
        success_msg: "result=PASS stig_id=RHEL-10-700580 detail=X11 forwarding configuration is correct (forwarding={{ rhel_10_700580_x11_forwarding }}, X11UseLocalhost enforced)."

  rescue:
    - name: "RHEL-10-700580 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700580 detail=Task failed unexpectedly — see prior error for details."
