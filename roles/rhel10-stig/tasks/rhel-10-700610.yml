---
# =============================================================================
# STIG ID  : RHEL-10-700610
# Rule ID  : SV-281264r1184764_rule
# Severity : medium
# CCI      : CCI-000766
# Title    : RHEL 10 must be configured so that SSHD does not allow blank passwords.
#
# Description:
#   If an account has an empty password, anyone could log in and run commands
#   with the privileges of that account. Accounts with empty passwords should
#   never be used in operational environments. OpenSSH uses the first
#   occurrence of a keyword it sees, and drop-in files are read in
#   lexicographical order at the start of the configuration. Red Hat
#   recommends using drop-in files rather than changing base configuration
#   files. Satisfies: SRG-OS-000106-GPOS-00053, SRG-OS-000480-GPOS-00229
#
# Check Text:
#   Verify RHEL 10 remote access using SSH prevents logging on with a blank
#   password with the following command:
#
#   $ sudo /usr/sbin/sshd -dd 2>&1 | awk '/filename/ {print $4}' | tr -d '\r'
#   | tr '\n' ' ' | xargs sudo grep -iH '^\s*permitemptypasswords'
#   /etc/ssh/sshd_config.d/10-stig.conf:PermitEmptyPasswords no
#
#   Verify the runtime setting with the following command:
#
#   $ sudo sshd -T | grep -i permitemptypasswords
#   permitemptypasswords no
#
#   If the "PermitEmptyPasswords" keyword is not set to "no" in a drop-in
#   that lexicographically precedes 50-redhat.conf, or if no output is
#   returned, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to prevent SSH users from logging on with blank
#   passwords.
#
#   In "/etc/ssh/sshd_config.d", create a drop file that will
#   lexicographically precede 50-redhat.conf and add the following line:
#
#   PermitEmptyPasswords no
#
#   Restart the SSH daemon with the following command for the settings to
#   take effect:
#
#   $ sudo systemctl restart sshd.service
# =============================================================================

- name: "RHEL-10-700610 | RHEL 10 must be configured so that SSHD does not allow blank passwords."
  when: rhel_10_700610 | bool
  tags:
    - RHEL-10-700610
    - medium
    - CCI-000766
  block:
    - name: "RHEL-10-700610 | Check PermitEmptyPasswords in sshd runtime config"
      ansible.builtin.command:
        cmd: sshd -T
      register: rhel_10_700610_runtime
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700610 | Set PermitEmptyPasswords in /etc/ssh/sshd_config.d/10-stig.conf"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config.d/10-stig.conf
        regexp: '^#?PermitEmptyPasswords'
        line: 'PermitEmptyPasswords no'
        state: present
        create: true
        mode: '0600'
        owner: root
        group: root
      when: "'permitemptypasswords no' not in rhel_10_700610_runtime.stdout | lower"
      notify: restart sshd

    - name: "RHEL-10-700610 | Re-check PermitEmptyPasswords in sshd runtime config"
      ansible.builtin.command:
        cmd: sshd -T
      register: rhel_10_700610_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700610 | Assert PermitEmptyPasswords is set to no"
      ansible.builtin.assert:
        that: "'permitemptypasswords no' in rhel_10_700610_verify.stdout | lower"
        fail_msg: "result=FAIL stig_id=RHEL-10-700610 detail=sshd runtime does not have PermitEmptyPasswords no."
        success_msg: "result=PASS stig_id=RHEL-10-700610 detail=sshd PermitEmptyPasswords is set to no."

  rescue:
    - name: "RHEL-10-700610 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700610 detail=Task failed unexpectedly — see prior error for details."
