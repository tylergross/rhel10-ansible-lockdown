---
# =============================================================================
# STIG ID  : RHEL-10-700640
# Rule ID  : SV-281267r1184767_rule
# Severity : high
# CCI      : CCI-000381
# Title    : RHEL 10 must not allow users to override Secure Shell (SSH) environment variables.
#
# Description:
#   SSH environment options potentially allow users to bypass access
#   restriction in some configurations. OpenSSH uses the first occurrence of
#   a keyword it sees, and drop-in files are read in lexicographical order at
#   the start of the configuration. Red Hat recommends using drop-in files
#   rather than changing base configuration files.
#
# Check Text:
#   Verify RHEL 10 disables unattended or automatic login via SSH with the
#   following command:
#
#   $ sudo /usr/sbin/sshd -dd 2>&1 | awk '/filename/ {print $4}' | tr -d '\r'
#   | tr '\n' ' ' | xargs sudo grep -iH '^\s*permituserenvironment'
#   /etc/ssh/sshd_config.d/10-stig.conf:PermitUserEnvironment no
#
#   Verify the runtime setting with the following command:
#
#   $ sudo sshd -T | grep -i permituserenvironment
#   permituserenvironment no
#
#   If the "PermitUserEnvironment" keyword is not set to "no" in a drop-in
#   that lexicographically precedes 50-redhat.conf, or if no output is
#   returned, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to disable unattended or automatic login via SSH.
#
#   In "/etc/ssh/sshd_config.d", create a drop file that will
#   lexicographically precede 50-redhat.conf and add the following line:
#
#   PermitUserEnvironment no
#
#   Restart the SSH daemon with the following command for the setting to take
#   effect:
#
#   $ sudo systemctl restart sshd.service
# =============================================================================

- name: "RHEL-10-700640 | RHEL 10 must not allow users to override Secure Shell (SSH) environment variables."
  when: rhel_10_700640 | bool
  tags:
    - RHEL-10-700640
    - high
    - CCI-000381
  block:
    - name: "RHEL-10-700640 | Check PermitUserEnvironment in sshd runtime config"
      ansible.builtin.command:
        cmd: sshd -T
      register: rhel_10_700640_runtime
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700640 | Set PermitUserEnvironment in /etc/ssh/sshd_config.d/10-stig.conf"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config.d/10-stig.conf
        regexp: '^#?PermitUserEnvironment'
        line: 'PermitUserEnvironment no'
        state: present
        create: true
        mode: '0600'
        owner: root
        group: root
      when: "'permituserenvironment no' not in rhel_10_700640_runtime.stdout | lower"
      notify: restart sshd

    - name: "RHEL-10-700640 | Re-check PermitUserEnvironment in sshd runtime config"
      ansible.builtin.command:
        cmd: sshd -T
      register: rhel_10_700640_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700640 | Assert PermitUserEnvironment is set to no"
      ansible.builtin.assert:
        that: "'permituserenvironment no' in rhel_10_700640_verify.stdout | lower"
        fail_msg: "result=FAIL stig_id=RHEL-10-700640 detail=sshd runtime does not have PermitUserEnvironment no."
        success_msg: "result=PASS stig_id=RHEL-10-700640 detail=sshd PermitUserEnvironment is set to no."

  rescue:
    - name: "RHEL-10-700640 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700640 detail=Task failed unexpectedly — see prior error for details."
