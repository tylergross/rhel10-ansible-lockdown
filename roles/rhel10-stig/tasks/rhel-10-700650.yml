---
# =============================================================================
# STIG ID  : RHEL-10-700650
# Rule ID  : SV-281268r1184768_rule
# Severity : high
# CCI      : CCI-002418
# Title    : RHEL 10 must force a frequent session key renegotiation for Secure Shell (SSH) connections to the server.
#
# Description:
#   Without protection of the transmitted information, confidentiality and
#   integrity may be compromised because unprotected communications can be
#   intercepted and either read or altered. This requirement applies to both
#   internal and external networks and all types of information system
#   components from which information can be transmitted (e.g., servers,
#   mobile devices, notebook computers, printers, copiers, scanners, and
#   facsimile machines). Communication paths outside the physical protection
#   of a controlled boundary are exposed to the possibility of interception
#   and modification. Protecting the confidentiality and integrity of
#   organizational information can be accomplished by physical means (e.g.,
#   employing physical distribution systems) or by logical means (e.g.,
#   employing cryptographic techniques). If physical means of protection are
#   employed, then logical means (cryptography) do not have to be employed,
#   and vice versa. Session key regeneration limits the chances of a session
#   key becoming compromised. OpenSSH uses the first occurrence of a keyword
#   it sees, and drop-in files are read in lexicographical order at the start
#   of the configuration. Red Hat recommends using drop-in files rather than
#   changing base configuration files. Satisfies: SRG-OS-000423-GPOS-00187,
#   SRG-OS-000033-GPOS-00014, SRG-OS-000424-GPOS-00188
#
# Check Text:
#   Verify RHEL 10 SSH servers are configured to force frequent session key
#   renegotiation with the following command:
#
#   $ sudo /usr/sbin/sshd -dd 2>&1 | awk '/filename/ {print $4}' | tr -d '\r'
#   | tr '\n' ' ' | xargs sudo grep -iH '^\s*rekeylimit'
#   /etc/ssh/sshd_config.d/10-stig.conf:RekeyLimit 1G 1h
#
#   Verify the runtime setting with the following command:
#
#   $ sudo sshd -T | grep -i rekeylimit
#   rekeylimit 1073741824 3600
#
#   If the "RekeyLimit" keyword is not set to "1G 1h" in a drop-in that
#   lexicographically precedes 50-redhat.conf, or if no output is returned,
#   this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to force a frequent session key renegotiation for SSH
#   connections to the server.
#
#   In "/etc/ssh/sshd_config.d", create a drop file that will
#   lexicographically precede 50-redhat.conf and add the following line:
#
#   RekeyLimit 1G 1h
#
#   Restart the SSH daemon with the following command for the settings to
#   take effect:
#
#   $ sudo systemctl restart sshd.service
# =============================================================================

- name: "RHEL-10-700650 | RHEL 10 must force a frequent session key renegotiation for Secure Shell (SSH) connections to the server."
  when: rhel_10_700650 | bool
  tags:
    - RHEL-10-700650
    - high
    - CCI-002418
  block:
    - name: "RHEL-10-700650 | Check RekeyLimit in sshd runtime config"
      ansible.builtin.command:
        cmd: sshd -T
      register: rhel_10_700650_runtime
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700650 | Set RekeyLimit in /etc/ssh/sshd_config.d/10-stig.conf"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config.d/10-stig.conf
        regexp: '^#?RekeyLimit'
        line: 'RekeyLimit 1G 1h'
        state: present
        create: true
        mode: '0600'
        owner: root
        group: root
      when: "'rekeylimit 1073741824 3600' not in rhel_10_700650_runtime.stdout | lower"
      notify: restart sshd

    - name: "RHEL-10-700650 | Re-check RekeyLimit in sshd runtime config"
      ansible.builtin.command:
        cmd: sshd -T
      register: rhel_10_700650_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700650 | Assert RekeyLimit is set to 1G 1h"
      ansible.builtin.assert:
        that: "'rekeylimit 1073741824 3600' in rhel_10_700650_verify.stdout | lower"
        fail_msg: "result=FAIL stig_id=RHEL-10-700650 detail=sshd runtime does not have RekeyLimit 1G 1h (1073741824 3600)."
        success_msg: "result=PASS stig_id=RHEL-10-700650 detail=sshd RekeyLimit is set to 1G 1h."

  rescue:
    - name: "RHEL-10-700650 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700650 detail=Task failed unexpectedly — see prior error for details."
