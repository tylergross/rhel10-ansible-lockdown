---
# =============================================================================
# STIG ID  : RHEL-10-700680
# Rule ID  : SV-281271r1197244_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must not have a "shosts.equiv" file on the system.
#
# Description:
#   The "shosts.equiv" files are used to configure host-based authentication
#   for the system via Secure Shell (SSH). Host-based authentication is not
#   sufficient for preventing unauthorized access to the system, as it does
#   not require interactive identification and authentication of a connection
#   request, or for the use of two-factor authentication.
#
# Check Text:
#   Verify RHEL 10 does not have a "shosts.equiv" file on the system with the
#   following command:
#
#   $ sudo find / -name shosts.equiv
#
#   If a "shosts.equiv" file is found, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to not have a "shosts.equiv" file on the system.
#
#   Remove any found "shosts.equiv" files from the system:
#
#   $ sudo rm /[path]/[to]/[file]/shosts.equiv
# =============================================================================

- name: "RHEL-10-700680 | RHEL 10 must not have a shosts.equiv file on the system."
  when: rhel_10_700680 | bool
  tags:
    - RHEL-10-700680
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-700680 | Find shosts.equiv files on the system"
      ansible.builtin.find:
        paths: /
        patterns: 'shosts.equiv'
        recurse: true
        hidden: true
      register: rhel_10_700680_found

    - name: "RHEL-10-700680 | Remove found shosts.equiv files"
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ rhel_10_700680_found.files }}"
      when: rhel_10_700680_found.files | length > 0

    - name: "RHEL-10-700680 | Re-check for shosts.equiv files"
      ansible.builtin.find:
        paths: /
        patterns: 'shosts.equiv'
        recurse: true
        hidden: true
      register: rhel_10_700680_verify

    - name: "RHEL-10-700680 | Assert no shosts.equiv files exist"
      ansible.builtin.assert:
        that: rhel_10_700680_verify.files | length == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-700680 detail=shosts.equiv file(s) found on the system (count={{ rhel_10_700680_verify.files | length }})."
        success_msg: "result=PASS stig_id=RHEL-10-700680 detail=No shosts.equiv files found on the system."

  rescue:
    - name: "RHEL-10-700680 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700680 detail=Task failed unexpectedly — see prior error for details."
