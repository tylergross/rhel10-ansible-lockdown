---
# =============================================================================
# STIG ID  : RHEL-10-700700
# Rule ID  : SV-281273r1184699_rule
# Severity : medium
# CCI      : CCI-000778
# Title    : RHEL 10 must prevent a user from overriding the disabling of the graphical user interface automount function.
#
# Description:
#   Without identifying and authenticating devices, unidentified or unknown
#   devices may be introduced, thereby facilitating malicious activity.
#   Peripherals include, but are not limited to, such devices as flash
#   drives, external storage, and printers. Satisfies:
#   SRG-OS-000114-GPOS-00059, SRG-OS-000378-GPOS-00163
#
# Check Text:
#   Note: This requirement assumes the use of the RHEL 10 default graphical
#   user interface, the GNOME desktop environment. If the system does not
#   have any graphical user interface installed, this requirement is not
#   applicable.
#
#   Verify RHEL 10 disables the ability of the user to override the graphical
#   user interface automount setting.
#
#   Determine which profile the system database is using with the following
#   command:
#
#   $ sudo grep system-db /etc/dconf/profile/user
#   system-db:local
#
#   Check that the automount setting is locked from nonprivileged user
#   modification with the following command:
#
#   Note: The example below is using the database "local" for the system, so
#   the path is "/etc/dconf/db/local.d". This path must be modified if a
#   database other than "local" is being used.
#
#   $ sudo grep 'automount-open' /etc/dconf/db/local.d/locks/*
#   /org/gnome/desktop/media-handling/automount-open
#
#   If the command does not return at least the example result, this is a
#   finding.
#
# Fix Text:
#   Configure RHEL 10 so that the GNOME desktop does not allow a user to
#   change the setting that disables automated mounting of removable media.
#
#   Note: The example below is using the database "local" for the system. If
#   the system is using another database in "/etc/dconf/profile/user", the
#   file should be created under the appropriate subdirectory.
#
#   Update the "/etc/dconf/db/local.d/locks/00-security-settings-lock" file
#   to prevent user modification:
#
#   $ sudo vi /etc/dconf/db/local.d/locks/00-security-settings-lock
#
#   /org/gnome/desktop/media-handling/automount-open
#
#   Update the dconf system databases:
#
#   $ sudo dconf update
# =============================================================================

- name: "RHEL-10-700700 | RHEL 10 must prevent a user from overriding the disabling of the graphical user interface automount function."
  when: rhel_10_700700 | bool
  tags:
    - RHEL-10-700700
    - medium
    - CCI-000778
  block:
    - name: "RHEL-10-700700 | Ensure dconf locks directory exists"
      ansible.builtin.file:
        path: /etc/dconf/db/local.d/locks
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: "RHEL-10-700700 | Check automount-open lock in dconf locks file"
      ansible.builtin.command:
        cmd: grep -r 'automount-open' /etc/dconf/db/local.d/locks/
      register: rhel_10_700700_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700700 | Set automount-open lock in dconf locks file"
      ansible.builtin.lineinfile:
        path: /etc/dconf/db/local.d/locks/00-security-settings-lock
        line: '/org/gnome/desktop/media-handling/automount-open'
        state: present
        create: true
        mode: '0644'
        owner: root
        group: root
      when: rhel_10_700700_check.rc != 0

    - name: "RHEL-10-700700 | Update dconf database"
      ansible.builtin.command:
        cmd: dconf update
      when: rhel_10_700700_check.rc != 0
      changed_when: true

    - name: "RHEL-10-700700 | Re-check automount-open lock in dconf"
      ansible.builtin.command:
        cmd: grep -r 'automount-open' /etc/dconf/db/local.d/locks/
      register: rhel_10_700700_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700700 | Assert automount-open is locked in dconf"
      ansible.builtin.assert:
        that: rhel_10_700700_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-700700 detail=automount-open is not locked in dconf."
        success_msg: "result=PASS stig_id=RHEL-10-700700 detail=automount-open is locked in dconf."

  rescue:
    - name: "RHEL-10-700700 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700700 detail=Task failed unexpectedly — see prior error for details."
