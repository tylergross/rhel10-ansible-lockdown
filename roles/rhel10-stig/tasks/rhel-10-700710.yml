---
# =============================================================================
# STIG ID  : RHEL-10-700710
# Rule ID  : SV-281274r1197245_rule
# Severity : medium
# CCI      : CCI-000778
# Title    : RHEL 10 must prevent a user from overriding the disabling of the graphical user interface autorun function.
#
# Description:
#   Techniques used to address this include protocols using nonces (e.g.,
#   numbers generated for a specific one-time use) or challenges (e.g.,
#   Transport Layer Security [TLS], WS_Security). Additional techniques
#   include time-synchronous or challenge-response one-time authenticators.
#   Satisfies: SRG-OS-000114-GPOS-00059, SRG-OS-000378-GPOS-00163
#
# Check Text:
#   Note: This requirement assumes the use of the RHEL 10 default graphical
#   user interface, the GNOME desktop environment. If the system does not
#   have any graphical user interface installed, this requirement is not
#   applicable.
#
#   Verify RHEL 10 disables ability of the user to override the graphical
#   user interface autorun setting.
#
#   Check that the autorun setting is set to prevent user modification with
#   the following command:
#
#   $ gsettings writable org.gnome.desktop.media-handling autorun-never
#   false
#
#   If "autorun-never" is writable, the result is "true".
#
#   If this is not documented with the information system security officer as
#   an operational requirement, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 so that the GNOME desktop does not allow a user to
#   change the setting that disables autorun on removable media.
#
#   Note: The example below is using the database "local" for the system. If
#   the system is using another database in "/etc/dconf/profile/user", the
#   file should be created under the appropriate subdirectory.
#
#   Update the "/etc/dconf/db/local.d/locks/00-security-settings-lock" file
#   to prevent user modification:
#
#   $ sudo vi /etc/dconf/db/local.d/locks/00-security-settings-lock
#
#   /org/gnome/desktop/media-handling/autorun-never
#
#   Update the dconf system databases:
#
#   $ sudo dconf update
# =============================================================================

- name: "RHEL-10-700710 | RHEL 10 must prevent a user from overriding the disabling of the graphical user interface autorun function."
  when: rhel_10_700710 | bool
  tags:
    - RHEL-10-700710
    - medium
    - CCI-000778
  block:
    - name: "RHEL-10-700710 | Ensure dconf locks directory exists"
      ansible.builtin.file:
        path: /etc/dconf/db/local.d/locks
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: "RHEL-10-700710 | Check autorun-never lock in dconf locks file"
      ansible.builtin.command:
        cmd: >-
          grep -r 'autorun-never' /etc/dconf/db/local.d/locks/
      register: rhel_10_700710_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700710 | Set autorun-never lock in dconf locks file"
      ansible.builtin.lineinfile:
        path: /etc/dconf/db/local.d/locks/00-security-settings-lock
        line: '/org/gnome/desktop/media-handling/autorun-never'
        state: present
        create: true
        mode: '0644'
        owner: root
        group: root
      when: rhel_10_700710_check.rc != 0

    - name: "RHEL-10-700710 | Update dconf database"
      ansible.builtin.command:
        cmd: dconf update
      when: rhel_10_700710_check.rc != 0
      changed_when: true

    - name: "RHEL-10-700710 | Re-check autorun-never lock in dconf"
      ansible.builtin.command:
        cmd: >-
          grep -r 'autorun-never' /etc/dconf/db/local.d/locks/
      register: rhel_10_700710_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700710 | Assert autorun-never is locked in dconf"
      ansible.builtin.assert:
        that: rhel_10_700710_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-700710 detail=autorun-never is not locked in dconf."
        success_msg: "result=PASS stig_id=RHEL-10-700710 detail=autorun-never is locked in dconf."

  rescue:
    - name: "RHEL-10-700710 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700710 detail=Task failed unexpectedly — see prior error for details."
