---
# =============================================================================
# STIG ID  : RHEL-10-700750
# Rule ID  : SV-281278r1166786_rule
# Severity : medium
# CCI      : CCI-000057
# Title    : RHEL 10 must automatically lock graphical user sessions after 15 minutes of inactivity.
#
# Description:
#   A session timeout lock is a temporary action taken when a user stops work
#   and moves away from the immediate physical vicinity of the information
#   system but does not log out because of the temporary nature of the
#   absence. Rather than relying on the user to manually lock their operating
#   system session prior to vacating the vicinity, the GNOME desktop can be
#   configured to identify when a user's session has idled and take action to
#   initiate a session lock. Satisfies: SRG-OS-000029-GPOS-00010,
#   SRG-OS-000031-GPOS-00012
#
# Check Text:
#   Note: This requirement assumes the use of the RHEL 10 default graphical
#   user interface, the GNOME desktop environment. If the system does not
#   have any graphical user interface installed, this requirement is not
#   applicable.
#
#   Verify RHEL 10 initiates a session lock after a 15-minute period of
#   inactivity for graphical user interfaces with the following command:
#
#   $ sudo gsettings get org.gnome.desktop.session idle-delay
#   uint32 900
#
#   If "idle-delay" is set to "0" or a value greater than "900", this is a
#   finding.
#
# Fix Text:
#   Configure RHEL 10 to initiate a screensaver after a 15-minute period of
#   inactivity for graphical user interfaces.
#
#   Note: The example below is using the database "local" for the system. If
#   the system is using another database in "/etc/dconf/profile/user", the
#   file should be created under the appropriate subdirectory.
#
#   Update the "/etc/dconf/db/local.d/00-screensaver" file to prevent
#   nonprivileged users from modifying the screensaver idle-delay setting:
#
#   $ sudo vi /etc/dconf/db/local.d/00-screensaver
#
#   [org/gnome/desktop/session]
#   # Set the lock time out to 900 seconds before the session is considered
#   idle
#   idle-delay=uint32 900
#
#   Update the system databases:
#
#   $ sudo dconf update
# =============================================================================

- name: "RHEL-10-700750 | RHEL 10 must automatically lock graphical user sessions after 15 minutes of inactivity."
  when: rhel_10_700750 | bool
  tags:
    - RHEL-10-700750
    - medium
    - CCI-000057
  block:
    - name: "RHEL-10-700750 | Ensure dconf local.d directory exists"
      ansible.builtin.file:
        path: /etc/dconf/db/local.d
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: "RHEL-10-700750 | Check idle-delay in dconf keyfile"
      ansible.builtin.command:
        cmd: grep -r 'idle-delay' /etc/dconf/db/local.d/
      register: rhel_10_700750_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700750 | Ensure dconf screensaver section header is present"
      ansible.builtin.lineinfile:
        path: /etc/dconf/db/local.d/00-screensaver
        line: '[org/gnome/desktop/session]'
        state: present
        create: true
        mode: '0644'
        owner: root
        group: root
      when: rhel_10_700750_check.rc != 0

    - name: "RHEL-10-700750 | Set idle-delay to 900 in dconf keyfile"
      ansible.builtin.lineinfile:
        path: /etc/dconf/db/local.d/00-screensaver
        regexp: '^#?idle-delay='
        line: 'idle-delay=uint32 900'
        state: present
        create: true
        mode: '0644'
        owner: root
        group: root
      when: rhel_10_700750_check.rc != 0

    - name: "RHEL-10-700750 | Update dconf database"
      ansible.builtin.command:
        cmd: dconf update
      when: rhel_10_700750_check.rc != 0
      changed_when: true

    - name: "RHEL-10-700750 | Re-check idle-delay in dconf"
      ansible.builtin.command:
        cmd: grep -r 'idle-delay' /etc/dconf/db/local.d/
      register: rhel_10_700750_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700750 | Assert idle-delay is configured in dconf"
      ansible.builtin.assert:
        that: rhel_10_700750_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-700750 detail=idle-delay is not configured in dconf."
        success_msg: "result=PASS stig_id=RHEL-10-700750 detail=idle-delay is configured in dconf."

  rescue:
    - name: "RHEL-10-700750 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700750 detail=Task failed unexpectedly — see prior error for details."
