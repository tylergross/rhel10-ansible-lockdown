---
# =============================================================================
# STIG ID  : RHEL-10-700760
# Rule ID  : SV-281279r1166789_rule
# Severity : medium
# CCI      : CCI-000057
# Title    : RHEL 10 must prevent a user from overriding the session idle-delay setting for the graphical user interface.
#
# Description:
#   A session timeout lock is a temporary action taken when a user stops work
#   and moves away from the immediate physical vicinity of the information
#   system but does not log out because of the temporary nature of the
#   absence. Rather than relying on the user to manually lock their operating
#   system session prior to vacating the vicinity, the GNOME desktop can be
#   configured to identify when a user's session has idled and take action to
#   initiate the session lock. Therefore, users should not be allowed to
#   change session settings. Satisfies: SRG-OS-000029-GPOS-00010,
#   SRG-OS-000031-GPOS-00012
#
# Check Text:
#   Note: This requirement assumes the use of the RHEL 10 default graphical
#   user interface, the GNOME desktop environment. If the system does not
#   have any graphical user interface installed, this requirement is not
#   applicable.
#
#   Verify RHEL 10 prevents a user from overriding settings for session idle
#   delay with the following command:
#
#   $ gsettings writable org.gnome.desktop.session idle-delay
#   false
#
#   If "idle-delay" is writable, and the result is "true", this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to prevent a user from overriding settings for
#   graphical user interfaces.
#
#   Note: The example below is using the database "local" for the system. If
#   the system is using another database in "/etc/dconf/profile/user", the
#   file should be created under the appropriate subdirectory.
#
#   Update the "/etc/dconf/db/local.d/locks/session" file to prevent
#   nonprivileged users from modifying the idle-delay lock:
#
#   $ sudo vi /etc/dconf/db/local.d/locks/session
#
#   /org/gnome/desktop/session/idle-delay
#
#   Run the following command to update the database:
#
#   $ sudo dconf update
# =============================================================================

- name: "RHEL-10-700760 | RHEL 10 must prevent a user from overriding the session idle-delay setting for the graphical user interface."
  when: rhel_10_700760 | bool
  tags:
    - RHEL-10-700760
    - medium
    - CCI-000057
  block:
    - name: "RHEL-10-700760 | Ensure dconf locks directory exists"
      ansible.builtin.file:
        path: /etc/dconf/db/local.d/locks
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: "RHEL-10-700760 | Check session idle-delay lock in dconf locks file"
      ansible.builtin.command:
        cmd: grep -r '/org/gnome/desktop/session/idle-delay' /etc/dconf/db/local.d/locks/
      register: rhel_10_700760_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700760 | Set session idle-delay lock in dconf locks file"
      ansible.builtin.lineinfile:
        path: /etc/dconf/db/local.d/locks/session
        line: '/org/gnome/desktop/session/idle-delay'
        state: present
        create: true
        mode: '0644'
        owner: root
        group: root
      when: rhel_10_700760_check.rc != 0

    - name: "RHEL-10-700760 | Update dconf database"
      ansible.builtin.command:
        cmd: dconf update
      when: rhel_10_700760_check.rc != 0
      changed_when: true

    - name: "RHEL-10-700760 | Re-check session idle-delay lock in dconf"
      ansible.builtin.command:
        cmd: grep -r '/org/gnome/desktop/session/idle-delay' /etc/dconf/db/local.d/locks/
      register: rhel_10_700760_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700760 | Assert session idle-delay is locked in dconf"
      ansible.builtin.assert:
        that: rhel_10_700760_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-700760 detail=session idle-delay is not locked in dconf."
        success_msg: "result=PASS stig_id=RHEL-10-700760 detail=session idle-delay is locked in dconf."

  rescue:
    - name: "RHEL-10-700760 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700760 detail=Task failed unexpectedly — see prior error for details."
