---
# =============================================================================
# STIG ID  : RHEL-10-700800
# Rule ID  : SV-281283r1166801_rule
# Severity : medium
# CCI      : CCI-000213
# Title    : RHEL 10 must ensure effective dconf policy matches the policy keyfiles.
#
# Description:
#   Unlike text-based keyfiles, the binary database is impossible to check
#   through most automated and all manual means; therefore, to evaluate dconf
#   configuration, both must be true at the same time. Configuration files
#   must be compliant, and the database must be more recent than those
#   keyfiles, which gives confidence that it reflects them.
#
# Check Text:
#   Note: This requirement assumes the use of the RHEL 10 default graphical
#   user interface, the GNOME desktop environment. If the system does not
#   have any graphical user interface installed, this requirement is not
#   applicable.
#
#   Verify RHEL 10 ensures effective dconf policy matches the policy
#   keyfiles.
#
#   Check the last modification time of the local databases, comparing it to
#   the last modification time of the related keyfiles. The following command
#   will check every dconf database and compare its modification time to the
#   related system keyfiles:
#
#   $ function dconf_needs_update { for db in $(find /etc/dconf/db -maxdepth
#   1 -type f); do db_mtime=$(stat -c %Y "$db"); keyfile_mtime=$(stat -c %Y
#   "$db".d/* | sort -n | tail -1); if [ -n "$db_mtime" ] && [ -n
#   "$keyfile_mtime" ] && [ "$db_mtime" -lt "$keyfile_mtime" ]; then echo
#   "$db needs update"; return 1; fi; done; }; dconf_needs_update
#
#   If the command has any output, then a dconf database needs to be updated,
#   and this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to ensure that the effective dconf policy matches the
#   policy keyfiles.
#
#   Update the dconf databases by running the following command:
#
#   $ sudo dconf update
# =============================================================================

- name: "RHEL-10-700800 | RHEL 10 must ensure effective dconf policy matches the policy keyfiles."
  when: rhel_10_700800 | bool
  tags:
    - RHEL-10-700800
    - medium
    - CCI-000213
  block:
    - name: "RHEL-10-700800 | Run dconf update to sync databases with keyfiles"
      ansible.builtin.command:
        cmd: dconf update
      changed_when: true
      failed_when: false
      register: rhel_10_700800_update

    - name: "RHEL-10-700800 | Warn if dconf update returned non-zero exit code"
      ansible.builtin.debug:
        msg: "result=WARN stig_id=RHEL-10-700800 detail=dconf update returned rc={{ rhel_10_700800_update.rc }} — databases may not fully match keyfiles. Check keyfile format (group headers required)."
      when: rhel_10_700800_update.rc != 0

    - name: "RHEL-10-700800 | Confirm dconf update completed successfully"
      ansible.builtin.debug:
        msg: "result=PASS stig_id=RHEL-10-700800 detail=dconf databases have been updated to match policy keyfiles."
      when: rhel_10_700800_update.rc == 0

  rescue:
    - name: "RHEL-10-700800 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700800 detail=Task failed unexpectedly — see prior error for details."
