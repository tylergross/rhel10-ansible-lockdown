---
# =============================================================================
# STIG ID  : RHEL-10-700820
# Rule ID  : SV-281285r1197249_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must prevent a user from overriding the Ctrl-Alt-Del sequence settings for the graphical user interface.
#
# Description:
#   A locally logged-in user who presses Ctrl-Alt-Del when at the console can
#   reboot the system. If accidentally pressed, as could happen in the case
#   of a mixed operating system environment, this can create the risk of
#   short-term loss of systems' availability due to unintentional reboot.
#
# Check Text:
#   Note: This requirement assumes the use of the RHEL 10 default graphical
#   user interface, the GNOME desktop environment. If the system does not
#   have any graphical user interface installed, this requirement is not
#   applicable.
#
#   Verify RHEL 10 users cannot enable the Ctrl-Alt-Del sequence in the GNOME
#   desktop:
#
#   $ gsettings writable org.gnome.settings-daemon.plugins.media-keys logout
#   false
#
#   If "logout" is writable and the result is "true", this is a finding.
#
#   If GNOME is configured to shut down when Ctrl-Alt-Del is pressed, this is
#   a finding.
#
# Fix Text:
#   Configure RHEL 10 to disallow the user changing the Ctrl-Alt-Del sequence
#   in the GNOME desktop.
#
#   Note: The example below is using the database "local" for the system. If
#   the system is using another database in "/etc/dconf/profile/user", the
#   file should be created under the appropriate subdirectory.
#
#   Update the "/etc/dconf/db/local.d/locks/session" file to prevent
#   nonprivileged users from modifying the Ctrl-Alt-Del setting:
#
#   $ sudo vi /etc/dconf/db/local.d/locks/session
#
#   /org/gnome/settings-daemon/plugins/media-keys/logout
#
#   Run the following command to update the database:
#
#   $ sudo dconf update
# =============================================================================

- name: "RHEL-10-700820 | RHEL 10 must prevent a user from overriding the Ctrl-Alt-Del sequence settings for the graphical user interface."
  when: rhel_10_700820 | bool
  tags:
    - RHEL-10-700820
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-700820 | Ensure dconf locks directory exists"
      ansible.builtin.file:
        path: /etc/dconf/db/local.d/locks
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: "RHEL-10-700820 | Check media-keys logout lock in dconf locks file"
      ansible.builtin.command:
        cmd: >-
          grep -r '/org/gnome/settings-daemon/plugins/media-keys/logout' /etc/dconf/db/local.d/locks/
      register: rhel_10_700820_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700820 | Set media-keys logout lock in dconf locks file"
      ansible.builtin.lineinfile:
        path: /etc/dconf/db/local.d/locks/session
        line: '/org/gnome/settings-daemon/plugins/media-keys/logout'
        state: present
        create: true
        mode: '0644'
        owner: root
        group: root
      when: rhel_10_700820_check.rc != 0

    - name: "RHEL-10-700820 | Update dconf database"
      ansible.builtin.command:
        cmd: dconf update
      when: rhel_10_700820_check.rc != 0
      changed_when: true

    - name: "RHEL-10-700820 | Re-check media-keys logout lock in dconf"
      ansible.builtin.command:
        cmd: >-
          grep -r '/org/gnome/settings-daemon/plugins/media-keys/logout' /etc/dconf/db/local.d/locks/
      register: rhel_10_700820_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700820 | Assert media-keys logout is locked in dconf"
      ansible.builtin.assert:
        that: rhel_10_700820_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-700820 detail=Ctrl-Alt-Del logout key is not locked in dconf."
        success_msg: "result=PASS stig_id=RHEL-10-700820 detail=Ctrl-Alt-Del logout key is locked in dconf."

  rescue:
    - name: "RHEL-10-700820 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700820 detail=Task failed unexpectedly — see prior error for details."
