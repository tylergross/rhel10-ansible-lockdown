---
# =============================================================================
# STIG ID  : RHEL-10-700830
# Rule ID  : SV-281286r1166810_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must disable the ability of a user to accidentally press Ctrl-Alt-Del and cause a system to shut down or reboot.
#
# Description:
#   A locally logged-in user who presses Ctrl-Alt-Del, when at the console,
#   can reboot the system. If accidentally pressed, as could happen in the
#   case of mixed operating system environments, this can create the risk of
#   short-term loss of availability of systems due to unintentional reboot.
#
# Check Text:
#   Note: This requirement assumes the use of the RHEL 10 default graphical
#   user interface, the GNOME desktop environment. If the system does not
#   have any graphical user interface installed, this requirement is not
#   applicable.
#
#   Verify RHEL 10 is configured to ignore the Ctrl-Alt-Del sequence in the
#   GNOME desktop with the following command:
#
#   Check that the Ctrl-Alt-Del sequence settings for the graphical user
#   interface cannot be overridden with the following command:
#
#   $ gsettings get org.gnome.settings-daemon.plugins.media-keys logout
#   @as []
#
#   If the GNOME desktop is configured to shut down when Ctrl-Alt-Del is
#   pressed, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to ignore the Ctrl-Alt-Del sequence in the GNOME
#   desktop.
#
#   Note: The example below is using the database "local" for the system. If
#   the system is using another database in "/etc/dconf/profile/user", the
#   file should be created under the appropriate subdirectory.
#
#   Update the "/etc/dconf/db/local.d/00-media-keys" file to set the
#   media-keys logout setting as an empty string array:
#
#   $ sudo vi /etc/dconf/db/local.d/00-media-keys
#
#   [org/gnome/settings-daemon/plugins/media-keys]
#   logout=@as []
#
#   Run the following command to update the database:
#
#   $ sudo dconf update
# =============================================================================

- name: "RHEL-10-700830 | RHEL 10 must disable the ability of a user to accidentally press Ctrl-Alt-Del and cause a system to shut down or reboot."
  when: rhel_10_700830 | bool
  tags:
    - RHEL-10-700830
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-700830 | Ensure dconf local.d directory exists"
      ansible.builtin.file:
        path: /etc/dconf/db/local.d
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: "RHEL-10-700830 | Check media-keys logout value in dconf keyfile"
      ansible.builtin.command:
        cmd: >-
          grep -r 'logout' /etc/dconf/db/local.d/
      register: rhel_10_700830_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700830 | Ensure media-keys section header is present"
      ansible.builtin.lineinfile:
        path: /etc/dconf/db/local.d/00-media-keys
        line: '[org/gnome/settings-daemon/plugins/media-keys]'
        state: present
        create: true
        mode: '0644'
        owner: root
        group: root
      when: rhel_10_700830_check.rc != 0

    - name: "RHEL-10-700830 | Set media-keys logout to empty array in dconf keyfile"
      ansible.builtin.lineinfile:
        path: /etc/dconf/db/local.d/00-media-keys
        regexp: '^#?logout='
        line: "logout=''"
        state: present
        create: true
        mode: '0644'
        owner: root
        group: root
      when: rhel_10_700830_check.rc != 0

    - name: "RHEL-10-700830 | Update dconf database"
      ansible.builtin.command:
        cmd: dconf update
      when: rhel_10_700830_check.rc != 0
      changed_when: true

    - name: "RHEL-10-700830 | Re-check media-keys logout in dconf"
      ansible.builtin.command:
        cmd: >-
          grep -r 'logout' /etc/dconf/db/local.d/
      register: rhel_10_700830_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700830 | Assert media-keys logout is configured in dconf"
      ansible.builtin.assert:
        that: rhel_10_700830_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-700830 detail=Ctrl-Alt-Del logout key is not disabled in dconf."
        success_msg: "result=PASS stig_id=RHEL-10-700830 detail=Ctrl-Alt-Del logout key is disabled in dconf."

  rescue:
    - name: "RHEL-10-700830 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700830 detail=Task failed unexpectedly — see prior error for details."
