---
# =============================================================================
# STIG ID  : RHEL-10-700840
# Rule ID  : SV-281287r1166813_rule
# Severity : medium
# CCI      : CCI-000381
# Title    : RHEL 10 must disable the user list at login for graphical user interfaces.
#
# Description:
#   Leaving the user list enabled is a security risk because it allows anyone
#   with physical access to the system to enumerate known user accounts
#   without authenticated access to the system.
#
# Check Text:
#   Note: This requirement assumes the use of the RHEL 10 default graphical
#   user interface, the GNOME desktop environment. If the system does not
#   have any graphical user interface installed, this requirement is not
#   applicable.
#
#   Verify RHEL 10 disables the user login list for graphical user interfaces
#   with the following command:
#
#   $ gsettings get org.gnome.login-screen disable-user-list
#   true
#
#   If the setting is "false", this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to disable the user list at login for graphical user
#   interfaces.
#
#   Note: The example below is using the database "local" for the system. If
#   the system is using another database in "/etc/dconf/profile/user", the
#   file should be created under the appropriate subdirectory.
#
#   Create a database to contain the systemwide screensaver settings (if it
#   does not already exist) with the following command:
#
#   $ sudo vi /etc/dconf/db/local.d/02-login-screen
#
#   [org/gnome/login-screen]
#   disable-user-list=true
#
#   Update the system databases:
#
#   $ sudo dconf update
# =============================================================================

- name: "RHEL-10-700840 | RHEL 10 must disable the user list at login for graphical user interfaces."
  when: rhel_10_700840 | bool
  tags:
    - RHEL-10-700840
    - medium
    - CCI-000381
  block:
    - name: "RHEL-10-700840 | Ensure dconf local.d directory exists"
      ansible.builtin.file:
        path: /etc/dconf/db/local.d
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: "RHEL-10-700840 | Check disable-user-list in dconf keyfile"
      ansible.builtin.command:
        cmd: >-
          grep -r 'disable-user-list' /etc/dconf/db/local.d/
      register: rhel_10_700840_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700840 | Ensure login-screen section header is present"
      ansible.builtin.lineinfile:
        path: /etc/dconf/db/local.d/02-login-screen
        line: '[org/gnome/login-screen]'
        state: present
        create: true
        mode: '0644'
        owner: root
        group: root
      when: rhel_10_700840_check.rc != 0

    - name: "RHEL-10-700840 | Set disable-user-list to true in dconf keyfile"
      ansible.builtin.lineinfile:
        path: /etc/dconf/db/local.d/02-login-screen
        regexp: '^#?disable-user-list='
        line: 'disable-user-list=true'
        state: present
        create: true
        mode: '0644'
        owner: root
        group: root
      when: rhel_10_700840_check.rc != 0

    - name: "RHEL-10-700840 | Update dconf database"
      ansible.builtin.command:
        cmd: dconf update
      when: rhel_10_700840_check.rc != 0
      changed_when: true

    - name: "RHEL-10-700840 | Re-check disable-user-list in dconf"
      ansible.builtin.command:
        cmd: >-
          grep -r 'disable-user-list' /etc/dconf/db/local.d/
      register: rhel_10_700840_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700840 | Assert disable-user-list is configured in dconf"
      ansible.builtin.assert:
        that: rhel_10_700840_verify.rc == 0
        fail_msg: "result=FAIL stig_id=RHEL-10-700840 detail=disable-user-list is not configured in dconf."
        success_msg: "result=PASS stig_id=RHEL-10-700840 detail=disable-user-list is configured in dconf."

  rescue:
    - name: "RHEL-10-700840 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700840 detail=Task failed unexpectedly — see prior error for details."
