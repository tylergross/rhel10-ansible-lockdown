---
# =============================================================================
# STIG ID  : RHEL-10-700870
# Rule ID  : SV-281290r1166822_rule
# Severity : medium
# CCI      : CCI-001444
# Title    : RHEL 10 must disable wireless network adapters.
#
# Description:
#   This requirement applies to wireless peripheral technologies (e.g.,
#   wireless mice, keyboards, displays, etc.) used with RHEL 10 systems.
#   Wireless peripherals (e.g., Wi-Fi/Bluetooth/IR keyboards, mice and
#   pointing devices, and near field communications [NFC]) present a unique
#   challenge by creating an open, unsecured port on a computer. Wireless
#   peripherals must meet DOD requirements for wireless data transmission and
#   be approved for use by the authorizing official. Even though some
#   wireless peripherals, such as mice and pointing devices, do not
#   ordinarily carry information that must be protected, modification of
#   communications with these wireless peripherals may be used to compromise
#   the RHEL 10 operating system. Satisfies: SRG-OS-000299-GPOS-00117,
#   SRG-OS-000300-GPOS-00118, SRG-OS-000424-GPOS-00188,
#   SRG-OS-000481-GPOS-00481
#
# Check Text:
#   Note: This requirement is not applicable for systems that do not have
#   physical wireless network radios.
#
#   Verify RHEL 10 disables wireless interfaces on the system with the
#   following command:
#
#   $ nmcli device status
#   DEVICE TYPE STATE CONNECTION
#   virbr0 bridge connected virbr0
#   wlp7s0 wifi connected wifiSSID
#   enp6s0 ethernet disconnected --
#   p2p-dev-wlp7s0 wifi-p2p disconnected --
#   lo loopback unmanaged --
#   virbr0-nic tun unmanaged --
#
#   If a wireless interface is configured and has not been documented and
#   approved by the information system security officer, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to disable all wireless network interfaces with the
#   following command:
#
#   $ nmcli radio all off
# =============================================================================

- name: "RHEL-10-700870 | RHEL 10 must disable wireless network adapters."
  when: rhel_10_700870 | bool
  tags:
    - RHEL-10-700870
    - medium
    - CCI-001444
  block:
    - name: "RHEL-10-700870 | Check for active wifi radio devices via nmcli"
      ansible.builtin.command:
        cmd: nmcli radio wifi
      register: rhel_10_700870_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700870 | Disable all wireless radio adapters via nmcli"
      ansible.builtin.command:
        cmd: nmcli radio all off
      when: rhel_10_700870_check.stdout | lower != 'disabled'
      changed_when: true

    - name: "RHEL-10-700870 | Re-check wireless radio state"
      ansible.builtin.command:
        cmd: nmcli radio wifi
      register: rhel_10_700870_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700870 | Assert wireless radio is disabled"
      ansible.builtin.assert:
        that: rhel_10_700870_verify.stdout | lower == 'disabled'
        fail_msg: "result=FAIL stig_id=RHEL-10-700870 detail=Wireless radio is not disabled (current={{ rhel_10_700870_verify.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-700870 detail=Wireless radio is disabled."

  rescue:
    - name: "RHEL-10-700870 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700870 detail=Task failed unexpectedly — see prior error for details."
