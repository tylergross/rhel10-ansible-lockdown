---
# =============================================================================
# STIG ID  : RHEL-10-700960
# Rule ID  : SV-281299r1166849_rule
# Severity : high
# CCI      : CCI-002235
# Title    : RHEL 10 must disable the x86 Ctrl-Alt-Delete key sequence.
#
# Description:
#   A locally logged-on user who presses Ctrl-Alt-Delete when at the console
#   can reboot the system. If accidentally pressed, as could happen in the
#   case of a mixed operating system environment, this can create the risk of
#   short-term loss of systems availability due to unintentional reboot. In a
#   graphical user environment, risk of unintentional reboot from the
#   Ctrl-Alt-Delete sequence is reduced because the user will be prompted
#   before any action is taken.
#
# Check Text:
#   Verify RHEL 10 is not configured to reboot the system when
#   Ctrl-Alt-Delete is pressed with the following command:
#
#   $ sudo systemctl status ctrl-alt-del.target
#   o ctrl-alt-del.target
#   Loaded: masked (Reason: Unit ctrl-alt-del.target is masked.)
#   Active: inactive (dead)
#
#   If the "ctrl-alt-del.target" is loaded and not masked, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to disable the "ctrl-alt-del.target" with the following
#   command:
#
#   $ sudo systemctl disable --now ctrl-alt-del.target
#   $ sudo systemctl mask --now ctrl-alt-del.target
# =============================================================================

- name: "RHEL-10-700960 | RHEL 10 must disable the x86 Ctrl-Alt-Delete key sequence."
  when: rhel_10_700960 | bool
  tags:
    - RHEL-10-700960
    - high
    - CCI-002235
  block:
    - name: "RHEL-10-700960 | Check if ctrl-alt-del.target is masked"
      ansible.builtin.command:
        cmd: systemctl status ctrl-alt-del.target
      register: rhel_10_700960_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700960 | Disable ctrl-alt-del.target"
      ansible.builtin.command:
        cmd: systemctl disable --now ctrl-alt-del.target
      when: "'masked' not in rhel_10_700960_check.stdout | lower"
      changed_when: true
      failed_when: false

    - name: "RHEL-10-700960 | Mask ctrl-alt-del.target"
      ansible.builtin.command:
        cmd: systemctl mask --now ctrl-alt-del.target
      when: "'masked' not in rhel_10_700960_check.stdout | lower"
      changed_when: true

    - name: "RHEL-10-700960 | Re-check ctrl-alt-del.target status"
      ansible.builtin.command:
        cmd: systemctl status ctrl-alt-del.target
      register: rhel_10_700960_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700960 | Assert ctrl-alt-del.target is masked"
      ansible.builtin.assert:
        that: "'masked' in rhel_10_700960_verify.stdout | lower"
        fail_msg: "result=FAIL stig_id=RHEL-10-700960 detail=ctrl-alt-del.target is not masked."
        success_msg: "result=PASS stig_id=RHEL-10-700960 detail=ctrl-alt-del.target is masked."

  rescue:
    - name: "RHEL-10-700960 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700960 detail=Task failed unexpectedly — see prior error for details."
