---
# =============================================================================
# STIG ID  : RHEL-10-700970
# Rule ID  : SV-280094r1184607_rule
# Severity : medium
# CCI      : CCI-002235
# Title    : RHEL 10 must disable the debug-shell systemd service.
#
# Description:
#   The debug-shell requires no authentication and provides root privileges
#   to anyone who has physical access to the machine. While this feature is
#   disabled by default, masking it adds an additional layer of assurance
#   that it will not be enabled via a dependency in systemd. This also
#   prevents attackers with physical access from trivially bypassing security
#   on the machine through valid troubleshooting configurations and gaining
#   root access when the system is rebooted.
#
# Check Text:
#   Verify RHEL 10 is configured to mask the debug-shell systemd service with
#   the following command:
#
#   $ sudo systemctl status debug-shell.service
#   o debug-shell.service
#   Loaded: masked (Reason: Unit debug-shell.service is masked.)
#   Active: inactive (dead)
#
#   If the "debug-shell.service" is loaded and not masked, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to mask the debug-shell systemd service with the
#   following command:
#
#   $ sudo systemctl disable --now debug-shell.service
#   $ sudo systemctl mask --now debug-shell.service
# =============================================================================

- name: "RHEL-10-700970 | RHEL 10 must disable the debug-shell systemd service."
  when: rhel_10_700970 | bool
  tags:
    - RHEL-10-700970
    - medium
    - CCI-002235
  block:
    - name: "RHEL-10-700970 | Check if debug-shell.service is masked"
      ansible.builtin.command:
        cmd: systemctl status debug-shell.service
      register: rhel_10_700970_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700970 | Disable debug-shell.service"
      ansible.builtin.command:
        cmd: systemctl disable --now debug-shell.service
      when: "'masked' not in rhel_10_700970_check.stdout | lower"
      changed_when: true
      failed_when: false

    - name: "RHEL-10-700970 | Mask debug-shell.service"
      ansible.builtin.command:
        cmd: systemctl mask --now debug-shell.service
      when: "'masked' not in rhel_10_700970_check.stdout | lower"
      changed_when: true

    - name: "RHEL-10-700970 | Re-check debug-shell.service status"
      ansible.builtin.command:
        cmd: systemctl status debug-shell.service
      register: rhel_10_700970_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700970 | Assert debug-shell.service is masked"
      ansible.builtin.assert:
        that: "'masked' in rhel_10_700970_verify.stdout | lower"
        fail_msg: "result=FAIL stig_id=RHEL-10-700970 detail=debug-shell.service is not masked."
        success_msg: "result=PASS stig_id=RHEL-10-700970 detail=debug-shell.service is masked."

  rescue:
    - name: "RHEL-10-700970 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700970 detail=Task failed unexpectedly — see prior error for details."
