---
# =============================================================================
# STIG ID  : RHEL-10-700980
# Rule ID  : SV-281300r1167050_rule
# Severity : medium
# CCI      : CCI-000381
# Title    : RHEL 10 must disable the ability of systemd to spawn an interactive boot process.
#
# Description:
#   Using interactive or recovery boot, the console user could disable
#   auditing, firewalls, or other services, weakening system security.
#
# Check Text:
#   Verify RHEL 10 is configured so that the current GRUB 2 configuration
#   disables the ability of systemd to spawn an interactive boot process with
#   the following command:
#
#   $ sudo grubby --info=ALL | grep args | grep 'systemd.confirm_spawn'
#
#   If any output is returned, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 so that the current GRUB 2 configuration disables the
#   ability of systemd to spawn an interactive boot process with the
#   following command:
#
#   $ sudo grubby --update-kernel=ALL --remove-args="systemd.confirm_spawn"
# =============================================================================

- name: "RHEL-10-700980 | RHEL 10 must disable the ability of systemd to spawn an interactive boot process."
  when: rhel_10_700980 | bool
  tags:
    - RHEL-10-700980
    - medium
    - CCI-000381
  block:
    - name: "RHEL-10-700980 | Check for systemd.confirm_spawn in kernel boot args"
      ansible.builtin.command:
        cmd: grubby --info=ALL
      register: rhel_10_700980_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700980 | Remove systemd.confirm_spawn from all kernel entries"
      ansible.builtin.command:
        cmd: grubby --update-kernel=ALL --remove-args="systemd.confirm_spawn"
      when: "'systemd.confirm_spawn' in rhel_10_700980_check.stdout"
      changed_when: true

    - name: "RHEL-10-700980 | Re-check for systemd.confirm_spawn in kernel boot args"
      ansible.builtin.command:
        cmd: grubby --info=ALL
      register: rhel_10_700980_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700980 | Assert systemd.confirm_spawn is not in kernel boot args"
      ansible.builtin.assert:
        that: "'systemd.confirm_spawn' not in rhel_10_700980_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-700980 detail=systemd.confirm_spawn is still present in kernel boot args after remediation."
        success_msg: "result=PASS stig_id=RHEL-10-700980 detail=systemd.confirm_spawn is not present in kernel boot args."

  rescue:
    - name: "RHEL-10-700980 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700980 detail=Task failed unexpectedly — see prior error for details."
