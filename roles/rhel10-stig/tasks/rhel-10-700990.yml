---
# =============================================================================
# STIG ID  : RHEL-10-700990
# Rule ID  : SV-281301r1184700_rule
# Severity : medium
# CCI      : CCI-001084
# Title    : RHEL 10 must disable virtual system calls.
#
# Description:
#   System calls are special routines in the Linux kernel, which userspace
#   applications ask to do privileged tasks. Invoking a system call is an
#   expensive operation because the processor must interrupt the currently
#   executing task and switch context to kernel mode and then back to
#   userspace after the system call completes. Virtual system calls map into
#   user space a page that contains some variables and the implementation of
#   some system calls. This allows the system calls to be executed in
#   userspace to alleviate the context-switching expense. Virtual system
#   calls provide an opportunity of attack for a user who has control of the
#   return instruction pointer. Disabling virtual system calls help to
#   prevent return-oriented programming attacks via buffer overflows and
#   overruns.
#
# Check Text:
#   Verify RHEL 10 is configured so that the current GRUB 2 configuration
#   disables virtual system calls with the following command:
#
#   $ sudo grubby --info=ALL | grep args | grep -v 'vsyscall=none'
#
#   If any output is returned, this is a finding.
#
#   Check that virtual system calls are disabled by default to persist in
#   kernel updates with the following command:
#
#   $ sudo grep vsyscall /etc/default/grub
#   GRUB_CMDLINE_LINUX="vsyscall=none"
#
#   If "vsyscall" is not set to "none", is missing or commented out, and is
#   not documented with the information system security officer as an
#   operational requirement, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to disable virtual system calls with the following
#   command:
#
#   $ sudo grubby --update-kernel=ALL --args="vsyscall=none"
# =============================================================================

- name: "RHEL-10-700990 | RHEL 10 must disable virtual system calls."
  when: rhel_10_700990 | bool
  tags:
    - RHEL-10-700990
    - medium
    - CCI-001084
  block:
    - name: "RHEL-10-700990 | Check for vsyscall=none in kernel boot args via grubby"
      ansible.builtin.command:
        cmd: grubby --info=ALL
      register: rhel_10_700990_grubby
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700990 | Check for vsyscall=none in /etc/default/grub"
      ansible.builtin.command:
        cmd: grep vsyscall /etc/default/grub
      register: rhel_10_700990_grubdefault
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700990 | Add vsyscall=none to all kernel entries via grubby"
      ansible.builtin.command:
        cmd: grubby --update-kernel=ALL --args="vsyscall=none"
      when: "'vsyscall=none' not in rhel_10_700990_grubby.stdout"
      changed_when: true

    - name: "RHEL-10-700990 | Backup /etc/default/grub before modification"
      ansible.builtin.copy:
        src: /etc/default/grub
        dest: "/etc/default/grub.bak.{{ ansible_date_time.iso8601_basic_short }}"
        remote_src: true
        mode: '0644'
        owner: root
        group: root
      when: "'vsyscall=none' not in rhel_10_700990_grubdefault.stdout"

    - name: "RHEL-10-700990 | Ensure vsyscall=none is in GRUB_CMDLINE_LINUX in /etc/default/grub"
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX='
        line: 'GRUB_CMDLINE_LINUX="vsyscall=none"'
        state: present
        backrefs: false
      when: "'vsyscall=none' not in rhel_10_700990_grubdefault.stdout"

    - name: "RHEL-10-700990 | Re-check vsyscall=none in kernel boot args"
      ansible.builtin.command:
        cmd: grubby --info=ALL
      register: rhel_10_700990_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-700990 | Assert vsyscall=none is in kernel boot args"
      ansible.builtin.assert:
        that: "'vsyscall=none' in rhel_10_700990_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-700990 detail=vsyscall=none is not present in kernel boot args after remediation."
        success_msg: "result=PASS stig_id=RHEL-10-700990 detail=vsyscall=none is present in kernel boot args."

  rescue:
    - name: "RHEL-10-700990 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-700990 detail=Task failed unexpectedly — see prior error for details."
