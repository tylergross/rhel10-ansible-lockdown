---
# =============================================================================
# STIG ID  : RHEL-10-701040
# Rule ID  : SV-281306r1167068_rule
# Severity : medium
# CCI      : CCI-001082
# Title    : RHEL 10 must prevent kernel profiling by nonprivileged users.
#
# Description:
#   Preventing unauthorized information transfers mitigates the risk of
#   information, including encrypted representations of information, produced
#   by the actions of prior users/roles (or the actions of processes acting
#   on behalf of prior users/roles) from being available to any current
#   users/roles (or current processes) that obtain access to shared system
#   resources (e.g., registers, main memory, hard disks) after those
#   resources have been released back to information systems. The control of
#   information in shared resources is also commonly referred to as object
#   reuse and residual information protection. This requirement generally
#   applies to the design of an information technology product, but it can
#   also apply to the configuration of information system components that
#   are, or use, such products. This can be verified by acceptance/validation
#   processes in DOD or other government agencies. There may be shared
#   resources with configurable protections (e.g., files in storage) that may
#   be assessed on specific information system components. Setting the
#   "kernel.perf_event_paranoid" kernel parameter to "2" prevents attackers
#   from gaining additional system information as a nonprivileged user.
#   Satisfies: SRG-OS-000132-GPOS-00067, SRG-OS-000138-GPOS-00069
#
# Check Text:
#   Verify RHEL 10 is configured to prevent kernel profiling by nonprivileged
#   users.
#
#   Check the status of the "kernel.perf_event_paranoid" kernel parameter:
#
#   $ sudo sysctl kernel.perf_event_paranoid
#   kernel.perf_event_paranoid = 2
#
#   If "kernel.perf_event_paranoid" is not set to "2" or is missing, this is
#   a finding.
#
# Fix Text:
#   Configure RHEL 10 to prevent kernel profiling by nonprivileged users.
#
#   Create a drop-in if it does not already exist:
#
#   $ sudo vi /etc/sysctl.d/99-kernel_perf_event_paranoid.conf
#
#   Add the following to the file:
#
#   kernel.perf_event_paranoid = 2
#
#   Reload settings from all system configuration files with the following
#   command:
#
#   $ sudo sysctl --system
# =============================================================================

- name: "RHEL-10-701040 | RHEL 10 must prevent kernel profiling by nonprivileged users."
  when: rhel_10_701040 | bool
  tags:
    - RHEL-10-701040
    - medium
    - CCI-001082
  block:
    - name: "RHEL-10-701040 | Set sysctl kernel.perf_event_paranoid = 2"
      ansible.builtin.lineinfile:
        path: /etc/sysctl.d/rhel10-stig.conf
        regexp: '^#?\s*kernel\.perf_event_paranoid\s*='
        line: 'kernel.perf_event_paranoid = 2'
        create: true
        mode: '0644'
        owner: root
        group: root

    - name: "RHEL-10-701040 | Apply sysctl settings from conf file"
      ansible.builtin.command:
        cmd: sysctl -p /etc/sysctl.d/rhel10-stig.conf
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701040 | Verify kernel.perf_event_paranoid"
      ansible.builtin.command:
        cmd: sysctl kernel.perf_event_paranoid
      register: rhel_10_701040_sysctl
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701040 | Assert kernel.perf_event_paranoid = 2"
      ansible.builtin.assert:
        that: "'= 2' in rhel_10_701040_sysctl.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-701040 detail=kernel.perf_event_paranoid is not set to 2 (output={{ rhel_10_701040_sysctl.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-701040 detail=kernel.perf_event_paranoid is set to 2."

  rescue:
    - name: "RHEL-10-701040 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-701040 detail=Task failed unexpectedly — see prior error for details."
