---
# =============================================================================
# STIG ID  : RHEL-10-701050
# Rule ID  : SV-281307r1184629_rule
# Severity : high
# CCI      : CCI-003992
# Title    : RHEL 10 must prevent the loading of a new kernel for later execution.
#
# Description:
#   Changes to any software components can have significant effects on the
#   overall security of the operating system. This requirement ensures the
#   software has not been tampered with and has been provided by a trusted
#   vendor. Disabling kexec_load prevents an unsigned kernel image (that
#   could be a windows kernel or modified vulnerable kernel) from being
#   loaded. Kexec can be used to subvert the entire secureboot process and
#   should be avoided at all costs, especially because it can load unsigned
#   kernel images.
#
# Check Text:
#   Verify RHEL 10 is configured to disable kernel image loading.
#
#   Check the status of the "kernel.kexec_load_disabled" kernel parameter
#   with the following command:
#
#   $ sudo sysctl kernel.kexec_load_disabled
#   kernel.kexec_load_disabled = 1
#
#   If "kernel.kexec_load_disabled" is not set to "1" or is missing, this is
#   a finding.
#
# Fix Text:
#   Configure RHEL 10 to disable kernel image loading.
#
#   Create a drop-in if it does not already exist:
#
#   $ sudo vi /etc/sysctl.d/99-kernel_kexec_load_disabled.conf
#
#   Add the following to the file:
#
#   kernel.kexec_load_disabled = 1
#
#   Reload settings from all system configuration files with the following
#   command:
#
#   $ sudo sysctl --system
# =============================================================================

- name: "RHEL-10-701050 | RHEL 10 must prevent the loading of a new kernel for later execution."
  when: rhel_10_701050 | bool
  tags:
    - RHEL-10-701050
    - high
    - CCI-003992
  block:
    - name: "RHEL-10-701050 | Set sysctl kernel.kexec_load_disabled = 1"
      ansible.builtin.lineinfile:
        path: /etc/sysctl.d/rhel10-stig.conf
        regexp: '^#?\s*kernel\.kexec_load_disabled\s*='
        line: 'kernel.kexec_load_disabled = 1'
        create: true
        mode: '0644'
        owner: root
        group: root

    - name: "RHEL-10-701050 | Apply sysctl settings from conf file"
      ansible.builtin.command:
        cmd: sysctl -p /etc/sysctl.d/rhel10-stig.conf
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701050 | Verify kernel.kexec_load_disabled"
      ansible.builtin.command:
        cmd: sysctl kernel.kexec_load_disabled
      register: rhel_10_701050_sysctl
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701050 | Assert kernel.kexec_load_disabled = 1"
      ansible.builtin.assert:
        that: "'= 1' in rhel_10_701050_sysctl.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-701050 detail=kernel.kexec_load_disabled is not set to 1 (output={{ rhel_10_701050_sysctl.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-701050 detail=kernel.kexec_load_disabled is set to 1."

  rescue:
    - name: "RHEL-10-701050 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-701050 detail=Task failed unexpectedly — see prior error for details."
