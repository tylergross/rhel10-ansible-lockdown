---
# =============================================================================
# STIG ID  : RHEL-10-701100
# Rule ID  : SV-281312r1167086_rule
# Severity : medium
# CCI      : CCI-000381
# Title    : RHEL 10 must be configured to disable the Controller Area Network (CAN) kernel module.
#
# Description:
#   Disabling CAN protects the system against exploitation of any flaws in
#   its implementation.
#
# Check Text:
#   Verify RHEL 10 disables the ability to load the CAN kernel module with
#   the following command:
#
#   $ sudo grep -rs can /etc/modprobe.conf /etc/modprobe.d/* | grep -v '#'
#   /etc/modprobe.d/can.conf:install can /bin/false
#   /etc/modprobe.d/can.conf:blacklist can
#
#   If the command does not return any output, or the lines are commented
#   out, and use of CAN is not documented with the information system
#   security officer as an operational requirement, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to disable the ability to load the CAN kernel module.
#
#   Create a drop-in if it does not already exist:
#
#   $ sudo vi /etc/modprobe.d/can.conf
#
#   Add the following lines to the file:
#
#   install can /bin/false
#   blacklist can
# =============================================================================

- name: "RHEL-10-701100 | RHEL 10 must be configured to disable the Controller Area Network (CAN) kernel module."
  when: rhel_10_701100 | bool
  tags:
    - RHEL-10-701100
    - medium
    - CCI-000381
  block:
    - name: "RHEL-10-701100 | Check can install rule in modprobe"
      ansible.builtin.command:
        cmd: >-
          grep -rs 'install can /bin/false' /etc/modprobe.conf /etc/modprobe.d/
      register: rhel_10_701100_install_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701100 | Check can blacklist rule in modprobe"
      ansible.builtin.command:
        cmd: >-
          grep -rs 'blacklist can' /etc/modprobe.conf /etc/modprobe.d/
      register: rhel_10_701100_blacklist_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701100 | Set can install rule in /etc/modprobe.d/can.conf"
      ansible.builtin.lineinfile:
        path: /etc/modprobe.d/can.conf
        line: 'install can /bin/false'
        state: present
        create: true
        mode: '0644'
        owner: root
        group: root
      when: rhel_10_701100_install_check.rc != 0

    - name: "RHEL-10-701100 | Set can blacklist rule in /etc/modprobe.d/can.conf"
      ansible.builtin.lineinfile:
        path: /etc/modprobe.d/can.conf
        line: 'blacklist can'
        state: present
        create: true
        mode: '0644'
        owner: root
        group: root
      when: rhel_10_701100_blacklist_check.rc != 0

    - name: "RHEL-10-701100 | Re-check can configuration in modprobe"
      ansible.builtin.command:
        cmd: >-
          grep -rs 'can' /etc/modprobe.conf /etc/modprobe.d/
      register: rhel_10_701100_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701100 | Assert can is disabled in modprobe"
      ansible.builtin.assert:
        that:
          - "'install can /bin/false' in rhel_10_701100_verify.stdout"
          - "'blacklist can' in rhel_10_701100_verify.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-701100 detail=can is not fully disabled in modprobe (install and/or blacklist missing)."
        success_msg: "result=PASS stig_id=RHEL-10-701100 detail=can is disabled via modprobe install and blacklist rules."

  rescue:
    - name: "RHEL-10-701100 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-701100 detail=Task failed unexpectedly — see prior error for details."
