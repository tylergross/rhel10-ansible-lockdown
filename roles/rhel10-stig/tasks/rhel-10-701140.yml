---
# =============================================================================
# STIG ID  : RHEL-10-701140
# Rule ID  : SV-281316r1167098_rule
# Severity : medium
# CCI      : CCI-001082
# Title    : RHEL 10 must restrict usage of ptrace to descendant processes.
#
# Description:
#   Unrestricted usage of ptrace allows compromised binaries to run ptrace on
#   other processes of the user. The attacker can then steal sensitive
#   information from the target processes (e.g., SSH sessions, web browser,
#   etc.) without any additional assistance from the user (i.e., without
#   resorting to phishing).
#
# Check Text:
#   Verify RHEL 10 restricts the usage of ptrace to descendant processes.
#
#   Check the status of the "kernel.yama.ptrace_scope" kernel parameter with
#   the following command:
#
#   $ sysctl kernel.yama.ptrace_scope
#   kernel.yama.ptrace_scope = 1
#
#   If the network parameter "kernel.yama.ptrace_scope" is not equal to "1",
#   or nothing is returned, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to restrict the usage of ptrace to descendant
#   processes.
#
#   Create the drop-in if it does not already exist:
#
#   $ sudo vi /etc/sysctl.d/99-kernel_yama.ptrace_scope.conf
#
#   Add the following line to the file:
#
#   kernel.yama.ptrace_scope = 1
#
#   Reload settings from all system configuration files with the following
#   command:
#
#   $ sudo sysctl --system
# =============================================================================

- name: "RHEL-10-701140 | RHEL 10 must restrict usage of ptrace to descendant processes."
  when: rhel_10_701140 | bool
  tags:
    - RHEL-10-701140
    - medium
    - CCI-001082
  block:
    - name: "RHEL-10-701140 | Set sysctl kernel.yama.ptrace_scope = 1"
      ansible.builtin.lineinfile:
        path: /etc/sysctl.d/rhel10-stig.conf
        regexp: '^#?\s*kernel\.yama\.ptrace_scope\s*='
        line: 'kernel.yama.ptrace_scope = 1'
        create: true
        mode: '0644'
        owner: root
        group: root

    - name: "RHEL-10-701140 | Apply sysctl settings from conf file"
      ansible.builtin.command:
        cmd: sysctl -p /etc/sysctl.d/rhel10-stig.conf
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701140 | Verify kernel.yama.ptrace_scope"
      ansible.builtin.command:
        cmd: sysctl kernel.yama.ptrace_scope
      register: rhel_10_701140_sysctl
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701140 | Assert kernel.yama.ptrace_scope = 1"
      ansible.builtin.assert:
        that: "'= 1' in rhel_10_701140_sysctl.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-701140 detail=kernel.yama.ptrace_scope is not set to 1 (output={{ rhel_10_701140_sysctl.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-701140 detail=kernel.yama.ptrace_scope is set to 1."

  rescue:
    - name: "RHEL-10-701140 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-701140 detail=Task failed unexpectedly — see prior error for details."
