---
# =============================================================================
# STIG ID  : RHEL-10-701190
# Rule ID  : SV-281321r1167113_rule
# Severity : medium
# CCI      : CCI-002824
# Title    : RHEL 10 must implement nonexecutable data to protect its memory from unauthorized code execution.
#
# Description:
#   ExecShield uses the segmentation feature on all x86 systems to prevent
#   execution in memory higher than a certain address. It writes an address
#   as a limit in the code segment descriptor, to control where code can be
#   executed, on a per-process basis. When the kernel places a process's
#   memory regions, such as the stack and heap, higher than this address, the
#   hardware prevents execution in that address range. This is enabled by
#   default on the latest Red Hat and Fedora systems if supported by the
#   hardware. Checking "dmesg" will return a false-positive if the system has
#   generated enough kernel messages that the "(Execute Disable) protection:
#   active" line is no longer present in the output from "dmesg(1)". A better
#   way to ensure that ExecShield is enabled is to first ensure all
#   processors support the NX feature, and then to check that "noexec" was
#   not passed to the kernel command line.
#
# Check Text:
#   Verify RHEL 10 enables ExecShield.
#
#   Run the following command:
#
#   $ sudo grep ^flags /proc/cpuinfo | grep -Ev
#   '([^[:alnum:]])(nx)([^[:alnum:]]|$)'
#
#   If any output is returned, this is a finding.
#
#   Run the following command:
#
#   $ sudo grubby --info=ALL | grep args | grep -E
#   '([^[:alnum:]])(noexec)([^[:alnum:]])'
#
#   If any output is returned, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to enable ExecShield.
#
#   If "/proc/cpuinfo" shows that one or more processors do not enable
#   ExecShield (lack the "nx" feature flag), verify the NX/XD feature is not
#   disabled in the BIOS or UEFI. If it is disabled, enable it.
#
#   If the "noexec" option is present on the kernel command line, update the
#   GRUB 2 bootloader configuration to remove it by running the following
#   command:
#
#   $ sudo grubby --update-kernel=ALL --remove-args=noexec
# =============================================================================

- name: "RHEL-10-701190 | RHEL 10 must implement nonexecutable data to protect its memory from unauthorized code execution."
  when: rhel_10_701190 | bool
  tags:
    - RHEL-10-701190
    - medium
    - CCI-002824
  block:
    - name: "RHEL-10-701190 | Check CPU NX flag support"
      ansible.builtin.command:
        cmd: >-
          grep -c 'nx' /proc/cpuinfo
      register: rhel_10_701190_nx_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701190 | Check for noexec in kernel arguments"
      ansible.builtin.command:
        cmd: grubby --info=ALL
      register: rhel_10_701190_grubby_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701190 | Remove noexec from kernel arguments if present"
      ansible.builtin.command:
        cmd: grubby --update-kernel=ALL --remove-args=noexec
      when: "'noexec' in (rhel_10_701190_grubby_check.stdout | default(''))"
      changed_when: true

    - name: "RHEL-10-701190 | Re-check kernel arguments after remediation"
      ansible.builtin.command:
        cmd: grubby --info=ALL
      register: rhel_10_701190_grubby_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701190 | Assert NX flag is present in CPU"
      ansible.builtin.assert:
        that: (rhel_10_701190_nx_check.stdout | default('0') | int) > 0
        fail_msg: "result=FAIL stig_id=RHEL-10-701190 detail=CPU does not support NX flag — BIOS/UEFI NX/XD feature may be disabled. Manual remediation required."
        success_msg: "result=PASS stig_id=RHEL-10-701190 detail=CPU NX flag is present."

    - name: "RHEL-10-701190 | Assert noexec is not in kernel arguments"
      ansible.builtin.assert:
        that: "'noexec' not in (rhel_10_701190_grubby_verify.stdout | default(''))"
        fail_msg: "result=FAIL stig_id=RHEL-10-701190 detail=noexec is still present in kernel boot arguments after remediation attempt."
        success_msg: "result=PASS stig_id=RHEL-10-701190 detail=noexec is not present in kernel boot arguments."

  rescue:
    - name: "RHEL-10-701190 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-701190 detail=Task failed unexpectedly — see prior error for details."
