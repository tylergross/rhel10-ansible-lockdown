---
# =============================================================================
# STIG ID  : RHEL-10-701210
# Rule ID  : SV-281323r1167119_rule
# Severity : medium
# CCI      : CCI-000778
# Title    : RHEL 10 must disable file system automount function unless required.
#
# Description:
#   An authentication process resists replay attacks if it is impractical to
#   achieve a successful authentication by recording and replaying a previous
#   authentication message. Satisfies: SRG-OS-000114-GPOS-00059,
#   SRG-OS-000378-GPOS-00163
#
# Check Text:
#   Note: If the "autofs" service is not installed, this requirement is not
#   applicable.
#
#   Verify RHEL 10 is configured so that the file system automount function
#   has been disabled with the following command:
#
#   $ systemctl is-enabled autofs
#   masked
#
#   If the returned value is not "masked", "disabled", or "not-found" and is
#   not documented as an operational requirement with the information system
#   security officer, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to disable the ability to automount devices.
#
#   The "autofs" service can be disabled with the following command:
#
#   $ sudo systemctl mask --now autofs.service
# =============================================================================

- name: "RHEL-10-701210 | RHEL 10 must disable file system automount function unless required."
  when: rhel_10_701210 | bool
  tags:
    - RHEL-10-701210
    - medium
    - CCI-000778
  block:
    - name: "RHEL-10-701210 | Check autofs service state"
      ansible.builtin.command:
        cmd: systemctl is-enabled autofs
      register: rhel_10_701210_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701210 | Disable and mask autofs service"
      ansible.builtin.systemd:
        name: autofs
        enabled: false
        masked: true
        state: stopped
      when:
        - rhel_10_701210_check.stdout | trim not in ['masked', 'disabled', 'not-found', '']
        - rhel_10_701210_check.rc != 4
      failed_when: false

    - name: "RHEL-10-701210 | Re-check autofs service state"
      ansible.builtin.command:
        cmd: systemctl is-enabled autofs
      register: rhel_10_701210_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701210 | Assert autofs is masked, disabled, or not installed"
      ansible.builtin.assert:
        that: >
          rhel_10_701210_verify.stdout | trim in ['masked', 'disabled', 'not-found'] or
          rhel_10_701210_verify.rc == 4
        fail_msg: "result=FAIL stig_id=RHEL-10-701210 detail=autofs service is not masked or disabled (state={{ rhel_10_701210_verify.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-701210 detail=autofs service is correctly restricted (state={{ rhel_10_701210_verify.stdout | trim }})."

  rescue:
    - name: "RHEL-10-701210 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-701210 detail=Task failed unexpectedly — see prior error for details."
