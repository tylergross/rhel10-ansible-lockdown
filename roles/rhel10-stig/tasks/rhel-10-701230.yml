---
# =============================================================================
# STIG ID  : RHEL-10-701230
# Rule ID  : SV-281325r1184772_rule
# Severity : medium
# CCI      : CCI-004046
# Title    : RHEL 10 must implement certificate status checking for multifactor authentication.
#
# Description:
#   Using an authentication device, such as a DOD common access card (CAC) or
#   token that is separate from the information system, ensures that even if
#   the information system is compromised, credentials stored on the
#   authentication device will not be affected. Multifactor solutions that
#   require devices separate from information systems gaining access include,
#   for example, hardware tokens providing time-based or challenge-response
#   authenticators and smart cards such as the U.S. Government Personal
#   Identity Verification (PIV) card and the DOD CAC. RHEL 10 includes
#   multiple options for configuring certificate status checking but for this
#   requirement focuses on the System Security Services Daemon (SSSD). By
#   default, SSSD performs Online Certificate Status Protocol (OCSP) checking
#   and certificate verification using a sha256 digest function. Satisfies:
#   SRG-OS-000375-GPOS-00160, SRG-OS-000377-GPOS-00162,
#   SRG-OS-000705-GPOS-00150
#
# Check Text:
#   Note: If the system administrator (SA) demonstrates the use of an
#   approved alternate multifactor authentication method, this requirement is
#   not applicable.
#
#   Verify RHEL 10 implements OCSP and is using the proper digest value on
#   the system with the following command:
#
#   $ sudo grep -irs certificate_verification /etc/sssd/sssd.conf
#   /etc/sssd/conf.d/ | grep -v "^#"
#   /etc/sssd/conf.d/certificate_verification.conf:certificate_verification =
#   ocsp_dgst=sha512
#
#   If the certificate_verification line is missing from the [sssd] section,
#   or is missing "ocsp_dgst=sha512", ask the SA to indicate what type of
#   multifactor authentication is being used and how the system implements
#   certificate status checking.
#
#   If there is no evidence of certificate status checking being used, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to implement certificate status checking for
#   multifactor authentication.
#
#   Review the "/etc/sssd/conf.d/certificate_verification.conf" file to
#   determine if the system is configured to prevent OCSP or certificate
#   verification.
#
#   Add the following line to the [sssd] section of the
#   "/etc/sssd/conf.d/certificate_verification.conf" file:
#
#   certificate_verification = ocsp_dgst=sha512
#
#   Set the correct ownership and permissions on the
#   "/etc/sssd/conf.d/certificate_verification.conf" file by running these
#   commands:
#
#   $ sudo chown root:root "/etc/sssd/conf.d/certificate_verification.conf"
#   $ sudo chmod 600 "/etc/sssd/conf.d/certificate_verification.conf"
#
#   Restart the "sssd" service with the following command for the changes to
#   take effect:
#
#   $ sudo systemctl restart sssd.service
# =============================================================================

- name: "RHEL-10-701230 | RHEL 10 must implement certificate status checking for multifactor authentication."
  when: rhel_10_701230 | bool
  tags:
    - RHEL-10-701230
    - medium
    - CCI-004046
  block:
    - name: "RHEL-10-701230 | Check current certificate_verification setting"
      ansible.builtin.command:
        cmd: grep -irs certificate_verification /etc/sssd/sssd.conf /etc/sssd/conf.d/ 2>/dev/null || true
      register: rhel_10_701230_check
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701230 | Check if 10-stig.conf already exists"
      ansible.builtin.stat:
        path: /etc/sssd/conf.d/10-stig.conf
      register: rhel_10_701230_stig_conf_stat

    - name: "RHEL-10-701230 | Backup 10-stig.conf if it exists and needs modification"
      ansible.builtin.copy:
        src: /etc/sssd/conf.d/10-stig.conf
        dest: "/etc/sssd/conf.d/10-stig.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when:
        - rhel_10_701230_stig_conf_stat.stat.exists
        - "'ocsp_dgst=sha512' not in (rhel_10_701230_check.stdout | default(''))"

    - name: "RHEL-10-701230 | Set certificate_verification = ocsp_dgst=sha512 in sssd conf.d"
      ansible.builtin.lineinfile:
        path: /etc/sssd/conf.d/10-stig.conf
        regexp: '^#?\s*certificate_verification\s*='
        line: 'certificate_verification = ocsp_dgst=sha512'
        state: present
        create: true
        owner: root
        group: root
        mode: '0600'
      when: "'ocsp_dgst=sha512' not in (rhel_10_701230_check.stdout | default(''))"
      register: rhel_10_701230_changed

    - name: "RHEL-10-701230 | Restart sssd after configuration change"
      ansible.builtin.systemd:
        name: sssd
        state: restarted
      when: rhel_10_701230_changed is changed
      failed_when: false

    - name: "RHEL-10-701230 | Re-check certificate_verification setting"
      ansible.builtin.command:
        cmd: grep -irs certificate_verification /etc/sssd/sssd.conf /etc/sssd/conf.d/ 2>/dev/null || true
      register: rhel_10_701230_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-701230 | Assert certificate_verification includes ocsp_dgst=sha512"
      ansible.builtin.assert:
        that: "'ocsp_dgst=sha512' in (rhel_10_701230_verify.stdout | default(''))"
        fail_msg: "result=FAIL stig_id=RHEL-10-701230 detail=certificate_verification with ocsp_dgst=sha512 is not configured in sssd."
        success_msg: "result=PASS stig_id=RHEL-10-701230 detail=certificate_verification = ocsp_dgst=sha512 is correctly configured in sssd."

  rescue:
    - name: "RHEL-10-701230 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-701230 detail=Task failed unexpectedly — see prior error for details."
