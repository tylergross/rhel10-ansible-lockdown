---
# =============================================================================
# STIG ID  : RHEL-10-800000
# Rule ID  : SV-281332r1167146_rule
# Severity : medium
# CCI      : CCI-000382
# Title    : RHEL 10 must control remote access methods.
#
# Description:
#   To prevent unauthorized connection of devices, unauthorized transfer of
#   information, or unauthorized tunneling (i.e., embedding of data types
#   within data types), organizations must disable or restrict unused or
#   unnecessary physical and logical ports/protocols on information systems.
#   Operating systems are capable of providing a wide variety of functions
#   and services. Some of the functions and services provided by default may
#   not be necessary to support essential organizational operations.
#   Additionally, it is sometimes convenient to provide multiple services
#   from a single component (e.g., VPN and IPS); however, doing so increases
#   risk over limiting the services provided by one component. To support the
#   requirements and principles of least functionality, the operating system
#   must support the organizational requirements, providing only essential
#   capabilities and limiting the use of ports, protocols, and/or services to
#   only those required, authorized, and approved to conduct official
#   business. Satisfies: SRG-OS-000096-GPOS-00050, SRG-OS-000297-GPOS-00115
#
# Check Text:
#   Verify RHEL 10 controls remote access methods by inspecting the firewall
#   configuration.
#
#   Inspect the list of enabled firewall ports and verify they are configured
#   correctly by running the following command:
#
#   $ sudo firewall-cmd --list-all
#
#   Ask the system administrator for the site or program Ports, Protocols,
#   and Services Management Component Local Service Assessment (PPSM CLSA).
#   Verify the services allowed by the firewall match the PPSM CLSA.
#
#   If there are additional ports, protocols, or services that are not in the
#   PPSM CLSA, or there are ports, protocols, or services that are prohibited
#   by the PPSM Category Assurance List (CAL), or there are no firewall rules
#   configured, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to allow approved settings and/or running services to
#   comply with the PPSM CLSA for the site or program and the PPSM CAL.
#
#   To open a port for a service, configure "firewalld" using the following
#   command:
#
#   $ sudo firewall-cmd --permanent --add-port=port_number/tcp
#   or
#   $ sudo firewall-cmd --permanent --add-service=service_name
# =============================================================================

- name: "RHEL-10-800000 | RHEL 10 must control remote access methods."
  when: rhel_10_800000 | bool
  tags:
    - RHEL-10-800000
    - medium
    - CCI-000382
  block:
    - name: "RHEL-10-800000 | Check firewalld is active"
      ansible.builtin.command:
        cmd: systemctl is-active firewalld
      register: rhel_10_800000_svc
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800000 | List all active firewall rules"
      ansible.builtin.command:
        cmd: firewall-cmd --list-all
      register: rhel_10_800000_rules
      changed_when: false
      failed_when: false
      when: rhel_10_800000_svc.stdout | trim == 'active'

    - name: "RHEL-10-800000 | Assert firewalld is active and controlling remote access"
      ansible.builtin.assert:
        that: rhel_10_800000_svc.stdout | trim == 'active'
        fail_msg: "result=FAIL stig_id=RHEL-10-800000 detail=firewalld is not active (status={{ rhel_10_800000_svc.stdout | trim }}). Remote access methods are not controlled."
        success_msg: "result=PASS stig_id=RHEL-10-800000 detail=firewalld is active. Verify allowed ports/services match the PPSM CLSA manually."

  rescue:
    - name: "RHEL-10-800000 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-800000 detail=Task failed unexpectedly — see prior error for details."
