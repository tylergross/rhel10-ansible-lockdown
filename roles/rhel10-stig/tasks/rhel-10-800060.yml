---
# =============================================================================
# STIG ID  : RHEL-10-800060
# Rule ID  : SV-281338r1167164_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must have at least two name servers configured for systems using Domain Name Server (DNS) resolution.
#
# Description:
#   To provide availability for name resolution services, multiple redundant
#   name servers are mandated. A failure in name resolution could lead to the
#   failure of security functions requiring name resolution, which may
#   include time synchronization, centralized authentication, and remote
#   system logging.
#
# Check Text:
#   Note: If the system is running in a cloud platform and the cloud provider
#   gives a single, highly available IP address for DNS configuration, this
#   control is not applicable.
#
#   Verify RHEL 10 has at least two name servers configured for systems using
#   DNS resolution.
#
#   Verify the name servers used by the system with the following command:
#
#   $ sudo grep nameserver /etc/resolv.conf
#   nameserver 192.168.1.2
#   nameserver 192.168.1.3
#
#   If fewer than two lines are returned that are not commented out, this is
#   a finding.
#
# Fix Text:
#   Configure RHEL 10 to use two or more name servers for DNS resolution
#   based on the DNS mode of the system.
#
#   If the NetworkManager DNS mode is set to "none", add the following lines
#   to "/etc/resolv.conf":
#
#   nameserver [name server 1]
#   nameserver [name server 2]
#
#   Replace [name server 1] and [name server 2] with the IPs of two different
#   DNS resolvers.
#
#   If the NetworkManager DNS mode is set to "default", add two DNS servers
#   to a NetworkManager connection using the following command:
#
#   $ nmcli connection modify [connection name] ipv4.dns [name server
#   1],[name server 2]
#
#   Replace [name server 1] and [name server 2] with the IPs of two different
#   DNS resolvers.
#
#   Replace [connection name] with a valid NetworkManager connection name on
#   the system.
#
#   Replace ipv4 with ipv6 if IPv6 DNS servers are used.
# =============================================================================

- name: "RHEL-10-800060 | RHEL 10 must have at least two name servers configured for systems using Domain Name Server (DNS) resolution."
  when: rhel_10_800060 | bool
  tags:
    - RHEL-10-800060
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-800060 | Check existing nameserver entries in /etc/resolv.conf"
      ansible.builtin.command:
        cmd: grep -c '^nameserver' /etc/resolv.conf
      register: rhel_10_800060_count
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800060 | Backup /etc/resolv.conf before modification"
      ansible.builtin.copy:
        src: /etc/resolv.conf
        dest: "/etc/resolv.conf.bak.{{ ansible_date_time.epoch }}"
        remote_src: true
        mode: preserve
      when: rhel_10_800060_count.stdout | int < 2

    - name: "RHEL-10-800060 | Add configured nameservers to /etc/resolv.conf"
      ansible.builtin.lineinfile:
        path: /etc/resolv.conf
        line: "nameserver {{ item }}"
        state: present
      loop: "{{ rhel_10_800060_nameservers }}"
      when: rhel_10_800060_count.stdout | int < 2

    - name: "RHEL-10-800060 | Re-check nameserver count in /etc/resolv.conf"
      ansible.builtin.command:
        cmd: grep -c '^nameserver' /etc/resolv.conf
      register: rhel_10_800060_verify
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800060 | Assert at least two nameservers are configured"
      ansible.builtin.assert:
        that: rhel_10_800060_verify.stdout | int >= 2
        fail_msg: "result=FAIL stig_id=RHEL-10-800060 detail=Fewer than 2 nameservers configured in /etc/resolv.conf (count={{ rhel_10_800060_verify.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-800060 detail={{ rhel_10_800060_verify.stdout | trim }} nameserver(s) configured in /etc/resolv.conf."

  rescue:
    - name: "RHEL-10-800060 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-800060 detail=Task failed unexpectedly — see prior error for details."
