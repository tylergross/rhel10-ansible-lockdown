---
# =============================================================================
# STIG ID  : RHEL-10-800080
# Rule ID  : SV-281340r1167170_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must be configured to use Transmission Control Protocol (TCP) syncookies.
#
# Description:
#   Denial of service (DoS) is a condition when a resource is not available
#   for legitimate users. When this occurs, the organization either cannot
#   accomplish its mission or must operate at degraded capacity. Managing
#   excess capacity ensures that sufficient capacity is available to counter
#   flooding attacks. Employing increased capacity and service redundancy may
#   reduce the susceptibility to some DoS attacks. Managing excess capacity
#   may include, for example, establishing selected usage priorities, quotas,
#   or partitioning. Satisfies: SRG-OS-000420-GPOS-00186,
#   SRG-OS-000142-GPOS-00071
#
# Check Text:
#   Verify RHEL 10 is configured to use Internet Protocol version 4 (IPv4)
#   TCP syncookies.
#
#   Check the value of all "net.ipv4.tcp_syncookies" variables with the
#   following command:
#
#   $ sudo sysctl net.ipv4.tcp_syncookies
#   net.ipv4.tcp_syncookies = 1
#
#   If the network parameter "ipv4.tcp_syncookies" is not equal to "1", or
#   nothing is returned, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to use TCP syncookies.
#
#   Create a configuration file if it does not already exist:
#
#   $ sudo vi /etc/sysctl.d/99-ipv4_tcp_syncookies.conf
#
#   Add the following line to the file:
#
#   net.ipv4.tcp_syncookies = 1
#
#   Reload settings from all system configuration files with the following
#   command:
#
#   $ sudo sysctl --system
# =============================================================================

- name: "RHEL-10-800080 | RHEL 10 must be configured to use Transmission Control Protocol (TCP) syncookies."
  when: rhel_10_800080 | bool
  tags:
    - RHEL-10-800080
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-800080 | Set sysctl net.ipv4.tcp_syncookies = 1"
      ansible.builtin.lineinfile:
        path: /etc/sysctl.d/rhel10-stig.conf
        regexp: '^#?\s*net\.ipv4\.tcp_syncookies\s*='
        line: 'net.ipv4.tcp_syncookies = 1'
        create: true
        mode: '0644'
        owner: root
        group: root

    - name: "RHEL-10-800080 | Apply sysctl settings from conf file"
      ansible.builtin.command:
        cmd: sysctl -p /etc/sysctl.d/rhel10-stig.conf
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800080 | Verify net.ipv4.tcp_syncookies"
      ansible.builtin.command:
        cmd: sysctl net.ipv4.tcp_syncookies
      register: rhel_10_800080_sysctl
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800080 | Assert net.ipv4.tcp_syncookies = 1"
      ansible.builtin.assert:
        that: "'= 1' in rhel_10_800080_sysctl.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-800080 detail=net.ipv4.tcp_syncookies is not set to 1 (output={{ rhel_10_800080_sysctl.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-800080 detail=net.ipv4.tcp_syncookies is set to 1."

  rescue:
    - name: "RHEL-10-800080 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-800080 detail=Task failed unexpectedly — see prior error for details."
