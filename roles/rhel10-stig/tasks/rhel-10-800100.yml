---
# =============================================================================
# STIG ID  : RHEL-10-800100
# Rule ID  : SV-281342r1167176_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must not forward Internet Protocol version 4 (IPv4) source-routed packets.
#
# Description:
#   Source-routed packets allow the source of the packet to suggest that
#   routers forward the packet along a different path than configured on the
#   router, which can be used to bypass network security measures. This
#   requirement applies only to the forwarding of source-routed traffic, such
#   as when IPv4 forwarding is enabled and the system is functioning as a
#   router. Accepting source-routed packets in the IPv4 protocol has few
#   legitimate uses. It must be disabled unless it is absolutely required.
#   Satisfies: SRG-OS-000420-GPOS-00186, SRG-OS-000142-GPOS-00073
#
# Check Text:
#   Verify RHEL 10 will not accept IPv4 source-routed packets.
#
#   Check the value of the "net.ipv4.conf.all.accept_source_route" variable
#   with the following command:
#
#   $ sudo sysctl net.ipv4.conf.all.accept_source_route
#   net.ipv4.conf.all.accept_source_route = 0
#
#   If "net.ipv4.conf.all.accept_source_route" is not set to "0" or is
#   missing, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to ignore IPv4 source-routed packets.
#
#   Create a configuration file if it does not already exist:
#
#   $ sudo vi /etc/sysctl.d/99-ipv4_accept_source.conf
#
#   Add the following line to the file:
#
#   net.ipv4.conf.all.accept_source_route = 0
#
#   Reload settings from all system configuration files with the following
#   command:
#
#   $ sudo sysctl --system
# =============================================================================

- name: "RHEL-10-800100 | RHEL 10 must not forward Internet Protocol version 4 (IPv4) source-routed packets."
  when: rhel_10_800100 | bool
  tags:
    - RHEL-10-800100
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-800100 | Set sysctl net.ipv4.conf.all.accept_source_route = 0"
      ansible.posix.sysctl:
        name: net.ipv4.conf.all.accept_source_route
        value: '0'
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/rhel10-stig.conf

    - name: "RHEL-10-800100 | Verify net.ipv4.conf.all.accept_source_route"
      ansible.builtin.command:
        cmd: sysctl net.ipv4.conf.all.accept_source_route
      register: rhel_10_800100_sysctl
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800100 | Assert net.ipv4.conf.all.accept_source_route = 0"
      ansible.builtin.assert:
        that: "'= 0' in rhel_10_800100_sysctl.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-800100 detail=net.ipv4.conf.all.accept_source_route is not set to 0 (output={{ rhel_10_800100_sysctl.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-800100 detail=net.ipv4.conf.all.accept_source_route is set to 0."

  rescue:
    - name: "RHEL-10-800100 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-800100 detail=Task failed unexpectedly — see prior error for details."
