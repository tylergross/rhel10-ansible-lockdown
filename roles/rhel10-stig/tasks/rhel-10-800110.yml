---
# =============================================================================
# STIG ID  : RHEL-10-800110
# Rule ID  : SV-281343r1167179_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must log Internet Protocol version 4 (IPv4) packets with impossible addresses.
#
# Description:
#   The presence of "martian" packets (which have impossible addresses), as
#   well as spoofed packets, source-routed packets, and redirects, could be a
#   sign of nefarious network activity. Logging these packets enables this
#   activity to be detected. Satisfies: SRG-OS-000420-GPOS-00186,
#   SRG-OS-000142-GPOS-00074
#
# Check Text:
#   Verify RHEL 10 logs IPv4 martian packets.
#
#   Check the value of the "net.ipv4.conf.all.log_martians" variable with the
#   following command:
#
#   $ sudo sysctl net.ipv4.conf.all.log_martians
#   net.ipv4.conf.all.log_martians = 1
#
#   If "net.ipv4.conf.all.log_martians" is not set to "1" or is missing, this
#   is a finding.
#
# Fix Text:
#   Configure RHEL 10 to log martian packets on IPv4 interfaces.
#
#   Create a configuration file if it does not already exist:
#
#   $ sudo vi /etc/sysctl.d/99-ipv4_log_martians.conf
#
#   Add the following line to the file:
#
#   net.ipv4.conf.all.log_martians=1
#
#   Reload settings from all system configuration files with the following
#   command:
#
#   $ sudo sysctl --system
# =============================================================================

- name: "RHEL-10-800110 | RHEL 10 must log Internet Protocol version 4 (IPv4) packets with impossible addresses."
  when: rhel_10_800110 | bool
  tags:
    - RHEL-10-800110
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-800110 | Set sysctl net.ipv4.conf.all.log_martians = 1"
      ansible.posix.sysctl:
        name: net.ipv4.conf.all.log_martians
        value: '1'
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/rhel10-stig.conf

    - name: "RHEL-10-800110 | Verify net.ipv4.conf.all.log_martians"
      ansible.builtin.command:
        cmd: sysctl net.ipv4.conf.all.log_martians
      register: rhel_10_800110_sysctl
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800110 | Assert net.ipv4.conf.all.log_martians = 1"
      ansible.builtin.assert:
        that: "'= 1' in rhel_10_800110_sysctl.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-800110 detail=net.ipv4.conf.all.log_martians is not set to 1 (output={{ rhel_10_800110_sysctl.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-800110 detail=net.ipv4.conf.all.log_martians is set to 1."

  rescue:
    - name: "RHEL-10-800110 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-800110 detail=Task failed unexpectedly — see prior error for details."
