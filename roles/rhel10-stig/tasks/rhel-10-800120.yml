---
# =============================================================================
# STIG ID  : RHEL-10-800120
# Rule ID  : SV-281344r1167182_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must log Internet Protocol version 4 (IPv4) packets with impossible addresses by default.
#
# Description:
#   The presence of "martian" packets (which have impossible addresses) as
#   well as spoofed packets, source-routed packets, and redirects, could be a
#   sign of nefarious network activity. Logging these packets enables this
#   activity to be detected. Satisfies: SRG-OS-000420-GPOS-00186,
#   SRG-OS-000142-GPOS-00075
#
# Check Text:
#   Verify RHEL 10 logs IPv4 martian packets by default.
#
#   Check the value of the "net.ipv4.conf.default.log_martians" variable with
#   the following command:
#
#   $ sudo sysctl net.ipv4.conf.default.log_martians
#   net.ipv4.conf.default.log_martians = 1
#
#   If "net.ipv4.conf.default.log_martians" is not set to "1" or is missing,
#   this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to log martian packets on IPv4 interfaces by default.
#
#   Create a configuration file if it does not already exist:
#
#   $ sudo vi /etc/sysctl.d/99-ipv4_log_martians.conf
#
#   Add the following line to the file:
#
#   net.ipv4.conf.default.log_martians=1
#
#   Reload settings from all system configuration files with the following
#   command:
#
#   $ sudo sysctl --system
# =============================================================================

- name: "RHEL-10-800120 | RHEL 10 must log Internet Protocol version 4 (IPv4) packets with impossible addresses by default."
  when: rhel_10_800120 | bool
  tags:
    - RHEL-10-800120
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-800120 | Set sysctl net.ipv4.conf.default.log_martians = 1"
      ansible.builtin.lineinfile:
        path: /etc/sysctl.d/rhel10-stig.conf
        regexp: '^#?\s*net\.ipv4\.conf\.default\.log_martians\s*='
        line: 'net.ipv4.conf.default.log_martians = 1'
        create: true
        mode: '0644'
        owner: root
        group: root

    - name: "RHEL-10-800120 | Apply sysctl settings from conf file"
      ansible.builtin.command:
        cmd: sysctl -p /etc/sysctl.d/rhel10-stig.conf
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800120 | Verify net.ipv4.conf.default.log_martians"
      ansible.builtin.command:
        cmd: sysctl net.ipv4.conf.default.log_martians
      register: rhel_10_800120_sysctl
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800120 | Assert net.ipv4.conf.default.log_martians = 1"
      ansible.builtin.assert:
        that: "'= 1' in rhel_10_800120_sysctl.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-800120 detail=net.ipv4.conf.default.log_martians is not set to 1 (output={{ rhel_10_800120_sysctl.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-800120 detail=net.ipv4.conf.default.log_martians is set to 1."

  rescue:
    - name: "RHEL-10-800120 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-800120 detail=Task failed unexpectedly — see prior error for details."
