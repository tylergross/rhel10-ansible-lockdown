---
# =============================================================================
# STIG ID  : RHEL-10-800130
# Rule ID  : SV-281345r1167185_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must use reverse path filtering on all Internet Protocol version 4 (IPv4) interfaces.
#
# Description:
#   Enabling reverse path filtering drops packets with source addresses that
#   should not have been able to be received on the interface on which they
#   were received. It must not be used on systems that are routers for
#   complicated networks but is helpful for end hosts and routers serving
#   small networks. Satisfies: SRG-OS-000420-GPOS-00186,
#   SRG-OS-000142-GPOS-00076
#
# Check Text:
#   Verify RHEL 10 uses reverse path filtering on all IPv4 interfaces.
#
#   Check the value of the "net.ipv4.conf.all.rp_filter" variable with the
#   following command:
#
#   $ sudo sysctl net.ipv4.conf.all.rp_filter
#   net.ipv4.conf.all.rp_filter = 1
#
#   If "net.ipv4.conf.all.rp_filter" is not set to "1" or is missing, this is
#   a finding.
#
# Fix Text:
#   Configure RHEL 10 to use reverse path filtering on all IPv4 interfaces.
#
#   Create a configuration file if it does not already exist:
#
#   $ sudo vi /etc/sysctl.d/99-ipv4_rp_filter.conf
#
#   Add the following line to the file:
#
#   net.ipv4.conf.all.rp_filter = 1
#
#   Reload settings from all system configuration files with the following
#   command:
#
#   $ sudo sysctl --system
# =============================================================================

- name: "RHEL-10-800130 | RHEL 10 must use reverse path filtering on all Internet Protocol version 4 (IPv4) interfaces."
  when: rhel_10_800130 | bool
  tags:
    - RHEL-10-800130
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-800130 | Set sysctl net.ipv4.conf.all.rp_filter = 1"
      ansible.posix.sysctl:
        name: net.ipv4.conf.all.rp_filter
        value: '1'
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/rhel10-stig.conf

    - name: "RHEL-10-800130 | Verify net.ipv4.conf.all.rp_filter"
      ansible.builtin.command:
        cmd: sysctl net.ipv4.conf.all.rp_filter
      register: rhel_10_800130_sysctl
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800130 | Assert net.ipv4.conf.all.rp_filter = 1"
      ansible.builtin.assert:
        that: "'= 1' in rhel_10_800130_sysctl.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-800130 detail=net.ipv4.conf.all.rp_filter is not set to 1 (output={{ rhel_10_800130_sysctl.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-800130 detail=net.ipv4.conf.all.rp_filter is set to 1."

  rescue:
    - name: "RHEL-10-800130 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-800130 detail=Task failed unexpectedly — see prior error for details."
