---
# =============================================================================
# STIG ID  : RHEL-10-800140
# Rule ID  : SV-281346r1197251_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must prevent Internet Protocol version 4 (IPv4) Internet Control Message Protocol (ICMP) redirect messages from being accepted.
#
# Description:
#   ICMP redirect messages are used by routers to inform hosts that a more
#   direct route exists for a particular destination. These messages modify
#   the host's route table and are unauthenticated. An illicit ICMP redirect
#   message could result in a man-in-the-middle attack. This feature of the
#   IPv4 protocol has few legitimate uses. It must be disabled unless
#   absolutely required. Satisfies: SRG-OS-000420-GPOS-00186,
#   SRG-OS-000142-GPOS-00077
#
# Check Text:
#   Verify RHEL 10 will not accept IPv4 ICMP redirect messages.
#
#   Check the value of the default "net.ipv4.conf.default.accept_redirects"
#   variable with the following command:
#
#   $ sudo sysctl net.ipv4.conf.default.accept_redirects
#   net.ipv4.conf.default.accept_redirects = 0
#
#   If "net.ipv4.conf.default.accept_redirects" is not set to "0" or is
#   missing, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to prevent IPv4 ICMP redirect messages from being
#   accepted.
#
#   Create a configuration file if it does not already exist:
#
#   $ sudo vi /etc/sysctl.d/99-ipv4_accept_redirects.conf
#
#   Add the following line to the file:
#
#   net.ipv4.conf.default.accept_redirects = 0
#
#   Reload settings from all system configuration files with the following
#   command:
#
#   $ sudo sysctl --system
# =============================================================================

- name: "RHEL-10-800140 | RHEL 10 must prevent Internet Protocol version 4 (IPv4) Internet Control Message Protocol (ICMP) redirect messages from being accepted."
  when: rhel_10_800140 | bool
  tags:
    - RHEL-10-800140
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-800140 | Set sysctl net.ipv4.conf.default.accept_redirects = 0"
      ansible.builtin.lineinfile:
        path: /etc/sysctl.d/rhel10-stig.conf
        regexp: '^#?\s*net\.ipv4\.conf\.default\.accept_redirects\s*='
        line: 'net.ipv4.conf.default.accept_redirects = 0'
        create: true
        mode: '0644'
        owner: root
        group: root

    - name: "RHEL-10-800140 | Apply sysctl settings from conf file"
      ansible.builtin.command:
        cmd: sysctl -p /etc/sysctl.d/rhel10-stig.conf
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800140 | Verify net.ipv4.conf.default.accept_redirects"
      ansible.builtin.command:
        cmd: sysctl net.ipv4.conf.default.accept_redirects
      register: rhel_10_800140_sysctl
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800140 | Assert net.ipv4.conf.default.accept_redirects = 0"
      ansible.builtin.assert:
        that: "'= 0' in rhel_10_800140_sysctl.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-800140 detail=net.ipv4.conf.default.accept_redirects is not set to 0 (output={{ rhel_10_800140_sysctl.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-800140 detail=net.ipv4.conf.default.accept_redirects is set to 0."

  rescue:
    - name: "RHEL-10-800140 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-800140 detail=Task failed unexpectedly — see prior error for details."
