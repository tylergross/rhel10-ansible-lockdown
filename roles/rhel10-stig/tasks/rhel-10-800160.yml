---
# =============================================================================
# STIG ID  : RHEL-10-800160
# Rule ID  : SV-281348r1167194_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must use a reverse-path filter for Internet Protocol version 4 (IPv4) network traffic when possible by default.
#
# Description:
#   Enabling reverse path filtering drops packets with source addresses that
#   should not have been able to be received on the interface on which they
#   were received. It must not be used on systems that are routers for
#   complicated networks but is helpful for end hosts and routers serving
#   small networks. Satisfies: SRG-OS-000420-GPOS-00186,
#   SRG-OS-000142-GPOS-00079
#
# Check Text:
#   Verify RHEL 10 uses reverse path filtering on IPv4 interfaces.
#
#   Check the value of the "net.ipv4.conf.default.rp_filter" with the
#   following command:
#
#   $ sudo sysctl net.ipv4.conf.default.rp_filter
#   net.ipv4.conf.default.rp_filter = 1
#
#   If the returned line does not have a value of "1", or a line is not
#   returned, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to use reverse path filtering on IPv4 interfaces by
#   default.
#
#   Create a configuration file if it does not already exist:
#
#   $ sudo vi /etc/sysctl.d/ipv4_rp_filter.conf
#
#   Add the following line to the file:
#
#   net.ipv4.conf.default.rp_filter = 1
#
#   Reload settings from all system configuration files with the following
#   command:
#
#   $ sudo sysctl --system
# =============================================================================

- name: "RHEL-10-800160 | RHEL 10 must use a reverse-path filter for Internet Protocol version 4 (IPv4) network traffic when possible by default."
  when: rhel_10_800160 | bool
  tags:
    - RHEL-10-800160
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-800160 | Set sysctl net.ipv4.conf.default.rp_filter = 1"
      ansible.builtin.lineinfile:
        path: /etc/sysctl.d/rhel10-stig.conf
        regexp: '^#?\s*net\.ipv4\.conf\.default\.rp_filter\s*='
        line: 'net.ipv4.conf.default.rp_filter = 1'
        create: true
        mode: '0644'
        owner: root
        group: root

    - name: "RHEL-10-800160 | Apply sysctl settings from conf file"
      ansible.builtin.command:
        cmd: sysctl -p /etc/sysctl.d/rhel10-stig.conf
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800160 | Verify net.ipv4.conf.default.rp_filter"
      ansible.builtin.command:
        cmd: sysctl net.ipv4.conf.default.rp_filter
      register: rhel_10_800160_sysctl
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800160 | Assert net.ipv4.conf.default.rp_filter = 1"
      ansible.builtin.assert:
        that: "'= 1' in rhel_10_800160_sysctl.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-800160 detail=net.ipv4.conf.default.rp_filter is not set to 1 (output={{ rhel_10_800160_sysctl.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-800160 detail=net.ipv4.conf.default.rp_filter is set to 1."

  rescue:
    - name: "RHEL-10-800160 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-800160 detail=Task failed unexpectedly — see prior error for details."
