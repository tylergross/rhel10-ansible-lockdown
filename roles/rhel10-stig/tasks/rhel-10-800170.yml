---
# =============================================================================
# STIG ID  : RHEL-10-800170
# Rule ID  : SV-281349r1167197_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must not respond to Internet Control Message Protocol (ICMP) echoes sent to a broadcast address.
#
# Description:
#   Responding to broadcast (ICMP) echoes facilitates network mapping and
#   provides a vector for amplification attacks. Ignoring ICMP echo requests
#   (pings) sent to broadcast or multicast addresses makes the system
#   slightly more difficult to enumerate on the network. Satisfies:
#   SRG-OS-000420-GPOS-00186, SRG-OS-000142-GPOS-00080
#
# Check Text:
#   Verify RHEL 10 ignores ICMP echoes sent to a broadcast address.
#
#   Check the value of the "net.ipv4.icmp_echo_ignore_broadcasts" variable
#   with the following command:
#
#   $ sudo sysctl net.ipv4.icmp_echo_ignore_broadcasts
#   net.ipv4.icmp_echo_ignore_broadcasts = 1
#
#   If "net.ipv4.icmp_echo_ignore_broadcasts" is not set to "1" or is
#   missing, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to ignore Internet Protocol version 4 (IPv4) ICMP
#   echoes sent to a broadcast address.
#
#   Create a configuration file if it does not already exist:
#
#   $ sudo vi /etc/sysctl.d/ipv4_icmp_echo_ignore_broadcasts.conf
#
#   Add the following line to the file:
#
#   net.ipv4.icmp_echo_ignore_broadcasts = 1
#
#   Reload settings from all system configuration files with the following
#   command:
#
#   $ sudo sysctl --system
# =============================================================================

- name: "RHEL-10-800170 | RHEL 10 must not respond to Internet Control Message Protocol (ICMP) echoes sent to a broadcast address."
  when: rhel_10_800170 | bool
  tags:
    - RHEL-10-800170
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-800170 | Set sysctl net.ipv4.icmp_echo_ignore_broadcasts = 1"
      ansible.posix.sysctl:
        name: net.ipv4.icmp_echo_ignore_broadcasts
        value: '1'
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/rhel10-stig.conf

    - name: "RHEL-10-800170 | Verify net.ipv4.icmp_echo_ignore_broadcasts"
      ansible.builtin.command:
        cmd: sysctl net.ipv4.icmp_echo_ignore_broadcasts
      register: rhel_10_800170_sysctl
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800170 | Assert net.ipv4.icmp_echo_ignore_broadcasts = 1"
      ansible.builtin.assert:
        that: "'= 1' in rhel_10_800170_sysctl.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-800170 detail=net.ipv4.icmp_echo_ignore_broadcasts is not set to 1 (output={{ rhel_10_800170_sysctl.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-800170 detail=net.ipv4.icmp_echo_ignore_broadcasts is set to 1."

  rescue:
    - name: "RHEL-10-800170 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-800170 detail=Task failed unexpectedly — see prior error for details."
