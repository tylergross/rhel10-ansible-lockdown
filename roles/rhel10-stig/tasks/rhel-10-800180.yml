---
# =============================================================================
# STIG ID  : RHEL-10-800180
# Rule ID  : SV-281350r1167200_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must limit the number of bogus Internet Control Message Protocol (ICMP) response errors logs.
#
# Description:
#   Some routers will send responses to broadcast frames that violate
#   RFC-1122, which fills up a log file system with many useless error
#   messages. An attacker may take advantage of this and attempt to flood the
#   logs with bogus error logs. Ignoring bogus ICMP error responses reduces
#   log size, although some activity would not be logged. Satisfies:
#   SRG-OS-000420-GPOS-00186, SRG-OS-000142-GPOS-00081
#
# Check Text:
#   Verify RHEL 10 limits the number of bogus ICMP response errors logs.
#
#   Check the value of the "net.ipv4.icmp_ignore_bogus_error_response"
#   variables with the following command:
#
#   $ sudo sysctl net.ipv4.icmp_ignore_bogus_error_responses
#   net.ipv4.icmp_ignore_bogus_error_responses = 1
#
#   If "net.ipv4.icmp_ignore_bogus_error_response" is not set to "1" or is
#   missing, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to not log bogus ICMP errors.
#
#   Create a configuration file if it does not already exist:
#
#   $ sudo vi /etc/sysctl.d/ipv4_icmp_ignore_bogus_error_responses.conf
#
#   Add the following line to the file:
#
#   net.ipv4.icmp_ignore_bogus_error_responses = 1
#
#   Reload settings from all system configuration files with the following
#   command:
#
#   $ sudo sysctl --system
# =============================================================================

- name: "RHEL-10-800180 | RHEL 10 must limit the number of bogus Internet Control Message Protocol (ICMP) response errors logs."
  when: rhel_10_800180 | bool
  tags:
    - RHEL-10-800180
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-800180 | Set sysctl net.ipv4.icmp_ignore_bogus_error_responses = 1"
      ansible.posix.sysctl:
        name: net.ipv4.icmp_ignore_bogus_error_responses
        value: '1'
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/rhel10-stig.conf

    - name: "RHEL-10-800180 | Verify net.ipv4.icmp_ignore_bogus_error_responses"
      ansible.builtin.command:
        cmd: sysctl net.ipv4.icmp_ignore_bogus_error_responses
      register: rhel_10_800180_sysctl
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800180 | Assert net.ipv4.icmp_ignore_bogus_error_responses = 1"
      ansible.builtin.assert:
        that: "'= 1' in rhel_10_800180_sysctl.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-800180 detail=net.ipv4.icmp_ignore_bogus_error_responses is not set to 1 (output={{ rhel_10_800180_sysctl.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-800180 detail=net.ipv4.icmp_ignore_bogus_error_responses is set to 1."

  rescue:
    - name: "RHEL-10-800180 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-800180 detail=Task failed unexpectedly — see prior error for details."
