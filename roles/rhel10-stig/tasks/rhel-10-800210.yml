---
# =============================================================================
# STIG ID  : RHEL-10-800210
# Rule ID  : SV-281353r1167209_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must not enable Internet Protocol version 4 (IPv4) packet forwarding unless the system is a router.
#
# Description:
#   Routing protocol daemons are typically used on routers to exchange
#   network topology information with other routers. If this capability is
#   used when not required, system network information may be transmitted
#   unnecessarily across the network. Satisfies: SRG-OS-000420-GPOS-00186,
#   SRG-OS-000142-GPOS-00084
#
# Check Text:
#   Verify RHEL 10 is not performing IPv4 packet forwarding unless the system
#   is a router.
#
#   Check that "net.ipv4.conf.all.forwarding" is disabled using the following
#   command:
#
#   $ sudo sysctl net.ipv4.conf.all.forwarding
#   net.ipv4.conf.all.forwarding = 0
#
#   If "net.ipv4.conf.all.forwarding" is not set to "0" and is not documented
#   with the information system security officer as an operational
#   requirement or is missing, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to not allow IPv4 packet forwarding unless the system
#   is a router.
#
#   Create a configuration file if it does not already exist:
#
#   $ sudo vi /etc/sysctl.d/ipv4_forwarding.conf
#
#   Add the following line to the file:
#
#   net.ipv4.conf.all.forwarding = 0
#
#   Reload settings from all system configuration files with the following
#   command:
#
#   $ sudo sysctl --system
# =============================================================================

- name: "RHEL-10-800210 | RHEL 10 must not enable Internet Protocol version 4 (IPv4) packet forwarding unless the system is a router."
  when: rhel_10_800210 | bool
  tags:
    - RHEL-10-800210
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-800210 | Set sysctl net.ipv4.conf.all.forwarding = 0"
      ansible.posix.sysctl:
        name: net.ipv4.conf.all.forwarding
        value: '0'
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/rhel10-stig.conf

    - name: "RHEL-10-800210 | Verify net.ipv4.conf.all.forwarding"
      ansible.builtin.command:
        cmd: sysctl net.ipv4.conf.all.forwarding
      register: rhel_10_800210_sysctl
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800210 | Assert net.ipv4.conf.all.forwarding = 0"
      ansible.builtin.assert:
        that: "'= 0' in rhel_10_800210_sysctl.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-800210 detail=net.ipv4.conf.all.forwarding is not set to 0 (output={{ rhel_10_800210_sysctl.stdout | trim }}). Only set to 1 if this system is a documented router."
        success_msg: "result=PASS stig_id=RHEL-10-800210 detail=net.ipv4.conf.all.forwarding is set to 0."

  rescue:
    - name: "RHEL-10-800210 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-800210 detail=Task failed unexpectedly — see prior error for details."
