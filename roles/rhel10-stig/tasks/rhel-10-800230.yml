---
# =============================================================================
# STIG ID  : RHEL-10-800230
# Rule ID  : SV-281355r1167215_rule
# Severity : medium
# CCI      : CCI-002385
# Title    : RHEL 10 must ignore IPv6 Internet Control Message Protocol (ICMP) redirect messages.
#
# Description:
#   An illicit ICMP redirect message could result in a man-in-the-middle
#   attack. Satisfies: SRG-OS-000420-GPOS-00186, SRG-OS-000142-GPOS-00086
#
# Check Text:
#   Note: If IPv6 is disabled on the system, this requirement is not
#   applicable.
#
#   Verify RHEL 10 ignores IPv6 ICMP redirect messages.
#
#   Check the value of the "net.ipv6.conf.all.accept_redirects" variable with
#   the following command:
#
#   $ sysctl net.ipv6.conf.all.accept_redirects
#   net.ipv6.conf.all.accept_redirects = 0
#
#   If "net.ipv6.conf.all.accept_redirects" is not set to "0" or is missing,
#   this is a finding.
#
# Fix Text:
#   Configure RHEL 10 to ignore Internet Protocol version 6 (IPv6) ICMP
#   redirect messages.
#
#   Create a configuration file if it does not already exist:
#
#   $ sudo vi /etc/sysctl.d/ipv6_accept_redirects.conf
#
#   Add the following line to the file:
#
#   net.ipv6.conf.all.accept_redirects = 0
#
#   Reload settings from all system configuration files with the following
#   command:
#
#   $ sudo sysctl --system
# =============================================================================

- name: "RHEL-10-800230 | RHEL 10 must ignore IPv6 Internet Control Message Protocol (ICMP) redirect messages."
  when: rhel_10_800230 | bool
  tags:
    - RHEL-10-800230
    - medium
    - CCI-002385
  block:
    - name: "RHEL-10-800230 | Set sysctl net.ipv6.conf.all.accept_redirects = 0"
      ansible.builtin.lineinfile:
        path: /etc/sysctl.d/rhel10-stig.conf
        regexp: '^#?\s*net\.ipv6\.conf\.all\.accept_redirects\s*='
        line: 'net.ipv6.conf.all.accept_redirects = 0'
        create: true
        mode: '0644'
        owner: root
        group: root

    - name: "RHEL-10-800230 | Apply sysctl settings from conf file"
      ansible.builtin.command:
        cmd: sysctl -p /etc/sysctl.d/rhel10-stig.conf
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800230 | Verify net.ipv6.conf.all.accept_redirects"
      ansible.builtin.command:
        cmd: sysctl net.ipv6.conf.all.accept_redirects
      register: rhel_10_800230_sysctl
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800230 | Assert net.ipv6.conf.all.accept_redirects = 0"
      ansible.builtin.assert:
        that: "'= 0' in rhel_10_800230_sysctl.stdout"
        fail_msg: "result=FAIL stig_id=RHEL-10-800230 detail=net.ipv6.conf.all.accept_redirects is not set to 0 (output={{ rhel_10_800230_sysctl.stdout | trim }})."
        success_msg: "result=PASS stig_id=RHEL-10-800230 detail=net.ipv6.conf.all.accept_redirects is set to 0."

  rescue:
    - name: "RHEL-10-800230 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-800230 detail=Task failed unexpectedly — see prior error for details."
