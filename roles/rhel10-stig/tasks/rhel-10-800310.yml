---
# =============================================================================
# STIG ID  : RHEL-10-800310
# Rule ID  : SV-281363r1195454_rule
# Severity : medium
# CCI      : CCI-000197
# Title    : RHEL 10 must be configured to operate in secure mode if the Trivial File Transfer Protocol (TFTP) server service is required.
#
# Description:
#   Restricting TFTP to a specific directory prevents remote users from
#   copying, transferring, or overwriting system files.
#
# Check Text:
#   Note: If a TFTP server is not installed, this rule is not applicable.
#
#   Verify RHEL 10 is configured to operate in secure mode if the TFTP server
#   service is required.
#
#   Determine if the TFTP server is installed with the following command:
#
#   $ sudo dnf list installed | grep tftp-server
#   tftp-server.x86_64 5.2-48.el10 @rhel-10-for-x86_64-appstream-rpms
#
#   Verify that the TFTP daemon, if "tftp.server" is installed, is configured
#   to operate in secure mode with the following command:
#
#   $ systemctl cat tftp.service | grep -i execstart
#   ExecStart=/usr/sbin/in.tftpd -s /var/lib/tftpboot
#
#   Note: The "-s" option ensures that the TFTP server serves only files from
#   the specified directory, which is a security measure to prevent
#   unauthorized access to other parts of the file system.
#
#   If the TFTP server is installed, but the TFTP daemon is not configured to
#   operate in secure mode, and tftp is not documented as critical to the
#   mission with the information system security officer, this is a finding.
#
# Fix Text:
#   Configure RHEL 10 TFTP to operate in secure mode with the following
#   command:
#
#   $ sudo systemctl edit tftp.service
#
#   In the editor, enter the following:
#
#   [Service]
#   ExecStart=/usr/sbin/in.tftpd -s /var/lib/tftpboot
#
#   After making changes, reload the systemd daemon and restart the TFTP
#   service as follows:
#
#   $ sudo systemctl daemon-reload
#   $ sudo systemctl restart tftp.service
# =============================================================================

- name: "RHEL-10-800310 | RHEL 10 must be configured to operate in secure mode if the Trivial File Transfer Protocol (TFTP) server service is required."
  when: rhel_10_800310 | bool
  tags:
    - RHEL-10-800310
    - medium
    - CCI-000197
  block:
    - name: "RHEL-10-800310 | Check if tftp-server is installed"
      ansible.builtin.command:
        cmd: rpm -q tftp-server
      register: rhel_10_800310_rpm
      changed_when: false
      failed_when: false

    - name: "RHEL-10-800310 | Check tftp.service ExecStart for -s flag"
      ansible.builtin.command:
        cmd: systemctl cat tftp.service
      register: rhel_10_800310_unit
      changed_when: false
      failed_when: false
      when: rhel_10_800310_rpm.rc == 0

    - name: "RHEL-10-800310 | Assert tftp is not installed or runs in secure mode"
      ansible.builtin.assert:
        that: >
          rhel_10_800310_rpm.rc != 0 or
          (rhel_10_800310_unit.stdout is defined and
           '-s' in rhel_10_800310_unit.stdout)
        fail_msg: "result=FAIL stig_id=RHEL-10-800310 detail=tftp-server is installed but ExecStart does not include the -s (secure mode) flag. Edit the service with: systemctl edit tftp.service"
        success_msg: "result=PASS stig_id=RHEL-10-800310 detail={{ 'tftp-server is not installed — control not applicable.' if rhel_10_800310_rpm.rc != 0 else 'tftp-server is running in secure mode (-s flag present).' }}"

  rescue:
    - name: "RHEL-10-800310 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-800310 detail=Task failed unexpectedly — see prior error for details."
