---
# =============================================================================
# STIG ID  : RHEL-10-900000
# Rule ID  : SV-281364r1167242_rule
# Severity : medium
# CCI      : CCI-000171
# Title    : RHEL 10 must enforce mode "0640" or less for the "/etc/audit/auditd.conf" file to prevent unauthorized access.
#
# Description:
#   Without the capability to restrict the roles and individuals that can
#   select which events are audited, unauthorized personnel may be able to
#   prevent the auditing of critical events. Misconfigured audits may degrade
#   the system's performance by overwhelming the audit log. Misconfigured
#   audits may also make it more difficult to establish, correlate, and
#   investigate the events relating to an incident or identify those
#   responsible for one.
#
# Check Text:
#   Verify RHEL 10 enforces the mode of "/etc/audit/auditd.conf" with the
#   following command:
#
#   $ sudo stat -c "%a %n" /etc/audit/auditd.conf
#   640 /etc/audit/auditd.conf
#
#   If "/etc/audit/auditd.conf" does not have a mode of "0640", this is a
#   finding.
#
# Fix Text:
#   Configure RHEL 10 to set the mode of the "/etc/audit/auditd.conf" file to
#   "0640" with the following command:
#
#   $ sudo chmod 0640 /etc/audit/auditd.conf
# =============================================================================

- name: "RHEL-10-900000 | RHEL 10 must enforce mode 0640 or less for /etc/audit/auditd.conf to prevent unauthorized access."
  when: rhel_10_900000 | bool
  tags:
    - RHEL-10-900000
    - medium
    - CCI-000171
  block:
    - name: "RHEL-10-900000 | Check permissions on /etc/audit/auditd.conf"
      ansible.builtin.stat:
        path: /etc/audit/auditd.conf
      register: rhel_10_900000_stat

    - name: "RHEL-10-900000 | Set mode 0640 on /etc/audit/auditd.conf"
      ansible.builtin.file:
        path: /etc/audit/auditd.conf
        mode: '0640'
      when:
        - rhel_10_900000_stat.stat.exists
        - rhel_10_900000_stat.stat.mode | int(base=8) > 0o640

    - name: "RHEL-10-900000 | Re-check permissions on /etc/audit/auditd.conf"
      ansible.builtin.stat:
        path: /etc/audit/auditd.conf
      register: rhel_10_900000_verify

    - name: "RHEL-10-900000 | Assert /etc/audit/auditd.conf has mode 0640 or less"
      ansible.builtin.assert:
        that:
          - rhel_10_900000_verify.stat.exists
          - rhel_10_900000_verify.stat.mode | int(base=8) <= 0o640
        fail_msg: "result=FAIL stig_id=RHEL-10-900000 detail=/etc/audit/auditd.conf does not have mode 0640 or less (mode={{ rhel_10_900000_verify.stat.mode }})."
        success_msg: "result=PASS stig_id=RHEL-10-900000 detail=/etc/audit/auditd.conf has mode {{ rhel_10_900000_verify.stat.mode }} (0640 or less)."

  rescue:
    - name: "RHEL-10-900000 | RESCUE - record failure and continue"
      ansible.builtin.debug:
        msg: "result=ERROR stig_id=RHEL-10-900000 detail=Task failed unexpectedly — see prior error for details."
